<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seamless Vibrant Fluid Art</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020202;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 25px;
            box-sizing: border-box;
        }
        .instruction {
            color: rgba(255, 255, 255, 0.9);
            font-size: 13px;
            letter-spacing: 3px;
            text-align: center;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.7);
            animation: pulse 2.5s infinite ease-in-out;
            width: 100%;
        }
        .controls-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            width: 100%;
        }
        .bg-selector {
            pointer-events: auto;
            display: flex;
            gap: 12px;
        }
        .bg-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.85);
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 12px;
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .bg-btn:hover, .bg-btn.active {
            background: rgba(255, 255, 255, 0.25);
            border-color: #fff;
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        .hotkeys {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            text-align: right;
            line-height: 1.8;
        }
        .hotkeys span {
            color: #fff;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 4px;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        @keyframes pulse {
            0% { opacity: 0.5; text-shadow: 0 0 5px rgba(255,255,255,0.2); }
            50% { opacity: 1; text-shadow: 0 0 25px rgba(255,255,255,0.8); }
            100% { opacity: 0.5; text-shadow: 0 0 5px rgba(255,255,255,0.2); }
        }
    </style>
</head>
<body>

    <canvas id="fluidCanvas"></canvas>

    <div id="ui-container">
        <div class="instruction">Move your mouse to print the fluid</div>
        
        <div class="controls-info">
            <div class="bg-selector" id="bgSelector">
                <button class="bg-btn active" data-bg="0">Neon Midnight</button>
                <button class="bg-btn" data-bg="1">Cyber Punk Pink</button>
                <button class="bg-btn" data-bg="2">Emerald Aurora</button>
                <button class="bg-btn" data-bg="3">Obsidian Black</button>
            </div>
            <div class="hotkeys">
                [Drag] Flow Fluid / [Click] Vibrant Burst<br>
                <span>Space</span> Clear Canvas | <span>C</span> Next Colors | <span>S</span> Export Art
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('fluidCanvas');
        const ctx = canvas.getContext('2d');

        const backgrounds = [
            'linear-gradient(135deg, #050814 0%, #020205 100%)',
            'radial-gradient(circle at 50% 90%, #240517 0%, #020106 100%)',
            'radial-gradient(circle at 10% 10%, #041a12 0%, #010403 100%)',
            '#000000'
        ];
        let currentBgIndex = 0;

        const palettes = [
            ['#ff0055', '#00ffcc', '#0099ff', '#ffec00', '#ff00ff'], 
            ['#39ff14', '#ff073a', '#00e5ff', '#ff007f', '#ffff00'], 
            ['#e100ff', '#00ff87', '#0061ff', '#ffe985', '#ff4e50'], 
            ['#ff003c', '#00f6ff', '#f8ff17', '#ae00ff', '#00ff55'] 
        ];
        let currentPaletteIndex = 0;

        // 마우스 트래킹 제어 구조 고도화 (궤적 연속성 확보용)
        let mouse = { x: 0, y: 0, px: 0, py: 0, isDown: false, moved: false, firstFrame: true };

        const SCALE = 7; 
        let width, height, simWidth, simHeight;
        let grid = [];
        let particles = [];

        function initDims() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            simWidth = Math.ceil(width / SCALE);
            simHeight = Math.ceil(height / SCALE);
            
            grid = [];
            for (let i = 0; i < simWidth * simHeight; i++) {
                grid.push({
                    u: 0, v: 0,
                    uOld: 0, vOld: 0,
                    r: 0, g: 0, b: 0,
                    density: 0
                });
            }
        }

        function getRandomColorFromPalette() {
            const colors = palettes[currentPaletteIndex];
            const hex = colors[Math.floor(Math.random() * colors.length)];
            return {
                r: parseInt(hex.slice(1, 3), 16) / 255,
                g: parseInt(hex.slice(3, 5), 16) / 255,
                b: parseInt(hex.slice(5, 7), 16) / 255
            };
        }

        function injectFluidAtPoint(simX, simY, dx, dy, color, radius, forceMultiplier) {
            for (let row = -radius; row <= radius; row++) {
                for (let col = -radius; col <= radius; col++) {
                    const targetX = simX + col;
                    const targetY = simY + row;

                    if (targetX >= 0 && targetX < simWidth && targetY >= 0 && targetY < simHeight) {
                        const dist = Math.sqrt(col * col + row * row);
                        if (dist <= radius) {
                            const falloff = 1.0 - (dist / radius);
                            const idx = targetX + targetY * simWidth;
                            
                            // 속도장 연속 주입
                            grid[idx].u += dx * falloff * 0.35 * forceMultiplier;
                            grid[idx].v += dy * falloff * 0.35 * forceMultiplier;
                            
                            // 선명한 네온 컬러 블렌딩 레이션 안정화
                            grid[idx].r = Math.min(1.0, grid[idx].r * 0.25 + color.r * falloff * 0.95);
                            grid[idx].g = Math.min(1.0, grid[idx].g * 0.25 + color.g * falloff * 0.95);
                            grid[idx].b = Math.min(1.0, grid[idx].b * 0.25 + color.b * falloff * 0.95);
                            grid[idx].density = Math.min(1.0, grid[idx].density + falloff * 0.95);
                        }
                    }
                }
            }
        }

        // ★ 선 끊김 해결: 이전 좌표와 현재 좌표 사이를 촘촘하게 메우는 선형 보간 함수
        function injectFluidLine(x1, y1, x2, y2, dx, dy, color, radius = 3, forceMultiplier = 1) {
            const distance = Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
            
            // 마우스 속도에 비례하여 스텝 수를 대폭 조절하여 완벽한 선 형성 (공백 파괴)
            const steps = Math.max(1, Math.floor(distance / (SCALE / 2.5))); 

            for (let i = 0; i <= steps; i++) {
                const t = i / steps;
                const currX = x1 + (x2 - x1) * t;
                const currY = y1 + (y2 - y1) * t;
                
                const simX = Math.floor(currX / SCALE);
                const simY = Math.floor(currY / SCALE);
                
                injectFluidAtPoint(simX, simY, dx, dy, color, radius, forceMultiplier);
            }
        }

        function triggerBurst(x, y) {
            const baseColor = getRandomColorFromPalette();
            const burstRadius = 8;
            const simX = Math.floor(x / SCALE);
            const simY = Math.floor(y / SCALE);

            for (let row = -burstRadius; row <= burstRadius; row++) {
                for (let col = -burstRadius; col <= burstRadius; col++) {
                    const targetX = simX + col;
                    const targetY = simY + row;

                    if (targetX >= 0 && targetX < simWidth && targetY >= 0 && targetY < simHeight) {
                        const dist = Math.sqrt(col * col + row * row);
                        if (dist > 0 && dist <= burstRadius) {
                            const falloff = 1.0 - (dist / burstRadius);
                            const idx = targetX + targetY * simWidth;
                            
                            const angle = Math.atan2(row, col);
                            const force = 14 * falloff;
                            
                            grid[idx].u += Math.cos(angle) * force;
                            grid[idx].v += Math.sin(angle) * force;
                            
                            const randCol = getRandomColorFromPalette();
                            grid[idx].r = Math.min(1.0, grid[idx].r * 0.1 + randCol.r * falloff * 1.6);
                            grid[idx].g = Math.min(1.0, grid[idx].g * 0.1 + randCol.g * falloff * 1.6);
                            grid[idx].b = Math.min(1.0, grid[idx].b * 0.1 + randCol.b * falloff * 1.6);
                            grid[idx].density = Math.min(1.0, grid[idx].density + falloff * 1.6);
                        }
                    }
                }
            }

            for (let i = 0; i < 80; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 11 + 4;
                const pColor = Math.random() > 0.2 ? baseColor : getRandomColorFromPalette();
                particles.push({
                    x: x, y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: Math.random() * 3.5 + 1.5,
                    alpha: 1.0,
                    decay: Math.random() * 0.012 + 0.008,
                    r: Math.floor(pColor.r * 255),
                    g: Math.floor(pColor.g * 255),
                    b: Math.floor(pColor.b * 255)
                });
            }
        }

        function spawnSparkle(x, y, vx, vy) {
            if (Math.random() > 0.35) return;
            const c = getRandomColorFromPalette();
            particles.push({
                x: x, y: y,
                vx: vx * 0.18 + (Math.random() - 0.5) * 3,
                vy: vy * 0.18 + (Math.random() - 0.5) * 3,
                size: Math.random() * 2 + 1,
                alpha: 0.95,
                decay: Math.random() * 0.015 + 0.008,
                r: Math.floor(c.r * 255),
                g: Math.floor(c.g * 255),
                b: Math.floor(c.b * 255)
            });
        }

        function updateFluid() {
            const viscosity = 0.988; 
            const diffusion = 1.0; // 강제 영구 유지 모드

            for (let y = 1; y < simHeight - 1; y++) {
                for (let x = 1; x < simWidth - 1; x++) {
                    const idx = x + y * simWidth;
                    const cell = grid[idx];

                    let oldX = x - cell.u * 0.38;
                    let oldY = y - cell.v * 0.38;

                    if (oldX < 0.5) oldX = 0.5; if (oldX > simWidth - 1.5) oldX = simWidth - 1.5;
                    if (oldY < 0.5) oldY = 0.5; if (oldY > simHeight - 1.5) oldY = simHeight - 1.5;

                    const i0 = Math.floor(oldX), i1 = i0 + 1;
                    const j0 = Math.floor(oldY), j1 = j0 + 1;
                    const s1 = oldX - i0, s0 = 1 - s1;
                    const t1 = oldY - j0, t0 = 1 - t1;

                    const cell00 = grid[i0 + j0 * simWidth];
                    const cell10 = grid[i1 + j0 * simWidth];
                    const cell01 = grid[i0 + j1 * simWidth];
                    const cell11 = grid[i1 + j1 * simWidth];

                    cell.uOld = s0 * (t0 * cell00.u + t1 * cell01.u) + s1 * (t0 * cell10.u + t1 * cell11.u);
                    cell.vOld = s0 * (t0 * cell00.v + t1 * cell01.v) + s1 * (t0 * cell10.v + t1 * cell11.v);
                    
                    cell.r = (s0 * (t0 * cell00.r + t1 * cell01.r) + s1 * (t0 * cell10.r + t1 * cell11.r)) * diffusion;
                    cell.g = (s0 * (t0 * cell00.g + t1 * cell01.g) + s1 * (t0 * cell10.g + t1 * cell11.g)) * diffusion;
                    cell.b = (s0 * (t0 * cell00.b + t1 * cell01.b) + s1 * (t0 * cell10.b + t1 * cell11.b)) * diffusion;
                    cell.density = (s0 * (t0 * cell00.density + t1 * cell01.density) + s1 * (t0 * cell10.density + t1 * cell11.density)) * diffusion;
                }
            }

            for (let i = 0; i < grid.length; i++) {
                grid[i].u = grid[i].uOld * viscosity;
                grid[i].v = grid[i].vOld * viscosity;
                
                if (grid[i].density < 0.0005) {
                    grid[i].density = 0;
                    grid[i].r = grid[i].g = grid[i].b = 0;
                }
            }
        }

        function draw() {
            ctx.fillStyle = canvas.style.background = backgrounds[currentBgIndex];
            ctx.fillRect(0, 0, width, height);

            ctx.save();
            ctx.globalCompositeOperation = 'lighter'; 
            ctx.filter = 'blur(4px) saturate(200%) contrast(125%)'; 

            const imgData = ctx.createImageData(simWidth, simHeight);
            const data = imgData.data;

            for (let i = 0; i < grid.length; i++) {
                const cell = grid[i];
                const d = cell.density;
                const idx = i * 4;

                if (d > 0) {
                    data[idx]     = Math.floor(cell.r * 255);
                    data[idx + 1] = Math.floor(cell.g * 255);
                    data[idx + 2] = Math.floor(cell.b * 255);
                    data[idx + 3] = Math.min(255, Math.floor(d * 255 * 2.2)); 
                }
            }

            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = simWidth;
            tempCanvas.height = simHeight;
            tempCanvas.getContext('2d').putImageData(imgData, 0, 0);

            ctx.imageSmoothingEnabled = true;
            ctx.drawImage(tempCanvas, 0, 0, width, height);
            ctx.restore();

            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vx *= 0.97;
                p.vy *= 0.97;
                p.alpha -= p.decay;

                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                    continue;
                }

                ctx.beginPath();
                ctx.fillStyle = `rgba(${p.r}, ${p.g}, ${p.b}, ${p.alpha})`;
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }

        function loop() {
            if (mouse.moved) {
                // 첫 진입 프레임일 때는 보간 건너뛰어 튐 현상 방지
                if (mouse.firstFrame) {
                    mouse.px = mouse.x;
                    mouse.py = mouse.y;
                    mouse.firstFrame = false;
                }

                const dx = mouse.x - mouse.px;
                const dy = mouse.y - mouse.py;
                const speed = Math.sqrt(dx * dx + dy * dy);
                const color = getRandomColorFromPalette();

                if (mouse.isDown) {
                    // 마우스 드래그: 속도에 맞춰 적절한 굵기의 끊김 없는 선 투입
                    const radius = Math.min(6, 2 + Math.floor(speed / 3));
                    injectFluidLine(mouse.px, mouse.py, mouse.x, mouse.y, dx, dy, color, radius, 1.5);
                    spawnSparkle(mouse.x, mouse.y, dx, dy);
                } else {
                    // 마우스 호버: 끊김 없는 실크 흐름 투입
                    injectFluidLine(mouse.px, mouse.py, mouse.x, mouse.y, dx, dy, color, 2, 0.6);
                    if (Math.random() > 0.5) spawnSparkle(mouse.x, mouse.y, dx, dy);
                }
                
                mouse.px = mouse.x;
                mouse.py = mouse.y;
                mouse.moved = false;
            }

            updateFluid();
            draw();
            requestAnimationFrame(loop);
        }

        function saveScreenshot() {
            const dataURL = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = `vibrant-fluid-art-${Date.now()}.png`;
            link.href = dataURL;
            link.click();
        }

        function clearSimulation() {
            for (let i = 0; i < grid.length; i++) {
                grid[i].u = grid[i].v = grid[i].uOld = grid[i].vOld = 0;
                grid[i].r = grid[i].g = grid[i].b = grid[i].density = 0;
            }
            particles = [];
        }

        function updateMousePos(e) {
            mouse.moved = true;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            mouse.x = clientX;
            mouse.y = clientY;
        }

        window.addEventListener('mousemove', updateMousePos);
        window.addEventListener('touchmove', updateMousePos, { passive: true });

        // 마우스가 화면 밖으로 나갔다 들어올 때 선이 튀는 것 방지
        window.addEventListener('mouseenter', (e) => {
            mouse.firstFrame = true;
        });

        window.addEventListener('mousedown', (e) => {
            if (e.target.tagName === 'BUTTON') return;
            mouse.isDown = true;
            mouse.firstFrame = true; // 클릭 순간 첫 좌표 스냅 고정
            updateMousePos(e);
            triggerBurst(mouse.x, mouse.y);
        });
        window.addEventListener('touchstart', (e) => {
            if (e.target.tagName === 'BUTTON') return;
            mouse.isDown = true;
            mouse.firstFrame = true;
            updateMousePos(e);
            triggerBurst(mouse.x, mouse.y);
        }, { passive: true });

        window.addEventListener('mouseup', () => mouse.isDown = false);
        window.addEventListener('touchend', () => mouse.isDown = false);

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                clearSimulation();
            } else if (e.key === 'c' || e.key === 'C') {
                currentPaletteIndex = (currentPaletteIndex + 1) % palettes.length;
            } else if (e.key === 's' || e.key === 'S') {
                saveScreenshot();
            }
        });

        document.getElementById('bgSelector').addEventListener('click', (e) => {
            if (e.target.classList.contains('bg-btn')) {
                document.querySelectorAll('.bg-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentBgIndex = parseInt(e.target.getAttribute('data-bg'));
            }
        });

        window.addEventListener('resize', () => {
            initDims();
        });

        initDims();
        loop();
    </script>
</body>
</html>
