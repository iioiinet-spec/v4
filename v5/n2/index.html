<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOD GEAR EVASION: DIMENSION CRACK</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        #ui-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }

        #score {
            font-size: 28px;
            font-weight: bold;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0,255,204,0.5);
        }

        #lives-container {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .heart {
            font-size: 32px;
            color: #ff3366;
            text-shadow: 0 0 10px rgba(255,51,102,0.5);
            transition: transform 0.2s;
        }

        .heart.lost {
            color: #444;
            text-shadow: none;
            transform: scale(0.8);
        }

        #pause-trigger {
            font-size: 28px;
            cursor: pointer;
            pointer-events: auto;
            transition: transform 0.2s;
            user-select: none;
        }
        #pause-trigger:hover {
            transform: scale(1.15) rotate(45deg);
        }

        /* 치트키 상황판 UI */
        #cheat-ui {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: grid;
            grid-template-columns: repeat(5, auto);
            gap: 8px 12px;
            z-index: 10;
            background: rgba(0,0,0,0.85);
            padding: 10px 16px;
            border-radius: 15px;
            border: 1px solid #555;
            font-size: 11px;
            font-weight: bold;
            pointer-events: none;
            box-shadow: 0 0 20px rgba(0,0,0,0.7);
            text-align: center;
        }
        .cheat-badge { color: #aaa; background: rgba(255,255,255,0.05); padding: 4px 8px; border-radius: 6px; }
        .cheat-badge span { color: #ffcc00; }

        /* 암호 입력 UI */
        #password-ui {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 36px;
            font-weight: bold;
            color: #ffcc00;
            text-shadow: 0 0 20px #ffcc00;
            display: none;
            z-index: 15;
            text-align: center;
            background: rgba(0,0,0,0.6);
            padding: 15px 30px;
            border-radius: 10px;
            border: 2px solid #ffcc00;
            pointer-events: none;
        }
        #password-timer {
            font-size: 24px;
            color: #ff3366;
            margin-top: 5px;
        }

        /* 대시보드 오버레이 */
        #msg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.94);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            transition: opacity 0.3s ease;
        }

        #game-title {
            font-size: 36px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-align: center;
            background: linear-gradient(45deg, #00ffcc, #ff3366);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0,255,204,0.2);
        }

        #game-subtitle {
            font-size: 15px;
            color: #888;
            margin-bottom: 40px;
            text-align: center;
        }

        .menu-grid {
            display: flex;
            gap: 25px;
            justify-content: center;
            align-items: center;
            max-width: 90%;
        }

        .menu-card {
            width: 180px;
            height: 180px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid #333;
            border-radius: 18px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.07);
            border-color: #ff3366;
            box-shadow: 0 0 20px rgba(255,51,102,0.3);
        }

        .menu-icon {
            font-size: 48px;
            margin-bottom: 15px;
            transition: transform 0.2s;
        }
        .menu-card:hover .menu-icon { transform: scale(1.15); }

        .menu-label {
            font-size: 16px;
            font-weight: bold;
            color: #ddd;
        }

        #settings-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 550px;
            max-width: 90%;
            background: #111;
            border-radius: 15px;
            padding: 25px;
            display: none;
            z-index: 30;
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
            border: 2px solid #00ffcc;
        }

        .modal-title { font-size: 22px; font-weight: bold; margin-bottom: 20px; text-align: center; }
        .title-settings { color: #00ffcc; }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
        }
        .setting-label { font-size: 16px; font-weight: bold; }
        .setting-toggle {
            padding: 6px 16px; background: #333; color: white; border: 1px solid #555; border-radius: 5px; cursor: pointer; font-weight: bold;
        }
        .setting-toggle.active { background: #00ffcc; color: #000; border-color: #00ffcc; }

        .modal-btn-group { display: flex; gap: 15px; justify-content: center; margin-top: 15px; }
        .close-btn { padding: 10px 24px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; text-align: center; }
        .btn-cyan { background: #00ffcc; color: #000; }
        .btn-gray { background: #444; color: #fff; }

        /* ⚔️ Canvas 스크린 */
        #boss2dCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 5;
            display: none;
            background: #000;
        }

        #go-screen-3d {
            position: absolute;
            top:0; left:0; width:100vw; height:100vh;
            z-index: 18; display: none; background: #000;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <!-- UI 레이어 -->
    <div id="ui-container">
        <div id="score">SCORE: 0</div>
        <div id="lives-container">
            <span id="heart1" class="heart">♥</span>
            <span id="heart2" class="heart">♥</span>
            <span id="heart3" class="heart">♥</span>
            <span id="pause-trigger" onclick="togglePause()">⚙️</span>
        </div>
    </div>

    <div id="cheat-ui">
        <div class="cheat-badge">[1] 회복: <span id="count1">3</span></div>
        <div class="cheat-badge">[2] 무적: <span id="count2">3</span></div>
        <div class="cheat-badge">[3] 대시: <span id="count3">3</span></div>
        <div class="cheat-badge">[4] 슬로우: <span id="count4">3</span></div>
        <div class="cheat-badge">[5] 폭발: <span id="count5">3</span></div>
        <div class="cheat-badge">[6] 워프: <span id="count6">3</span></div>
        <div class="cheat-badge">[7] 실드: <span id="count7">3</span></div>
        <div class="cheat-badge">[8] 리와인드: <span id="count8">2</span></div>
        <div class="cheat-badge">[9] 올클리어: <span id="count9">1</span></div>
    </div>

    <div id="password-ui">
        <div id="password-prompt">ENTER PASSWORD</div>
        <div id="password-display" style="letter-spacing: 5px; font-size: 42px; color: #ffcc00;">- - - -</div>
        <div id="password-timer">남은 시간: 5.0s</div>
    </div>

    <canvas id="boss2dCanvas"></canvas>
    <canvas id="go-screen-3d"></canvas>

    <!-- 대시보드 메인 메뉴 -->
    <div id="msg-overlay">
        <div id="game-title">GOD GEAR EVASION</div>
        <div id="game-subtitle">3D 신 가 기믹 회피 & 차원 균열 보스 레이싱</div>
        
        <div class="menu-grid">
            <div class="menu-card" onclick="startGame()">
                <div class="menu-icon">🎮</div>
                <div class="menu-label">GAME START</div>
            </div>
        </div>
    </div>

    <div id="settings-modal">
        <div class="modal-title title-settings">⚙️ PAUSE & SETTINGS</div>
        <div class="setting-row">
            <div class="setting-label">사운드 효과음 (Sound Effect)</div>
            <button id="sound-toggle-btn" class="setting-toggle active" onclick="toggleSound()">ON</button>
        </div>
        <div class="modal-btn-group">
            <button class="close-btn btn-cyan" onclick="togglePause()">게임 계속하기</button>
            <button class="close-btn btn-gray" onclick="exitToMainMenu()">메인 메뉴로</button>
        </div>
    </div>

    <script>
        // --- THREE.JS 설정 ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.03); 

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const clock = new THREE.Clock();

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4); scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0x00ffcc, 0.8); dirLight.position.set(5, 10, 7); scene.add(dirLight);
        const pointLight = new THREE.PointLight(0xff3366, 1, 15); pointLight.position.set(0, 2, 0); scene.add(pointLight);

        const trackWidth = 8;
        const trackGroup = new THREE.Group();
        const leftTrackGeom = new THREE.BoxGeometry(trackWidth/2, 0.2, 120);
        const rightTrackGeom = new THREE.BoxGeometry(trackWidth/2, 0.2, 120);
        const trackMaterial = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
        
        const leftTrack = new THREE.Mesh(leftTrackGeom, trackMaterial); leftTrack.position.set(-trackWidth/4, -0.1, 0); trackGroup.add(leftTrack);
        const rightTrack = new THREE.Mesh(rightTrackGeom, trackMaterial); rightTrack.position.set(trackWidth/4, -0.1, 0); trackGroup.add(rightTrack);
        scene.add(trackGroup);

        const gridHelper = new THREE.GridHelper(trackWidth, 60, 0x444444, 0x222222);
        gridHelper.position.y = 0.01; scene.add(gridHelper);

        const playerGeometry = new THREE.BoxGeometry(0.8, 0.8, 0.8);
        const playerMaterial = new THREE.MeshStandardMaterial({ color: 0x00ffcc, emissive: 0x00aa88, roughness: 0.2 });
        const playerMesh = new THREE.Mesh(playerGeometry, playerMaterial);
        playerMesh.position.set(0, 0.4, 0); 
        scene.add(playerMesh);

        const shieldGeometry = new THREE.SphereGeometry(0.65, 32, 32);
        const shieldMaterial = new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true, transparent: true, opacity: 0 });
        const playerShieldMesh = new THREE.Mesh(shieldGeometry, shieldMaterial);
        playerMesh.add(playerShieldMesh);

        camera.position.set(0, 3.5, 5);
        camera.lookAt(0, 1, -5);

        // --- CANVAS 세팅 ---
        const canvas2d = document.getElementById("boss2dCanvas");
        const ctx2d = canvas2d.getContext("2d");
        const goCanvas3d = document.getElementById("go-screen-3d");
        const ctxGo3d = goCanvas3d.getContext("2d");
        
        function resizeCanvases() {
            canvas2d.width = window.innerWidth; canvas2d.height = window.innerHeight;
            goCanvas3d.width = window.innerWidth; goCanvas3d.height = window.innerHeight;
        }
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            resizeCanvases();
        });
        resizeCanvases();

        // 시스템 전역 엔진 변수들
        let lives = 3; let score = 0; let isGameOver = true; let isPaused = false; let obstacles = [];
        let isJumping = false; let jumpVelocity = 0; const gravity = 0.012;
        let baseFloorY = 0.4; let targetX = 0; const laneWidth = 2.6; 
        let gameSpeed = 0.25; let spawnTimer = 0; let nextSpawnTime = 60;

        let isPhase2 = false; let keys = {};
        
        // 2D 보스전 데이터 구조
        let player2D = { x: 0, y: 0, size: 40, hp: 100, maxHp: 100, speed: 8 };
        let boss2D = { x: 0, y: -150, width: 250, height: 90, hp: 500, maxHp: 500, speed: 5, active: false };
        let walls2D = []; let projectiles2D = [];
        let deathTimer = 0; let goSequenceTimer = null;
        let wallInterval2D = null; let attackInterval2D = null;

        // 암호 트랩용 변수
        let activeTimedWall = null; let timedPasswordString = ""; let timedInputBuffer = "";
        let timedRemainingFrames = 300; let isFallingDead = false;

        let cheatCounts = { 1: 3, 2: 3, 3: 3, 4: 3, 5: 3, 6: 3, 7: 3, 8: 2, 9: 1 };
        let invincibilityFrames = 0; let dashEffectTimer = 0; let slowMotionTimer = 0; let hasActiveShield = false;

        let audioCtx; let isSoundOn = true;

        function playSound(freq, duration, type) {
            if (!isSoundOn) return;
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                
                if(type === 'jump') osc.frequency.exponentialRampToValueAtTime(freq * 2, audioCtx.currentTime + duration);
                else if (type === 'cheat') { osc.type = 'sine'; osc.frequency.exponentialRampToValueAtTime(freq * 1.6, audioCtx.currentTime + duration); gain.gain.setValueAtTime(0.08, audioCtx.currentTime); }
                else if (type === 'nuke') { osc.type = 'sawtooth'; osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + duration); gain.gain.setValueAtTime(0.15, audioCtx.currentTime); }
                else if (type === 'fall') { osc.type = 'sawtooth'; osc.frequency.linearRampToValueAtTime(300, 40, duration); gain.gain.setValueAtTime(0.2, audioCtx.currentTime); }
                else if (type === 'sawtooth' || type === 'square' || type === 'triangle') { osc.type = type; gain.gain.setValueAtTime(0.1, audioCtx.currentTime); }
                
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch (e) {}
        }

        function togglePause() {
            if (isGameOver) return;
            isPaused = !isPaused;
            document.getElementById('settings-modal').style.display = isPaused ? 'block' : 'none';
            if (!isPaused) { clock.getDelta(); animate(); }
        }

        function toggleSound() {
            isSoundOn = !isSoundOn;
            const btn = document.getElementById('sound-toggle-btn');
            btn.innerText = isSoundOn ? "ON" : "OFF";
            btn.classList.toggle('active', isSoundOn);
        }

        function exitToMainMenu() {
            isPaused = false; isGameOver = true; isPhase2 = false;
            document.getElementById('settings-modal').style.display = 'none';
            document.getElementById('password-ui').style.display = 'none';
            document.getElementById('boss2dCanvas').style.display = 'none';
            document.getElementById('go-screen-3d').style.display = 'none';
            clearInterval(wallInterval2D); clearInterval(attackInterval2D);
            if(goSequenceTimer) clearTimeout(goSequenceTimer);
            
            obstacles.forEach(obs => obs.meshes.forEach(m => scene.remove(m)));
            obstacles = [];
            
            document.getElementById('msg-overlay').style.display = 'flex';
            document.getElementById('msg-overlay').style.opacity = 1;
        }

        function startGame() {
            document.getElementById('msg-overlay').style.opacity = 0;
            setTimeout(() => document.getElementById('msg-overlay').style.display = 'none', 300);
            
            lives = 3; score = 0; isGameOver = false; isPaused = false; isPhase2 = false; isFallingDead = false;
            gameSpeed = 0.25; obstacles.forEach(obs => obs.meshes.forEach(m => scene.remove(m))); obstacles = [];
            targetX = 0; playerMesh.position.set(0, 0.4, 0); playerMesh.rotation.set(0,0,0); baseFloorY = 0.4;
            leftTrack.position.y = -0.1; rightTrack.position.y = -0.1;
            activeTimedWall = null; document.getElementById('password-ui').style.display = 'none';
            document.getElementById('go-screen-3d').style.display = 'none';
            
            cheatCounts = { 1: 3, 2: 3, 3: 3, 4: 3, 5: 3, 6: 3, 7: 3, 8: 2, 9: 1 };
            hasActiveShield = false; playerShieldMesh.material.opacity = 0;
            updateUI();
            
            clock.getDelta();
            animate();
        }

        function updateUI() {
            document.getElementById('score').innerText = `SCORE: ${score}`;
            for(let i=1; i<=3; i++) {
                document.getElementById(`heart${i}`).classList.toggle('lost', i > lives);
            }
            for(let key in cheatCounts) {
                const countSpan = document.getElementById(`count${key}`);
                if(countSpan) countSpan.innerText = cheatCounts[key];
            }
        }

        // --- 📊 확률 조정형 장애물 빌더 ---
        function createObstacle() {
            if (isPhase2 || isGameOver || isFallingDead) return;

            // 정밀 확률 분배 연산 (총합 100%)
            let rand = Math.random() * 100;
            let chosenType = 'CENTER_WALL';

            if (rand < 30) { chosenType = 'CENTER_WALL'; }       // 30%
            else if (rand < 60) { chosenType = 'WING_WALL'; }    // 30%
            else if (rand < 75) { chosenType = 'MOVING_WALL'; }  // 15%
            else if (rand < 90) { chosenType = 'JUMP_CENTER'; }  // 15%
            else { chosenType = 'TIMED_PASSWORD'; }              // 10%
            
            let obsZ = -60;
            let obstacleData = { meshes: [], type: chosenType, passed: false, moveDir: 1, speed: 0.08 };

            const redMat = new THREE.MeshStandardMaterial({ color: 0xff1144, roughness: 0.2 });
            const yellowMat = new THREE.MeshStandardMaterial({ color: 0xffcc00, roughness: 0.2 });
            const timedGateMat = new THREE.MeshStandardMaterial({ color: 0xff3300, emissive: 0x440000 });

            if (chosenType === 'CENTER_WALL') {
                const geom = new THREE.BoxGeometry(3, 2, 1); const mesh = new THREE.Mesh(geom, redMat);
                mesh.position.set(0, 1, obsZ); obstacleData.meshes.push(mesh);
            } else if (chosenType === 'WING_WALL') {
                const geom = new THREE.BoxGeometry(2.5, 2, 1);
                const m1 = new THREE.Mesh(geom, redMat); m1.position.set(-2.8, 1, obsZ);
                const m2 = new THREE.Mesh(geom, redMat); m2.position.set(2.8, 1, obsZ);
                obstacleData.meshes.push(m1, m2);
            } else if (chosenType === 'MOVING_WALL') {
                const geom = new THREE.BoxGeometry(2, 1.5, 1); const mesh = new THREE.Mesh(geom, yellowMat);
                mesh.position.set(-2.5, 0.75, obsZ); obstacleData.meshes.push(mesh);
            } else if (chosenType === 'JUMP_CENTER') {
                const geom = new THREE.BoxGeometry(8, 0.6, 1.2); const mesh = new THREE.Mesh(geom, redMat);
                mesh.position.set(0, 0.3, obsZ); obstacleData.meshes.push(mesh);
            } else if (chosenType === 'TIMED_PASSWORD') {
                const geom = new THREE.BoxGeometry(8.0, 5.0, 0.8); const mesh = new THREE.Mesh(geom, timedGateMat);
                mesh.position.set(0, 2.5, obsZ); obstacleData.meshes.push(mesh);
                
                const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ"; let pass = "";
                for(let i=0; i<4; i++) pass += chars.charAt(Math.floor(Math.random() * chars.length));
                obstacleData.password = pass;
            }

            obstacleData.meshes.forEach(m => scene.add(m));
            obstacles.push(obstacleData);
        }

        function triggerGameOverSequence() {
            isGameOver = true;
            deathTimer = Date.now();
            clearInterval(wallInterval2D);
            clearInterval(attackInterval2D);

            goSequenceTimer = setTimeout(() => {
                exitToMainMenu();
            }, 5000);
        }

        function switchPhase2() {
            isPhase2 = true;
            document.getElementById('boss2dCanvas').style.display = 'block';
            
            player2D.x = canvas2d.width / 2 - player2D.size / 2;
            player2D.y = canvas2d.height - 120;
            player2D.hp = 100;
            
            boss2D.x = canvas2d.width / 2 - boss2D.width / 2;
            boss2D.y = -150;
            boss2D.active = true;
            boss2D.hp = 500;
            
            walls2D = []; projectiles2D = [];
            
            playSound(180, 0.5, 'triangle');
            setTimeout(() => playSound(130, 0.6, 'triangle'), 200);

            // 2D 보스전 장애물 확률 밸런싱 세팅
            wallInterval2D = setInterval(() => {
                if(isGameOver) return;
                
                let rand2d = Math.random() * 100;
                let type = "NORMAL";
                let w = 60, h = 60, s = 6, color = "#FFF";
                
                if (rand2d < 45) { // 45% 일반형
                    type = "NORMAL";
                } else if (rand2d < 70) { // 25% 지그재그 교란형
                    type = "ZIGZAG"; w = 50; h = 50; s = 6; color = "#FFA500";
                } else if (rand2d < 90) { // 20% 고속 스피드형
                    type = "FAST"; w = 35; h = 35; s = 11; color = "#FFD700";
                } else { // 10% 거대 차단벽
                    type = "GIANT"; w = 220; h = 50; s = 5; color = "#9400D3";
                }
                
                let rx = Math.random() * (canvas2d.width - w);
                walls2D.push({ x: rx, y: -h, width: w, height: h, type: type, speed: s, color: color, dir: Math.random() < 0.5 ? -1 : 1 });
            }, 800);

            attackInterval2D = setInterval(() => {
                if (boss2D.y >= 50 && !isGameOver) {
                    projectiles2D.push({ x: boss2D.x + boss2D.width/2, y: boss2D.y + boss2D.height, radius: 12, speed: 7 });
                    playSound(120, 0.1, 'sawtooth');
                }
            }, 1000);
        }

        function drawHeart(ctx, x, y, size) {
            ctx.save(); ctx.beginPath(); ctx.translate(x, y); ctx.scale(size, size);
            for (let t = 0; t < Math.PI * 2; t += 0.02) {
                let hx = 16 * Math.pow(Math.sin(t), 3);
                let hy = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                if (t === 0) ctx.moveTo(hx, hy); else ctx.lineTo(hx, hy);
            }
            ctx.fillStyle = "#FF0000"; ctx.fill(); ctx.restore();
        }

        function update2DGame() {
            ctx2d.fillStyle = "#000"; ctx2d.fillRect(0, 0, canvas2d.width, canvas2d.height);

            if (!isGameOver) {
                if ((keys["ArrowLeft"] || keys["a"]) && player2D.x > 0) player2D.x -= player2D.speed;
                if ((keys["ArrowRight"] || keys["d"]) && player2D.x < canvas2d.width - player2D.size) player2D.x += player2D.speed;

                if (boss2D.y < 60) boss2D.y += 3;
                else {
                    boss2D.x += boss2D.speed;
                    if (boss2D.x <= 0 || boss2D.x >= canvas2d.width - boss2D.width) boss2D.speed *= -1;
                }

                ctx2d.fillStyle = "#FF1144";
                ctx2d.fillRect(boss2D.x, boss2D.y, boss2D.width, boss2D.height);

                for (let i = projectiles2D.length - 1; i >= 0; i--) {
                    let bp = projectiles2D[i]; bp.y += bp.speed;
                    ctx2d.beginPath(); ctx2d.arc(bp.x, bp.y, bp.radius, 0, Math.PI * 2);
                    ctx2d.fillStyle = "#FF3333"; ctx2d.fill();

                    if (bp.x > player2D.x && bp.x < player2D.x + player2D.size && bp.y > player2D.y && bp.y < player2D.y + player2D.size) {
                        player2D.hp -= 20; playSound(220, 0.15, 'square'); projectiles2D.splice(i, 1);
                    } else if (bp.y > canvas2d.height) projectiles2D.splice(i, 1);
                }

                for (let i = walls2D.length - 1; i >= 0; i--) {
                    let w = walls2D[i]; w.y += w.speed;
                    if (w.type === "ZIGZAG") {
                        w.x += w.dir * 4;
                        if (w.x <= 0 || w.x >= canvas2d.width - w.width) w.dir *= -1;
                    }
                    ctx2d.fillStyle = w.color; ctx2d.fillRect(w.x, w.y, w.width, w.height);

                    if (player2D.x < w.x + w.width && player2D.x + player2D.size > w.x && player2D.y < w.y + w.height && player2D.y + player2D.size > w.y) {
                        player2D.hp -= 15; playSound(280, 0.1, 'sawtooth'); walls2D.splice(i, 1); continue;
                    }
                    if (w.y > canvas2d.height) { walls2D.splice(i, 1); score += 5; updateUI(); }
                }

                ctx2d.fillStyle = "#00ffcc"; ctx2d.fillRect(player2D.x, player2D.y, player2D.size, player2D.size);

                if (player2D.hp < player2D.maxHp) {
                    let ratio = 1 - (player2D.hp / player2D.maxHp); let thick = ratio * 50;
                    ctx2d.strokeStyle = `rgba(255, 0, 0, ${ratio * 0.75})`; ctx2d.lineWidth = thick;
                    ctx2d.strokeRect(thick/2, thick/2, canvas2d.width - thick, canvas2d.height - thick);
                }

                if (player2D.hp <= 0) { player2D.hp = 0; triggerGameOverSequence(); }

                ctx2d.fillStyle = "#FFF"; ctx2d.font = "bold 22px Arial"; ctx2d.fillText(`SCORE: ${score}`, 30, 45);
                ctx2d.fillStyle = "#FF3366"; ctx2d.fillText(`PLAYER HP: ${player2D.hp}%`, 30, 80);
                ctx2d.fillStyle = "#FFCC00"; ctx2d.fillText("CRACK PHASE: 2D BOSS", canvas2d.width/2 - 120, 45);
            } else {
                let dt = Date.now() - deathTimer;
                let heartTime = dt / 1000; let hSize = 5;
                
                if (heartTime < 5.0) {
                    let pulse = Math.sin(heartTime * Math.PI * 3); hSize = 5 + Math.abs(pulse) * 2.5;
                    if (Math.floor(heartTime * 10) % 7 === 0 && Math.floor(heartTime * 10) !== 0) playSound(70, 0.08, 'sine');
                }

                drawHeart(ctx2d, canvas2d.width / 2, canvas2d.height / 2 - 50, hSize);
                ctx2d.fillStyle = "#FFF"; ctx2d.font = "bold 45px Arial"; ctx2d.textAlign = "center";
                ctx2d.fillText("GAME OVER", canvas2d.width / 2, canvas2d.height / 2 + 120);
                ctx2d.font = "bold 20px Arial"; ctx2d.fillStyle = "#888";
                ctx2d.fillText(`${(5.0 - heartTime).toFixed(1)}초 후 시작화면으로 이동`, canvas2d.width / 2, canvas2d.height / 2 + 170);
                ctx2d.textAlign = "left"; 
            }
        }

        function draw3DGameOverScreen() {
            ctxGo3d.fillStyle = "#000"; ctxGo3d.fillRect(0, 0, goCanvas3d.width, goCanvas3d.height);
            let dt = Date.now() - deathTimer;
            let heartTime = dt / 1000; let hSize = 5;
            
            let pulse = Math.sin(heartTime * Math.PI * 3); hSize = 5 + Math.abs(pulse) * 2.5;
            if (Math.floor(heartTime * 10) % 7 === 0 && Math.floor(heartTime * 10) !== 0) playSound(70, 0.08, 'sine');

            drawHeart(ctxGo3d, goCanvas3d.width / 2, goCanvas3d.height / 2 - 50, hSize);
            ctxGo3d.fillStyle = "#FFF"; ctxGo3d.font = "bold 45px Arial"; ctxGo3d.textAlign = "center";
            ctxGo3d.fillText("GAME OVER", goCanvas3d.width / 2, goCanvas3d.height / 2 + 120);
            ctxGo3d.font = "bold 20px Arial"; ctxGo3d.fillStyle = "#888";
            ctxGo3d.fillText(`${(5.0 - heartTime).toFixed(1)}초 후 시작화면으로 이동`, goCanvas3d.width / 2, goCanvas3d.height / 2 + 170);
            ctxGo3d.textAlign = "left";
        }

        function animate() {
            if (isGameOver && !isPhase2) {
                document.getElementById('go-screen-3d').style.display = 'block';
                draw3DGameOverScreen();
                requestAnimationFrame(animate);
                return;
            }
            if (isPaused) return;

            if (isPhase2) {
                update2DGame();
                requestAnimationFrame(animate);
                return;
            }

            const delta = clock.getDelta();

            let currentSpeed = gameSpeed;
            if (slowMotionTimer > 0) { slowMotionTimer--; currentSpeed = gameSpeed * 0.33; }
            if (invincibilityFrames > 0) invincibilityFrames--;
            if (dashEffectTimer > 0) { dashEffectTimer--; currentSpeed = gameSpeed * 2.5; }

            if (score >= 1000) {
                switchPhase2();
                requestAnimationFrame(animate);
                return;
            }

            if (isFallingDead) {
                playerMesh.position.y -= 0.25; playerMesh.rotation.x += 0.1; playerMesh.rotation.y += 0.05;
                if(playerMesh.position.y < -15) { triggerGameOverSequence(); }
                renderer.render(scene, camera);
                requestAnimationFrame(animate);
                return;
            }

            playerMesh.position.x += (targetX - playerMesh.position.x) * 0.25;

            if (isJumping) {
                playerMesh.position.y += jumpVelocity; jumpVelocity -= gravity;
                if (playerMesh.position.y <= baseFloorY) { playerMesh.position.y = baseFloorY; isJumping = false; jumpVelocity = 0; }
            }

            if (!activeTimedWall) {
                spawnTimer++;
                if (spawnTimer >= nextSpawnTime) { createObstacle(); spawnTimer = 0; nextSpawnTime = 45 + Math.random() * 40; }
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                if (activeTimedWall !== obs) { obs.meshes.forEach(m => m.position.z += currentSpeed * 60 * delta); }

                if (obs.type === 'MOVING_WALL') {
                    let firstMesh = obs.meshes[0]; firstMesh.position.x += obs.moveDir * obs.speed;
                    if (Math.abs(firstMesh.position.x) > 3.0) obs.moveDir *= -1;
                }

                let leader = obs.meshes[0];
                if (obs.type === 'TIMED_PASSWORD' && leader.position.z >= -3 && !obs.passed && activeTimedWall !== obs) {
                    activeTimedWall = obs; timedPasswordString = obs.password; timedInputBuffer = ""; timedRemainingFrames = 300;
                    document.getElementById('password-ui').style.display = 'block';
                    document.getElementById('password-display').innerText = `_ _ _ _ (힌트: ${timedPasswordString})`;
                }

                if (!obs.passed && activeTimedWall !== obs && !activeTimedWall && invincibilityFrames <= 0) {
                    obs.meshes.forEach(m => {
                        let boxPlayer = new THREE.Box3().setFromObject(playerMesh);
                        let boxObs = new THREE.Box3().setFromObject(m);
                        if (boxPlayer.intersectsBox(boxObs)) {
                            if (hasActiveShield) {
                                hasActiveShield = false; playerShieldMesh.material.opacity = 0; playSound(400, 0.3, 'sine');
                            } else {
                                lives--; playSound(150, 0.25, 'sawtooth'); updateUI();
                                if (lives <= 0) { triggerGameOverSequence(); }
                            }
                            obs.passed = true;
                        }
                    });
                }

                if (leader.position.z > 2 && !obs.passed) { obs.passed = true; score += 15; updateUI(); }
                if (leader.position.z > 10) { obs.meshes.forEach(m => scene.remove(m)); obstacles.splice(i, 1); }
            }

            if (activeTimedWall) {
                timedRemainingFrames--;
                document.getElementById('password-timer').innerText = `남은 시간: ${(timedRemainingFrames/60).toFixed(1)}s`;
                if (timedRemainingFrames <= 0) {
                    document.getElementById('password-ui').style.display = 'none'; activeTimedWall = null; isFallingDead = true; playSound(100, 1.5, 'fall');
                    leftTrack.position.y = -10; rightTrack.position.y = -10;
                }
            }

            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        window.addEventListener('keydown', (e) => {
            if (isGameOver && !isPhase2) return;
            keys[e.key] = true;

            if (isPhase2) return;

            if (activeTimedWall) {
                let keyUpper = e.key.toUpperCase();
                if (keyUpper.length === 1 && keyUpper >= 'A' && keyUpper <= 'Z') {
                    let targetChar = timedPasswordString.charAt(timedInputBuffer.length);
                    if (keyUpper === targetChar) {
                        timedInputBuffer += keyUpper; playSound(600, 0.05, 'sine');
                        let disp = "";
                        for(let i=0; i<4; i++) {
                            if(i < timedInputBuffer.length) disp += timedPasswordString.charAt(i) + " ";
                            else disp += "_ ";
                        }
                        document.getElementById('password-display').innerText = disp;

                        if (timedInputBuffer.length === 4) {
                            document.getElementById('password-ui').style.display = 'none';
                            activeTimedWall.meshes.forEach(m => scene.remove(m));
                            obstacles = obstacles.filter(o => o !== activeTimedWall);
                            activeTimedWall = null; score += 35; updateUI(); playSound(800, 0.2, 'cheat');
                        }
                    } else {
                        document.getElementById('password-ui').style.display = 'none'; activeTimedWall = null; isFallingDead = true; playSound(100, 1.5, 'fall');
                        leftTrack.position.y = -10; rightTrack.position.y = -10;
                    }
                }
                return;
            }

            if (e.key === 'a' || e.key === 'ArrowLeft') { if(targetX > -laneWidth) { targetX -= laneWidth; playSound(350, 0.05, 'sine'); } }
            if (e.key === 'd' || e.key === 'ArrowRight') { if(targetX < laneWidth) { targetX += laneWidth; playSound(350, 0.05, 'sine'); } }
            if (e.key === ' ' || e.key === 'Spacebar') { if(!isJumping) { isJumping = true; jumpVelocity = 0.22; playSound(200, 0.15, 'jump'); } }
            if (e.key === 'Escape' || e.key === 'p') { togglePause(); }

            let num = parseInt(e.key);
            if (num >= 1 && num <= 9) {
                if (cheatCounts[num] > 0) {
                    cheatCounts[num]--; playSound(440, 0.2, 'cheat');
                    if (num === 1) { lives = 3; }
                    else if (num === 2) { invincibilityFrames = 180; } 
                    else if (num === 3) { dashEffectTimer = 45; score += 2; } 
                    else if (num === 4) { slowMotionTimer = 180; }
                    else if (num === 5) { obstacles.forEach(o => o.meshes.forEach(m => scene.remove(m))); obstacles = []; playSound(100, 0.5, 'nuke'); }
                    else if (num === 6) { targetX = -targetX; }
                    else if (num === 7) { hasActiveShield = true; playerShieldMesh.material.opacity = 0.4; }
                    else if (num === 8) { if(score >= 10) { score -= 10; lives = 3; if(activeTimedWall){ activeTimedWall.meshes.forEach(m=>scene.remove(m)); obstacles=obstacles.filter(o=>o!==activeTimedWall); activeTimedWall=null; document.getElementById('password-ui').style.display='none'; } } }
                    else if (num === 9) { obstacles.forEach(o => o.meshes.forEach(m => scene.remove(m))); obstacles = []; }
                    updateUI();
                }
            }
        });

        window.addEventListener('keyup', (e) => { keys[e.key] = false; });
    </script>
