
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>컬러 유체 미디어 아트</title>
<style>
  body {
    margin: 0;
    background-color: black;
    overflow: hidden;
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>
<canvas id="fluidCanvas"></canvas>
<script>
const canvas = document.getElementById('fluidCanvas');
const ctx = canvas.getContext('2d');

let width = window.innerWidth;
let height = window.innerHeight;
canvas.width = width;
canvas.height = height;

// 창 크기 조절
window.addEventListener('resize', () => {
  width = window.innerWidth;
  height = window.innerHeight;
  canvas.width = width;
  canvas.height = height;
});

// 유체 시뮬레이션 변수
const particles = [];
const maxParticles = 1000;

// 컬러 팔레트 (네온 컬러)
const colors = ['#00ffff', '#ff00ff', '#ff69b4', '#00ffcc', '#ffff00'];

// 마우스 위치와 상태
let mouse = {
  x: 0,
  y: 0,
  isDown: false
};

// 폭발 효과를 위한 변수
let explosion = false;

// 파티클 생성 함수
function createParticle(x, y, vx, vy, color) {
  if (particles.length < maxParticles) {
    particles.push({x, y, vx, vy, color});
  }
}

// 마우스 이벤트
canvas.addEventListener('mousedown', (e) => {
  mouse.isDown = true;
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  // 폭발 트리거
  explosion = true;
});
canvas.addEventListener('mouseup', () => {
  mouse.isDown = false;
});
canvas.addEventListener('mousemove', (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

// 애니메이션 루프
function animate() {
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  ctx.fillRect(0, 0, width, height);

  // 마우스 클릭 시 폭발
  if (explosion) {
    for (let i = 0; i < 50; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 4 + 2;
      const vx = Math.cos(angle) * speed;
      const vy = Math.sin(angle) * speed;
      const color = colors[Math.floor(Math.random() * colors.length)];
      createParticle(mouse.x, mouse.y, vx, vy, color);
    }
    explosion = false;
  }

  // 파티클 업데이트 및 그리기
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];

    // 부드럽고 네온 컬러 효과를 위해 색상 변화
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
    ctx.fill();

    // 속도와 위치 업데이트
    p.x += p.vx;
    p.y += p.vy;

    // 자연스럽게 감속
    p.vx *= 0.98;
    p.vy *= 0.98;

    // 화면 밖으로 나가면 제거
    if (p.x < 0 || p.x > width || p.y < 0 || p.y > height || Math.abs(p.vx) < 0.1 && Math.abs(p.vy) < 0.1) {
      particles.splice(i, 1);
    }
  }

  requestAnimationFrame(animate);
}

// 시작
animate();
</script>
</body>
</html>
