<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fire Fluid</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

canvas{
    display:block;
    width:100vw;
    height:100vh;
    background:#000;
    cursor:crosshair;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let w,h;

function resize(){
    w = canvas.width = innerWidth;
    h = canvas.height = innerHeight;
}
addEventListener("resize", resize);
resize();

const particles = [];
const MAX = 500;

// 불꽃 컬러
const colors = [
    "#ff2200",
    "#ff5500",
    "#ff8800",
    "#ffaa00",
    "#ffee66",
    "#ffffff"
];

function rand(min,max){
    return Math.random()*(max-min)+min;
}

function color(){
    return colors[(Math.random()*colors.length)|0];
}

class Flame{

    constructor(x,y,vx,vy,size,col){

        this.x = x;
        this.y = y;

        this.vx = vx;
        this.vy = vy;

        this.size = size;

        this.life = 1;
        this.decay = rand(0.015,0.03);

        this.color = col;
    }

    update(){

        // 불꽃 상승
        this.vy -= 0.03;

        // 흔들림
        this.vx += rand(-0.08,0.08);

        this.x += this.vx;
        this.y += this.vy;

        // 감속
        this.vx *= 0.98;
        this.vy *= 0.98;

        this.life -= this.decay;

        this.size *= 0.985;
    }

    draw(){

        ctx.globalAlpha = this.life;

        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;

        ctx.fillStyle = this.color;

        ctx.beginPath();
        ctx.arc(
            this.x,
            this.y,
            this.size,
            0,
            Math.PI*2
        );

        ctx.fill();
    }
}

function burst(x,y,power=1){

    const amount = 30 * power;

    for(let i=0;i<amount;i++){

        if(particles.length > MAX){
            particles.shift();
        }

        const angle = Math.random()*Math.PI*2;
        const speed = rand(1,5)*power;

        particles.push(
            new Flame(
                x,
                y,
                Math.cos(angle)*speed,
                Math.sin(angle)*speed,
                rand(2,7),
                color()
            )
        );
    }
}

let mouse = {
    x:w/2,
    y:h/2,
    px:w/2,
    py:h/2
};

addEventListener("mousemove",e=>{

    mouse.px = mouse.x;
    mouse.py = mouse.y;

    mouse.x = e.clientX;
    mouse.y = e.clientY;

    const dx = mouse.x - mouse.px;
    const dy = mouse.y - mouse.py;

    const speed = Math.sqrt(dx*dx + dy*dy);

    // 빠른 움직임 = 불꽃 꼬리
    if(speed > 6){

        for(let i=0;i<3;i++){

            if(particles.length > MAX){
                particles.shift();
            }

            particles.push(
                new Flame(
                    mouse.x,
                    mouse.y,
                    dx*0.08 + rand(-1,1),
                    dy*0.08 + rand(-1,1),
                    rand(2,5),
                    color()
                )
            );
        }
    }
});

// 클릭 폭발
addEventListener("mousedown",e=>{
    if(e.button === 0){
        burst(e.clientX,e.clientY,1.5);
    }
});

// 스페이스 화염폭발
addEventListener("keydown",e=>{

    if(e.code === "Space"){

        burst(
            mouse.x,
            mouse.y,
            2.5
        );
    }
});

function animate(){

    requestAnimationFrame(animate);

    // 검정 배경 잔상
    ctx.globalCompositeOperation = "source-over";

    ctx.fillStyle = "rgba(0,0,0,0.18)";
    ctx.fillRect(0,0,w,h);

    // 빛 합성
    ctx.globalCompositeOperation = "lighter";

    for(let i=particles.length-1;i>=0;i--){

        const p = particles[i];

        p.update();
        p.draw();

        if(p.life <= 0 || p.size < 0.3){
            particles.splice(i,1);
        }
    }
}

animate();
</script>

</body>
</html>
