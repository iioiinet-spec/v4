<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacking Simulator</title>
    <style>
        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            border: 2px solid #0f0;
            padding: 30px;
            box-shadow: 0 0 20px #0f0;
            background-color: #111;
            border-radius: 10px;
            max-width: 400px;
            width: 100%;
        }
        input {
            background-color: #000;
            border: 1px solid #0f0;
            color: #0f0;
            padding: 10px;
            font-size: 16px;
            text-align: center;
            outline: none;
            width: 80%;
            margin-bottom: 15px;
        }
        button {
            background-color: #0f0;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover {
            background-color: #00ff00;
            box-shadow: 0 0 10px #0f0;
        }
        .hidden {
            display: none !important;
        }
        .loading-bar {
            width: 100%;
            background-color: #222;
            border: 1px solid #0f0;
            height: 20px;
            margin-top: 15px;
            position: relative;
            overflow: hidden;
        }
        .progress {
            width: 0%;
            height: 100%;
            background-color: #0f0;
            transition: width 6s linear;
        }
        #file-link {
            color: #ff0;
            text-decoration: underline;
            cursor: pointer;
            margin-top: 15px;
            display: inline-block;
            font-size: 18px;
        }
        #emoticon-screen {
            text-align: center;
        }
        /* 움직이는 애니메이션(bounce) 제거 */
        .large-gorani {
            font-size: 180px; 
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div id="login-screen" class="container">
        <p style="font-size: 20px; font-weight: bold;">[ SYSTEM HACKING TOOL ]</p>
        <p>암호를 입력하십시오.</p>
        <input type="text" id="password-input" placeholder="암호 입력..." onkeydown="if(event.key === 'Enter') checkPassword()">
        <br>
        <button onclick="checkPassword()">실행</button>
        <p id="error-msg" style="color: red; margin-top: 10px; min-height: 20px;"></p>
    </div>

    <div id="hacking-screen" class="container hidden">
        <p style="font-size: 24px; color: red; font-weight: bold; margin-bottom: 5px;">🦌 고라니 🦌</p>
        <p id="status-text" style="font-size: 18px; color: #0f0;">선생님의 컴퓨터 보안 해킹중...</p>
        
        <div class="loading-bar">
            <div id="progress-bar" class="progress"></div>
        </div>
        
        <p id="download-msg" class="hidden" style="color: #0ff; margin-top: 15px; font-weight: bold;">
            📥 아래 선생님 이미지122 다운로드 완료
        </p>
        
        <div id="file-link" class="hidden" onclick="showEmoticon()">
            📄 teacher_photo_122.jpg (클릭하여 열기)
        </div>
    </div>

    <div id="emoticon-screen" class="hidden">
        <div class="large-gorani">🦌</div>
        <p style="font-size: 28px; color: #0f0; margin-top: 20px; font-weight: bold;">선생님이미지 122</p>
        <button onclick="location.reload()" style="font-size: 14px; padding: 5px 10px; margin-top: 20px;">다시 하기</button>
    </div>

    <script>
        function checkPassword() {
            const input = document.getElementById('password-input').value;
            const errorMsg = document.getElementById('error-msg');
            
            if (input === '고라니') {
                errorMsg.innerText = "";
                startHacking();
            } else {
                errorMsg.innerText = "❌ 잘못된 암호입니다. 다시 입력하세요.";
                document.getElementById('password-input').value = "";
                document.getElementById('password-input').focus();
            }
        }

        function startHacking() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('hacking-screen').classList.remove('hidden');
            
            setTimeout(() => {
                document.getElementById('progress-bar').style.width = '100%';
            }, 100);

            // 6초 뒤 다운로드 요소 등장
            setTimeout(() => {
                document.getElementById('status-text').innerText = "작업 완료";
                document.getElementById('status-text').style.color = "#0ff";
                
                document.getElementById('download-msg').classList.remove('hidden');
                document.getElementById('file-link').classList.remove('hidden');
            }, 6000);
        }

        function showEmoticon() {
            document.getElementById('hacking-screen').classList.add('hidden');
            document.getElementById('emoticon-screen').classList.remove('hidden');
        }
    </script>

</body>
</html>
