<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supernova & Gargantua Media Art</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020202;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        
        canvas {
            display: block;
        }

        #ui {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.8);
            text-align: center;
            pointer-events: none;
            transition: opacity 1s ease-out;
            user-select: none;
            z-index: 10;
        }

        #ui h1 {
            font-weight: 200;
            letter-spacing: 12px;
            font-size: 3.5rem;
            margin: 0;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            background: linear-gradient(90deg, #00f2fe, #4facfe, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: all 0.5s ease;
        }

        #ui p {
            font-size: 1rem;
            letter-spacing: 4px;
            opacity: 0.9;
            margin-top: 15px;
            color: #ccc;
        }

        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            letter-spacing: 3px;
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>
<body>

<div id="ui">
    <h1 id="title">SUPERNOVA</h1>
    <p>화면을 꾹 눌러 에너지를 모으고, 포인터로 조종하세요</p>
</div>

<div class="controls">
    [1] 초신성 모드 &nbsp;&nbsp;|&nbsp;&nbsp; [2] 가르강튀아 모드
</div>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const ui = document.getElementById('ui');
    const title = document.getElementById('title');

    let width, height;
    let particles = [];
    let time = 0;
    let isInteracting = false;
    let flashAlpha = 0;
    let currentMode = 1; // 1: Supernova, 2: Gargantua

    let blackhole = { active: false, x: width/2, y: height/2 };
    let mouse = { x: -1000, y: -1000, active: false };

    const PARTICLE_COUNT = 900;
    const MAX_DISTANCE = 80;
    const MOUSE_ATTRACTION_RADIUS = 150;
    const MOUSE_ATTRACTION_STRENGTH = 0.5;

    // 초신성 모드 색상 (Cyan, Blue, Purple, Pink)
    const COLORS_SUPERNOVA = [
        {h: 190, s: 100, l: 60}, {h: 230, s: 100, l: 65}, 
        {h: 280, s: 100, l: 70}, {h: 330, s: 100, l: 65}, {h: 50,  s: 100, l: 70}
    ];

    // 가르강튀아 모드 색상 (Gold, Orange, Red, White)
    const COLORS_GARGANTUA = [
        {h: 35, s: 100, l: 60},  // Orange
        {h: 45, s: 100, l: 70},  // Gold
        {h: 15, s: 100, l: 55},  // Red-orange
        {h: 60, s: 100, l: 85},  // Bright yellow
        {h: 0,  s: 0,   l: 100}  // Pure white
    ];

    let currentColors = COLORS_SUPERNOVA;

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Particle {
        constructor() {
            this.initParams();
            this.x = Math.random() * width;
            this.y = Math.random() * height;
        }

        initParams() {
            this.vx = (Math.random() - 0.5) * 2;
            this.vy = (Math.random() - 0.5) * 2;
            this.size = Math.random() * 2 + 0.5;
            this.baseColor = currentColors[Math.floor(Math.random() * currentColors.length)];
            // 가르강튀아 모드용 파티클 타입 (원반형 or 상단 광원형)
            this.isHalo = Math.random() > 0.65; 
        }

        update() {
            // ==========================================
            // [ 모드 2: 가르강튀아 (Gargantua) ]
            // ==========================================
            if (currentMode === 2) {
                const cx = width / 2;
                const cy = height / 2;
                const eh = Math.min(width, height) * 0.12; // 사건의 지평선 반지름
                
                const dx = cx - this.x;
                const dy = cy - this.y;
                const distSq = dx * dx + dy * dy;
                const dist = Math.sqrt(distSq) || 1;

                if (blackhole.active) {
                    // 모으기(클릭) 상태: 가르강튀아로 모든 입자가 추락
                    const pullForce = 2.5;
                    this.vx += (dx / dist) * pullForce;
                    this.vy += (dy / dist) * pullForce;
                    this.vx *= 0.92;
                    this.vy *= 0.92;
                } else {
                    // 일반 상태: 강착 원반 궤도 유지
                    if (dist < eh) {
                        // 사건의 지평선 내부로 떨어지면 바깥 궤도에서 재스폰
                        const angle = Math.random() * Math.PI * 2;
                        const r = eh + Math.random() * 300 + 30;
                        this.x = cx + Math.cos(angle) * r;
                        this.y = cy + Math.sin(angle) * r * (this.isHalo ? 0.9 : 0.2);
                        this.vx = 0;
                        this.vy = 0;
                    } else {
                        // 블랙홀의 강력한 중력
                        const gravity = 600 / distSq;
                        this.vx += (dx / dist) * gravity;
                        this.vy += (dy / dist) * gravity;
                        
                        // 강착 원반 회전 속도 (원심력)
                        if (this.isHalo) {
                            // 중력 렌즈로 인해 위아래로 휘어진 빛 (Halo)
                            const swirl = 120 / dist;
                            this.vx += (dy / dist) * swirl;
                            this.vy -= (dx / dist) * swirl;
                        } else {
                            // 평평하게 압축된 메인 강착 원반 (Accretion Disk)
                            this.vy -= (this.y - cy) * 0.1; // Y축 압축력
                            const swirl = 350 / dist;
                            this.vx += (dy / dist) * swirl;
                            this.vy -= (dx / dist) * swirl * 0.2;
                        }

                        // 마우스 자석 효과
                        if (mouse.active) {
                            const mdx = mouse.x - this.x;
                            const mdy = mouse.y - this.y;
                            const mdistSq = mdx*mdx + mdy*mdy;
                            if (mdistSq < MOUSE_ATTRACTION_RADIUS * MOUSE_ATTRACTION_RADIUS) {
                                const mdist = Math.sqrt(mdistSq);
                                const mforce = (MOUSE_ATTRACTION_RADIUS - mdist) / MOUSE_ATTRACTION_RADIUS;
                                this.vx += (mdx / mdist) * mforce * MOUSE_ATTRACTION_STRENGTH;
                                this.vy += (mdy / mdist) * mforce * MOUSE_ATTRACTION_STRENGTH;
                            }
                        }
                    }
                    this.vx *= 0.96; // 궤도 유지를 위해 마찰력 낮춤
                    this.vy *= 0.96;
                }
                
                this.x += this.vx;
                this.y += this.vy;
                return; // 가르강튀아 로직 완료 후 종료
            }

            // ==========================================
            // [ 모드 1: 초신성 (Supernova) ]
            // ==========================================
            if (blackhole.active) {
                const dx = blackhole.x - this.x;
                const dy = blackhole.y - this.y;
                const distSq = dx * dx + dy * dy;
                const dist = Math.sqrt(distSq) || 1;

                const pullForce = 1.2;
                this.vx += (dx / dist) * pullForce;
                this.vy += (dy / dist) * pullForce;

                const swirlForce = 0.8;
                this.vx += (dy / dist) * swirlForce;
                this.vy -= (dx / dist) * swirlForce;

                this.vx *= 0.88;
                this.vy *= 0.88;
            } else {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;

                if (mouse.active) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const distSq = dx * dx + dy * dy;

                    if (distSq < MOUSE_ATTRACTION_RADIUS * MOUSE_ATTRACTION_RADIUS) {
                        const dist = Math.sqrt(distSq);
                        const force = (MOUSE_ATTRACTION_RADIUS - dist) / MOUSE_ATTRACTION_RADIUS;
                        this.vx += (dx / dist) * force * MOUSE_ATTRACTION_STRENGTH;
                        this.vy += (dy / dist) * force * MOUSE_ATTRACTION_STRENGTH;
                    }
                }

                this.vx *= 0.98;
                this.vy *= 0.98;
                this.vx += (Math.random() - 0.5) * 0.1;
                this.vy += (Math.random() - 0.5) * 0.1;
            }

            if (blackhole.active) {
                this.x += this.vx;
                this.y += this.vy;
            }
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            const lightness = blackhole.active ? 85 : this.baseColor.l;
            ctx.fillStyle = `hsl(${this.baseColor.h}, ${this.baseColor.s}%, ${lightness}%)`;
            ctx.fill();
        }
    }

    function init() {
        particles = [];
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            particles.push(new Particle());
        }
    }

    // 모드 전환 함수 (키보드 1, 2)
    function setMode(mode) {
        if (currentMode === mode) return;
        currentMode = mode;
        
        if (mode === 1) {
            title.innerText = "SUPERNOVA";
            title.style.background = "linear-gradient(90deg, #00f2fe, #4facfe, #f093fb, #f5576c)";
            title.style.webkitBackgroundClip = "text";
            currentColors = COLORS_SUPERNOVA;
        } else if (mode === 2) {
            title.innerText = "GARGANTUA";
            title.style.background = "linear-gradient(90deg, #f12711, #f5af19, #ffffff)";
            title.style.webkitBackgroundClip = "text";
            currentColors = COLORS_GARGANTUA;
        }
        
        // 파티클 색상 및 물리량 즉시 업데이트
        particles.forEach(p => p.initParams());
    }

    // 키보드 이벤트
    window.addEventListener('keydown', (e) => {
        if (e.key === '1') setMode(1);
        if (e.key === '2') setMode(2);
    });

    // 마우스 및 터치 이벤트
    function startGathering(x, y) {
        if (!isInteracting) {
            isInteracting = true;
            ui.style.opacity = '0';
        }
        blackhole.active = true;
        blackhole.x = x;
        blackhole.y = y;
        mouse.active = false;
    }

    function triggerExplosion() {
        if (!blackhole.active) return;
        blackhole.active = false;
        flashAlpha = 1;

        for (let p of particles) {
            const dx = p.x - blackhole.x;
            const dy = p.y - blackhole.y;
            const dist = Math.sqrt(dx * dx + dy * dy) || 1;
            
            // 가르강튀아 모드 폭발은 퀘이사처럼 상하좌우로 더 강력하게 분출
            const powerMult = currentMode === 2 ? 1.5 : 1; 
            const power = (Math.random() * 40 + 15) * (1 + 50/dist) * powerMult;
            
            p.vx = (dx / dist) * power;
            p.vy = (dy / dist) * power;
        }
        mouse.active = true;
    }

    window.addEventListener('mousedown', (e) => startGathering(e.clientX, e.clientY));
    window.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
        mouse.active = true;
        if (blackhole.active) {
            blackhole.x = e.clientX;
            blackhole.y = e.clientY;
        }
    });
    window.addEventListener('mouseup', triggerExplosion);
    window.addEventListener('mouseleave', () => {
        triggerExplosion();
        mouse.active = false;
    });

    window.addEventListener('touchstart', (e) => {
        e.preventDefault();
        startGathering(e.touches[0].clientX, e.touches[0].clientY);
    }, {passive: false});
    window.addEventListener('touchmove', (e) => {
        e.preventDefault();
        mouse.x = e.touches[0].clientX;
        mouse.y = e.touches[0].clientY;
        mouse.active = true;
        if (blackhole.active) {
            blackhole.x = e.touches[0].clientX;
            blackhole.y = e.touches[0].clientY;
        }
    }, {passive: false});
    window.addEventListener('touchend', triggerExplosion);

    // 메인 루프
    function animate() {
        // 잔상 효과 (가르강튀아 모드에서는 우주 느낌을 위해 잔상을 더 짙게)
        ctx.fillStyle = currentMode === 2 ? 'rgba(0, 0, 0, 0.3)' : 'rgba(2, 2, 2, 0.2)'; 
        ctx.fillRect(0, 0, width, height);

        if (flashAlpha > 0) {
            ctx.fillStyle = `rgba(255, 255, 255, ${flashAlpha})`;
            ctx.fillRect(0, 0, width, height);
            flashAlpha -= 0.05;
        }

        for (let i = 0; i < particles.length; i++) {
            particles[i].update();
            particles[i].draw();
        }

        ctx.globalCompositeOperation = 'lighter';
        ctx.lineWidth = 0.5;

        for (let i = 0; i < particles.length; i++) {
            const p1 = particles[i];
            let connections = 0;

            for (let j = i + 1; j < particles.length; j++) {
                if (connections > 6) break; 

                const p2 = particles[j];
                const dx = p1.x - p2.x;
                const dy = p1.y - p2.y;
                const distSq = dx * dx + dy * dy;

                if (distSq < MAX_DISTANCE * MAX_DISTANCE) {
                    connections++;
                    const dist = Math.sqrt(distSq);
                    const opacity = Math.min(1, (MAX_DISTANCE - dist) / MAX_DISTANCE);
                    const h = (p1.baseColor.h + p2.baseColor.h) / 2;
                    
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    
                    const strokeOpacity = blackhole.active ? opacity * 0.8 : opacity * 0.3;
                    ctx.strokeStyle = `hsla(${h}, 100%, 70%, ${strokeOpacity})`;
                    ctx.stroke();
                }
            }
        }

        // ==========================================
        // 가르강튀아 모드 전용: 사건의 지평선(블랙홀) 그리기
        // ==========================================
        if (currentMode === 2) {
            ctx.globalCompositeOperation = 'source-over';
            const cx = width / 2;
            const cy = height / 2;
            const eh = Math.min(width, height) * 0.12;

            // 순흑색의 중심 (Event Horizon)
            ctx.beginPath();
            ctx.arc(cx, cy, eh, 0, Math.PI * 2);
            ctx.fillStyle = '#000000';
            ctx.fill();

            // 안쪽 광자 고리 (Photon Ring)
            ctx.lineWidth = 3;
            ctx.strokeStyle = 'rgba(255, 220, 150, 0.8)';
            ctx.stroke();

            // 바깥쪽 아우라 (Glow)
            ctx.lineWidth = 8;
            ctx.strokeStyle = 'rgba(255, 150, 50, 0.3)';
            ctx.stroke();
        }

        ctx.globalCompositeOperation = 'source-over';
        requestAnimationFrame(animate);
    }

    init();
    animate();

</script>
</body>
</html>
