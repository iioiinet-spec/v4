<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Energy Fluid Explosion</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#050816;
}

canvas{
    width:100%;
    height:100%;
    display:block;
    cursor:none;
}
</style>
</head>

<body>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let width,height;
let flowField;
let cols,rows;

const cellSize = 22;
const particles = [];
const sparks = [];

const mouse = {x:0,y:0,px:0,py:0,down:false};

function resize(){
    width = canvas.width = innerWidth * devicePixelRatio;
    height = canvas.height = innerHeight * devicePixelRatio;

    cols = Math.floor(width / cellSize);
    rows = Math.floor(height / cellSize);

    flowField = new Array(cols*rows);
}
addEventListener("resize",resize);
resize();

/* ---------------- PARTICLES ---------------- */

class Particle{
    constructor(){ this.reset(); }

    reset(){
        this.x = Math.random()*width;
        this.y = Math.random()*height;
        this.vx = 0;
        this.vy = 0;
        this.px = this.x;
        this.py = this.y;
        this.hue = 200 + Math.random()*120;
    }

    update(){
        this.px = this.x;
        this.py = this.y;

        const cx = Math.floor(this.x / cellSize);
        const cy = Math.floor(this.y / cellSize);
        const idx = cx + cy * cols;

        const angle = flowField[idx];
        if(angle !== undefined){
            this.vx += Math.cos(angle)*0.4;
            this.vy += Math.sin(angle)*0.4;
        }

        let dx = mouse.x - this.x;
        let dy = mouse.y - this.y;
        let d = Math.sqrt(dx*dx + dy*dy)+0.001;

        if(d < 360){

            let force = (360 - d)/360;
            let ang = Math.atan2(dy,dx);

            // 🌪 강한 끌림 + 흐름
            this.vx += Math.cos(ang)*force*2.8;
            this.vy += Math.sin(ang)*force*2.8;

            // 회전 강화
            this.vx += -dy * 0.0018 * force * 60;
            this.vy += dx * 0.0018 * force * 60;

            // 미세 끌림
            this.vx += dx * 0.00003;
            this.vy += dy * 0.00003;

            if(mouse.down){
                this.vx += -dy * 0.0065;
                this.vy += dx * 0.0065;
            }
        }

        this.vx *= 0.955;
        this.vy *= 0.955;

        this.x += this.vx;
        this.y += this.vy;

        if(this.x<0||this.x>width||this.y<0||this.y>height){
            this.reset();
        }
    }

    draw(){
        let sp = Math.sqrt(this.vx*this.vx+this.vy*this.vy);

        ctx.strokeStyle =
        `hsla(${this.hue + sp*20},100%,65%,0.11)`;

        ctx.lineWidth = 1.3;

        ctx.beginPath();
        ctx.moveTo(this.px,this.py);
        ctx.lineTo(this.x,this.y);
        ctx.stroke();
    }
}

/* ---------------- BIG EXPLOSION (핵심 업그레이드) ---------------- */

class Spark{
    constructor(x,y){

        this.x = x;
        this.y = y;

        this.px = x;
        this.py = y;

        let a = Math.random()*Math.PI*2;

        // 💥 훨씬 더 큰 폭발
        let s = Math.random()*18 + 6;

        this.vx = Math.cos(a)*s;
        this.vy = Math.sin(a)*s;

        this.life = 160 + Math.random()*80;

        // 🌌 배경과 같은 톤으로 통일
        this.hue = 210 + Math.random()*80;
    }

    update(){

        this.px = this.x;
        this.py = this.y;

        this.life--;

        // 감쇠 (공기 느낌)
        this.vx *= 0.94;
        this.vy *= 0.94;

        // 약한 중력
        this.vy += 0.01;

        this.x += this.vx;
        this.y += this.vy;

        // flowField 영향
        const cx = Math.floor(this.x / cellSize);
        const cy = Math.floor(this.y / cellSize);
        const idx = cx + cy * cols;

        const angle = flowField[idx];

        if(angle !== undefined){
            this.vx += Math.cos(angle)*0.10;
            this.vy += Math.sin(angle)*0.10;
        }

        // mouse 영향
        let dx = mouse.x - this.x;
        let dy = mouse.y - this.y;
        let d = Math.sqrt(dx*dx + dy*dy);

        if(d < 300){
            let ang = Math.atan2(dy,dx);
            this.vx += Math.cos(ang)*0.28;
            this.vy += Math.sin(ang)*0.28;

            this.vx += -dy*0.001;
            this.vy += dx*0.001;
        }
    }

    draw(){

        // 🌌 배경과 어울리는 밝기
        let alpha = this.life / 180;

        ctx.strokeStyle =
        `hsla(${this.hue},100%,70%,${alpha})`;

        ctx.lineWidth = 2.2;

        ctx.beginPath();
        ctx.moveTo(this.px,this.py);
        ctx.lineTo(this.x,this.y);
        ctx.stroke();
    }
}

/* ---------------- INIT ---------------- */

for(let i=0;i<10000;i++){
    particles.push(new Particle());
}

/* ---------------- FLOW FIELD ---------------- */

let z = 0;

function updateFlow(){

    let yoff = 0;

    for(let y=0;y<rows;y++){
        let xoff = 0;

        for(let x=0;x<cols;x++){

            const i = x + y*cols;

            const a =
                Math.sin(xoff*1.1+z) +
                Math.cos(yoff*1.1+z);

            flowField[i] = a*Math.PI;

            xoff += 0.11;
        }

        yoff += 0.11;
    }

    z += 0.0023;
}

/* ---------------- INPUT ---------------- */

addEventListener("mousemove",(e)=>{
    mouse.px = mouse.x;
    mouse.py = mouse.y;
    mouse.x = e.clientX * devicePixelRatio;
    mouse.y = e.clientY * devicePixelRatio;
});

addEventListener("mousedown",()=>{

    mouse.down = true;

    // 💥 훨씬 큰 폭발
    for(let i=0;i<220;i++){
        sparks.push(new Spark(mouse.x,mouse.y));
    }
});

addEventListener("mouseup",()=>{
    mouse.down = false;
});

/* ---------------- LOOP ---------------- */

function animate(){
    requestAnimationFrame(animate);

    // 🌌 배경 더 진하게 = 폭발 더 선명
    ctx.fillStyle = "rgba(5,8,22,0.055)";
    ctx.fillRect(0,0,width,height);

    updateFlow();

    ctx.globalCompositeOperation = "lighter";

    for(let p of particles){
        p.update();
        p.draw();
    }

    for(let i=sparks.length-1;i>=0;i--){
        sparks[i].update();
        sparks[i].draw();

        if(sparks[i].life<=0){
            sparks.splice(i,1);
        }
    }

    ctx.globalCompositeOperation = "source-over";
}

animate();
</script>

</body>
</html>
