
<style>
#fw{position:relative;border-radius:16px;overflow:hidden;background:#000;line-height:0;}
#bg{position:absolute;top:0;left:0;display:block;}
#fc{position:absolute;top:0;left:0;display:block;cursor:none;}
#fcur{position:absolute;pointer-events:none;border-radius:50%;width:16px;height:16px;border:1.5px solid rgba(255,255,255,0.45);transform:translate(-50%,-50%);opacity:0;transition:width .1s,height .1s;}
#fpn{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.5);pointer-events:none;transition:opacity .6s;opacity:0;text-transform:uppercase;}
.fb{font-size:11px;padding:3px 13px;border-radius:20px;background:transparent;cursor:pointer;letter-spacing:.5px;}
</style>
<div id="fw">
  <canvas id="bg"></canvas>
  <canvas id="fc"></canvas>
  <div id="fcur"></div>
  <div id="fpn"></div>
</div>
<div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:9px;align-items:center;">
  <button class="fb" onclick="setMode('flow')" id="b-flow" style="border:1px solid rgba(255,255,255,0.3);color:#fff;background:rgba(255,255,255,0.08);">흐름</button>
  <button class="fb" onclick="setMode('swirl')" id="b-swirl" style="border:1px solid rgba(255,255,255,0.1);color:#555;">소용돌이</button>
  <button class="fb" onclick="setMode('burst')" id="b-burst" style="border:1px solid rgba(255,255,255,0.1);color:#555;">폭발</button>
  <div style="width:1px;height:16px;background:#222;margin:0 2px;"></div>
  <button class="fb" onclick="toggleMusic()" id="b-music" style="border:1px solid rgba(255,255,255,0.1);color:#555;">리듬</button>
  <button class="fb" onclick="nextPalette()" style="border:1px solid rgba(255,255,255,0.1);color:#555;">팔레트</button>
  <button class="fb" onclick="takeSnapshot()" style="border:1px solid rgba(255,255,255,0.1);color:#555;">저장</button>
  <button class="fb" onclick="clearCanvas()" style="border:1px solid rgba(255,255,255,0.1);color:#555;margin-left:auto;">초기화</button>
  <label style="font-size:11px;color:#444;margin-left:6px;">밀도<input type="range" id="dens" min="1" max="5" step="1" value="3" style="width:50px;vertical-align:middle;margin-left:5px;"></label>
</div>
<script>
const fw=document.getElementById('fw');
const bgc=document.getElementById('bg');
const fc=document.getElementById('fc');
const bgx=bgc.getContext('2d');
const ctx=fc.getContext('2d',{alpha:true,desynchronized:true});
const fcur=document.getElementById('fcur');
const fpn=document.getElementById('fpn');
let W,H,mode='flow',mx=300,my=190,down=false,t=0,frame=0;
let curPal=0,musicOn=false,beat=0,beatT=0,bgT=0;

const PALETTES=[
  {name:'AURORA',   bg:[20,0,40],    nebula:[[120,0,180],[0,80,160]],  cols:[[255,60,160],[255,120,0],[80,255,180],[60,160,255],[220,60,255],[255,220,0],[0,255,120],[255,80,80]]},
  {name:'INFERNO',  bg:[30,5,0],     nebula:[[180,40,0],[120,20,0]],   cols:[[255,30,0],[255,120,0],[255,220,30],[255,60,120],[200,0,60],[255,180,60],[255,100,0],[200,60,0]]},
  {name:'ABYSS',    bg:[0,5,30],     nebula:[[0,60,160],[40,0,120]],   cols:[[0,180,255],[100,0,255],[0,255,200],[180,0,255],[0,120,255],[60,255,220],[0,80,255],[120,0,200]]},
  {name:'PRISM',    bg:[5,0,20],     nebula:[[100,0,120],[0,80,60]],   cols:[[255,0,100],[0,255,150],[255,200,0],[0,150,255],[255,0,200],[100,255,0],[255,100,255],[0,255,255]]},
  {name:'VAPOR',    bg:[15,0,25],    nebula:[[160,0,120],[0,60,120]],  cols:[[255,100,200],[100,200,255],[200,100,255],[255,180,100],[0,255,230],[255,80,150],[180,255,180],[255,200,255]]},
  {name:'VOID',     bg:[0,0,0],      nebula:[[80,0,160],[0,80,160]],   cols:[[180,0,255],[255,0,80],[0,255,255],[255,255,0],[0,180,255],[255,0,180],[120,255,0],[255,120,255]]},
  {name:'CANDY',    bg:[20,5,15],    nebula:[[160,20,100],[20,80,60]], cols:[[255,50,200],[50,255,200],[255,200,50],[50,200,255],[200,50,255],[255,150,50],[50,255,100],[255,50,100]]},
  {name:'ICE',      bg:[0,10,30],    nebula:[[0,80,160],[0,120,100]],  cols:[[100,220,255],[0,150,255],[180,240,255],[0,255,220],[60,180,255],[200,255,255],[0,100,200],[100,255,255]]},
];

// --- 별 미리 생성 (정적) ---
const STAR_N=120;
const starX=new Float32Array(STAR_N),starY=new Float32Array(STAR_N);
const starR=new Float32Array(STAR_N),starA=new Float32Array(STAR_N),starTw=new Float32Array(STAR_N);
for(let i=0;i<STAR_N;i++){starTw[i]=Math.random()*Math.PI*2;}

function initStars(){
  for(let i=0;i<STAR_N;i++){
    starX[i]=Math.random()*W; starY[i]=Math.random()*H;
    starR[i]=0.3+Math.random()*1.2;
    starA[i]=0.2+Math.random()*0.6;
  }
}

// 배경 한번만 그리기 (팔레트 바뀔 때만 재그림)
let bgDirty=true;
function drawBg(){
  const pal=PALETTES[curPal];
  const [br,bg2,bb]=pal.bg;
  bgx.fillStyle=`rgb(${br},${bg2},${bb})`;
  bgx.fillRect(0,0,W,H);

  // 네뷸라 2개
  pal.nebula.forEach(([nr,ng,nb],ni)=>{
    const gx=W*(0.25+ni*0.5), gy=H*(0.3+ni*0.2);
    const g=bgx.createRadialGradient(gx,gy,0,gx,gy,W*0.55);
    g.addColorStop(0,`rgba(${nr},${ng},${nb},0.18)`);
    g.addColorStop(0.5,`rgba(${nr},${ng},${nb},0.07)`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    bgx.fillStyle=g;
    bgx.fillRect(0,0,W,H);
  });

  // 은하수 띠
  const gw=bgx.createLinearGradient(0,H*.2,W,H*.8);
  const [c0r,c0g,c0b]=pal.nebula[0];
  gw.addColorStop(0,'rgba(0,0,0,0)');
  gw.addColorStop(0.3,`rgba(${c0r},${c0g},${c0b},0.04)`);
  gw.addColorStop(0.5,`rgba(${c0r},${c0g},${c0b},0.09)`);
  gw.addColorStop(0.7,`rgba(${c0r},${c0g},${c0b},0.04)`);
  gw.addColorStop(1,'rgba(0,0,0,0)');
  bgx.fillStyle=gw;
  bgx.fillRect(0,0,W,H);

  bgDirty=false;
}

// 별 반짝임 — bgCanvas에 덮어쓰지 않고 별만 업데이트
// 대신 별은 fc(파티클 캔버스) 아래 별도로 bgc에 그림
// 별 레이어는 매 프레임 bgc 위에 직접 그리되, 배경은 캐시 ImageData 활용
let bgCache=null;
function cacheBg(){
  drawBg();
  bgCache=bgx.getImageData(0,0,W,H);
}

function drawBgFrame(){
  if(!bgCache)return;
  bgx.putImageData(bgCache,0,0);
  // 반짝이는 별
  bgT+=0.015;
  bgx.globalCompositeOperation='source-over';
  for(let i=0;i<STAR_N;i++){
    const tw=Math.sin(bgT+starTw[i]);
    const a=starA[i]*(0.4+0.6*(tw*.5+.5));
    const r=starR[i]*(0.7+0.3*(tw*.5+.5));
    bgx.beginPath();
    bgx.arc(starX[i],starY[i],r,0,6.283);
    bgx.fillStyle=`rgba(255,255,255,${a.toFixed(2)})`;
    bgx.fill();
    // 밝은 별에 십자 글리터
    if(starA[i]>0.6&&tw>0.7){
      const g2=r*4;
      bgx.strokeStyle=`rgba(255,255,255,${(a*0.4).toFixed(2)})`;
      bgx.lineWidth=0.5;
      bgx.beginPath();bgx.moveTo(starX[i]-g2,starY[i]);bgx.lineTo(starX[i]+g2,starY[i]);bgx.stroke();
      bgx.beginPath();bgx.moveTo(starX[i],starY[i]-g2);bgx.lineTo(starX[i],starY[i]+g2);bgx.stroke();
    }
  }
}

// --- 파티클 ---
const MAX_P=600,TR=8;
const px=new Float32Array(MAX_P),py=new Float32Array(MAX_P);
const pvx=new Float32Array(MAX_P),pvy=new Float32Array(MAX_P);
const plife=new Float32Array(MAX_P),psz=new Float32Array(MAX_P);
const pr=new Uint8Array(MAX_P),pg2=new Uint8Array(MAX_P),pb=new Uint8Array(MAX_P);
const trx=new Float32Array(MAX_P*TR),try_=new Float32Array(MAX_P*TR);
const tln=new Uint8Array(MAX_P);
let nextSlot=0;

function gridSpawnPos(idx){
  const col=idx%3,row=Math.floor(idx/3);
  return [W*(0.15+col*0.35),H*(0.2+row*0.3)];
}
function resetParticle(i,x,y,sp){
  const cols=PALETTES[curPal].cols; sp=sp||1;
  px[i]=x+(Math.random()-.5)*20; py[i]=y+(Math.random()-.5)*20;
  pvx[i]=(Math.random()-.5)*2.4*sp; pvy[i]=(Math.random()-.5)*2.4*sp;
  plife[i]=0.7+Math.random()*.3; psz[i]=1.2+Math.random()*3.2;
  const c=cols[Math.floor(Math.random()*cols.length)];
  pr[i]=c[0]; pg2[i]=c[1]; pb[i]=c[2]; tln[i]=0;
}
function initAll(){
  for(let i=0;i<MAX_P;i++){
    const[x,y]=gridSpawnPos(i%9);
    resetParticle(i,x+(Math.random()-.5)*W*.25,y+(Math.random()-.5)*H*.25,1);
    plife[i]=Math.random();
  }
  nextSlot=0;
}
function spawn(x,y,n,sp){
  for(let i=0;i<n;i++){resetParticle(nextSlot,x,y,sp||1);nextSlot=(nextSlot+1)%MAX_P;}
}

const perm=new Uint8Array(512);
(()=>{const p=new Uint8Array(256);for(let i=0;i<256;i++)p[i]=i;for(let i=255;i>0;i--){const j=Math.random()*i|0;[p[i],p[j]]=[p[j],p[i]];}for(let i=0;i<512;i++)perm[i]=p[i&255];})();
function fd(x){return x*x*x*(x*(x*6-15)+10);}
function gr(h,x,y){h&=3;return(h<2?(h&1?-x:x):(h&1?-y:y))+(h<2?(h&1?-y:y):(h&1?-x:x));}
function noise(x,y){const X=x|0,Y=y|0,xf=x-X,yf=y-Y,u=fd(xf),v=fd(yf),a=perm[X&255]+Y,b=perm[(X+1)&255]+Y;return lerp(lerp(gr(perm[a&255],xf,yf),gr(perm[b&255],xf-1,yf),u),lerp(gr(perm[(a+1)&255],xf,yf-1),gr(perm[(b+1)&255],xf-1,yf-1),u),v);}
function lerp(a,b,t){return a+t*(b-a);}

let audioCtx=null;
function getAC(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function tone(f,v,d){try{const a=getAC(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=f;o.type='triangle';g.gain.setValueAtTime(v,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+d);o.start();o.stop(a.currentTime+d);}catch(e){}}

function toggleMusic(){
  musicOn=!musicOn;
  const b=document.getElementById('b-music');
  b.style.background=musicOn?'rgba(255,255,255,0.08)':'transparent';
  b.style.color=musicOn?'#fff':'#555';
  b.style.border=musicOn?'1px solid rgba(255,255,255,0.3)':'1px solid rgba(255,255,255,0.1)';
  if(musicOn)try{getAC().resume();}catch(e){}
}
function setMode(m){
  mode=m;
  ['flow','swirl','burst'].forEach(n=>{
    const b=document.getElementById('b-'+n);
    b.style.background=n===m?'rgba(255,255,255,0.08)':'transparent';
    b.style.color=n===m?'#fff':'#555';
    b.style.border=n===m?'1px solid rgba(255,255,255,0.3)':'1px solid rgba(255,255,255,0.1)';
  });
}
function clearCanvas(){ctx.clearRect(0,0,W,H);initAll();}
function nextPalette(){
  curPal=(curPal+1)%PALETTES.length;
  fpn.textContent=PALETTES[curPal].name;
  fpn.style.opacity='1';
  setTimeout(()=>fpn.style.opacity='0',2000);
  cacheBg();
}
function takeSnapshot(){
  const out=document.createElement('canvas');
  out.width=W; out.height=H;
  const o=out.getContext('2d');
  o.drawImage(bgc,0,0); o.drawImage(fc,0,0);
  const a=document.createElement('a');
  a.download='fluid-art.png'; a.href=out.toDataURL(); a.click();
}

function resize(){
  const r=fw.parentElement.getBoundingClientRect();
  W=Math.floor(r.width)||600;
  H=Math.round(Math.min(W*0.6,380));
  [bgc,fc].forEach(cv=>{cv.style.width=W+'px';cv.style.height=H+'px';cv.width=W;cv.height=H;});
  fw.style.width=W+'px'; fw.style.height=H+'px';
  initStars();
  cacheBg();
  ctx.clearRect(0,0,W,H);
}

let spawnZone=0,lastTime=0;
function loop(ts){
  requestAnimationFrame(loop);
  if(ts-lastTime<14)return;
  lastTime=ts;
  t++; frame++;
  const T=t*0.008;

  // 배경 (별 반짝임)
  drawBgFrame();

  // 파티클 페이드
  ctx.globalCompositeOperation='source-over';
  ctx.fillStyle='rgba(0,0,0,0.14)';
  ctx.fillRect(0,0,W,H);

  const dens=parseInt(document.getElementById('dens').value);
  if(down) spawn(mx,my,dens+1);
  if(frame%3===0){
    const[x,y]=gridSpawnPos(spawnZone);
    spawn(x+Math.sin(T+spawnZone)*W*.08,y+Math.cos(T*1.1+spawnZone)*H*.06,dens);
    spawnZone=(spawnZone+1)%9;
  }
  beatT++;
  if(beatT>=(musicOn?26:52)){
    beatT=0; beat++;
    const[bx,by]=gridSpawnPos(beat%9);
    spawn(bx,by,6,2);
    if(musicOn)tone(200+Math.sin(beat*.7)*200,.05,.2);
  }

  ctx.globalCompositeOperation='lighter';
  ctx.lineCap='round';

  for(let i=0;i<MAX_P;i++){
    if(mode==='flow'){
      const ang=noise(px[i]*.004+T,py[i]*.004)*Math.PI*4;
      pvx[i]+=Math.cos(ang)*.11; pvy[i]+=Math.sin(ang)*.11;
    } else if(mode==='swirl'){
      const dx=px[i]-W/2,dy=py[i]-H/2,d=Math.sqrt(dx*dx+dy*dy)||1;
      if(down){
        const ex=mx-px[i],ey=my-py[i],ed=Math.sqrt(ex*ex+ey*ey)||1;
        pvx[i]+=(ex/ed)*Math.min(3,80/ed); pvy[i]+=(ey/ed)*Math.min(3,80/ed);
      } else {
        pvx[i]+=(-dy/d)*.23; pvy[i]+=(dx/d)*.23;
      }
    } else {
      const dx=px[i]-mx,dy=py[i]-my,d=Math.sqrt(dx*dx+dy*dy)||1;
      pvx[i]+=(dx/d)*(38/d); pvy[i]+=(dy/d)*(38/d);
    }
    pvx[i]*=.965; pvy[i]*=.965;
    px[i]+=pvx[i]; py[i]+=pvy[i];
    plife[i]-=.005+Math.random()*.004;
    if(plife[i]<=0){
      const[rx,ry]=gridSpawnPos(i%9);
      resetParticle(i,rx+(Math.random()-.5)*W*.3,ry+(Math.random()-.5)*H*.3,1);
      continue;
    }
    if(px[i]<0||px[i]>W)pvx[i]*=-.68;
    if(py[i]<0||py[i]>H)pvy[i]*=-.68;

    const base=i*TR,tl=tln[i];
    trx[base+tl%TR]=px[i]; try_[base+tl%TR]=py[i]; tln[i]++;
    const steps=Math.min(tl,TR-1);
    if(steps>2){
      ctx.beginPath();
      ctx.moveTo(trx[base+(tl-1+TR)%TR],try_[base+(tl-1+TR)%TR]);
      for(let s=1;s<steps;s++)
        ctx.lineTo(trx[base+(tl-1-s+TR)%TR],try_[base+(tl-1-s+TR)%TR]);
      ctx.strokeStyle=`rgba(${pr[i]},${pg2[i]},${pb[i]},${(plife[i]*.45).toFixed(2)})`;
      ctx.lineWidth=psz[i]*.7; ctx.stroke();
    }
    ctx.beginPath();
    ctx.arc(px[i],py[i],psz[i]*.6,0,6.283);
    ctx.fillStyle=`rgba(${pr[i]},${pg2[i]},${pb[i]},${(plife[i]*.7).toFixed(2)})`;
    ctx.fill();
  }
  ctx.globalCompositeOperation='source-over';
}

fc.addEventListener('mousemove',e=>{const r=fc.getBoundingClientRect();mx=e.clientX-r.left;my=e.clientY-r.top;fcur.style.left=mx+'px';fcur.style.top=my+'px';});
fc.addEventListener('mousedown',e=>{if(e.detail===2){nextPalette();return;}down=true;fcur.style.width='26px';fcur.style.height='26px';const r=fc.getBoundingClientRect();mx=e.clientX-r.left;my=e.clientY-r.top;spawn(mx,my,14,1.6);if(musicOn)tone(280+mx/W*420,.07,.22);});
fc.addEventListener('mouseup',()=>{down=false;fcur.style.width='16px';fcur.style.height='16px';});
fc.addEventListener('mouseleave',()=>{down=false;fcur.style.opacity='0';});
fc.addEventListener('mouseenter',()=>{fcur.style.opacity='1';});
fc.addEventListener('touchmove',e=>{e.preventDefault();const r=fc.getBoundingClientRect();const tc=e.touches[0];mx=tc.clientX-r.left;my=tc.clientY-r.top;spawn(mx,my,4);},{passive:false});
fc.addEventListener('touchstart',e=>{const r=fc.getBoundingClientRect();const tc=e.touches[0];mx=tc.clientX-r.left;my=tc.clientY-r.top;spawn(mx,my,12,1.6);});

resize();
initAll();
window.addEventListener('resize',()=>{resize();initAll();});
requestAnimationFrame(loop);
</script>
