<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>네모 딱지 RPG (적 성장)</title>
<style>
body { margin:0; font-family:sans-serif; text-align:center; }
canvas { background:#eef2ff; display:block; margin:0 auto; }

#menu {
  position:absolute;
  top:40px;
  left:50%;
  transform:translateX(-50%);
  background:white;
  border:2px solid #333;
  padding:15px;
  display:none;
}
button { margin:5px; }
</style>
</head>
<body>

<h3>🟥 네모 딱지 RPG (적 성장 시스템)</h3>

<canvas id="game" width="600" height="300"></canvas>

<div id="menu">
  <h4>🏪 상점</h4>
  <button onclick="upgrade()">⚔️ 강화 (+힘)</button>
  <button onclick="armor()">🛠 공방 (+방어)</button>
  <br>
  <button onclick="closeShop()">❌ 닫기</button>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let keys={};
let coin=0;

// 🧍 플레이어
let p={
  x:100,y:200,
  size:30,
  color:"blue",
  hp:10,
  power:1,
  defense:1
};

// 👹 적 (성장형)
let enemyLevel = 1;

let e={
  x:450,y:200,
  size:30,
  color:"red",
  hp:10,
  speed:2
};

// 🏪 상점
let shop={x:500,y:200,w:60,h:80};

// ⌨️ 이동
document.addEventListener("keydown",e2=>keys[e2.key]=true);
document.addEventListener("keyup",e2=>keys[e2.key]=false);

// 🖱 상점 열기
canvas.onmousedown=(ev)=>{
  let mx=ev.offsetX;
  let my=ev.offsetY;

  if(
    mx>shop.x && mx<shop.x+shop.w &&
    my>shop.y && my<shop.y+shop.h
  ){
    document.getElementById("menu").style.display="block";
  }
};

// ❌ 닫기
function closeShop(){
  document.getElementById("menu").style.display="none";
}

// ⚔️ 강화
function upgrade(){
  if(coin>=5){
    coin-=5;
    p.power+=2;
  }
}

// 🛠 공방
function armor(){
  if(coin>=5){
    coin-=5;
    p.defense+=1;
  }
}

// 🔁 적 리스폰 + 성장
function respawnEnemy(){
  enemyLevel++;

  e.x=450;
  e.y=200;

  e.hp = 10 + enemyLevel * 5;      // 💪 점점 단단해짐
  e.speed = 2 + enemyLevel * 0.5;  // ⚡ 점점 빨라짐
}

// 🤖 AI (강해짐 반영)
function enemyAI(){
  if(p.x < e.x) e.x -= e.speed;
  else e.x += e.speed * 0.3;
}

// 🎮 업데이트
function update(){
  ctx.clearRect(0,0,600,300);

  ctx.fillStyle="#999";
  ctx.fillRect(0,270,600,30);

  // 🧍 이동
  if(keys["ArrowLeft"]) p.x-=3;
  if(keys["ArrowRight"]) p.x+=3;
  if(keys["ArrowUp"]) p.y-=3;
  if(keys["ArrowDown"]) p.y+=3;

  p.x=Math.max(0,Math.min(600,p.x));
  p.y=Math.max(0,Math.min(250,p.y));

  enemyAI();

  // 💥 전투
  let dx=p.x-e.x;
  let dy=p.y-e.y;
  let dist=Math.sqrt(dx*dx+dy*dy);

  if(dist<40){
    e.hp-=p.power;
  }

  // 👹 적 처치 → 보상 + 성장
  if(e.hp<=0){
    coin+=10;
    respawnEnemy();
  }

  // 🧍 플레이어
  ctx.fillStyle=p.color;
  ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);

  // 👹 적
  ctx.fillStyle=e.color;
  ctx.fillRect(e.x-e.size/2,e.y-e.size/2,e.size,e.size);

  // 🏪 상점
  ctx.fillStyle="brown";
  ctx.fillRect(shop.x,shop.y,shop.w,shop.h);
  ctx.fillStyle="white";
  ctx.fillText("SHOP",shop.x+5,shop.y+45);

  // UI
  ctx.fillStyle="black";
  ctx.fillText("💰 코인:"+coin,10,20);
  ctx.fillText("⚔️ 힘:"+p.power,10,40);
  ctx.fillText("🛡 방어:"+p.defense,10,60);
  ctx.fillText("👹 적 HP:"+e.hp,10,80);
  ctx.fillText("📈 적 레벨:"+enemyLevel,10,100);
  ctx.fillText("⚡ 속도:"+e.speed.toFixed(1),10,120);

  requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
