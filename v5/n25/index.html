<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optimized Neon Fluid</title>

<style>
html, body{
    margin:0;
    overflow:hidden;
    background:black;
}

canvas{
    display:block;
    width:100vw;
    height:100vh;
    cursor:crosshair;
}

.info{
    position:fixed;
    top:10px;
    left:10px;
    color:rgba(255,255,255,0.7);
    font-family:Arial;
    font-size:13px;
    line-height:1.5;
    pointer-events:none;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="info">
드래그: 유체 생성<br>
클릭: 폭발<br>
SPACE: 초기화<br>
C: 색상 변경<br>
S: 스크린샷<br>
F: 자동 분출
</div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
});


// -------------------
// 설정
// -------------------

const MAX_PARTICLES = 1200;
const MAX_SPARKLES = 300;

let fountainMode = false;


// -------------------
// 색상
// -------------------

const palettes = [
    ["#00d0ff","#ff00ff","#8a2eff","#ffe600","#39ff14"],
    ["#ff0080","#7928ff","#00f0ff","#fff700","#ff5e00"],
    ["#00ffcc","#ff66cc","#cc00ff","#66ff00","#00aaff"]
];

let paletteIndex = 0;

function randomColor(){
    const p = palettes[paletteIndex];
    return p[Math.floor(Math.random()*p.length)];
}


// -------------------
// 입자
// -------------------

let particles = [];
let sparkles = [];

class Particle{

    constructor(x,y,dx,dy,color,size){

        this.x = x;
        this.y = y;

        this.dx = dx;
        this.dy = dy;

        this.color = color;
        this.size = size;

        this.life = 1;
    }

    update(){

        this.x += this.dx;
        this.y += this.dy;

        this.dx *= 0.985;
        this.dy *= 0.985;

        this.life -= 0.01;
    }

    draw(){

        ctx.globalAlpha = this.life;

        ctx.fillStyle = this.color;

        ctx.beginPath();
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fill();
    }
}


class Sparkle{

    constructor(x,y,color){

        this.x = x;
        this.y = y;

        this.dx = (Math.random()-0.5)*3;
        this.dy = (Math.random()-0.5)*3;

        this.size = Math.random()*2+1;
        this.life = 1;

        this.color = color;
    }

    update(){

        this.x += this.dx;
        this.y += this.dy;

        this.life -= 0.03;
    }

    draw(){

        ctx.globalAlpha = this.life;

        ctx.fillStyle = this.color;

        ctx.fillRect(this.x,this.y,this.size,this.size);
    }
}


// -------------------
// 생성 함수
// -------------------

function addParticle(x,y,dx,dy,big=false){

    if(particles.length > MAX_PARTICLES){
        particles.shift();
    }

    particles.push(
        new Particle(
            x,
            y,
            dx,
            dy,
            randomColor(),
            big ? Math.random()*20+10 : Math.random()*8+4
        )
    );
}


function addSparkle(x,y){

    if(sparkles.length > MAX_SPARKLES){
        sparkles.shift();
    }

    sparkles.push(
        new Sparkle(x,y,randomColor())
    );
}


// -------------------
// 마우스
// -------------------

let mouseDown = false;

let lastX = 0;
let lastY = 0;

canvas.addEventListener("mousedown",(e)=>{

    mouseDown = true;

    explosion(e.clientX,e.clientY);
});

canvas.addEventListener("mouseup",()=>{

    mouseDown = false;
});

canvas.addEventListener("mousemove",(e)=>{

    const x = e.clientX;
    const y = e.clientY;

    const speedX = x - lastX;
    const speedY = y - lastY;

    if(mouseDown){

        for(let i=0;i<3;i++){

            addParticle(
                x,
                y,
                speedX*0.08 + (Math.random()-0.5),
                speedY*0.08 + (Math.random()-0.5)
            );
        }

        addSparkle(x,y);
    }

    lastX = x;
    lastY = y;
});


// -------------------
// 폭발
// -------------------

function explosion(x,y){

    for(let i=0;i<40;i++){

        const angle = Math.random()*Math.PI*2;
        const speed = Math.random()*5;

        addParticle(
            x,
            y,
            Math.cos(angle)*speed,
            Math.sin(angle)*speed,
            true
        );
    }

    for(let i=0;i<20;i++){
        addSparkle(x,y);
    }
}


// -------------------
// 자동 분출
// -------------------

function fountain(){

    if(!fountainMode) return;

    const x = w/2 + Math.sin(Date.now()*0.001)*200;
    const y = h/2 + Math.cos(Date.now()*0.001)*120;

    for(let i=0;i<4;i++){

        addParticle(
            x,
            y,
            (Math.random()-0.5)*3,
            (Math.random()-0.5)*3,
            true
        );
    }
}


// -------------------
// 키보드
// -------------------

window.addEventListener("keydown",(e)=>{

    if(e.code === "Space"){

        particles = [];
        sparkles = [];
    }

    if(e.key === "c" || e.key === "C"){

        paletteIndex++;
        paletteIndex %= palettes.length;
    }

    if(e.key === "f" || e.key === "F"){

        fountainMode = !fountainMode;
    }

    if(e.key === "s" || e.key === "S"){

        const link = document.createElement("a");

        link.download = "fluid.png";
        link.href = canvas.toDataURL();

        link.click();
    }
});


// -------------------
// 애니메이션
// -------------------

function animate(){

    requestAnimationFrame(animate);

    // 잔상
    ctx.globalCompositeOperation = "source-over";
    ctx.fillStyle = "rgba(0,0,0,0.08)";
    ctx.fillRect(0,0,w,h);

    // 밝게 겹치기
    ctx.globalCompositeOperation = "lighter";

    fountain();

    // 입자
    for(let i=particles.length-1;i>=0;i--){

        const p = particles[i];

        p.update();
        p.draw();

        if(p.life <= 0){

            particles.splice(i,1);
        }
    }

    // 반짝이
    for(let i=sparkles.length-1;i>=0;i--){

        const s = sparkles[i];

        s.update();
        s.draw();

        if(s.life <= 0){

            sparkles.splice(i,1);
        }
    }

    ctx.globalAlpha = 1;
}

animate();

</script>
</body>
</html>
