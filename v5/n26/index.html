<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Fast Storm Smoke Universe</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    touch-action:none;
}
canvas{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    display:block;
}
.info{
    position:fixed;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    color:rgba(255,255,255,0.5);
    font-size:11px;
    letter-spacing:2px;
    pointer-events:none;
}
</style>
</head>

<body>

<div class="info">
FAST STORMS • WHITE / BLUE TRAILS
</div>

<canvas id="c"></canvas>

<script>
const c=document.getElementById("c");
const ctx=c.getContext("2d");

let w,h,dpr;

function resize(){
    dpr=Math.min(devicePixelRatio||1,2);
    w=innerWidth;
    h=innerHeight;

    c.width=w*dpr;
    c.height=h*dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
}
resize();
addEventListener("resize",resize);

/* =========================
   색
========================= */
const colors=[
    "rgba(255,255,255,0.22)",
    "rgba(180,220,255,0.18)",
    "rgba(140,200,255,0.16)"
];

/* =========================
   연기
========================= */
class Smoke{
    constructor(x,y,vx,vy,size,color){
        this.x=x;
        this.y=y;
        this.vx=vx;
        this.vy=vy;
        this.size=size;
        this.color=color;
        this.life=100;
    }

    update(){
        this.life--;

        this.x+=this.vx;
        this.y+=this.vy;

        this.vx*=0.985;
        this.vy*=0.985;

        this.size*=1.03;
    }

    draw(){
        ctx.globalAlpha=this.life/100;

        const g=ctx.createRadialGradient(
            this.x,this.y,0,
            this.x,this.y,this.size
        );

        g.addColorStop(0,this.color);
        g.addColorStop(1,"transparent");

        ctx.fillStyle=g;
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fill();
    }
}

const smokes=[];

/* =========================
   ⚡ 폭풍 (속도 UP 핵심)
========================= */
class Storm{
    constructor(x,y){

        this.x=x;
        this.y=y;

        // ⭐ 속도 대폭 증가
        this.vx=(Math.random()-0.5)*12;
        this.vy=(Math.random()-0.5)*12;

        this.size=70;
    }

    update(){

        // ⭐ 이동 속도 UP 반영
        this.x+=this.vx;
        this.y+=this.vy;

        // 벽 반사 (빠르게 튕김)
        if(this.x<0||this.x>w){
            this.vx*=-1.05;
            this.x=Math.max(0,Math.min(w,this.x));
        }

        if(this.y<0||this.y>h){
            this.vy*=-1.05;
            this.y=Math.max(0,Math.min(h,this.y));
        }

        // 폭풍 연기 생성
        spawnSmoke(this.x,this.y,this.vx,this.vy,this.size);
    }

    draw(){

        ctx.globalAlpha=0.25;

        const g=ctx.createRadialGradient(
            this.x,this.y,0,
            this.x,this.y,this.size
        );

        g.addColorStop(0,"rgba(255,255,255,0.28)");
        g.addColorStop(0.4,"rgba(160,210,255,0.18)");
        g.addColorStop(1,"transparent");

        ctx.fillStyle=g;
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fill();
    }
}

const storms=[];

/* =========================
   연기 생성
========================= */
function spawnSmoke(x,y,vx,vy,size){

    for(let i=0;i<4;i++){

        const a=Math.random()*Math.PI*2;
        const s=Math.random()*3;

        smokes.push(new Smoke(
            x,y,
            Math.cos(a)*s - vx*0.12,
            Math.sin(a)*s - vy*0.12,
            30 + size*0.25,
            colors[Math.floor(Math.random()*colors.length)]
        ));
    }

    if(smokes.length>900) smokes.splice(0,120);
}

/* =========================
   클릭 → 폭풍 생성
========================= */
function click(x,y){

    storms.push(new Storm(x,y));

    for(let i=0;i<70;i++){

        const a=Math.random()*Math.PI*2;
        const s=Math.random()*9;

        smokes.push(new Smoke(
            x,y,
            Math.cos(a)*s,
            Math.sin(a)*s,
            40,
            "rgba(180,220,255,0.22)"
        ));
    }
}

/* =========================
   마우스 잔상
========================= */
let px=0,py=0;

function move(x,y){

    let dx=x-px;
    let dy=y-py;

    for(let i=0;i<6;i++){

        const a=Math.random()*Math.PI*2;
        const s=Math.random()*3;

        smokes.push(new Smoke(
            x,y,
            Math.cos(a)*s - dx*0.12,
            Math.sin(a)*s - dy*0.12,
            34,
            colors[Math.floor(Math.random()*colors.length)]
        ));
    }

    px=x;py=y;
}

/* =========================
   입력
========================= */
c.addEventListener("mousedown",e=>{
    click(e.clientX,e.clientY);
});

c.addEventListener("mousemove",e=>{
    move(e.clientX,e.clientY);
});

c.addEventListener("touchstart",e=>{
    const t=e.touches[0];
    click(t.clientX,t.clientY);
});

c.addEventListener("touchmove",e=>{
    e.preventDefault();
    const t=e.touches[0];
    move(t.clientX,t.clientY);
},{passive:false});

/* =========================
   애니메이션
========================= */
function loop(){

    requestAnimationFrame(loop);

    ctx.fillStyle="rgba(0,0,0,0.08)";
    ctx.fillRect(0,0,w,h);

    for(const s of storms){
        s.update();
        s.draw();
    }

    for(let i=smokes.length-1;i>=0;i--){

        let s=smokes[i];
        s.update();
        s.draw();

        if(s.life<=0) smokes.splice(i,1);
    }

    ctx.globalAlpha=1;
}

loop();
</script>

</body>
</html>
