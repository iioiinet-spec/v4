<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>쉬운 슈퍼 점프맵</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:linear-gradient(#6ec6ff,#ffffff);
    font-family:sans-serif;
}

#game{
    width:100vw;
    height:100vh;
    overflow:hidden;
    position:relative;
}

#world{
    position:absolute;
    width:4000px;
    height:1200px;
}

.platform{
    position:absolute;
    border-radius:12px;
    border:4px solid #222;
}

.normal{
    background:#4CAF50;
}

.bounce{
    background:#ffe66d;
}

.ice{
    background:#8be9fd;
}

#player{
    position:absolute;
    width:45px;
    height:45px;
    background:red;
    border-radius:10px;
    z-index:999;
}

#goal{
    position:absolute;
    width:80px;
    height:80px;
    background:gold;
    border-radius:50%;
    border:6px solid orange;
}

#ui{
    position:fixed;
    top:10px;
    left:10px;
    color:white;
    background:rgba(0,0,0,0.5);
    padding:12px;
    border-radius:12px;
    z-index:9999;
    line-height:1.8;
}

</style>
</head>

<body>

<div id="ui">
🎮 쉬운 점프맵<br>
← → 이동<br>
스페이스 = 점프<br><br>

🟩 일반 발판<br>
🟨 슈퍼 점프 발판<br>
🟦 얼음 발판
</div>

<div id="game">

    <div id="world">

        <div id="player"></div>

        <div id="goal"></div>

    </div>

</div>

<script>

const world = document.getElementById("world");
const player = document.getElementById("player");
const goal = document.getElementById("goal");

let x = 100;
let y = 300;

let vx = 0;
let vy = 0;

let jumping = false;

const gravity = 0.8;

const keys = {};

document.addEventListener("keydown",(e)=>{

    keys[e.code] = true;

    // 높은 점프
    if(e.code==="Space" && !jumping){

        vy = -24;
        jumping = true;

    }

});

document.addEventListener("keyup",(e)=>{

    keys[e.code] = false;

});

const platforms = [

    // 간격 줄인 쉬운 맵
    {x:0,y:600,w:300,h:50,type:"normal"},

    {x:350,y:560,w:180,h:40,type:"bounce"},

    {x:600,y:520,w:180,h:40,type:"ice"},

    {x:850,y:560,w:200,h:40,type:"normal"},

    {x:1100,y:500,w:220,h:40,type:"bounce"},

    {x:1400,y:450,w:240,h:40,type:"ice"},

    {x:1700,y:520,w:240,h:40,type:"normal"},

    {x:2000,y:460,w:260,h:40,type:"bounce"},

    {x:2350,y:420,w:260,h:40,type:"ice"},

    {x:2700,y:500,w:280,h:40,type:"normal"},

    {x:3050,y:440,w:280,h:40,type:"bounce"},

    {x:3400,y:380,w:320,h:50,type:"normal"}

];

// 플랫폼 생성
platforms.forEach(p=>{

    const div = document.createElement("div");

    div.className = "platform " + p.type;

    div.style.left = p.x + "px";
    div.style.top = p.y + "px";
    div.style.width = p.w + "px";
    div.style.height = p.h + "px";

    world.appendChild(div);

});

// 골
goal.style.left = "3500px";
goal.style.top = "250px";

function reset(){

    x = 100;
    y = 300;

    vx = 0;
    vy = 0;

}

function update(){

    // 좌우 이동
    if(keys["ArrowRight"]){

        vx += 0.6;

    }

    if(keys["ArrowLeft"]){

        vx -= 0.6;

    }

    // 마찰
    vx *= 0.9;

    // 중력
    vy += gravity;

    x += vx;
    y += vy;

    // 플랫폼 충돌
    platforms.forEach(p=>{

        if(
            x + 45 > p.x &&
            x < p.x + p.w &&
            y + 45 > p.y &&
            y + 45 < p.y + p.h + 20 &&
            vy >= 0
        ){

            y = p.y - 45;

            vy = 0;

            jumping = false;

            // 슈퍼 점프 발판
            if(p.type==="bounce"){

                vy = -35;

            }

            // 얼음 발판
            if(p.type==="ice"){

                vx *= 1.03;

            }

        }

    });

    // 떨어지면 리셋
    if(y > 1100){

        reset();

    }

    // 플레이어 위치
    player.style.left = x + "px";
    player.style.top = y + "px";

    // 카메라
    const cameraX = -x + window.innerWidth / 3;

    world.style.transform =
    `translateX(${cameraX}px)`;

    // 클리어
    if(
        x + 45 > 3500 &&
        y + 45 > 250 &&
        x < 3580 &&
        y < 330
    ){

        alert("🏆 쉬운 점프맵 클리어!");

        reset();

    }

    requestAnimationFrame(update);

}

update();

</script>

</body>
</html>
