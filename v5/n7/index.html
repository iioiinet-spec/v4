<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sakura Dream</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
}

canvas{
    display:block;
    width:100%;
    height:100%;

    cursor:none;

    background:
    linear-gradient(
        to bottom,
        #7ecfff 0%,
        #bce8ff 45%,
        #edfaff 100%
    );
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<script>

const canvas =
document.getElementById("canvas");

const ctx =
canvas.getContext("2d");

let w,h;

function resize(){

    w = canvas.width = innerWidth;
    h = canvas.height = innerHeight;
}

resize();

window.addEventListener(
    "resize",
    resize
);

const petals = [];

/* 색 */

const colors = [

    "#ffe4ef",
    "#ffd3e6",
    "#fff0f6",
    "#ffc8de"
];

function randomColor(){

    return colors[
        Math.floor(
            Math.random()*colors.length
        )
    ];
}

/* 벚꽃 위치 저장 */

const blossoms = [];

for(let i=0;i<180;i++){

    blossoms.push({

        x:
        80 + Math.random()*320,

        y:
        80 + Math.random()*220,

        size:
        Math.random()*10 + 10,

        color:
        randomColor()
    });
}

/* 꽃잎 */

class Petal{

    constructor(x,y,vx,vy,size,color){

        this.x = x;
        this.y = y;

        this.vx = vx;
        this.vy = vy;

        this.size = size;

        this.life = 240;

        this.rotation =
        Math.random()*Math.PI*2;

        this.rotationSpeed =
        (Math.random()-0.5)*0.03;

        this.color = color;
    }

    update(){

        this.x += this.vx;
        this.y += this.vy;

        this.vx *= 0.995;
        this.vy *= 0.997;

        this.vy += 0.002;

        this.rotation +=
        this.rotationSpeed;

        this.life--;
    }

    draw(){

        ctx.save();

        ctx.translate(
            this.x,
            this.y
        );

        ctx.rotate(
            this.rotation
        );

        ctx.globalAlpha =
        this.life / 240;

        drawFlower(
            0,
            0,
            this.size,
            this.color
        );

        ctx.restore();
    }
}

/* 벚꽃 모양 */

function drawFlower(x,y,size,color){

    ctx.fillStyle = color;

    for(let i=0;i<5;i++){

        ctx.beginPath();

        const angle =
        (Math.PI*2/5)*i;

        const px =
        Math.cos(angle)*size*0.8;

        const py =
        Math.sin(angle)*size*0.8;

        ctx.arc(
            x + px,
            y + py,
            size*0.65,
            0,
            Math.PI*2
        );

        ctx.fill();
    }

    /* 중앙 */

    ctx.fillStyle =
    "#fff7b2";

    ctx.beginPath();

    ctx.arc(
        x,
        y,
        size*0.35,
        0,
        Math.PI*2
    );

    ctx.fill();
}

/* 배경 */

function drawBackground(){

    /* 구름 */

    ctx.fillStyle =
    "rgba(255,255,255,0.7)";

    for(let i=0;i<5;i++){

        const cx =
        150 + i*280;

        const cy =
        90 + Math.sin(i)*20;

        ctx.beginPath();

        ctx.arc(cx,cy,45,0,Math.PI*2);
        ctx.arc(cx+40,cy+10,35,0,Math.PI*2);
        ctx.arc(cx-40,cy+10,35,0,Math.PI*2);

        ctx.fill();
    }

    /* 땅 */

    ctx.fillStyle =
    "#dff5cf";

    ctx.fillRect(
        0,
        h-120,
        w,
        120
    );

    /* 줄기 */

    ctx.strokeStyle =
    "#8f6a58";

    ctx.lineWidth = 18;

    ctx.lineCap = "round";

    ctx.beginPath();

    ctx.moveTo(
        220,
        h
    );

    ctx.quadraticCurveTo(
        210,
        h-180,
        250,
        h-390
    );

    ctx.stroke();

    /* 가지 */

    ctx.lineWidth = 7;

    const branches = [

        [250,h-390,140,h-510],
        [250,h-390,390,h-500],
        [240,h-320,120,h-360],
        [250,h-300,410,h-350],
        [235,h-240,150,h-180]
    ];

    branches.forEach(b=>{

        ctx.beginPath();

        ctx.moveTo(
            b[0],
            b[1]
        );

        ctx.quadraticCurveTo(

            (b[0]+b[2])/2,
            b[1]-20,

            b[2],
            b[3]
        );

        ctx.stroke();
    });

    /* 벚꽃 */

    blossoms.forEach(f=>{

        drawFlower(
            f.x,
            f.y,
            f.size,
            f.color
        );
    });
}

/* 마우스 꽃잎 */

window.addEventListener(
    "mousemove",
    e=>{

        for(let i=0;i<2;i++){

            petals.push(

                new Petal(

                    e.clientX +
                    (Math.random()-0.5)*15,

                    e.clientY +
                    (Math.random()-0.5)*15,

                    (Math.random()-0.5)*0.9,

                    Math.random()*0.7,

                    Math.random()*4 + 3,

                    randomColor()
                )
            );
        }
    }
);

/* 클릭 → 하트 폭발 */

window.addEventListener(
    "click",
    e=>{

        heartBloom(
            e.clientX,
            e.clientY
        );
    }
);

function heartBloom(x,y){

    const count = 120;

    for(let i=0;i<count;i++){

        const t =
        Math.random()*Math.PI*2;

        const r =
        Math.random();

        let hx =
        16*Math.pow(
            Math.sin(t),
            3
        );

        let hy =
        13*Math.cos(t)
        -5*Math.cos(2*t)
        -2*Math.cos(3*t)
        -Math.cos(4*t);

        hx *= 1.05;
        hy *= 0.78;

        const scale =
        0.13 * r;

        petals.push(

            new Petal(

                x,
                y,

                hx*scale,

                -hy*scale,

                Math.random()*5 + 3,

                randomColor()
            )
        );
    }
}

/* 자연 꽃잎 */

function ambientPetals(){

    if(Math.random() < 0.02){

        petals.push(

            new Petal(

                Math.random()*w,
                -20,

                Math.random()*0.3 - 0.15,

                Math.random()*0.5 + 0.2,

                Math.random()*4 + 3,

                randomColor()
            )
        );
    }
}

function animate(){

    requestAnimationFrame(
        animate
    );

    ctx.clearRect(
        0,
        0,
        w,
        h
    );

    drawBackground();

    ambientPetals();

    for(
        let i=petals.length-1;
        i>=0;
        i--
    ){

        const p = petals[i];

        p.update();

        p.draw();

        if(
            p.life <= 0 ||
            p.y > h + 60
        ){

            petals.splice(i,1);
        }
    }
}

animate();

</script>

</body>
</html>
