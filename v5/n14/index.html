<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Fluid Effect with Floating Cloud Background</title>

<style>
html, body {
  margin: 0;
  overflow: hidden;
  background: #000;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
}
</style>
</head>

<body>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
  initAmbientFog(); // 화면 크기 변경 시 구름 재배치
});

/* =========================
   마우스 데이터
========================= */
const mouse = {
  x: 0, y: 0,
  oldX: 0, oldY: 0,
  down: false,
  downTime: 0
};

/* =========================
   컬러 슬롯 (비비드 컬러)
========================= */
const colors = [
  [0, 225, 255],   // 네온 시안 (Cyan)
  [255, 0, 150],   // 핫 핑크 (Hot Pink)
  [150, 0, 255],   // 일렉트릭 퍼플 (Purple)
  [0, 255, 150],   // 형광 그린 (Green)
  [255, 100, 0]    // 비비드 오렌지 (Orange)
];

let fog = []; // 동적 유체 이펙트 안개 배열
let ambientFog = []; // ✨ 둥실둥실 떠다니는 배경 구름 안개 배열
let charge = 1;

/* =========================
   ✨ 핵심 수정: 둥실둥실 흐르는 배경 구름 초기화
========================= */
function initAmbientFog() {
  ambientFog = [];
  const maxAmbient = 10; // 배경 밀도를 높이기 위해 10개로 상향
  
  for (let i = 0; i < maxAmbient; i++) {
    const baseColor = colors[Math.floor(Math.random() * colors.length)];
    const size = Math.random() * 250 + 400; // 크기를 더 거대하게 설정 (400~650)
    
    ambientFog.push({
      x: Math.random() * w,
      y: Math.random() * h,
      // 구름처럼 아주 잔잔하고 유기적으로 움직이도록 미세한 독립 속도 부여
      vx: (Math.random() - 0.5) * 0.2 - 0.05, // 살짝 한쪽으로 흐르는 경향성 부여
      vy: (Math.random() - 0.5) * 0.1,
      baseSize: size,
      color: baseColor,
      // 구름 내부가 뭉게뭉게 일렁이는 효과를 위한 펄스(Pulse) 데이터
      pulseSpeed: Math.random() * 0.002 + 0.001,
      pulseAngle: Math.random() * Math.PI * 2
    });
  }
}

// 최초 1회 배경 구름 생성
initAmbientFog();


// 마우스 움직임 이벤트 (커서 트레일 유체 안개 생성)
window.addEventListener("mousemove", (e) => {
  mouse.oldX = mouse.x;
  mouse.oldY = mouse.y;
  mouse.x = e.clientX;
  mouse.y = e.clientY;

  const dx = mouse.x - mouse.oldX;
  const dy = mouse.y - mouse.oldY;
  const speed = Math.sqrt(dx * dx + dy * dy);

  if (speed > 1) {
    const trailCount = Math.min(4, Math.floor(speed / 4) + 1); 
    
    for (let i = 0; i < trailCount; i++) {
      const angle = Math.random() * Math.PI * 2;
      const baseColor = colors[Math.floor(Math.random() * colors.length)];
      
      fog.push({
        x: mouse.x + (Math.random() - 0.5) * 20,
        y: mouse.y + (Math.random() - 0.5) * 20,
        vx: -dx * 0.08 + Math.cos(angle) * 0.4,
        vy: -dy * 0.08 + Math.sin(angle) * 0.4 - 0.1,
        life: 1.0,
        decay: Math.random() * 0.008 + 0.006, 
        baseSize: Math.random() * 20 + 35, 
        maxSizeMultiplier: Math.random() * 1.5 + 3.5,
        color: baseColor,
        rotation: Math.random() * Math.PI * 2,
        spin: (Math.random() - 0.5) * 0.015
      });
    }
  }
});

window.addEventListener("mousedown", () => {
  mouse.down = true;
  mouse.downTime = performance.now();
  charge = 1;
});

window.addEventListener("mouseup", () => {
  if (!mouse.down) return;
  mouse.down = false;

  const t = performance.now() - mouse.downTime;
  charge = 1 + Math.min(5, t / 500);

  releaseFog(mouse.x, mouse.y, charge);
});

// 키보드 입력 이벤트
window.addEventListener("keydown", (e) => {
  if (e.code === "Space") {
    e.preventDefault(); 
    const randomX = Math.random() * w;
    const randomY = Math.random() * h;
    releaseFog(randomX, randomY, 3);
  }
  
  if (e.code === "Enter") {
    e.preventDefault();
    fog = []; // 유체 이펙트 안개만 초기화
  }
});

function updateCharge() {
  if (mouse.down) {
    const t = performance.now() - mouse.downTime;
    charge = 1 + Math.min(5, t / 500);
  }
}

/* =========================
   안개 생성 (클릭 & 스페이스바)
========================= */
function releaseFog(startX, startY, chargeValue) {
  const count = Math.floor(40 + chargeValue * 40); 

  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = (Math.random() * 4 + 1.5) * chargeValue; 
    const baseColor = colors[Math.floor(Math.random() * colors.length)];

    fog.push({
      x: startX,
      y: startY,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1.0,
      decay: Math.random() * 0.008 + 0.006,
      baseSize: (Math.random() * 20 + 15) * (chargeValue * 0.7),
      maxSizeMultiplier: Math.random() * 2 + 3,
      color: baseColor,
      rotation: Math.random() * Math.PI * 2,
      spin: (Math.random() - 0.5) * 0.01
    });
  }
}

/* =========================
   업데이트
========================= */
function update() {
  updateCharge();

  // 1. ✨ 배경 구름 안개 업데이트 (둥실둥실 흐름 및 경계 루프 연산)
  for (let p of ambientFog) {
    p.x += p.vx;
    p.y += p.vy;
    p.pulseAngle += p.pulseSpeed; // 크기가 아주 미세하게 커졌다 작아지도록 연산

    // 구름이 화면 바깥으로 완전히 나가면 반대편에서 부드럽게 재출현 (Wrapping)
    const padding = p.baseSize; 
    if (p.x < -padding) p.x = w + padding;
    if (p.x > w + padding) p.x = -padding;
    if (p.y < -padding) p.y = h + padding;
    if (p.y > h + padding) p.y = -padding;
  }

  // 2. 동적 유체 이펙트 안개 업데이트
  for (let i = fog.length - 1; i >= 0; i--) {
    const p = fog[i];

    p.x += p.vx;
    p.y += p.vy;

    p.vx *= 0.94;
    p.vy *= 0.94;
    p.vy -= 0.015; 
    p.life -= p.decay;

    p.rotation += p.spin;

    if (p.life <= 0) {
      fog.splice(i, 1);
    }
  }
}

/* =========================
   렌더링
========================= */
function draw() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.12)";
  ctx.fillRect(0, 0, w, h);

  ctx.globalCompositeOperation = "screen";

  // 1. ✨ 배경 구름 안개 그리기
  for (let p of ambientFog) {
    const [r, g, b] = p.color;
    // 펄스 연산으로 구름 크기가 살아 숨 쉬듯 미세하게 변동합니다.
    const dynamicSize = p.baseSize + Math.sin(p.pulseAngle) * 40;
    const alpha = 0.01; // 유체 효과를 방해하지 않는 최적의 은은한 투명도

    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, dynamicSize);
    grad.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${alpha})`); 
    grad.addColorStop(0.3, `rgba(${r}, ${g}, ${b}, ${alpha * 0.5})`);
    grad.addColorStop(0.8, `rgba(${r}, ${g}, ${b}, ${alpha * 0.08})`);
    grad.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);

    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(p.x, p.y, dynamicSize, 0, Math.PI * 2);
    ctx.fill();
  }

  // 2. 동적 유체 이펙트 안개 그리기
  for (let p of fog) {
    const [r, g, b] = p.color;
    const currentSize = p.baseSize * (1 + (1 - p.life) * p.maxSizeMultiplier);
    const alpha = p.life * 0.15; 

    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, currentSize);
    grad.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${alpha})`); 
    grad.addColorStop(0.3, `rgba(${r}, ${g}, ${b}, ${alpha * 0.5})`);
    grad.addColorStop(0.7, `rgba(${r}, ${g}, ${b}, ${alpha * 0.1})`);
    grad.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);

    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(p.x, p.y, currentSize, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.globalCompositeOperation = "source-over";
}

/* =========================
   루프
========================= */
function animate() {
  update();
  draw();
  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
