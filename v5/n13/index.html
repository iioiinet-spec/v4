<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마우스로 만드는 컬러 유체 미디어 아트</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #02040a; /* 깊은 밤하늘 기본색 */
            font-family: 'Malgun Gothic', sans-serif;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }
        #instruction {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            pointer-events: none;
            text-align: center;
            background: rgba(255, 255, 255, 0.02);
            padding: 6px 20px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            letter-spacing: 1px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="instruction">
        화면을 <strong>클릭</strong>하면 컬러 유체와 전구가 반짝이며, <strong>길게 누르면</strong> 은하수와 축사가 나타납니다.
    </div>
    <canvas id="artCanvas"></canvas>

    <script>
        const canvas = document.getElementById('artCanvas');
        const ctx = canvas.getContext('2d');

        // 랙 방지용 정적 배경 캐시 캔버스
        const bgCanvas = document.createElement('canvas');
        const bgCtx = bgCanvas.getContext('2d');

        let width, height;
        let decorations = []; 
        let particles = [];
        let sparkles = [];
        
        let isMouseDown = false;
        let mouseX = 0, mouseY = 0;
        let pressTimer = 0;
        let merryAlpha = 0;
        let currentTextItem = { text: "Merry Christmas", color: "#FF3333" };

        // 지정된 6가지 핵심 색상 (빨강, 초록, 노랑, 민트, 보라, 분홍)
        const THEME_COLORS = ['#FF3333', '#33FF33', '#FFFF33', '#33FFD2', '#B833FF', '#FF3399'];

        function resize() {
            width = canvas.width = bgCanvas.width = window.innerWidth;
            height = canvas.height = bgCanvas.height = window.innerHeight;
            
            // 1. 정적 배경(나무 몸통, 잎, 꼭대기 황금별)을 가상 캔버스에 미리 그리기 (랙 방지)
            preRenderBackground();
            // 2. 트리 내부에 맞는 장식 위치 초기화
            initTreeDecorations();
        }

        // 트리의 수직 정방향 실루엣 가로폭 계산기
        function getTreeWidthAtY(y, bottomY, treeHeight) {
            if (y > bottomY || y < bottomY - treeHeight) return 0;
            const pct = (bottomY - y) / treeHeight; // 0(바닥) ~ 1(꼭대기)
            const reversePct = 1 - pct; // 바닥으로 갈수록 커짐 (0 ~ 1)
            
            // 리얼한 침엽수 느낌을 위한 외곽 웨이브 굴곡 
            const baseWidth = reversePct * (width * 0.22);
            const wave = Math.sin(reversePct * Math.PI * 5) * (width * 0.012); 
            return Math.max(0, baseWidth + wave);
        }

        // 배경 정적 에셋 사전 렌더링 (매 프레임마다 그리지 않아 랙을 완벽히 제거)
        function preRenderBackground() {
            bgCtx.clearRect(0, 0, width, height);
            
            // 밤하늘 그라데이션 배경 기본 깔기
            let skyGrad = bgCtx.createRadialGradient(width/2, height/2, 0, width/2, height/2, Math.max(width, height));
            skyGrad.addColorStop(0, '#050c1e');
            skyGrad.addColorStop(1, '#010205');
            bgCtx.fillStyle = skyGrad;
            bgCtx.fillRect(0, 0, width, height);

            const centerX = width / 2;
            const bottomY = height * 0.85;
            const treeHeight = height * 0.6;

            // 1. 정방향 나무 기둥
            let trunkGrad = bgCtx.createLinearGradient(centerX - 15, 0, centerX + 15, 0);
            trunkGrad.addColorStop(0, '#110601');
            trunkGrad.addColorStop(0.5, '#3a1e08');
            trunkGrad.addColorStop(1, '#110601');
            bgCtx.fillStyle = trunkGrad;
            bgCtx.fillRect(centerX - 15, bottomY - 30, 30, 45);

            // 2. 울창한 진짜 침엽수 레이어링 (8단 적층 구조로 리얼함 극대화)
            const layers = 8;
            for (let i = layers; i > 0; i--) {
                const pct = i / layers;
                const currentY = bottomY - (treeHeight * (1 - pct));
                const layerWidth = getTreeWidthAtY(currentY, bottomY, treeHeight) * 1.15;
                const layerHeight = treeHeight * 0.23;

                bgCtx.save();
                let treeGrad = bgCtx.createLinearGradient(0, currentY - layerHeight, 0, currentY);
                treeGrad.addColorStop(0, '#020a03');
                treeGrad.addColorStop(0.4, '#07220c');
                treeGrad.addColorStop(0.8, '#0f3d19');
                treeGrad.addColorStop(1, '#010401');
                bgCtx.fillStyle = treeGrad;

                // 솔잎 생동감을 위한 지그재그 하단 드로잉
                bgCtx.beginPath();
                bgCtx.moveTo(centerX, currentY - layerHeight - 15);
                bgCtx.quadraticCurveTo(centerX + layerWidth * 0.45, currentY - layerHeight * 0.4, centerX + layerWidth, currentY);
                
                const spikes = 10;
                for(let j = 0; j <= spikes; j++) {
                    let stepX = centerX + layerWidth - (layerWidth * 2 / spikes) * j;
                    let stepY = currentY + (j % 2 === 0 ? 7 : -4);
                    bgCtx.lineTo(stepX, stepY);
                }
                
                bgCtx.quadraticCurveTo(centerX - layerWidth * 0.45, currentY - layerHeight * 0.4, centerX, currentY - layerHeight - 15);
                bgCtx.closePath();
                bgCtx.fill();
                bgCtx.restore();
            }

            // 3. 꼭대기 정방향 황금 큰 별 고정
            const starY = bottomY - treeHeight - 15;
            bgCtx.save();
            bgCtx.shadowBlur = 20;
            bgCtx.shadowColor = "#ffdf66";
            let starGrad = bgCtx.createRadialGradient(centerX, starY, 1, centerX, starY, 20);
            starGrad.addColorStop(0, '#ffffff');
            starGrad.addColorStop(0.3, '#ffd633');
            starGrad.addColorStop(1, '#997a00');
            bgCtx.fillStyle = starGrad;
            
            // 별 그리기
            let rot = Math.PI / 2 * 3;
            let step = Math.PI / 5;
            bgCtx.beginPath();
            bgCtx.moveTo(centerX, starY - 22);
            for (let i = 0; i < 5; i++) {
                bgCtx.lineTo(centerX + Math.cos(rot) * 22, starY + Math.sin(rot) * 22);
                rot += step;
                bgCtx.lineTo(centerX + Math.cos(rot) * 9, starY + Math.sin(rot) * 9);
                rot += step;
            }
            bgCtx.closePath();
            bgCtx.fill();
            bgCtx.restore();
        }

        // 트리 외곽선 내부에 장식물 위치 잡기
        function initTreeDecorations() {
            decorations = [];
            const centerX = width / 2;
            const bottomY = height * 0.85;
            const treeHeight = height * 0.6;
            const types = ['bulb', 'ornament', 'ribbon'];

            let safety = 0;
            while (decorations.length < 120 && safety < 2000) {
                safety++;
                const randomPct = Math.random(); 
                const y = bottomY - (randomPct * treeHeight);
                const maxW = getTreeWidthAtY(y, bottomY, treeHeight);
                
                if (maxW < 12) continue; 

                const padding = 14; // 테두리 탈출 방지 패딩
                const x = centerX + (Math.random() - 0.5) * 2 * (maxW - padding);

                let type = types[Math.floor(Math.random() * types.length)];
                if (randomPct > 0.85) type = 'bulb'; // 상단은 가벼운 전구 위주

                decorations.push({
                    x: x,
                    y: y,
                    type: type,
                    glowColor: THEME_COLORS[Math.floor(Math.random() * THEME_COLORS.length)],
                    alpha: 0, // 처음에는 꺼져있음
                    size: type === 'bulb' ? Math.random() * 1.5 + 3 : (type === 'ornament' ? 6.5 : 10),
                    speed: Math.random() * 0.015 + 0.008
                });
            }
        }

        // --- 유체 파티클 클래스 (최적화를 위해 연산 최소화) ---
        class FluidColor {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 5 + 1.5;
                this.vx = Math.cos(angle) * velocity;
                this.vy = Math.sin(angle) * velocity;
                this.size = Math.random() * 20 + 10;
                this.alpha = 1.0;
                this.decay = Math.random() * 0.012 + 0.006;
            }
            update() {
                this.vx *= 0.96;
                this.vy *= 0.96;
                this.x += this.vx;
                this.y += this.vy;
                this.size += 0.2;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                let gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(0.3, this.color);
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // --- 트리 주변 반짝이 은하수 클래스 ---
        class SpaceSparkle {
            constructor(x, y) {
                this.x = x + (Math.random() - 0.5) * (width * 0.45);
                this.y = y + (Math.random() - 0.5) * (height * 0.65);
                this.size = Math.random() * 2 + 1;
                this.alpha = 0;
                this.targetAlpha = Math.random() * 0.8 + 0.2;
                this.speed = Math.random() * 0.05 + 0.02;
                this.phase = Math.random() * 100;
            }
            update() {
                this.phase += 0.05;
                this.x += Math.sin(this.phase) * 0.12;
                if (isMouseDown) {
                    this.alpha += (this.targetAlpha - this.alpha) * this.speed;
                } else {
                    this.alpha -= 0.04;
                }
            }
            draw() {
                if (this.alpha <= 0) return;
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = 6;
                ctx.shadowColor = '#fff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // --- 똑바로 정렬된 리본(Bow) 드로잉 함수 ---
        function drawPerfectBow(cx, cy, size, color, alpha) {
            ctx.save();
            ctx.translate(cx, cy); // 회전 없음 (정방향 고정)
            ctx.globalAlpha = alpha > 0 ? alpha : 0.35;

            if (alpha > 0) {
                ctx.shadowBlur = 12;
                ctx.shadowColor = color;
                ctx.fillStyle = color;
            } else {
                ctx.fillStyle = '#6e1212'; // 꺼져있을 때 기본 다크레드 모양 리본
            }

            // 왼쪽 고리
            ctx.beginPath();
            ctx.bezierCurveTo(0, 0, -size, -size * 1.1, -size, -size * 0.1);
            ctx.bezierCurveTo(-size, size * 0.5, 0, 0, 0, 0);
            ctx.fill();

            // 오른쪽 고리
            ctx.beginPath();
            ctx.bezierCurveTo(0, 0, size, -size * 1.1, size, -size * 0.1);
            ctx.bezierCurveTo(size, size * 0.5, 0, 0, 0, 0);
            ctx.fill();

            // 아래 방향 꼬리 2줄기 (거꾸로 뒤집히지 않음)
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(-size * 0.4, size * 1.1);
            ctx.lineTo(-size * 0.1, size * 0.7);
            ctx.lineTo(0, 0);
            ctx.moveTo(0, 0);
            ctx.lineTo(size * 0.4, size * 1.1);
            ctx.lineTo(size * 0.1, size * 0.7);
            ctx.closePath();
            ctx.fill();

            // 중앙 알맹이 매듭
            ctx.beginPath();
            ctx.arc(0, -size * 0.05, size * 0.25, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        // --- 메인 루프 애니메이션 ---
        function animate() {
            // 1. 사전 렌더링된 트리 배경을 고속 복사 (매 프레임 그리던 연산을 생략하여 초고속 구현)
            ctx.drawImage(bgCanvas, 0, 0);

            // 롱프레스 감지 및 타이머 제어
            if (isMouseDown) {
                pressTimer++;
                if (pressTimer > 35) {
                    merryAlpha = Math.min(merryAlpha + 0.03, 1);
                }
                if (sparkles.length < 120) {
                    sparkles.push(new SpaceSparkle(width / 2, height * 0.5));
                }
            } else {
                pressTimer = 0;
                merryAlpha = Math.max(merryAlpha - 0.03, 0);
            }

            // 은하수 반짝이 업데이트
            for (let i = sparkles.length - 1; i >= 0; i--) {
                sparkles[i].update();
                sparkles[i].draw();
                if (!isMouseDown && sparkles[i].alpha <= 0) {
                    sparkles.splice(i, 1);
                }
            }

            // 트리 장식품(전구, 오너먼트, 리본) 순회 업데이트 (천천히 사라지는 타이밍 포함)
            decorations.forEach(item => {
                if (item.alpha > 0) {
                    item.alpha -= item.speed * 0.45; // 자연스러운 소멸 흐림
                } else {
                    item.alpha = 0;
                }

                if (item.type === 'bulb') {
                    if (item.alpha > 0) {
                        ctx.save();
                        ctx.globalAlpha = item.alpha;
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = item.glowColor;
                        ctx.fillStyle = '#ffffff';
                        ctx.beginPath();
                        ctx.arc(item.x, item.y, item.size * 0.5, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = item.glowColor;
                        ctx.beginPath();
                        ctx.arc(item.x, item.y, item.size, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.restore();
                    }
                } else if (item.type === 'ornament') {
                    ctx.save();
                    if (item.alpha > 0) {
                        ctx.globalAlpha = item.alpha;
                        ctx.shadowBlur = 12;
                        ctx.shadowColor = item.glowColor;
                        ctx.fillStyle = item.glowColor;
                    } else {
                        ctx.globalAlpha = 0.4;
                        ctx.fillStyle = '#94771e'; // 꺼져있을 때 정방향 기본 무광 메탈구
                    }
                    ctx.beginPath();
                    ctx.arc(item.x, item.y, item.size, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // 정방향 유지용 입체 우상단 하이라이트 백색 점
                    ctx.fillStyle = 'rgba(255,255,255,0.4)';
                    ctx.beginPath();
                    ctx.arc(item.x - 1.8, item.y - 1.8, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                } else if (item.type === 'ribbon') {
                    drawPerfectBow(item.x, item.y, item.size, item.glowColor, item.alpha);
                }
            });

            // 미디어 유체 아트 파티클 업데이트
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].alpha <= 0) {
                    particles.splice(i, 1);
                }
            }

            // 가변 다채로운 Merry Christmas 타이포그래피 출력
            if (merryAlpha > 0) {
                ctx.save();
                ctx.globalAlpha = merryAlpha;
                ctx.font = "italic bold 46px 'Georgia', serif";
                ctx.textAlign = "center";
                ctx.shadowBlur = 20;
                ctx.shadowColor = currentTextItem.color;
                ctx.fillStyle = "#ffffff";
                
                let textX = width / 2;
                let textY = height * 0.5;
                if (width > 768) { 
                    textX = width / 2 + (width * 0.25); // 와이드형 모니터 우측 레이아웃
                } else {
                    textY = height * 0.15; // 모바일 스크린 상단 레이아웃
                }

                ctx.fillText(currentTextItem.text, textX, textY);
                ctx.restore();
            }

            requestAnimationFrame(animate);
        }

        // --- 마우스 및 터치 제어 핸들러 ---
        function triggerArt(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            mouseX = clientX - rect.left;
            mouseY = clientY - rect.top;

            // 1. 누를 때마다 "Merry Christmas" 가변 폰트 색상 6종 중 실시간 셔플
            currentTextItem.color = THEME_COLORS[Math.floor(Math.random() * THEME_COLORS.length)];

            // 2. 유체 크래시 물감 퍼짐 생성
            const chosenColor = THEME_COLORS[Math.floor(Math.random() * THEME_COLORS.length)];
            for (let i = 0; i < 22; i++) {
                particles.push(new FluidColor(mouseX, mouseY, chosenColor));
            }

            // 3. 트리 내부에 정상 정렬되어 숨겨진 모든 장식(전구, 방울, 리본) 점등 유도
            decorations.forEach(item => {
                if (Math.random() > 0.2) { 
                    item.alpha = Math.random() * 0.4 + 0.6;
                    item.glowColor = THEME_COLORS[Math.floor(Math.random() * THEME_COLORS.length)];
                }
            });
        }

        window.addEventListener('mousedown', (e) => {
            isMouseDown = true;
            triggerArt(e.clientX, e.clientY);
        });

        window.addEventListener('mouseup', () => isMouseDown = false);

        // 모바일 터치 최적화 연동 (랙 방지 가속 적용)
        window.addEventListener('touchstart', (e) => {
            isMouseDown = true;
            triggerArt(e.touches[0].clientX, e.touches[0].top);
        }, { passive: true });

        window.addEventListener('touchend', () => isMouseDown = false);
        window.addEventListener('resize', resize);

        // 최초 실행
        resize();
        animate();
    </script>
</body>
</html>
