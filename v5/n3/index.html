<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fire Smoke Fluid Art</title>

<style>
    html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        cursor: crosshair;
    }

    canvas {
        display: block;
        width: 100vw;
        height: 100vh;
    }

    .info{
        position: fixed;
        left: 20px;
        bottom: 20px;
        color: rgba(255,255,255,0.35);
        font-family: sans-serif;
        font-size: 13px;
        letter-spacing: 1px;
        user-select: none;
        pointer-events: none;
    }
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="info">
    DRAG : FIRE SMOKE &nbsp;&nbsp;|&nbsp;&nbsp;
    CLICK : FIRE EXPLOSION
</div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w, h;

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

const particles = [];
const sparks = [];

const mouse = {
    x: w / 2,
    y: h / 2,
    down: false
};

// ==========================
// FIRE COLORS
// ==========================

const firePalette = [
    [10, 100, 55],   // red-orange
    [20, 100, 55],   // orange
    [35, 100, 60],   // warm orange
    [48, 100, 60]    // yellow
];

function random(min, max){
    return Math.random() * (max - min) + min;
}

function fireColor(alpha=1){

    const c = firePalette[
        Math.floor(Math.random() * firePalette.length)
    ];

    return `hsla(${c[0]},${c[1]}%,${c[2]}%,${alpha})`;
}

// ==========================
// SMOKE PARTICLE
// ==========================

class SmokeParticle {

    constructor(x, y, power=1, explosion=false){

        this.x = x;
        this.y = y;

        const angle = random(0, Math.PI * 2);

        const speed = random(0.2, 4.5) * power;

        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;

        this.size = explosion
            ? random(40, 100)
            : random(20, 65);

        this.life = explosion
            ? random(130, 220)
            : random(90, 170);

        this.maxLife = this.life;

        this.spin = random(-0.08, 0.08);

        this.alpha = explosion ? 0.16 : 0.08;
    }

    update(){

        this.life--;

        // swirling
        const angle = Math.atan2(this.vy, this.vx) + this.spin;

        const speed = Math.sqrt(
            this.vx * this.vx +
            this.vy * this.vy
        );

        this.vx = Math.cos(angle) * speed * 0.992;
        this.vy = Math.sin(angle) * speed * 0.992;

        // fluid motion
        this.vx += Math.sin(
            this.y * 0.003 +
            performance.now() * 0.001
        ) * 0.03;

        this.vy += Math.cos(
            this.x * 0.003 +
            performance.now() * 0.001
        ) * 0.03;

        // smoke rising
        this.vy -= 0.015;

        this.x += this.vx;
        this.y += this.vy;

        this.size *= 0.995;

        this.draw();
    }

    draw(){

        const lifeRatio = this.life / this.maxLife;

        const g = ctx.createRadialGradient(
            this.x, this.y, 0,
            this.x, this.y, this.size
        );

        g.addColorStop(
            0,
            fireColor(this.alpha * lifeRatio * 2)
        );

        g.addColorStop(
            0.25,
            fireColor(this.alpha * lifeRatio)
        );

        g.addColorStop(
            0.6,
            `rgba(255,80,0,${0.03 * lifeRatio})`
        );

        g.addColorStop(
            1,
            "rgba(0,0,0,0)"
        );

        ctx.beginPath();
        ctx.fillStyle = g;
        ctx.arc(
            this.x,
            this.y,
            this.size,
            0,
            Math.PI * 2
        );
        ctx.fill();
    }
}

// ==========================
// SPARK
// ==========================

class Spark {

    constructor(x,y){

        this.x = x;
        this.y = y;

        this.vx = random(-10,10);
        this.vy = random(-10,10);

        this.life = random(25,45);

        this.size = random(1,3);
    }

    update(){

        this.life--;

        this.x += this.vx;
        this.y += this.vy;

        this.vx *= 0.95;
        this.vy *= 0.95;

        ctx.beginPath();

        ctx.fillStyle = fireColor(this.life / 45);

        ctx.arc(
            this.x,
            this.y,
            this.size,
            0,
            Math.PI * 2
        );

        ctx.fill();
    }
}

// ==========================
// EFFECTS
// ==========================

function emitSmoke(
    x,
    y,
    amount=8,
    power=1,
    explosion=false
){

    for(let i=0;i<amount;i++){

        particles.push(
            new SmokeParticle(
                x,
                y,
                power,
                explosion
            )
        );
    }
}

function emitExplosion(x,y){

    emitSmoke(
        x,
        y,
        180,
        2.8,
        true
    );

    for(let i=0;i<120;i++){

        sparks.push(
            new Spark(x,y)
        );
    }
}

// ==========================
// MOUSE
// ==========================

window.addEventListener("mousedown", e => {

    mouse.down = true;

    emitExplosion(
        e.clientX,
        e.clientY
    );
});

window.addEventListener("mouseup", () => {

    mouse.down = false;
});

window.addEventListener("mousemove", e => {

    mouse.x = e.clientX;
    mouse.y = e.clientY;

    // dragging fire smoke
    if(mouse.down){

        emitSmoke(
            mouse.x,
            mouse.y,
            12,
            1.4,
            false
        );

    } else {

        emitSmoke(
            mouse.x,
            mouse.y,
            2,
            0.5,
            false
        );
    }
});

window.addEventListener("click", e => {

    emitExplosion(
        e.clientX,
        e.clientY
    );
});

// ==========================
// AMBIENT FIRE
// ==========================

setInterval(() => {

    emitSmoke(
        random(0, w),
        random(h*0.5, h),
        2,
        0.5,
        false
    );

}, 160);

// ==========================
// RENDER
// ==========================

function animate(){

    requestAnimationFrame(animate);

    // fade out
    ctx.globalCompositeOperation = "source-over";

    ctx.fillStyle = "rgba(0,0,0,0.06)";
    ctx.fillRect(0,0,w,h);

    // glow blend
    ctx.globalCompositeOperation = "lighter";

    // particles
    for(let i=particles.length-1;i>=0;i--){

        const p = particles[i];

        p.update();

        if(
            p.life <= 0 ||
            p.size < 0.5
        ){
            particles.splice(i,1);
        }
    }

    // sparks
    for(let i=sparks.length-1;i>=0;i--){

        const s = sparks[i];

        s.update();

        if(s.life <= 0){
            sparks.splice(i,1);
        }
    }

    // dreamy atmosphere glow
    const glow = ctx.createRadialGradient(
        w/2, h/2, 0,
        w/2, h/2,
        Math.max(w,h)*0.7
    );

    glow.addColorStop(
        0,
        "rgba(255,120,0,0.03)"
    );

    glow.addColorStop(
        0.4,
        "rgba(255,60,0,0.02)"
    );

    glow.addColorStop(
        1,
        "rgba(0,0,0,0)"
    );

    ctx.globalCompositeOperation = "screen";
    ctx.fillStyle = glow;
    ctx.fillRect(0,0,w,h);
}

animate();

</script>

</body>
</html>
