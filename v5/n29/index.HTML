<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Ultra Optimized Neon Fluid</title>

<style>
html, body {
    margin: 0;
    overflow: hidden;
    background: #050505;
    width: 100%;
    height: 100%;
}

canvas {
    display: block;
    touch-action: none;
    cursor: crosshair;
}

.ui {
    position: fixed;
    top: 14px;
    left: 14px;
    color: rgba(255,255,255,0.7);
    font-family: sans-serif;
    font-size: 13px;
    line-height: 1.7;
    user-select: none;
    pointer-events: none;
}

.title {
    font-size: 18px;
    color: white;
    margin-bottom: 8px;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="ui">
    <div class="title">ULTRA OPTIMIZED NEON FLUID</div>
    드래그 : Fluid<br>
    클릭 : Explosion<br>
    휠 : Screen Shake<br>
    SPACE : Reset<br>
    C : Palette Change
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w, h;

const DPR = Math.min(window.devicePixelRatio || 1, 1);

function resize() {

    w = innerWidth;
    h = innerHeight;

    canvas.width = w * DPR;
    canvas.height = h * DPR;

    canvas.style.width = w + "px";
    canvas.style.height = h + "px";

    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}

resize();
addEventListener("resize", resize);

const fadeColor = "rgba(0,0,0,0.14)";

const palettes = [
    ["#00d0ff", "#7a5cff", "#ff48c4", "#00ffc8"],
    ["#ff006e", "#8338ec", "#3a86ff", "#00f5d4"],
    ["#8ec5ff", "#c77dff", "#ff9cee", "#72efdd"]
];

let paletteIndex = 0;

function randomColor() {
    const p = palettes[paletteIndex];
    return p[(Math.random() * p.length) | 0];
}

const MAX_PARTICLES = 1200;
const particles = [];
const pool = [];

const glowSprites = {};

function createGlowSprite(color) {

    const key = color;

    if (glowSprites[key]) return glowSprites[key];

    const c = document.createElement("canvas");
    c.width = 64;
    c.height = 64;

    const g = c.getContext("2d");

    const grad = g.createRadialGradient(
        32, 32, 0,
        32, 32, 32
    );

    grad.addColorStop(0, "white");
    grad.addColorStop(0.2, color);
    grad.addColorStop(1, "transparent");

    g.fillStyle = grad;
    g.fillRect(0, 0, 64, 64);

    glowSprites[key] = c;

    return c;
}

class Particle {

    constructor() {

        this.active = false;
    }

    init(x, y, vx, vy, color, size) {

        this.x = x;
        this.y = y;

        this.vx = vx;
        this.vy = vy;

        this.life = 1;

        this.decay = 0.018 + Math.random() * 0.01;

        this.size = size;

        this.angle = Math.random() * Math.PI * 2;
        this.spin = (Math.random() - 0.5) * 0.05;

        this.sprite = createGlowSprite(color);

        this.active = true;
    }

    update() {

        this.angle += this.spin;

        this.vx += Math.cos(this.angle) * 0.05;
        this.vy += Math.sin(this.angle) * 0.05;

        this.vx *= 0.985;
        this.vy *= 0.985;

        this.x += this.vx;
        this.y += this.vy;

        this.life -= this.decay;

        if (this.life <= 0) {
            this.active = false;
        }
    }

    draw() {

        const s = this.size * this.life;

        ctx.globalAlpha = this.life * 0.7;

        ctx.drawImage(
            this.sprite,
            this.x - s * 0.5,
            this.y - s * 0.5,
            s,
            s
        );
    }
}

function getParticle() {

    return pool.length
        ? pool.pop()
        : new Particle();
}

function releaseParticle(p) {

    pool.push(p);
}

function addParticle(x, y, vx, vy, size, color) {

    if (particles.length >= MAX_PARTICLES) return;

    const p = getParticle();

    p.init(x, y, vx, vy, color, size);

    particles.push(p);
}

function addFluid(x, y, amount = 5, speedX = 0, speedY = 0) {

    for (let i = 0; i < amount; i++) {

        const angle = Math.random() * Math.PI * 2;
        const force = Math.random() * 2;

        addParticle(
            x,
            y,
            Math.cos(angle) * force + speedX * 0.04,
            Math.sin(angle) * force + speedY * 0.04,
            20 + Math.random() * 30,
            randomColor()
        );
    }
}

function addExplosion(x, y) {

    for (let i = 0; i < 35; i++) {

        const angle = Math.random() * Math.PI * 2;
        const force = 2 + Math.random() * 5;

        addParticle(
            x,
            y,
            Math.cos(angle) * force,
            Math.sin(angle) * force,
            30 + Math.random() * 35,
            randomColor()
        );
    }
}

let pointerDown = false;
let lastX = 0;
let lastY = 0;

function pointerMove(x, y) {

    const dx = x - lastX;
    const dy = y - lastY;

    const speed = dx * dx + dy * dy;

    if (pointerDown) {

        addFluid(
            x,
            y,
            Math.min(10, 2 + speed * 0.002),
            dx,
            dy
        );
    }

    lastX = x;
    lastY = y;
}

canvas.addEventListener("mousedown", e => {

    pointerDown = true;

    lastX = e.clientX;
    lastY = e.clientY;

    addExplosion(e.clientX, e.clientY);
});

addEventListener("mouseup", () => {
    pointerDown = false;
});

canvas.addEventListener("mousemove", e => {
    pointerMove(e.clientX, e.clientY);
});

canvas.addEventListener("touchstart", e => {

    const t = e.touches[0];

    pointerDown = true;

    lastX = t.clientX;
    lastY = t.clientY;

    addExplosion(t.clientX, t.clientY);

}, { passive: false });

canvas.addEventListener("touchmove", e => {

    const t = e.touches[0];

    pointerMove(t.clientX, t.clientY);

    e.preventDefault();

}, { passive: false });

addEventListener("touchend", () => {
    pointerDown = false;
});

let shake = 0;

canvas.addEventListener("wheel", e => {

    shake = 10;

    for (let i = 0; i < 10; i++) {

        addFluid(
            e.clientX + (Math.random() - 0.5) * 150,
            e.clientY + (Math.random() - 0.5) * 150,
            5
        );
    }
});

addEventListener("keydown", e => {

    if (e.code === "Space") {

        particles.length = 0;
    }

    if (e.key.toLowerCase() === "c") {

        paletteIndex++;
        paletteIndex %= palettes.length;
    }
});

function animate() {

    requestAnimationFrame(animate);

    ctx.globalCompositeOperation = "source-over";
    ctx.globalAlpha = 1;

    ctx.fillStyle = fadeColor;
    ctx.fillRect(0, 0, w, h);

    let offsetX = 0;
    let offsetY = 0;

    if (shake > 0) {

        offsetX = (Math.random() - 0.5) * shake;
        offsetY = (Math.random() - 0.5) * shake;

        shake *= 0.9;
    }

    ctx.save();
    ctx.translate(offsetX, offsetY);

    ctx.globalCompositeOperation = "lighter";

    for (let i = particles.length - 1; i >= 0; i--) {

        const p = particles[i];

        p.update();

        if (!p.active) {

            releaseParticle(p);

            particles[i] = particles[particles.length - 1];
            particles.pop();

            continue;
        }

        p.draw();
    }

    ctx.restore();
}

animate();
</script>

</body>
</html>
