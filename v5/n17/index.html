<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Media Art - Fluid Dynamics</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050508;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #info-overlay {
            position: absolute;
            bottom: 30px;
            left: 30px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            letter-spacing: 2px;
            pointer-events: none;
            text-transform: uppercase;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <canvas id="artCanvas"></canvas>
    <div id="info-overlay">
        Fluid Dynamics & Typography Analysis<br>
        <span style="color: #ff3366;">Interactive Media Art Piece</span>
    </div>

    <script>
        const canvas = document.getElementById('artCanvas');
        const ctx = canvas.getContext('2d');
        
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // 마우스 물리 상태 벡터
        let mouse = { x: width / 2, y: height / 2, px: width / 2, py: height / 2, vx: 0, vy: 0, down: false };
        
        // 텍스트 데이터 소스 (미디어아트적 추상 단어들)
        const words = ["AESTHETIC", "FLUID", "DYNAMIC", "DATA", "CHAOS", "GENERATIVE", "SURFACE", "ENERGY", "FLOW"];
        
        // 유체 입자 배열
        const particles = [];
        const maxParticles = 120;

        class FluidParticle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.radius = Math.random() * 3 + 1;
                this.text = words[Math.floor(Math.random() * words.length)];
                this.fontSize = Math.floor(Math.random() * 40) + 12;
                this.hue = Math.random() * 60 + 180; // 기본 푸른빛~보랏빛 계열
                this.alpha = Math.random() * 0.5 + 0.2;
                this.decay = Math.random() * 0.005 + 0.002;
            }
            update(flowX, flowY) {
                // 외력(마우스 유체 흐름) 적용 및 자체 관성
                this.vx += flowX * 0.05 + (Math.random() - 0.5) * 0.1;
                this.vy += flowY * 0.05 + (Math.random() - 0.5) * 0.1;
                
                // 마찰력 표현
                this.vx *= 0.96;
                this.vy *= 0.96;

                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;

                // 벽면 반사 및 경계 처리
                if (this.x < 0 || this.x > width || this.y < 0 || this.y > height || this.alpha <= 0) {
                    this.reset();
                }
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.font = `900 ${this.fontSize}px sans-serif`;
                ctx.fillStyle = `hsla(${this.hue}, 100%, 65%, ${this.alpha})`;
                
                // 흐르는 속도 방향으로 텍스트 기울기(회전) 계산
                const angle = Math.atan2(this.vy, this.vx);
                ctx.translate(this.x, this.y);
                ctx.rotate(angle);
                
                // 디지털 아트 분위기의 미세한 외곽선 효과
                ctx.fillText(this.text, 0, 0);
                if(Math.random() > 0.8) {
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 1;
                    ctx.strokeText(this.text, 0, 0);
                }
                ctx.restore();
            }
        }

        // 입자 초기화
        for (let i = 0; i < maxParticles; i++) {
            particles.push(new FluidParticle());
        }

        // 마우스 이벤트 리스너
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            // 속도 계산
            mouse.vx = mouse.x - mouse.px;
            mouse.vy = mouse.y - mouse.py;
            mouse.px = mouse.x;
            mouse.py = mouse.y;
        });

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        let time = 0;

        // 메인 애니메이션 루프
        function render() {
            time += 0.01;

            // 잔상 효과 극대화 (몽환적인 밤바다나 연기 느낌 표현)
            ctx.fillStyle = 'rgba(5, 5, 8, 0.08)';
            ctx.fillRect(0, 0, width, height);

            // 화면 가상의 격자 단위로 유체 역학 피드백 적용
            for (let i = 0; i < 5; i++) {
                const size = Math.random() * 300 + 100;
                const x = Math.random() * (width - size);
                const y = Math.random() * (height - size);
                // 오프셋 왜곡으로 유기적인 점성 표현
                const ox = Math.sin(time + y * 0.01) * 10;
                const oy = Math.cos(time + x * 0.01) * 10;
                ctx.drawImage(canvas, x, y, size, size, x + ox, y + oy, size, size);
            }

            // 입자 업데이트 및 렌더링
            particles.forEach(p => {
                let dx = mouse.x - p.x;
                let dy = mouse.y - p.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                let fX = 0;
                let fY = 0;

                // 마우스 반경 내에 있을 때 유체 추동력 발생
                if (dist < 250) {
                    let force = (250 - dist) / 250;
                    fX = mouse.vx * force * 1.5;
                    fY = mouse.vy * force * 1.5;
                    p.hue = (p.hue + 2) % 360; // 자극을 받으면 색상이 다채롭게 변함
                }

                p.update(fX, fY);
                p.draw();
            });

            // 화면 필터 조절을 통해 고급스러운 빛 가공 (미디어아트 빔프로젝터 느낌)
            const contrast = 120 + Math.sin(time) * 20;
            const saturate = 140 + Math.cos(time) * 30;
            canvas.style.filter = `contrast(${contrast}%) saturate(${saturate}%) blur(0.5px)`;

            // 자연스러운 마우스 감쇠
            mouse.vx *= 0.9;
            mouse.vy *= 0.9;

            requestAnimationFrame(render);
        }

        // 초기 시작
        render();
    </script>
</body>
</html>
