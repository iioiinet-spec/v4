<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Soft Ink Forest</title>

<style>
html,body{
    margin:0;
    overflow:hidden;
    height:100%;
    background:#05070d;
    cursor:crosshair;
}

canvas{
    display:block;
    width:100%;
    height:100%;
}
</style>
</head>

<body>
<canvas id="c"></canvas>

<script>
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

let w,h,dpr;

function resize(){
    dpr=Math.min(2,devicePixelRatio||1);
    w=innerWidth;
    h=innerHeight;

    canvas.width=w*dpr;
    canvas.height=h*dpr;
    canvas.style.width=w+"px";
    canvas.style.height=h+"px";

    ctx.setTransform(dpr,0,0,dpr,0,0);
}
resize();
addEventListener("resize",resize);

/* ================= COLORS (LOW CONTRAST INK) ================= */
const palettes=[
    ["#2a3b44","#2f3d46","#3a3a3a","#2b3a35","#3b3b2f"],
    ["#24343c","#2d3a3f","#3a3a3a","#2e3b36","#34342d"],
    ["#1f2d33","#27343a","#313131","#26322f","#2f2f29"]
];

let pi=0;
const color=()=>palettes[pi][Math.random()*5|0];

/* ================= PARTICLES ================= */
const particles=[];

class P{
    constructor(x,y,vx,vy,c){
        this.x=x;
        this.y=y;
        this.vx=vx;
        this.vy=vy;
        this.c=c;

        this.life=1;
        this.decay=Math.random()*0.0022+0.0014;

        // 🔴 매우 작은 잉크 입자
        this.size=Math.random()*2+0.6;

        this.seed=Math.random()*1000;
    }

    update(mx,my){

        const dx=this.x-mx;
        const dy=this.y-my;
        const d=Math.sqrt(dx*dx+dy*dy)+0.001;

        const angle=Math.atan2(dy,dx);
        const swirl=0.2/d;

        // 부드러운 유체 흐름
        this.vx+=Math.cos(angle+Math.PI/2)*swirl;
        this.vy+=Math.sin(angle+Math.PI/2)*swirl;

        this.vx+=-dx*0.00035;
        this.vy+=-dy*0.00035;

        this.vx+=Math.sin(this.seed+this.y*0.01)*0.012;
        this.vy+=Math.cos(this.seed+this.x*0.01)*0.012;

        this.vx*=0.965;
        this.vy*=0.965;

        this.x+=this.vx;
        this.y+=this.vy;

        this.life-=this.decay;
    }

    draw(){

        // ❌ 완전 무광 (빛, blur 없음)
        ctx.globalAlpha=this.life;
        ctx.fillStyle=this.c;

        ctx.beginPath();
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fill();
    }
}

/* ================= SOFT FOREST BACKGROUND ================= */
function drawForest(){

    const sky=ctx.createLinearGradient(0,0,0,h);
    sky.addColorStop(0,"#05070c");
    sky.addColorStop(0.6,"#05060a");
    sky.addColorStop(1,"#030406");

    ctx.fillStyle=sky;
    ctx.fillRect(0,0,w,h);

    // 🌫 아주 약한 숲 실루엣
    drawTrees("#0b0f12",0.68,0.4);
    drawTrees("#070a0d",0.78,0.3);
    drawTrees("#05070a",0.88,0.25);
}

function drawTrees(color,y,alpha){
    ctx.fillStyle=color;

    const base=h*y;

    for(let x=0;x<w+30;x+=45){

        const top=base-(90+Math.sin(x*0.01)*20);

        ctx.globalAlpha=alpha;

        ctx.beginPath();
        ctx.moveTo(x,base);
        ctx.lineTo(x+18,top);
        ctx.lineTo(x+36,base);
        ctx.closePath();
        ctx.fill();
    }

    ctx.globalAlpha=1;
}

/* ================= BURST ================= */
function burst(x,y,vx,vy){

    const count=65;

    for(let i=0;i<count;i++){

        const angle=Math.random()*Math.PI*2;
        const speed=Math.random()*4+1.5;

        particles.push(new P(
            x,
            y,
            Math.cos(angle)*speed + vx*0.1,
            Math.sin(angle)*speed + vy*0.1,
            color()
        ));
    }
}

/* ================= FLOW ================= */
function emit(x,y,vx,vy){

    const n=16;

    for(let i=0;i<n;i++){
        particles.push(new P(
            x+(Math.random()-0.5)*3,
            y+(Math.random()-0.5)*3,
            vx*0.08+(Math.random()-0.5)*1.8,
            vy*0.08+(Math.random()-0.5)*1.8,
            color()
        ));
    }
}

/* ================= MOUSE ================= */
let m={x:0,y:0,px:0,py:0,down:false};

addEventListener("mousedown",e=>{
    m.down=true;
    burst(e.clientX,e.clientY,0,0);
});

addEventListener("mouseup",()=>m.down=false);

addEventListener("mousemove",e=>{
    m.x=e.clientX;
    m.y=e.clientY;

    const dx=m.x-m.px;
    const dy=m.y-m.py;
    const sp=Math.sqrt(dx*dx+dy*dy);

    if(m.down && sp>0.8){
        emit(m.x,m.y,dx,dy);
    }

    m.px=m.x;
    m.py=m.y;
});

/* ================= LOOP ================= */
function loop(){
    requestAnimationFrame(loop);

    drawForest();

    // 잔상 아주 약하게 (물감 유지)
    ctx.fillStyle="rgba(0,0,0,0.14)";
    ctx.fillRect(0,0,w,h);

    for(let i=particles.length-1;i>=0;i--){
        const p=particles[i];
        p.update(m.x,m.y);
        p.draw();

        if(p.life<=0) particles.splice(i,1);
    }

    if(particles.length>2800){
        particles.splice(0,particles.length-2800);
    }
}

loop();
</script>

</body>
</html>
