<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>터치 피아노 건반</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
      background: radial-gradient(circle at top, #1e293b, #020617 70%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    .app {
      width: min(1100px, 100%);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 5vw, 4rem);
      letter-spacing: -1px;
    }

    .subtitle {
      margin: 0 0 26px;
      color: #cbd5e1;
      font-size: clamp(0.95rem, 2.5vw, 1.15rem);
    }

    .panel {
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 28px;
      padding: 24px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 800;
      color: #0f172a;
      background: linear-gradient(135deg, #facc15, #38bdf8);
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(56, 189, 248, 0.25);
    }

    .status {
      color: #cbd5e1;
      font-weight: 700;
    }

    .piano-wrap {
      width: 100%;
      overflow-x: auto;
      padding: 16px 8px 4px;
    }

    .piano {
      position: relative;
      display: flex;
      width: 980px;
      max-width: none;
      height: 320px;
      margin: 0 auto;
      background: #111827;
      border: 10px solid #111827;
      border-radius: 22px;
      box-shadow: inset 0 -10px 20px rgba(0, 0, 0, 0.3);
      touch-action: none;
    }

    .white-key {
      position: relative;
      flex: 1;
      height: 100%;
      background: linear-gradient(#ffffff, #e5e7eb);
      border: 1px solid #94a3b8;
      border-radius: 0 0 14px 14px;
      color: #0f172a;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 18px;
      font-weight: 900;
      font-size: 1rem;
      box-shadow: inset 0 -12px 16px rgba(15, 23, 42, 0.12);
      cursor: pointer;
      transition: transform 0.06s, background 0.06s;
    }

    .white-key.active {
      background: linear-gradient(#bfdbfe, #60a5fa);
      transform: translateY(4px);
      box-shadow: inset 0 10px 20px rgba(15, 23, 42, 0.22);
    }

    .black-key {
      position: absolute;
      top: 0;
      width: 42px;
      height: 190px;
      background: linear-gradient(#1f2937, #020617);
      border: 1px solid #020617;
      border-radius: 0 0 10px 10px;
      color: #e5e7eb;
      z-index: 2;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 14px;
      font-size: 0.78rem;
      font-weight: 800;
      box-shadow: 0 8px 16px rgba(0,0,0,0.55);
      cursor: pointer;
      transition: transform 0.06s, background 0.06s;
    }

    .black-key.active {
      background: linear-gradient(#0ea5e9, #0369a1);
      transform: translateY(4px);
    }

    .note-display {
      margin-top: 20px;
      min-height: 54px;
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      font-weight: 900;
      color: #facc15;
      text-shadow: 0 0 18px rgba(250, 204, 21, 0.4);
    }

    .guide {
      margin-top: 14px;
      color: #94a3b8;
      font-size: 0.95rem;
    }

    @media (max-width: 700px) {
      body {
        padding: 16px;
        align-items: flex-start;
      }

      .panel {
        padding: 16px;
        border-radius: 22px;
      }

      .piano {
        width: 860px;
        height: 260px;
        border-width: 8px;
      }

      .black-key {
        width: 36px;
        height: 155px;
      }

      .white-key {
        padding-bottom: 12px;
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>🎹 터치 피아노</h1>
    <p class="subtitle">마우스로 클릭하거나 스마트폰에서 건반을 터치하면 소리가 납니다.</p>

    <div class="panel">
      <div class="controls">
        <button id="startBtn">소리 켜기</button>
        <span class="status" id="status">처음 터치 전에 소리 켜기를 눌러주세요.</span>
      </div>

      <div class="piano-wrap">
        <div class="piano" id="piano"></div>
      </div>

      <div class="note-display" id="noteDisplay">♪</div>
      <div class="guide">팁: 스마트폰에서는 가로 화면으로 보면 더 편합니다.</div>
    </div>
  </div>

  <script>
    const whiteNotes = [
      { name: "C4", freq: 261.63 },
      { name: "D4", freq: 293.66 },
      { name: "E4", freq: 329.63 },
      { name: "F4", freq: 349.23 },
      { name: "G4", freq: 392.00 },
      { name: "A4", freq: 440.00 },
      { name: "B4", freq: 493.88 },
      { name: "C5", freq: 523.25 },
      { name: "D5", freq: 587.33 },
      { name: "E5", freq: 659.25 },
      { name: "F5", freq: 698.46 },
      { name: "G5", freq: 783.99 },
      { name: "A5", freq: 880.00 },
      { name: "B5", freq: 987.77 }
    ];

    const blackNotes = [
      { name: "C#4", freq: 277.18, after: 0 },
      { name: "D#4", freq: 311.13, after: 1 },
      { name: "F#4", freq: 369.99, after: 3 },
      { name: "G#4", freq: 415.30, after: 4 },
      { name: "A#4", freq: 466.16, after: 5 },
      { name: "C#5", freq: 554.37, after: 7 },
      { name: "D#5", freq: 622.25, after: 8 },
      { name: "F#5", freq: 739.99, after: 10 },
      { name: "G#5", freq: 830.61, after: 11 },
      { name: "A#5", freq: 932.33, after: 12 }
    ];

    const piano = document.getElementById("piano");
    const startBtn = document.getElementById("startBtn");
    const statusText = document.getElementById("status");
    const noteDisplay = document.getElementById("noteDisplay");

    let audioContext = null;
    let isReady = false;
    const activeOscillators = new Map();

    function initAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }

      if (audioContext.state === "suspended") {
        audioContext.resume();
      }

      isReady = true;
      statusText.textContent = "소리 준비 완료! 건반을 눌러보세요.";
    }

    function playNote(note, keyElement) {
      if (!isReady) {
        initAudio();
      }

      stopNote(note.name);

      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();
      const filter = audioContext.createBiquadFilter();

      oscillator.type = "sine";
      oscillator.frequency.setValueAtTime(note.freq, audioContext.currentTime);

      filter.type = "lowpass";
      filter.frequency.setValueAtTime(2400, audioContext.currentTime);

      gainNode.gain.setValueAtTime(0.0001, audioContext.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.35, audioContext.currentTime + 0.02);
      gainNode.gain.exponentialRampToValueAtTime(0.18, audioContext.currentTime + 0.25);

      oscillator.connect(filter);
      filter.connect(gainNode);
      gainNode.connect(audioContext.destination);

      oscillator.start();

      activeOscillators.set(note.name, { oscillator, gainNode });

      keyElement.classList.add("active");
      noteDisplay.textContent = note.name;
    }

    function stopNote(noteName) {
      const active = activeOscillators.get(noteName);
      if (!active || !audioContext) return;

      const now = audioContext.currentTime;
      active.gainNode.gain.cancelScheduledValues(now);
      active.gainNode.gain.setValueAtTime(active.gainNode.gain.value, now);
      active.gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 0.15);
      active.oscillator.stop(now + 0.16);

      activeOscillators.delete(noteName);
    }

    function releaseKey(keyElement, noteName) {
      keyElement.classList.remove("active");
      stopNote(noteName);
    }

    function addKeyEvents(keyElement, note) {
      keyElement.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        keyElement.setPointerCapture(event.pointerId);
        playNote(note, keyElement);
      });

      keyElement.addEventListener("pointerup", (event) => {
        event.preventDefault();
        releaseKey(keyElement, note.name);
      });

      keyElement.addEventListener("pointercancel", () => {
        releaseKey(keyElement, note.name);
      });

      keyElement.addEventListener("pointerleave", () => {
        releaseKey(keyElement, note.name);
      });
    }

    function buildPiano() {
      whiteNotes.forEach((note) => {
        const key = document.createElement("div");
        key.className = "white-key";
        key.textContent = note.name;
        key.dataset.note = note.name;
        piano.appendChild(key);
        addKeyEvents(key, note);
      });

      requestAnimationFrame(() => {
        const whiteKeys = piano.querySelectorAll(".white-key");
        blackNotes.forEach((note) => {
          const key = document.createElement("div");
          key.className = "black-key";
          key.textContent = note.name;
          key.dataset.note = note.name;

          const whiteKey = whiteKeys[note.after];
          const pianoRect = piano.getBoundingClientRect();
          const whiteRect = whiteKey.getBoundingClientRect();
          const left = whiteRect.right - pianoRect.left - 21;

          key.style.left = `${left}px`;
          piano.appendChild(key);
          addKeyEvents(key, note);
        });
      });
    }

    startBtn.addEventListener("click", initAudio);

    window.addEventListener("resize", () => {
      piano.querySelectorAll(".black-key").forEach((key) => key.remove());
      requestAnimationFrame(() => {
        const whiteKeys = piano.querySelectorAll(".white-key");
        blackNotes.forEach((note) => {
          const key = document.createElement("div");
          key.className = "black-key";
          key.textContent = note.name;
          key.dataset.note = note.name;

          const whiteKey = whiteKeys[note.after];
          const pianoRect = piano.getBoundingClientRect();
          const whiteRect = whiteKey.getBoundingClientRect();
          const left = whiteRect.right - pianoRect.left - key.offsetWidth / 2;

          key.style.left = `${left}px`;
          piano.appendChild(key);
          addKeyEvents(key, note);
        });
      });
    });

    buildPiano();
  </script>
</body>
</html>
