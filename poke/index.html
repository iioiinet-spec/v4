<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Glass Box Terrarium</title>
    <style>
        body {
            margin: 0;
            padding: 40px 20px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            color: #333;
            text-align: center;
        }

        .wrapper {
            max-width: 850px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
        }

        h1 {
            color: #1a365d;
            font-size: 2.2rem;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .desc {
            color: #555;
            font-size: 1.1rem;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        /* 비디오 컨테이너 테두리 글래스모피즘 렌더링 */
        .video-container {
            width: 100%;
            max-width: 680px;
            margin: 0 auto 35px auto;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.12);
            border: 4px solid #ffffff;
            background: #000;
        }

        video {
            width: 100%;
            display: block;
        }

        /* 런처 이동 버튼 스타일링 */
        .btn-play {
            display: inline-block;
            background: linear-gradient(135deg, #ff5252, #ff3333);
            color: #ffffff;
            padding: 16px 45px;
            font-size: 1.2rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 35px;
            box-shadow: 0 6px 20px rgba(255, 82, 82, 0.35);
            transition: all 0.25s ease;
        }

        .btn-play:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 82, 82, 0.5);
        }
        
        .btn-play:active {
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <h1>Pokémon Glass Box Terrarium</h1>
        <p class="desc">
            Matter.js 2D 강체 물리 엔진과 포켓몬 애니메이션 스프라이트를 융합하여 구현한<br>
            작은 유리 상자 속 포켓몬 테라리움 시뮬레이터 프로젝트입니다.
        </p>
        
        <div class="video-container">
            <video src="preview.mp4" controls autoplay muted loop playsinline></video>
        </div>
        
        <a href="simulator.html" class="btn-play">👉 시뮬레이터 실시간 실행하기</a>
    </div>

</body>
</html>
