<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 마음 처방전</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;600;900&display=swap');

        :root {
            --황금색: #d4af37;
            --심연검정: #050507;
            --글꼴: 'Noto Serif KR', serif;
        }

        body {
            background-color: var(--심연검정); color: #eee;
            font-family: var(--글꼴); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .상자 {
            width: 95%; max-width: 750px; background: linear-gradient(180deg, #0f0f1b 0%, #050507 100%);
            border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 30px; padding: 40px; text-align: center;
        }

        .페이지 { display: none; }
        .활성 { display: block; animation: 나타나기 0.8s ease; }
        @keyframes 나타나기 { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .주제-그리드 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 25px; }
        @media (min-width: 600px) { .주제-그리드 { grid-template-columns: repeat(5, 1fr); } }

        .주제-단추 {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 15px 5px; color: var(--황금색); cursor: pointer; border-radius: 12px; font-family: var(--글꼴);
            transition: 0.3s; font-size: 0.9rem;
        }
        .주제-단추:hover { background: var(--황금색); color: #000; font-weight: bold; transform: translateY(-3px); }

        input, select {
            background: rgba(255,255,255,0.05); border: 1px solid #444; color: white;
            padding: 15px; width: 85%; border-radius: 10px; margin-bottom: 15px; font-family: var(--글꼴); text-align: center; font-size: 1rem;
        }
        
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }

        .카드-더미 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 30px 0; }
        .타로-카드 {
            aspect-ratio: 1 / 1.6; background: #1a1a2e; border: 1px solid #333; border-radius: 8px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.5em; transition: 0.5s; color: rgba(212, 175, 55, 0.2);
        }
        .타로-카드.뒤집힘 { transform: rotateY(180deg); background: var(--황금색); color: white; }

        .총평 { background: rgba(212, 175, 55, 0.1); padding: 25px; border-radius: 20px; border: 1px solid var(--황금색); margin-bottom: 25px; line-height: 1.8; text-align: left; }
        .결과-섹션 { text-align: left; background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px; margin-bottom: 20px; border-left: 4px solid var(--황금색); }
        .긍정 { color: #50fa7b; font-weight: bold; }

        .행운-처방전 {
            background: rgba(0,0,0,0.4); padding: 25px; border-radius: 20px; border: 2px solid var(--황금색);
            text-align: left; margin-top: 30px;
        }
        .행운-처방전 h3 { color: var(--황금색); margin-top: 0; border-bottom: 1px solid var(--황금색); padding-bottom: 10px; font-size: 1.1em; }
        .처방-그리드 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .처방-항목 b { color: var(--황금색); display: block; margin-bottom: 5px; font-size: 0.85em; opacity: 0.8; }

        .메인-단추 {
            background: transparent; border: 1px solid var(--황금색); color: var(--황금색);
            padding: 15px 40px; cursor: pointer; font-family: var(--글꼴); border-radius: 30px; margin-top: 10px; transition: 0.3s;
        }
        .메인-단추:hover { background: var(--황금색); color: black; font-weight: bold; }
    </style>
</head>
<body>

<div class="상자">
    <div id="p1" class="페이지 활성">
        <h1 style="color:var(--황금색); letter-spacing: 2px;">오늘의 마음 처방</h1>
        <p style="opacity: 0.8;">고민되는 주제를 하나 선택해 주세요.</p>
        <div class="주제-그리드">
            <button class="주제-단추" onclick="이동(2, '오늘의 운세')">전체운 ✨</button>
            <button class="주제-단추" onclick="이동(2, '연애와 사랑')">연애운 ❤️</button>
            <button class="주제-단추" onclick="이동(2, '금전과 재물')">금전운 💰</button>
            <button class="주제-단추" onclick="이동(2, '직장과 사업')">직장운 💼</button>
            <button class="주제-단추" onclick="이동(2, '인간관계')">대인관계 🤝</button>
            <button class="주제-단추" onclick="이동(2, '공부와 시험')">학업/시험 📝</button>
            <button class="주제-단추" onclick="이동(2, '건강과 다이어트')">건강/운동 🌿</button>
            <button class="주제-단추" onclick="이동(2, '이사와 변화')">이사/변동 🏠</button>
            <button class="주제-단추" onclick="이동(2, '쇼핑과 선택')">구매/선택 ⚖️</button>
            <button class="주제-단추" onclick="이동(2, '나의 속마음')">심리분석 🧿</button>
        </div>
    </div>

    <div id="p2" class="페이지">
        <h2 id="주제표시" style="color:var(--황금색);"></h2>
        <input type="text" id="이름" placeholder="이름 (또는 별명)"><br>
        <input type="date" id="생일" min="1900-01-01" max="2099-12-31"><br>
        <select id="성별">
            <option value="남성">남성</option>
            <option value="여성">여성</option>
        </select><br>
        <button class="메인-단추" onclick="이동(3)">카드 선택하러 가기</button>
    </div>

    <div id="p3" class="페이지">
        <h2 id="선택문구">세 장의 카드를 골라주세요</h2>
        <div class="카드-더미" id="더미"></div>
        <div style="font-size: 1.2em; color: var(--황금색);">남은 카드: <span id="남은수">3</span></div>
    </div>

    <div id="p4" class="페이지">
        <h2 id="결과헤더">처방 리포트</h2>
        <div id="결과내용"></div>
        <div id="행운처방" class="행운-처방전"></div>
        <button class="메인-단추" onclick="location.reload()">처음으로 돌아가기</button>
    </div>
</div>

<script>
    let 주제 = ""; let 선택수 = 0; let 선택카드 = [];
    const 아이콘 = ["🔮", "✨", "🕯️", "📜", "🌙", "☀️", "🧿", "🗝️", "💎", "🔱"];

    const 카드DB = {
        "마법사": { 기운: "불", 해석: { "오늘의 운세": "주도적으로 일을 해결할 에너지가 넘칩니다.", "연애와 사랑": "자신감 있는 태도가 큰 매력으로 작용합니다.", "금전과 재물": "새로운 수익 아이디어가 떠오르는 날입니다.", "직장과 사업": "프로젝트를 시작하거나 주도하기에 좋습니다.", "인간관계": "당신의 말이 주변에 큰 영향을 줍니다.", "공부와 시험": "집중력이 최고조에 달해 암기가 잘 됩니다.", "건강과 다이어트": "새로운 운동법을 시도하면 효과가 좋습니다.", "이사와 변화": "새로운 곳으로의 이동이 능력을 키워줍니다.", "쇼핑과 선택": "처음 본 것이 정답입니다. 망설이지 마세요.", "나의 속마음": "무엇이든 해낼 수 있다는 자신감이 가득합니다." } },
        "고위 여사제": { 기운: "물", 해석: { "오늘의 운세": "직관이 예리해지는 날입니다. 느낌을 믿으세요.", "연애와 사랑": "조용한 감정의 교류나 비밀스러운 설렘이 있습니다.", "금전과 재물": "지출을 단속하고 자산을 지킬 시기입니다.", "직장과 사업": "드러나지 않은 정보나 의도를 파악하는 게 우선입니다.", "인간관계": "경청하는 태도가 신뢰를 크게 높여줍니다.", "공부와 시험": "정적인 환경에서 깊이 있는 탐구가 성과를 냅니다.", "건강과 다이어트": "충분한 명상과 수면으로 에너지를 보충하세요.", "이사와 변화": "아직은 때가 아닙니다. 상황을 더 지켜보세요.", "쇼핑과 선택": "꼼꼼하게 비교 분석한 뒤에 결정하는 것이 길합니다.", "나의 속마음": "혼자만의 시간이 필요하며 생각이 깊은 상태입니다." } },
        "전차": { 기운: "불", 해석: { "오늘의 운세": "추진력으로 장애물을 극복하고 승리하는 날입니다.", "연애와 사랑": "적극적인 표현이 관계를 급진전시킵니다.", "금전과 재물": "이익을 위해 과감하게 움직일 시기입니다.", "직장과 사업": "성과가 확실한 이동이나 출장수가 있습니다.", "인간관계": "리더가 되어 사람들을 이끄는 흐름입니다.", "공부와 시험": "단기간 몰입하여 점수를 올리기 아주 좋습니다.", "건강과 다이어트": "격렬한 운동이 몸의 독소를 빼주는 날입니다.", "이사와 변화": "빠르게 추진되는 이동수가 강하게 들어옵니다.", "쇼핑과 선택": "속도감 있는 결정이 이득을 가져다줍니다.", "나의 속마음": "목표를 향해 달려가고 싶은 열망이 큽니다." } },
        "은둔자": { 기운: "흙", 해석: { "오늘의 운세": "내면을 성찰하며 조용히 지내는 것이 유익합니다.", "연애와 사랑": "정신적 교감과 깊이 있는 대화가 중요합니다.", "금전과 재물": "돈의 흐름을 분석하고 재테크를 공부할 때입니다.", "직장과 사업": "전문적인 업무나 혼자 집중하는 일에서 빛이 납니다.", "인간관계": "진실된 사람 한 명과의 대화가 소중한 날입니다.", "공부와 시험": "자신만의 공부법을 완성하기에 좋은 시기입니다.", "건강과 다이어트": "요가나 스트레칭으로 몸의 균형을 맞추세요.", "이사와 변화": "한적하고 조용한 곳으로의 이동이 길합니다.", "쇼핑과 선택": "오래 쓸 수 있는 가치 있는 물건을 고르세요.", "나의 속마음": "잠시 세상을 멀리하고 쉬고 싶은 마음입니다." } },
        "운명의 수레바퀴": { 기운: "불", 해석: { "오늘의 운세": "거부할 수 없는 행운의 변화가 시작됩니다.", "연애와 사랑": "운명적인 만남이나 관계의 급진전이 예상됩니다.", "금전과 재물": "예상치 못한 보너스나 혜택이 따르는 운입니다.", "직장과 사업": "이직이나 부서 이동 등 환경 변화가 옵니다.", "인간관계": "오해가 풀리거나 새로운 인연이 찾아오는 시기입니다.", "공부와 시험": "운이 따르는 날이니 자신감 있게 임하세요.", "건강과 다이어트": "체질 개선을 위해 식단을 바꿀 최적기입니다.", "이사와 변화": "이사는 운명의 흐름입니다. 좋은 선택이 됩니다.", "쇼핑과 선택": "놓치면 다시 오지 않을 기회이니 잡으세요.", "나의 속마음": "새로운 변화를 받아들일 준비가 되었습니다." } }
    };

    function 이동(n, t) {
        if(t) { 주제 = t; document.getElementById('주제표시').innerText = `[${t}] 처방전`; }
        if(n === 3) { if(!document.getElementById('이름').value || !document.getElementById('생일').value) return alert("정보를 모두 입력해 주세요."); 생성(); }
        document.querySelectorAll('.페이지').forEach(p => p.classList.remove('활성'));
        document.getElementById('p' + n).classList.add('활성');
    }

    function 생성() {
        const 더미 = document.getElementById('더미'); 더미.innerHTML = '';
        선택수 = 0; 선택카드 = []; document.getElementById('남은수').innerText = 3;
        const 카드키들 = Object.keys(카드DB);
        for(let i=0; i<15; i++) {
            const div = document.createElement('div'); div.className = '타로-카드'; div.innerText = '✵';
            div.onclick = () => { if(선택수 < 3 && !div.classList.contains('뒤집힘')) {
                div.classList.add('뒤집힘'); div.innerText = 아이콘[Math.floor(Math.random()*아이콘.length)];
                선택수++; document.getElementById('남은수').innerText = 3 - 선택수;
                const 랜덤카드 = 카드키들[Math.floor(Math.random() * 카드키들.length)];
                선택카드.push({이름: 랜덤카드, ...카드DB[랜덤카드]});
                if(선택수 === 3) setTimeout(해석, 800);
            }}; 더미.appendChild(div);
        }
    }

    function 해석() {
        const 이름 = document.getElementById('이름').value;
        const 생일 = new Date(document.getElementById('생일').value);
        const 일 = 생일.getDate();
        const 월 = 생일.getMonth() + 1;
        const 대표기운 = 선택카드[1].기운;

        document.getElementById('결과헤더').innerText = `✨ ${이름}님의 [${주제}] 리포트`;
        
        let 결과HTML = `<div class="총평"><b>'${주제}'</b>에 대한 분석 결과입니다. 현재 <b>${대표기운}의 기운</b>이 중심입니다. 당신의 운명이 들려주는 조언을 확인하세요.</div>`;

        선택카드.forEach((c, i) => {
            const 타이틀 = ["과거의 영향", "오늘의 핵심", "내일의 예보"][i];
            결과HTML += `
                <div class="결과-섹션">
                    <span style="font-size:0.8em; color:var(--황금색); font-weight:bold;">${타이틀}</span>
                    <strong style="display:block; font-size:1.2em; margin:5px 0;">${c.이름}</strong>
                    <div style="font-size:0.95em; line-height:1.6;">
                        <span class="긍정">처방:</span> ${c.해석[주제]}
                    </div>
                </div>`;
        });
        document.getElementById('결과내용').innerHTML = 결과HTML;

        // 행운 요소 로직
        const 운명합 = 일 + 월;
        const 장소들 = { "불": ["에너지가 넘치는 카페", "운동장"], "물": ["강변 산책로", "분수대 근처"], "흙": ["숲길", "서점"], "공기": ["전망대", "미술관"] };
        const 방향목록 = ["동쪽 (활기찬 소식)", "서쪽 (안정적인 기운)", "남쪽 (따뜻한 응원)", "북쪽 (냉철한 지혜)"];
        const 시간목록 = ["오전 8시 ~ 10시", "오후 1시 ~ 3시", "오후 6시 ~ 8시", "밤 10시 ~ 12시"];
        
        // 행운의 날짜 계산 (오늘 기준으로 7일 이내 중 하루)
        const 행운날짜 = (운명합 % 7) + 1;

        document.getElementById('행운처방').innerHTML = `
            <h3>🍀 당신을 위한 행운의 나침반</h3>
            <div class="처방-그리드">
                <div class="처방-항목"><b>행운의 날짜</b>이번 달 ${행운날짜}가 포함된 일자</div>
                <div class="처방-항목"><b>행운의 장소</b>${장소들[대표기운][운명합 % 2]}</div>
                <div class="처방-항목"><b>행운의 방향</b>${방향목록[운명합 % 4]}</div>
                <div class="처방-항목"><b>행운의 시간</b>${시간목록[운명합 % 4]}</div>
                <div class="처방-항목"><b>행운의 숫자</b>${(운명합 % 9) + 1}</div>
                <div class="처방-항목"><b>행운의 색상</b>${대표기운 === '불' ? '레드' : 대표기운 === '물' ? '블루' : '그린'}</div>
            </div>
        `;
        이동(4);
    }
</script>
</body>
</html>
