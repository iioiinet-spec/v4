<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Space Symmetry Fast Stamp Brush</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    cursor: none;
    background: radial-gradient(circle at center, #050816, #000000);
}
canvas {
    display: block;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    createStars();
    saveCanvas();
});

// =====================
// 🌌 상태
// =====================
let mouse = { x: W/2, y: H/2 };
let drawing = false;

let currentColor = randomColor();
let dotSize = 3;

let stars = [];
let savedImage;
let stampInterval = null;

// =====================
// ⭐ 별 배경
// =====================
function createStars() {
    stars = [];
    for (let i = 0; i < 250; i++) {
        stars.push({
            x: Math.random() * W,
            y: Math.random() * H,
            r: Math.random() * 1.5
        });
    }
}

function drawStars() {
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, W, H);

    for (let s of stars) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = "white";
        ctx.fill();
    }
}

// =====================
// 🎨 색
// =====================
function randomColor() {
    return `hsl(${Math.random()*360}, 100%, 60%)`;
}

// =====================
// 🔵 점 찍기
// =====================
function drawDot(x, y) {
    ctx.beginPath();
    ctx.arc(x, y, dotSize, 0, Math.PI * 2);
    ctx.fillStyle = currentColor;
    ctx.fill();
}

// =====================
// 🧱 도장 브러시 (빠른 버전)
// =====================
function stampBrush() {

    drawDot(mouse.x, mouse.y);
    drawDot(W - mouse.x, H - mouse.y);

    saveCanvas();
}

// =====================
// 🧭 커서 표시
// =====================
function drawCursorGuide() {
    ctx.save();

    // 현재 커서
    ctx.beginPath();
    ctx.arc(mouse.x, mouse.y, dotSize + 3, 0, Math.PI * 2);
    ctx.fillStyle = currentColor;
    ctx.fill();

    // 중심점
    ctx.beginPath();
    ctx.arc(mouse.x, mouse.y, 2, 0, Math.PI * 2);
    ctx.fillStyle = "#fff";
    ctx.fill();

    // 대칭 커서
    ctx.globalAlpha = 0.4;
    ctx.beginPath();
    ctx.arc(W - mouse.x, H - mouse.y, dotSize, 0, Math.PI * 2);
    ctx.fillStyle = currentColor;
    ctx.fill();

    ctx.restore();
}

// =====================
// 🖱️ 입력 (🔥 20ms 도장)
// =====================
window.addEventListener("mousedown", () => {
    drawing = true;

    // 🔥 더 빠르게 (20ms)
    stampInterval = setInterval(stampBrush, 20);
});

window.addEventListener("mouseup", () => {
    drawing = false;
    clearInterval(stampInterval);
});

window.addEventListener("mousemove", (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

// =====================
// ⌨️ 컨트롤
// =====================
window.addEventListener("keydown", (e) => {

    if (e.code === "Enter") {
        currentColor = randomColor();
    }

    if (e.code === "ArrowUp") {
        dotSize = Math.min(30, dotSize + 0.5);
    }

    if (e.code === "ArrowDown") {
        dotSize = Math.max(0.5, dotSize - 0.5);
    }

    if (e.code === "Space") {
        drawStars();
        saveCanvas();
    }
});

// =====================
// 💾 저장
// =====================
function saveCanvas() {
    savedImage = ctx.getImageData(0, 0, W, H);
}

// =====================
// 🎬 루프
// =====================
function animate() {
    requestAnimationFrame(animate);

    ctx.putImageData(savedImage, 0, 0);
    drawCursorGuide();
}

// =====================
// 🚀 시작
// =====================
createStars();
drawStars();
saveCanvas();
animate();

</script>

</body>
</html>
