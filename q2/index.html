<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>클릭하면 깜빡이는 캐릭터 생성</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background-color: #f0f0f0;
    position: relative;
    cursor: pointer;
  }

  .character {
    position: absolute;
    width: 120px;
    height: 120px;
  }

  .character svg {
    width: 100%;
    height: 100%;
  }

  /* 눈 깜빡임 애니메이션 */
  @keyframes blink {
    0%, 90%, 100% { transform: scaleY(1); }
    95% { transform: scaleY(0.1); }
  }

  .eye {
    transform-origin: center;
    animation: blink 3s infinite;
  }
</style>
</head>
<body>
<script>
document.body.addEventListener('click', function(e) {
  const character = document.createElement('div');
  character.className = 'character';
  character.style.left = (e.clientX - 60) + 'px';
  character.style.top = (e.clientY - 60) + 'px';

  character.innerHTML = `
    <svg viewBox="0 0 100 100">
      <!-- 얼굴 테두리 -->
      <circle cx="50" cy="50" r="48" stroke="black" stroke-width="4" fill="white"/>
      
      <!-- 눈 -->
      <path class="eye" d="M28 38 Q28 32 34 32 Q34 38 28 38 Z" fill="black"/>
      <path class="eye" d="M66 38 Q66 32 72 32 Q72 38 66 38 Z" fill="black"/>
      
      <!-- 입 -->
      <path d="M40 60 L50 75 L60 60 L50 65 Z" fill="black"/>
    </svg>
  `;

  document.body.appendChild(character);
});
</script>
</body>
</html>
