<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Cyber Cube Advanced</title>
<style>
body { margin:0; overflow:hidden; background:white; font-family:sans-serif; }
#ui {
  position:absolute; top:10px; left:10px;
  background:rgba(255,255,255,0.85);
  padding:10px; border-radius:8px;
}
label { display:block; margin-top:6px; font-size:14px;}
</style>
</head>
<body>

<div id="ui">
  <label>큐브 색상</label><input type="color" id="cubeColor" value="#dddddd">
  <label>코어 색상</label><input type="color" id="coreColor1" value="#ffdd33">
  <label>코어 플래시 색상</label><input type="color" id="coreColor2" value="#ff0000">
  <label>배경 색상</label><input type="color" id="bgColor" value="#ffffff">
  <label>라인 색상</label><input type="color" id="lineColor" value="#00ffff">
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
let scene=new THREE.Scene();
let camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.z=5;

let renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setClearColor(0xffffff);
document.body.appendChild(renderer.domElement);

// light
scene.add(new THREE.PointLight(0xffffff,1.5).position.set(5,5,5));

// cube group
let cubeGroup=new THREE.Group();
scene.add(cubeGroup);

let pieces=[],edges=[],isAnimating=false;

// 큐브 조각
let div=3,size=1,ps=size/div;

for(let x=0;x<div;x++){
 for(let y=0;y<div;y++){
  for(let z=0;z<div;z++){

    if(x===1&&y===1&&z===1) continue;

    let geo=new THREE.BoxGeometry(ps,ps,ps);
    let mat=new THREE.MeshStandardMaterial({color:0xdddddd});
    let cube=new THREE.Mesh(geo,mat);

    cube.position.set((x-1)*ps,(y-1)*ps,(z-1)*ps);
    cube.userData.origin=cube.position.clone();
    cubeGroup.add(cube);
    pieces.push(cube);

    let eGeo=new THREE.EdgesGeometry(geo);
    let eMat=new THREE.LineBasicMaterial({color:0x00ffff,transparent:true,opacity:0});
    let line=new THREE.LineSegments(eGeo,eMat);
    cube.add(line);
    edges.push(line);
  }
 }
}

// 🔷 전체 큐브 외곽 라인
let outerGeo=new THREE.BoxGeometry(size,size,size);
let outerEdges=new THREE.EdgesGeometry(outerGeo);
let outerMat=new THREE.LineBasicMaterial({
  color:0x00ffff,
  transparent:true,
  opacity:0
});
let outerLine=new THREE.LineSegments(outerEdges,outerMat);
cubeGroup.add(outerLine);

// core
let coreMat=new THREE.MeshBasicMaterial({color:0xffdd33});
let core=new THREE.Mesh(new THREE.SphereGeometry(0.2,32,32),coreMat);
core.visible=false;
scene.add(core);

let glow=new THREE.PointLight(0xffdd33,1.5,6);
glow.visible=false;
scene.add(glow);

// UI
cubeColor.oninput=e=>{
 let c=new THREE.Color(e.target.value);
 pieces.forEach(p=>p.material.color=c);
};

coreColor1.oninput=e=>{
 let c=new THREE.Color(e.target.value);
 core.material.color=c;
 glow.color=c;
};

bgColor.oninput=e=>{
 renderer.setClearColor(new THREE.Color(e.target.value));
};

lineColor.oninput=e=>{
 let c=new THREE.Color(e.target.value);
 edges.forEach(l=>l.material.color=c);
 outerLine.material.color=c;
};

// raycaster
let raycaster=new THREE.Raycaster();
let mouse=new THREE.Vector2();

function animate(){
 requestAnimationFrame(animate);
 cubeGroup.rotation.x+=0.01;
 cubeGroup.rotation.y+=0.01;
 renderer.render(scene,camera);
}
animate();

function easeOut(t){return 1-Math.pow(1-t,3);}

// click
window.addEventListener("click",(e)=>{
 mouse.x=(e.clientX/innerWidth)*2-1;
 mouse.y=-(e.clientY/innerHeight)*2+1;
 raycaster.setFromCamera(mouse,camera);

 // 🔥 코어 클릭 → 색2 플래시
 if(core.visible && raycaster.intersectObject(core).length>0){
   let flashColor=new THREE.Color(coreColor2.value);
   let original=core.material.color.clone();

   core.material.color=flashColor;
   glow.color=flashColor;
   glow.intensity=12;

   setTimeout(()=>{
     core.material.color=original;
     glow.color=original;
     glow.intensity=1.5;
   },120);
   return;
 }

 let hit=raycaster.intersectObjects(pieces);
 if(hit.length===0||isAnimating) return;

 isAnimating=true;
 core.visible=true;
 glow.visible=true;

 // 🔹 0.3초 라인 (내부 + 외곽)
 edges.forEach(l=>l.material.opacity=1);
 outerLine.material.opacity=1;

 setTimeout(()=>{

   edges.forEach(l=>l.material.opacity=0);
   outerLine.material.opacity=0;

   let duration=300;
   let start=performance.now();

   pieces.forEach(p=>{
     let dir=p.userData.origin.clone().normalize();
     p.userData.target=p.userData.origin.clone().add(dir.multiplyScalar(2));
   });

   function explode(t){
     let k=Math.min((t-start)/duration,1);
     let e=easeOut(k);

     pieces.forEach(p=>{
       p.position.lerpVectors(p.userData.origin,p.userData.target,e);
     });

     if(k<1) requestAnimationFrame(explode);
     else setTimeout(merge,3000);
   }

   function merge(){
     let start2=performance.now();

     function anim(t){
       let k=Math.min((t-start2)/duration,1);
       let e=easeOut(k);

       pieces.forEach(p=>{
         p.position.lerpVectors(p.userData.target,p.userData.origin,e);
       });

       if(k<1) requestAnimationFrame(anim);
       else{
         // 🔹 재조립 후 라인 잔광
         edges.forEach(l=>l.material.opacity=1);
         outerLine.material.opacity=1;

         setTimeout(()=>{
           edges.forEach(l=>l.material.opacity=0);
           outerLine.material.opacity=0;
           core.visible=false;
           glow.visible=false;
           isAnimating=false;
         },300);
       }
     }
     anim(start2);
   }

   explode(start);

 },300);
});

// drag
let drag=false,px=0,py=0;
window.addEventListener("mousedown",e=>{drag=true;px=e.clientX;py=e.clientY;});
window.addEventListener("mouseup",()=>drag=false);
window.addEventListener("mousemove",e=>{
 if(!drag)return;
 let dx=e.clientX-px,dy=e.clientY-py;
 cubeGroup.rotation.y+=dx*0.005;
 cubeGroup.rotation.x+=dy*0.005;
 px=e.clientX; py=e.clientY;
});

// resize
window.addEventListener("resize",()=>{
 camera.aspect=innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
