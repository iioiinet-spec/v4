<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3옥타브 그랜드 웹 피아노 - 애니메이션 에디션</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        h1 {
            color: #f8fafc;
            font-size: 1.6rem;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        p {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .piano-scroll-container {
            width: 95vw;
            max-width: 1120px;
            overflow-x: auto;
            padding: 20px 0; /* 애니메이션으로 건반이 내려갈 공간 확보 */
            border-radius: 12px;
        }

        .piano-scroll-container::-webkit-scrollbar {
            height: 6px;
        }
        .piano-scroll-container::-webkit-scrollbar-thumb {
            background-color: #334155;
            border-radius: 3px;
        }

        .piano-body {
            display: flex;
            background-color: #020617;
            padding: 15px 10px 10px 10px;
            border-radius: 8px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            width: max-content;
        }

        .octave {
            display: flex;
            position: relative;
            width: 350px; /* 50px * 7 */
        }

        /* [백건] 기본 스타일 및 애니메이션 전환 설정 */
        .key {
            width: 50px;
            height: 240px;
            background: linear-gradient(to bottom, #ffffff 0%, #f8fafc 100%);
            border: 1px solid #e2e8f0;
            border-radius: 0 0 6px 6px;
            cursor: pointer;
            box-sizing: border-box;
            position: relative;
            z-index: 1;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 12px;
            
            /* 애니메이션 핵심: 변화할 때 0.15초 동안 부드럽게 바뀌도록 설정 */
            transform-origin: top;
            transition: background 0.15s ease-out, transform 0.08s ease-out, box-shadow 0.08s ease-out, padding-bottom 0.08s ease-out;
        }
        
        .key span {
            color: #94a3b8;
            font-size: 0.8rem;
            font-weight: bold;
            transition: color 0.15s;
        }

        /* [백건 클릭/터치 애니메이션] 화려한 네온 스카이블루 색상으로 변경 */
        .key.active {
            background: linear-gradient(to bottom, #e0f2fe 0%, #38bdf8 60%, #0284c7 100%);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.6), inset 0 4px 6px rgba(0,0,0,0.2);
            padding-bottom: 6px;
            transform: translateY(4px) scaleY(0.98); /* 건반이 아래로 꾹 눌리는 물리 효과 */
        }
        .key.active span {
            color: #ffffff; /* 누르면 글자색도 백색으로 반전 */
        }

        /* [흑건] 기본 스타일 및 애니메이션 전환 설정 */
        .key.black {
            position: absolute;
            width: 30px;
            height: 145px;
            background: linear-gradient(to bottom, #1e293b 0%, #020617 100%);
            border: 1px solid #000000;
            border-radius: 0 0 4px 4px;
            z-index: 2;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            
            /* 흑건 복귀 애니메이션 속도 */
            transform-origin: top;
            transition: background 0.15s ease-out, transform 0.08s ease-out, box-shadow 0.08s ease-out;
        }

        /* [흑건 클릭/터치 애니메이션] 몽환적인 네온 보라/핑크 빛으로 변경 */
        .key.black.active {
            background: linear-gradient(to bottom, #fdf4ff 0%, #e879f9 50%, #a21caf 100%);
            box-shadow: 0 0 15px rgba(232, 121, 249, 0.8), inset 0 2px 4px rgba(0,0,0,0.4);
            transform: translateY(3px) scaleY(0.98); /* 흑건 깊이에 맞춘 눌림 효과 */
        }

        /* 흑건들의 정밀 절대위치 셋팅 */
        .key[data-note="C#"] { left: 35px; }  
        .key[data-note="D#"] { left: 85px; }  
        .key[data-note="F#"] { left: 185px; } 
        .key[data-note="G#"] { left: 235px; } 
        .key[data-note="A#"] { left: 285px; } 

        .last-octave {
            width: 50px;
        }
    </style>
</head>
<body>

    <h1>3옥타브 그랜드 애니메이션 피아노</h1>
    <p>터치하거나 클릭하면 역동적인 컬러 그라데이션과 타건 애니메이션이 작동합니다.</p>

    <div class="piano-scroll-container">
        <div class="piano-body">
            
            <!-- [옥타브 1 : 저음역대 C3 ~ B3] -->
            <div class="octave">
                <div class="key" data-freq="130.81"><span>C3</span></div>
                <div class="key" data-freq="146.83"><span>D3</span></div>
                <div class="key" data-freq="164.81"><span>E3</span></div>
                <div class="key" data-freq="174.61"><span>F3</span></div>
                <div class="key" data-freq="196.00"><span>G3</span></div>
                <div class="key" data-freq="220.00"><span>A3</span></div>
                <div class="key" data-freq="246.94"><span>B3</span></div>

                <div class="key black" data-note="C#" data-freq="138.59"></div>
                <div class="key black" data-note="D#" data-freq="155.56"></div>
                <div class="key black" data-note="F#" data-freq="185.00"></div>
                <div class="key black" data-note="G#" data-freq="207.65"></div>
                <div class="key black" data-note="A#" data-freq="233.08"></div>
            </div>

            <!-- [옥타브 2 : 중음역대 C4 ~ B4] -->
            <div class="octave">
                <div class="key" data-freq="261.63"><span>C4</span></div>
                <div class="key" data-freq="293.66"><span>D4</span></div>
                <div class="key" data-freq="329.63"><span>E4</span></div>
                <div class="key" data-freq="349.23"><span>F4</span></div>
                <div class="key" data-freq="392.00"><span>G4</span></div>
                <div class="key" data-freq="440.00"><span>A4</span></div>
                <div class="key" data-freq="493.88"><span>B4</span></div>

                <div class="key black" data-note="C#" data-freq="277.18"></div>
                <div class="key black" data-note="D#" data-freq="311.13"></div>
                <div class="key black" data-note="F#" data-freq="369.99"></div>
                <div class="key black" data-note="G#" data-freq="415.30"></div>
                <div class="key black" data-note="A#" data-freq="466.16"></div>
            </div>

            <!-- [옥타브 3 : 고음역대 C5 ~ B5] -->
            <div class="octave">
                <div class="key" data-freq="523.25"><span>C5</span></div>
                <div class="key" data-freq="587.33"><span>D5</span></div>
                <div class="key" data-freq="659.25"><span>E5</span></div>
                <div class="key" data-freq="698.46"><span>F5</span></div>
                <div class="key" data-freq="783.99"><span>G5</span></div>
                <div class="key" data-freq="880.00"><span>A5</span></div>
                <div class="key" data-freq="987.77"><span>B5</span></div>

                <div class="key black" data-note="C#" data-freq="554.37"></div>
                <div class="key black" data-note="D#" data-freq="622.25"></div>
                <div class="key black" data-note="F#" data-freq="739.99"></div>
                <div class="key black" data-note="G#" data-freq="830.61"></div>
                <div class="key black" data-note="A#" data-freq="932.33"></div>
            </div>

            <!-- [마지막 최고음 단일 백건 C6] -->
            <div class="last-octave">
                <div class="key" data-freq="1046.50"><span>C6</span></div>
            </div>

        </div>
    </div>

    <script>
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function playPianoSound(frequency) {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'triangle'; 
            oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);

            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.008); 
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.9); 

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.9);
        }

        const keys = document.querySelectorAll('.key');

        keys.forEach(key => {
            key.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                
                const frequency = parseFloat(key.getAttribute('data-freq'));
                playPianoSound(frequency);
                
                key.classList.add('active');
            });

            // 포인터가 떨어지거나 영역을 벗어나면 색상과 물리 효과가 원래대로 부드럽게 복귀
            key.addEventListener('pointerup', () => key.classList.remove('active'));
            key.addEventListener('pointerleave', () => key.classList.remove('active'));
        });
    </script>
</body>
</html>
