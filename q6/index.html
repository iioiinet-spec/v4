<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEONKING</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+KR:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; user-select: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: #0ff; text-shadow: 0 0 10px #0ff; pointer-events: none; z-index: 10; }
        #score-board { font-size: 1.5rem; margin-bottom: 5px; }
        #life-board { font-size: 1.8rem; color: #fff; text-shadow: 0 0 10px #fff; letter-spacing: 5px; }
        
        /* 메시지 영역 */
        #fate-msg, #protection-msg { 
            position: absolute; left: 50%; transform: translateX(-50%);
            font-family: 'Noto Sans KR', sans-serif; opacity: 0; pointer-events: none; z-index: 15;
            transition: opacity 0.5s; text-align: center; width: 80%; line-height: 1.6;
        }
        #fate-msg { bottom: 15%; color: #ff0055; font-size: 1.1rem; font-weight: 500; text-shadow: 0 0 15px #ff0055; }
        #protection-msg { top: 25%; color: #ffd700; font-size: 1.2rem; text-shadow: 0 0 15px #ffd700; }

        #great-text { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%) scale(0);
                      color: #0ff; font-size: 4rem; font-weight: bold; text-shadow: 0 0 20px #0ff;
                      pointer-events: none; z-index: 15; opacity: 0; }
        .pop-in { animation: popInEffect 0.4s ease-out; }
        @keyframes popInEffect {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }

        #intro-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
                         display: none; align-items: center; justify-content: center; background: #000; z-index: 20; }
        #intro-text { font-size: 1.6rem; color: #0ff; text-shadow: 0 0 20px #0ff; max-width: 80%; text-align: center;
                      opacity: 0; transition: opacity 1s, filter 1s; filter: blur(10px); font-family: 'Noto Sans KR', sans-serif; }
        .fade-in-text { opacity: 1 !important; filter: blur(0px) !important; }

        #skip-btn { 
            position: absolute; bottom: 50px; right: 50px; padding: 12px 30px; 
            border: 2px solid #0ff; color: #0ff; cursor: pointer; z-index: 30;
            background: transparent; box-shadow: 0 0 10px #0ff; text-shadow: 0 0 5px #0ff; animation: neonPulse 1.5s infinite alternate;
        }
        @keyframes neonPulse { from { box-shadow: 0 0 10px #0ff; } to { box-shadow: 0 0 25px #0ff; } }

        /* 강화된 네온 카운트다운 애니메이션 */
        #countdown { font-size: 10rem; color: #ffd700; display: none; position: absolute; top: 45%; left: 50%; 
                     transform: translate(-50%, -50%); text-shadow: 0 0 30px #ffd700; z-index: 10; font-weight: bold; opacity: 0; }
        .count-pulse { animation: neonCount 0.9s ease-out; }
        @keyframes neonCount {
            0% { transform: translate(-50%, -50%) scale(0.5) blur(0px); opacity: 0; filter: blur(0px); }
            30% { transform: translate(-50%, -50%) scale(1.1) blur(2px); opacity: 1; filter: blur(2px); text-shadow: 0 0 50px #ffd700; }
            100% { transform: translate(-50%, -50%) scale(1.5) blur(10px); opacity: 0; filter: blur(15px); }
        }

        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #f0f; 
               text-align: center; text-shadow: 0 0 20px #f0f; cursor: pointer; z-index: 10; 
               background: rgba(0,0,0,0.85); padding: 50px; border-radius: 5px; border: 2px solid #f0f; width: 80%; max-width: 600px; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="score-board">SCORE: <span id="score">0</span></div>
        <div id="life-board">LIFE: <span id="life">🖤🖤🖤</span></div>
    </div>

    <div id="protection-msg">당신의 세상에 살던 이들의 기도가 2초동안 당신을 보호합니다.</div>
    <div id="fate-msg">???:운명은 언제나 너의 것이 아니다. 너의 영혼을 나에게 바쳐라. <br>그럼 니 목숨 하나만큼은 확실하게 살려주지.</div>
    <div id="great-text">GREAT</div>
    
    <div id="intro-overlay">
        <div id="intro-text"></div>
        <button id="skip-btn">SKIP >></button>
    </div>
    
    <div id="countdown"></div>

    <div id="msg">
        <h1>NEONKING</h1>
        <p>당신이 창조한 세상에서<br>당신의 세상을 없애려고 하는 적들을 제거하십시오</p>
        <div style="border: 1px solid #0ff; padding: 10px; display: inline-block; margin-top: 20px; color: #0ff;">작전 시행</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        let scene, camera, renderer, composer, player, clock, gridHelper;
        let obstacles = [];
        let score = 0, lives = 3;
        let isPlaying = false, isInvincible = false, isStarting = false, skipIntro = false, isDeathZone = false;
        let gameTime = 0, lastSpawnTime = 0;
        
        let spawnCooldown = 0.75, currentSpeed = 0.65;
        let jumpVelocity = 0;
        const gravity = -0.024; 
        let shakeIntensity = 0;

        const scoreEl = document.getElementById('score');
        const lifeEl = document.getElementById('life');
        const msgEl = document.getElementById('msg');
        const countEl = document.getElementById('countdown');
        const greatEl = document.getElementById('great-text');
        const protectEl = document.getElementById('protection-msg');
        const fateEl = document.getElementById('fate-msg');
        const introOverlay = document.getElementById('intro-overlay');
        const introText = document.getElementById('intro-text');
        const skipBtn = document.getElementById('skip-btn');

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000000, 10, 60);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3.5, 8);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.1);
            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            scene.add(new THREE.AmbientLight(0x333333));
            gridHelper = new THREE.GridHelper(200, 40, 0x00ffff, 0x002222);
            gridHelper.position.y = -1.01;
            scene.add(gridHelper);

            player = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x00ffff, emissiveIntensity: 2 }));
            scene.add(player);

            clock = new THREE.Clock();
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousedown', jump);
            window.addEventListener('keydown', (e) => { if(e.code === 'Space') jump(); });
            msgEl.addEventListener('click', runIntro);
            skipBtn.addEventListener('click', (e) => { e.stopPropagation(); skipIntro = true; });
        }

        async function runIntro() {
            if (isStarting) return;
            isStarting = true; skipIntro = false;
            msgEl.style.display = 'none'; introOverlay.style.display = 'flex';
            const lines = ["강렬한 비트 소리와 함께 새 시대가 열립니다.", "당신은 새 시대의 창조자입니다.", "이제 어둠과의 전쟁을 시작하십시오."];
            for (let line of lines) {
                if (skipIntro) break;
                introText.innerText = line;
                introText.classList.add('fade-in-text');
                await new Promise(r => {
                    const t = setTimeout(r, 1800);
                    const c = setInterval(() => { if (skipIntro) { clearInterval(c); clearTimeout(t); r(); } }, 50);
                });
                introText.classList.remove('fade-in-text');
                if (!skipIntro) await new Promise(r => setTimeout(r, 600));
            }
            introOverlay.style.display = 'none';
            startCountdown();
        }

        function startCountdown() {
            let count = 3; countEl.style.display = 'block';
            const itv = setInterval(() => {
                if (count <= 0) { clearInterval(itv); countEl.style.display = 'none'; startGame(); }
                else {
                    countEl.innerText = count;
                    countEl.classList.remove('count-pulse');
                    void countEl.offsetWidth; // 트리거
                    countEl.classList.add('count-pulse');
                    count--;
                }
            }, 1000);
        }

        function startGame() {
            score = 0; lives = 3; currentSpeed = 0.65; gameTime = 0; lastSpawnTime = 0; spawnCooldown = 0.75;
            isDeathZone = false; isInvincible = false;
            resetEnvironment();
            scoreEl.innerText = score; updateLifeUI();
            obstacles.forEach(obj => scene.remove(obj));
            obstacles = [];
            player.position.set(0, 0, 0);
            isPlaying = true; isStarting = false;
        }

        function resetEnvironment() {
            scene.fog.color.set(0x000000);
            gridHelper.material.color.set(0x00ffff);
            fateEl.style.opacity = 0;
        }

        function jump() { if (player.position.y <= 0.15 && isPlaying) jumpVelocity = 0.44; }
        function updateLifeUI() { lifeEl.innerText = "🖤".repeat(lives) || "DEATH"; }

        function triggerProtection() {
            isInvincible = true;
            protectEl.style.opacity = 1;
            let blinkCount = 0;
            const blinkInterval = setInterval(() => {
                player.visible = !player.visible;
                blinkCount++;
                if (blinkCount >= 20) {
                    clearInterval(blinkInterval);
                    player.visible = true; isInvincible = false;
                    protectEl.style.opacity = 0;
                }
            }, 100);
        }

        function createObstacle() {
            const width = 8, height = Math.random() > 0.8 ? 2.5 : 1.4;
            let mat;
            if (isDeathZone) {
                // 죽음의 구간: 눈부신 광원 제거, 진한 분홍색으로 변경
                mat = new THREE.MeshStandardMaterial({ color: 0xff1493, emissive: 0x000000 });
            } else {
                // 일반 구간: 기존 네온 핑크 유지
                mat = new THREE.MeshStandardMaterial({ color: 0xff0055, emissive: 0xff0055, emissiveIntensity: 2 });
            }
            const obs = new THREE.Mesh(new THREE.BoxGeometry(width, height, 0.8), mat);
            obs.position.set(0, (height / 2) - 1, -60);
            scene.add(obs);
            obstacles.push(obs);
        }

        function update() {
            if (!isPlaying) return;
            const delta = clock.getDelta();
            const prevTime = gameTime;
            gameTime += delta;

            // 15초 주기 50% 확률 죽음의 구간 체크
            if (Math.floor(gameTime / 15) > Math.floor(prevTime / 15)) {
                if (Math.random() < 0.5) {
                    isDeathZone = true;
                    fateEl.style.opacity = 1;
                    scene.fog.color.set(0xff0055);
                    gridHelper.material.color.set(0xff0055);
                    if (lives > 1) { lives = 1; updateLifeUI(); }
                    setTimeout(() => {
                        isDeathZone = false;
                        resetEnvironment();
                    }, 7000);
                }
            }

            if (gameTime - lastSpawnTime > spawnCooldown) { createObstacle(); lastSpawnTime = gameTime; }

            player.position.y += jumpVelocity; jumpVelocity += gravity;
            if (player.position.y < 0) { player.position.y = 0; jumpVelocity = 0; }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].position.z += currentSpeed;
                const pBox = new THREE.Box3().setFromObject(player).expandByScalar(-0.15);
                const oBox = new THREE.Box3().setFromObject(obstacles[i]);
                
                if (pBox.intersectsBox(oBox)) {
                    if (!isInvincible) {
                        lives--; updateLifeUI();
                        shakeIntensity = 0.6;
                        scene.remove(obstacles[i]);
                        obstacles.splice(i, 1);
                        if (lives <= 0) { isPlaying = false; msgEl.style.display = 'block'; }
                        else { triggerProtection(); }
                    }
                    continue;
                }

                if (obstacles[i].position.z > camera.position.z) {
                    scene.remove(obstacles[i]); obstacles.splice(i, 1);
                    score++; scoreEl.innerText = score;
                    greatEl.classList.remove('pop-in');
                    void greatEl.offsetWidth;
                    greatEl.classList.add('pop-in');
                    if (score % 10 === 0) spawnCooldown = Math.max(0.2, spawnCooldown - 0.07);
                    currentSpeed += 0.003; 
                }
            }
            if (shakeIntensity > 0.01) {
                camera.position.x = (Math.random() - 0.5) * shakeIntensity;
                camera.position.y = 3.5 + (Math.random() - 0.5) * shakeIntensity;
                shakeIntensity *= 0.9;
            }
        }

        function onWindowResize() { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight); }
        function animate() { requestAnimationFrame(animate); update(); composer.render(); }
        init(); animate();
    </script>
</body>
</html>
