<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>3D 루빅스 큐브 - Three.js</title>
    <style>
        body { margin: 0; background-color: #ffffff; overflow: hidden; }
        #instructions {
            position: absolute; top: 10px; left: 10px;
            background: rgba(255, 255, 255, 0.8); padding: 10px;
            border-radius: 5px; font-family: sans-serif; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="instructions">
        <b>컨트롤 가이드:</b><br>
        회전: W, A, S, D | 섞기: Space | 리셋: R<br>
        화면 드래그: 카메라 회전
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- 초기 설정 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff); // 배경 흰색

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(6, 6, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
        scene.add(ambientLight);

        // --- 큐브 생성 ---
        const cubeGroup = new THREE.Group();
        scene.add(cubeGroup);

        const colors = [
            0xffa500, // 주황 (Right)
            0xff0000, // 빨강 (Left)
            0xffffff, // 하양 (Top)
            0xffff00, // 노랑 (Bottom)
            0x00ff00, // 초록 (Front)
            0x0000ff  // 파랑 (Back)
        ];

        function createCube() {
            while(cubeGroup.children.length > 0) cubeGroup.remove(cubeGroup.children[0]);
            
            for (let x = -1; x <= 1; x++) {
                for (let y = -1; y <= 1; y++) {
                    for (let z = -1; z <= 1; z++) {
                        const geometry = new THREE.BoxGeometry(0.95, 0.95, 0.95);
                        const materials = colors.map(color => new THREE.MeshLambertMaterial({ color }));
                        const mesh = new THREE.Mesh(geometry, materials);
                        mesh.position.set(x, y, z);
                        cubeGroup.add(mesh);
                    }
                }
            }
        }
        createCube();

        // --- 회전 로직 ---
        let isRotating = false;
        const rotationSpeed = 0.5; // 요청하신 0.5 속도

        function rotateSide(axis, layer, angle) {
            if (isRotating) return;
            isRotating = true;

            const pivot = new THREE.Group();
            scene.add(pivot);

            const targets = [];
            cubeGroup.children.forEach(child => {
                const pos = child.position[axis];
                if (Math.round(pos) === layer) targets.push(child);
            });

            targets.forEach(t => pivot.attach(t));

            const startRotation = { val: 0 };
            const duration = rotationSpeed * 1000;
            const startTime = performance.now();

            function animateRotation(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                pivot.rotation[axis] = angle * progress;

                if (progress < 1) {
                    requestAnimationFrame(animateRotation);
                } else {
                    targets.forEach(t => cubeGroup.attach(t));
                    scene.remove(pivot);
                    isRotating = false;
                }
            }
            requestAnimationFrame(animateRotation);
        }

        // --- 키 입력 이벤트 ---
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') rotateSide('x', 1, Math.PI / 2);
            if (key === 's') rotateSide('x', -1, -Math.PI / 2);
            if (key === 'a') rotateSide('y', 1, Math.PI / 2);
            if (key === 'd') rotateSide('y', -1, -Math.PI / 2);
            if (key === 'r') createCube(); // 리셋
            if (e.code === 'Space') { // 섞기
                let count = 0;
                const shuffleInterval = setInterval(() => {
                    const axes = ['x', 'y', 'z'];
                    const layers = [-1, 0, 1];
                    rotateSide(axes[Math.floor(Math.random()*3)], layers[Math.floor(Math.random()*3)], Math.PI/2);
                    count++;
                    if (count > 10) clearInterval(shuffleInterval);
                }, 600);
            }
        });

        // 윈도우 리사이즈 대응
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
