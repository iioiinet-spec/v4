<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포켓몬 오션 & 섬 점프맵 시뮬레이터</title>
    <!-- Matter.js 물리 엔진 로드 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            margin: 0;
            padding: 10px;
            background: linear-gradient(135deg, #0288d1 0%, #004d40 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            color: #fff;
            overflow-x: hidden;
        }

        .header-title {
            margin: 5px 0 10px 0;
            font-size: 1.6rem;
            font-weight: 800;
            text-shadow: 0 2px 10px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 컨트롤 패널 UI */
        #control-panel {
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 12px 20px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.25);
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            max-width: 900px;
            width: 100%;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.88rem;
            font-weight: 600;
        }

        input[type="range"] {
            width: 85px;
            accent-color: #00e676;
            cursor: pointer;
        }

        .btn {
            background: linear-gradient(135deg, #00e676, #00b0ff);
            color: #0d47a1;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(0, 230, 118, 0.3);
            font-size: 0.85rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 230, 118, 0.5);
        }

        .btn-gyarados {
            background: linear-gradient(135deg, #ff1744, #d500f9);
            color: #fff;
            box-shadow: 0 4px 12px rgba(255, 23, 68, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            box-shadow: none;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* 컨트롤 안내 바 */
        #status-bar {
            background: rgba(0, 20, 40, 0.5);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255,255,255,0.15);
            flex-wrap: wrap;
            justify-content: center;
        }

        .key-badge {
            background: #fff;
            color: #004d40;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.75rem;
            box-shadow: 0 2px 0 #80cbd2;
        }

        /* 유리 상자 및 캔버스 */
        #terrarium-container {
            position: relative;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 12px;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.4),
                inset 0 0 35px rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.35);
            max-width: 900px;
            width: 100%;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 16px;
            box-shadow: inset 0 0 25px rgba(0, 0, 0, 0.2);
            cursor: pointer;
        }

        /* 모바일 터치 조작반 */
        #mobile-controls {
            display: none;
            width: 100%;
            max-width: 900px;
            justify-content: space-between;
            margin-top: 10px;
            padding: 0 10px;
        }

        .touch-group {
            display: flex;
            gap: 8px;
        }

        .touch-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            border: 2px solid rgba(255, 255, 255, 0.4);
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            touch-action: manipulation;
        }

        .touch-btn:active {
            background: rgba(0, 230, 118, 0.6);
        }

        @media (max-width: 768px) {
            #mobile-controls {
                display: flex;
            }
            .header-title {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

    <div class="header-title">
        <span>🌊</span> 포켓몬 오션 & 섬 점프맵
    </div>

    <!-- 컨트롤 패널 -->
    <div id="control-panel">
        <div class="control-group">
            <label for="gravity-slider">중력</label>
            <input type="range" id="gravity-slider" min="0.2" max="2" step="0.1" value="0.9">
            <span id="gravity-val">0.9</span>
        </div>
        <div class="control-group">
            <label for="jump-slider">점프/헤엄 파워</label>
            <input type="range" id="jump-slider" min="0.8" max="2.2" step="0.1" value="1.3">
            <span id="jump-val">1.3</span>
        </div>
        <button class="btn" id="add-btn">+ 포켓몬 추가</button>
        <button class="btn btn-gyarados" id="gyarados-btn">🐉 갸라도스 소환</button>
        <button class="btn btn-secondary" id="deselect-btn">선택 해제</button>
    </div>

    <!-- 조작 가이드 -->
    <div id="status-bar">
        <span id="selected-info">💡 포켓몬을 <b>클릭</b>하면 조종할 수 있습니다! (비행 포켓몬은 하늘 비상 가능)</span>
        <span style="opacity:0.4;">|</span>
        <span>이동: <span class="key-badge">←</span> <span class="key-badge">→</span> <span class="key-badge">↑</span> <span class="key-badge">↓</span></span>
        <span>점프/헤엄: <span class="key-badge">Space</span></span>
    </div>

    <!-- 테라리움 메인 캔버스 -->
    <div id="terrarium-container" style="margin-top: 10px;">
        <canvas id="simCanvas"></canvas>
    </div>

    <!-- 터치 기기용 컨트롤러 -->
    <div id="mobile-controls">
        <div class="touch-group">
            <div class="touch-btn" id="btn-left">◀</div>
            <div class="touch-btn" id="btn-right">▶</div>
            <div class="touch-btn" id="btn-up">▲</div>
            <div class="touch-btn" id="btn-down">▼</div>
        </div>
        <div class="touch-group">
            <div class="touch-btn" id="btn-jump" style="width:70px; border-radius:25px;">JUMP</div>
        </div>
    </div>

    <script>
        // --- Matter.js 물리 엔진 초기화 ---
        const { Engine, World, Bodies, Body, Composite, Events } = Matter;

        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');

        const CANVAS_WIDTH = 900;
        const CANVAS_HEIGHT = 600;
        canvas.width = CANVAS_WIDTH;
        canvas.height = CANVAS_HEIGHT;

        const WATER_LEVEL = 430; // 해수면 Y 좌표

        const engine = Engine.create({
            gravity: { y: 0.9 }
        });
        const world = engine.world;

        // --- 포켓몬 속성 및 스프라이트 데이터 ---
        // type: 'water' (수영), 'flyer' (비행), 'land' (육상)
        const POKEMON_ROSTER = [
            // 물포켓몬 (수영 특화)
            { id: 7, name: '꼬부기', type: 'water', url: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/7.gif', radius: 24, scale: 1.0 },
            { id: 131, name: '라프라스', type: 'water', url: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/131.gif', radius: 30, scale: 1.2 },
            { id: 134, name: '샤미드', type: 'water', url: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/134.gif', radius: 24, scale: 1.0 },
            { id: 54, name: '고라파덕', type: 'water', url: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/54.gif', radius: 24, scale: 1.0 },
            { id: 129, name: '잉어킹', type: 'water', url: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/129.gif', radius: 22, scale: 1.0 },
            { id: 393, name: '팽도리', type: 'water', url: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/393.gif', radius: 22, scale: 1.0 },
            
            // 비행 포켓몬 (하늘 비상)
            { id: 130, name: '갸라도스', type: 'flyer', url: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/130.gif', radius: 34, scale: 1.4 },
            { id: 149, name: '망나뇽', type: 'flyer', url: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/149.gif', radius: 30, scale: 1.2 },
            { id: 249, name: '루기아', type: 'flyer', url: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/249.gif', radius: 32, scale: 1.3 },

            // 일반/육상 점퍼
            { id: 25, name: '피카츄', type: 'land', url: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/25.gif', radius: 24, scale: 1.0 },
            { id: 133, name: '이브이', type: 'land', url: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/133.gif', radius: 22, scale: 1.0 },
            { id: 4, name: '파이리', type: 'land', url: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/4.gif', radius: 24, scale: 1.0 }
        ];

        // 이미지 캐싱
        const imageCache = {};
        POKEMON_ROSTER.forEach(p => {
            const img = new Image();
            img.src = p.url;
            imageCache[p.id] = img;
        });

        // --- 외곽 유리벽 및 섬(플랫폼) 배치 ---
        const wallThickness = 60;
        const wallOptions = { isStatic: true, friction: 0.1, restitution: 0.2 };

        const ground = Bodies.rectangle(CANVAS_WIDTH / 2, CANVAS_HEIGHT + wallThickness/2 - 10, CANVAS_WIDTH, wallThickness, wallOptions);
        const leftWall = Bodies.rectangle(-wallThickness/2 + 10, CANVAS_HEIGHT / 2, wallThickness, CANVAS_HEIGHT, wallOptions);
        const rightWall = Bodies.rectangle(CANVAS_WIDTH + wallThickness/2 - 10, CANVAS_HEIGHT / 2, wallThickness, CANVAS_HEIGHT, wallOptions);
        const ceiling = Bodies.rectangle(CANVAS_WIDTH / 2, -wallThickness/2 + 10, CANVAS_WIDTH, wallThickness, wallOptions);

        // 섬 점프맵 배치
        const platformData = [
            { x: 160, y: 410, w: 180, h: 28, label: '섬 1 (좌측)' },
            { x: 740, y: 400, w: 180, h: 28, label: '섬 2 (우측)' },
            { x: 450, y: 340, w: 220, h: 25, label: '중앙 바위섬' },
            { x: 220, y: 230, w: 150, h: 20, label: '구름 섬 1' },
            { x: 680, y: 230, w: 150, h: 20, label: '구름 섬 2' },
            { x: 450, y: 130, w: 170, h: 22, label: '공중 천공섬' }
        ];

        const platforms = platformData.map(p => {
            return Bodies.rectangle(p.x, p.y, p.w, p.h, {
                isStatic: true,
                friction: 0.2,
                restitution: 0.1
            });
        });

        World.add(world, [ground, leftWall, rightWall, ceiling, ...platforms]);

        // --- 수집용 열매 아이템 ---
        let collectibles = [];
        function initCollectibles() {
            collectibles = [
                { x: 160, y: 360, radius: 10, collected: false },
                { x: 740, y: 350, radius: 10, collected: false },
                { x: 450, y: 290, radius: 10, collected: false },
                { x: 220, y: 180, radius: 10, collected: false },
                { x: 680, y: 180, radius: 10, collected: false },
                { x: 450, y: 80,  radius: 10, collected: false }
            ];
        }
        initCollectibles();

        // --- 상태 변수 ---
        let pokemonBodies = [];
        let selectedPokemon = null;
        let jumpPowerMultiplier = 1.3;
        let particles = [];

        const keys = { left: false, right: false, up: false, down: false, jump: false };

        // --- 포켓몬 소환 함수 ---
        function spawnPokemon(x, y, pokemonInfo = null) {
            const p = pokemonInfo || POKEMON_ROSTER[Math.floor(Math.random() * POKEMON_ROSTER.length)];
            
            const isFlyer = p.type === 'flyer';
            const body = Bodies.circle(x, y, p.radius, {
                friction: 0.05,
                frictionAir: isFlyer ? 0.05 : 0.02,
                restitution: 0.3,
                density: isFlyer ? 0.0008 : 0.002
            });

            body.pokemonData = p;
            body.facingLeft = Math.random() > 0.5;
            body.isGrounded = false;
            body.inWater = false;

            // AI 이동 파라미터
            body.ai = {
                nextDecision: 0,
                directionX: Math.random() > 0.5 ? 1 : -1,
                directionY: Math.random() > 0.5 ? 1 : -1
            };

            pokemonBodies.push(body);
            World.add(world, body);

            addParticles(x, y, 15, isFlyer ? '#e100ff' : '#00e676');
            return body;
        }

        // 초기 포켓몬 배치
        spawnPokemon(450, 100, POKEMON_ROSTER[6]); // 갸라도스 (하늘)
        spawnPokemon(250, 500, POKEMON_ROSTER[0]); // 꼬부기 (바다)
        spawnPokemon(650, 480, POKEMON_ROSTER[1]); // 라프라스 (바다)
        spawnPokemon(160, 350, POKEMON_ROSTER[9]); // 피카츄 (섬 위)
        spawnPokemon(450, 280, POKEMON_ROSTER[3]); // 고라파덕 (중앙 섬)
        spawnPokemon(700, 140, POKEMON_ROSTER[7]); // 망나뇽 (하늘)

        // --- 파티클 시스템 ---
        function addParticles(x, y, count, color, speedScale = 1) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 5 * speedScale,
                    vy: (Math.random() - 0.5) * 5 * speedScale,
                    life: 1.0,
                    size: Math.random() * 6 + 2,
                    color: color || '#ffffff'
                });
            }
        }

        function updateAndDrawParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.03;

                if (p.life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }

                ctx.save();
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // --- 접지 체크 ---
        function checkGrounded(body) {
            const bX = body.position.x;
            const bY = body.position.y + body.circleRadius + 3;

            if (bY >= CANVAS_HEIGHT - 15) return true;

            for (let plat of platformData) {
                if (Math.abs(bX - plat.x) < plat.w / 2 && Math.abs(bY - (plat.y - plat.h/2)) < 8) {
                    return true;
                }
            }
            return false;
        }

        // --- 물리 & AI 프레임 연산 ---
        Events.on(engine, 'beforeUpdate', () => {
            const now = engine.timing.timestamp;

            pokemonBodies.forEach(body => {
                const pType = body.pokemonData.type;
                body.isGrounded = checkGrounded(body);
                
                // 물속 여부 판별
                const wasInWater = body.inWater;
                body.inWater = body.position.y > WATER_LEVEL;

                // 물 입수/출수 시 물보라 파티클
                if (!wasInWater && body.inWater) {
                    addParticles(body.position.x, WATER_LEVEL, 12, '#ffffff', 1.2);
                    addParticles(body.position.x, WATER_LEVEL, 8, '#00b0ff', 0.8);
                }

                // 1. 바다 부력 & 수영 물리 적용
                if (body.inWater) {
                    const depth = body.position.y - WATER_LEVEL;
                    const buoyancy = -0.0022 * depth * engine.gravity.y;
                    Body.applyForce(body, body.position, { x: 0, y: buoyancy });

                    Body.setVelocity(body, {
                        x: body.velocity.x * 0.94,
                        y: body.velocity.y * 0.92
                    });

                    if (pType === 'water' && Math.random() < 0.1) {
                        addParticles(body.position.x, body.position.y, 1, '#b3e5fc', 0.3);
                    }
                }

                // 2. 비행 포켓몬 (갸라도스, 망나뇽 등) 반중력 유영
                if (pType === 'flyer' && body !== selectedPokemon) {
                    Body.applyForce(body, body.position, { x: 0, y: -0.0018 * engine.gravity.y });
                    
                    const hoverAmp = Math.sin(now * 0.002 + body.id) * 0.0008;
                    Body.applyForce(body, body.position, { x: 0, y: hoverAmp });
                }

                // --- 3. 컨트롤러 또는 AI 행동 연산 ---
                if (body === selectedPokemon) {
                    // [플레이어 직접 조작]
                    const speed = pType === 'flyer' ? 4.5 : (body.inWater ? 3.2 : 3.8);

                    if (keys.left) {
                        Body.setVelocity(body, { x: -speed, y: body.velocity.y });
                        body.facingLeft = true;
                    } else if (keys.right) {
                        Body.setVelocity(body, { x: speed, y: body.velocity.y });
                        body.facingLeft = false;
                    }

                    // 비행/수영 포켓몬 수직 이동
                    if (pType === 'flyer' || body.inWater) {
                        if (keys.up) {
                            Body.setVelocity(body, { x: body.velocity.x, y: -speed });
                        } else if (keys.down) {
                            Body.setVelocity(body, { x: body.velocity.x, y: speed });
                        }
                    }

                    // 점프 / 헤엄 치기
                    if (keys.jump) {
                        if (body.isGrounded || body.inWater || pType === 'flyer') {
                            const jumpImpulse = body.inWater ? -7.5 : -9.5;
                            Body.setVelocity(body, { 
                                x: body.velocity.x, 
                                y: jumpImpulse * jumpPowerMultiplier 
                            });

                            if (body.inWater) {
                                addParticles(body.position.x, body.position.y, 10, '#e0f7fa');
                            } else {
                                addParticles(body.position.x, body.position.y + 15, 8, '#ffffff');
                            }
                            keys.jump = false;
                        }
                    }
                } else {
                    // [자율 AI 이동]
                    const ai = body.ai;

                    if (now > ai.nextDecision) {
                        ai.directionX = Math.random() < 0.2 ? 0 : (Math.random() > 0.5 ? 1 : -1);
                        ai.directionY = Math.random() > 0.5 ? 1 : -1;
                        ai.nextDecision = now + 1500 + Math.random() * 2500;

                        if (body.isGrounded && Math.random() < 0.45) {
                            Body.setVelocity(body, {
                                x: body.velocity.x + ai.directionX * 2,
                                y: -8 * jumpPowerMultiplier
                            });
                        }
                    }

                    if (ai.directionX !== 0 && Math.abs(body.velocity.x) < 2.5) {
                        Body.applyForce(body, body.position, { x: ai.directionX * 0.0006, y: 0 });
                        body.facingLeft = ai.directionX < 0;
                    }

                    if (pType === 'flyer' && Math.abs(body.velocity.y) < 2) {
                        Body.applyForce(body, body.position, { x: 0, y: ai.directionY * 0.0004 });
                    }
                }

                // 회전 복원
                if (Math.abs(body.angle) > 0.05) {
                    Body.setAngle(body, body.angle * 0.85);
                }

                // 열매 수집 확인
                collectibles.forEach(item => {
                    if (!item.collected) {
                        const dist = Math.hypot(body.position.x - item.x, body.position.y - item.y);
                        if (dist < body.circleRadius + item.radius) {
                            item.collected = true;
                            addParticles(item.x, item.y, 15, '#ffea00');
                            setTimeout(() => { item.collected = false; }, 7000);
                        }
                    }
                });
            });
        });

        // --- 캔버스 렌더링 루프 ---
        function render() {
            const time = Date.now() * 0.002;

            // 1. 하늘 & 바다 그라데이션 배경
            const skyGrad = ctx.createLinearGradient(0, 0, 0, WATER_LEVEL);
            skyGrad.addColorStop(0, '#4fc3f7');
            skyGrad.addColorStop(0.7, '#e0f7fa');
            skyGrad.addColorStop(1, '#80deea');
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, CANVAS_WIDTH, WATER_LEVEL);

            // 구름 연출
            ctx.fillStyle = 'rgba(255, 255, 255, 0.55)';
            ctx.beginPath();
            ctx.arc((time * 15) % (CANVAS_WIDTH + 100) - 50, 60, 30, 0, Math.PI * 2);
            ctx.arc((time * 15) % (CANVAS_WIDTH + 100) - 30, 50, 40, 0, Math.PI * 2);
            ctx.arc((time * 15) % (CANVAS_WIDTH + 100) + 10, 60, 30, 0, Math.PI * 2);
            ctx.fill();

            // 바다 속 그라데이션
            const seaGrad = ctx.createLinearGradient(0, WATER_LEVEL, 0, CANVAS_HEIGHT);
            seaGrad.addColorStop(0, 'rgba(3, 169, 244, 0.82)');
            seaGrad.addColorStop(0.5, 'rgba(2, 119, 189, 0.92)');
            seaGrad.addColorStop(1, 'rgba(1, 87, 155, 0.98)');
            ctx.fillStyle = seaGrad;
            ctx.fillRect(0, WATER_LEVEL, CANVAS_WIDTH, CANVAS_HEIGHT - WATER_LEVEL);

            // 2. 섬 점프맵 (플랫폼) 그려주기
            platformData.forEach(p => {
                ctx.save();

                const isCloud = p.y < 300;

                if (isCloud) {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
                    ctx.shadowColor = 'rgba(255, 255, 255, 0.5)';
                    ctx.shadowBlur = 10;
                    ctx.beginPath();
                    ctx.roundRect(p.x - p.w/2, p.y - p.h/2, p.w, p.h, 12);
                    ctx.fill();
                } else {
                    ctx.shadowColor = 'rgba(0,0,0,0.15)';
                    ctx.shadowBlur = 8;
                    ctx.shadowOffsetY = 4;

                    ctx.fillStyle = '#d7ccc8';
                    ctx.beginPath();
                    ctx.roundRect(p.x - p.w/2, p.y - p.h/2, p.w, p.h, 10);
                    ctx.fill();

                    ctx.fillStyle = '#66bb6a';
                    ctx.beginPath();
                    ctx.roundRect(p.x - p.w/2, p.y - p.h/2, p.w, 8, [8, 8, 0, 0]);
                    ctx.fill();
                }

                ctx.restore();
            });

            // 3. 열매 수집품
            collectibles.forEach(item => {
                if (item.collected) return;
                ctx.save();
                const floatY = item.y + Math.sin(time * 2 + item.x) * 3;

                ctx.shadowColor = '#ffea00';
                ctx.shadowBlur = 12;
                ctx.fillStyle = '#ffd600';
                ctx.beginPath();
                ctx.arc(item.x, floatY, item.radius, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(item.x - 3, floatY - 3, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });

            // 4. 포켓몬 스프라이트 그려주기
            pokemonBodies.forEach(body => {
                const { x, y } = body.position;
                const pData = body.pokemonData;
                const img = imageCache[pData.id];

                ctx.save();
                ctx.translate(x, y);

                // 선택 포켓몬 표식
                if (body === selectedPokemon) {
                    ctx.save();
                    ctx.scale(1, 0.4);
                    ctx.beginPath();
                    ctx.arc(0, body.circleRadius * 2.3, body.circleRadius * 1.5, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(0, 230, 118, 0.35)';
                    ctx.fill();
                    ctx.strokeStyle = '#00e676';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    ctx.restore();

                    const arrowY = -body.circleRadius - 22 + Math.sin(time * 4) * 4;
                    ctx.fillStyle = '#ff1744';
                    ctx.beginPath();
                    ctx.moveTo(0, arrowY + 8);
                    ctx.lineTo(-7, arrowY);
                    ctx.lineTo(7, arrowY);
                    ctx.closePath();
                    ctx.fill();

                    ctx.font = 'bold 12px sans-serif';
                    ctx.fillStyle = '#0d47a1';
                    ctx.textAlign = 'center';
                    ctx.fillText(pData.name, 0, arrowY - 5);
                }

                // 그림자 효과
                if (!body.inWater) {
                    ctx.beginPath();
                    ctx.ellipse(0, body.circleRadius - 2, body.circleRadius * 0.8, 5, 0, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.12)';
                    ctx.fill();
                }

                // 방향 반전
                if (body.facingLeft) {
                    ctx.scale(-1, 1);
                }

                // 이미지 렌더링
                if (img && img.complete) {
                    const drawSize = body.circleRadius * 2.6 * pData.scale;
                    ctx.drawImage(img, -drawSize/2, -drawSize/2, drawSize, drawSize);
                } else {
                    ctx.beginPath();
                    ctx.arc(0, 0, body.circleRadius, 0, Math.PI * 2);
                    ctx.fillStyle = '#00b0ff';
                    ctx.fill();
                }

                ctx.restore();
            });

            // 5. 파도 연출
            ctx.save();
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.beginPath();
            ctx.moveTo(0, WATER_LEVEL);
            for (let x = 0; x <= CANVAS_WIDTH; x += 20) {
                const waveY = WATER_LEVEL + Math.sin(x * 0.02 + time * 2) * 5 + Math.cos(x * 0.03 - time) * 3;
                ctx.lineTo(x, waveY);
            }
            ctx.lineTo(CANVAS_WIDTH, WATER_LEVEL + 12);
            ctx.lineTo(0, WATER_LEVEL + 12);
            ctx.closePath();
            ctx.fill();
            ctx.restore();

            // 6. 파티클 그려주기
            updateAndDrawParticles();

            // 7. 유리 상자 프레임 빛반사
            ctx.save();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 4;
            ctx.strokeRect(2, 2, CANVAS_WIDTH - 4, CANVAS_HEIGHT - 4);

            const gloss = ctx.createLinearGradient(0, 0, 200, 200);
            gloss.addColorStop(0, 'rgba(255, 255, 255, 0.3)');
            gloss.addColorStop(1, 'rgba(255, 255, 255, 0)');
            ctx.fillStyle = gloss;
            ctx.beginPath();
            ctx.moveTo(0, 0); ctx.lineTo(220, 0); ctx.lineTo(0, 220);
            ctx.closePath();
            ctx.fill();
            ctx.restore();

            requestAnimationFrame(render);
        }

        Engine.run(engine);
        render();

        // --- 마우스 클릭 선택 ---
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = CANVAS_WIDTH / rect.width;
            const scaleY = CANVAS_HEIGHT / rect.height;

            const clickX = (e.clientX - rect.left) * scaleX;
            const clickY = (e.clientY - rect.top) * scaleY;

            let clickedBody = null;
            let minDist = Infinity;

            pokemonBodies.forEach(body => {
                const dist = Math.hypot(body.position.x - clickX, body.position.y - clickY);
                if (dist < body.circleRadius + 18 && dist < minDist) {
                    minDist = dist;
                    clickedBody = body;
                }
            });

            if (clickedBody) {
                selectedPokemon = clickedBody;
                const p = clickedBody.pokemonData;
                const typeText = p.type === 'flyer' ? '✈️ 비행 (상하좌우 자유조종)' : (p.type === 'water' ? '🏊 수영' : '🏃 점퍼');
                
                document.getElementById('selected-info').innerHTML = 
                    `🎯 선택됨: <b style="color:#00e676;">${p.name}</b> (${typeText}) - 방향키 & Space로 조종 가능`;
                addParticles(clickedBody.position.x, clickedBody.position.y, 20, '#00e676');
            }
        });

        // --- 키보드 조작 ---
        window.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
            if (e.code === 'ArrowUp' || e.code === 'KeyW') keys.up = true;
            if (e.code === 'ArrowDown' || e.code === 'KeyS') keys.down = true;
            if (e.code === 'Space') { keys.jump = true; e.preventDefault(); }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
            if (e.code === 'ArrowUp' || e.code === 'KeyW') keys.up = false;
            if (e.code === 'ArrowDown' || e.code === 'KeyS') keys.down = false;
            if (e.code === 'Space') keys.jump = false;
        });

        // --- 터치 버튼 연동 ---
        const bindTouch = (id, keyName) => {
            const el = document.getElementById(id);
            if (!el) return;
            const start = (e) => { e.preventDefault(); keys[keyName] = true; };
            const end = (e) => { e.preventDefault(); keys[keyName] = false; };
            el.addEventListener('touchstart', start);
            el.addEventListener('touchend', end);
            el.addEventListener('mousedown', () => keys[keyName] = true);
            el.addEventListener('mouseup', () => keys[keyName] = false);
        };
        bindTouch('btn-left', 'left');
        bindTouch('btn-right', 'right');
        bindTouch('btn-up', 'up');
        bindTouch('btn-down', 'down');
        bindTouch('btn-jump', 'jump');

        // --- UI 슬라이더 & 버튼 리스너 ---
        const gravitySlider = document.getElementById('gravity-slider');
        const gravityVal = document.getElementById('gravity-val');
        gravitySlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            engine.gravity.y = val;
            gravityVal.textContent = val.toFixed(1);
        });

        const jumpSlider = document.getElementById('jump-slider');
        const jumpVal = document.getElementById('jump-val');
        jumpSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            jumpForceMultiplier = val;
            jumpVal.textContent = val.toFixed(1);
        });

        document.getElementById('add-btn').addEventListener('click', () => {
            spawnPokemon(CANVAS_WIDTH / 2 + (Math.random() * 100 - 50), 80);
        });

        document.getElementById('gyarados-btn').addEventListener('click', () => {
            const gyarados = spawnPokemon(CANVAS_WIDTH / 2, 120, POKEMON_ROSTER[6]);
            selectedPokemon = gyarados;
            document.getElementById('selected-info').innerHTML = 
                `🐉 소환 및 선택됨: <b style="color:#ff1744;">갸라도스</b> (방향키 상하좌우 비행 조종 가능!)`;
        });

        document.getElementById('deselect-btn').addEventListener('click', () => {
            selectedPokemon = null;
            document.getElementById('selected-info').innerHTML = `💡 포켓몬을 <b>클릭</b>하면 조종할 수 있습니다!`;
        });
    </script>
</body>
</html>
