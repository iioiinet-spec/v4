<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>색깔 폭발 두더지 코 악기</title>
    <style>
        /* 기본 설정 및 모바일 최적화 (터치 지연 및 스크롤 방지) */
        * {
            box-sizing: border-box;
            touch-action: none; /* 모바일에서 스크롤 및 줌 방지 */
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #111; /* 어두운 색상들이 잘 보이도록 짙은 회색 배경 */
            color: white;
            font-family: sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        /* 오실로스코프 캔버스 영역 */
        #oscope-container {
            flex: 1;
            position: relative;
            background: #000;
            border-bottom: 2px solid #333;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        /* 폭발 파티클용 캔버스 (전체 화면 덮기, 터치 무시) */
        #fx-canvas {
            z-index: 10;
            pointer-events: none; /* 아래 요소들 클릭 가능하도록 */
        }

        /* 두더지 코 그리드 인터페이스 */
        #grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 15px;
            padding: 20px;
            background: #222;
            z-index: 5;
        }

        /* 두더지 코 버튼 스타일 */
        .mole-nose {
            background: #8b5a2b; /* 기본 두더지 코 갈색 */
            border-radius: 50%;
            border: 4px solid #5c3a21;
            box-shadow: 0 8px 0 #4a2e1b, inset 0 -10px 20px rgba(0,0,0,0.5), inset 0 10px 10px rgba(255,255,255,0.2);
            position: relative;
            cursor: pointer;
            transition: transform 0.05s, box-shadow 0.05s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .mole-nose::after {
            content: '';
            position: absolute;
            top: 15%;
            width: 30%;
            height: 20%;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            transform: rotate(-15deg);
        }
        .mole-nose:active, .mole-nose.active {
            transform: translateY(8px);
            box-shadow: 0 0px 0 #4a2e1b, inset 0 -10px 20px rgba(0,0,0,0.5), inset 0 10px 10px rgba(255,255,255,0.2);
        }

        /* 안내 문구 */
        #start-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="start-overlay">화면을 터치하여 시작하세요</div>

    <div id="oscope-container">
        <canvas id="oscope-canvas"></canvas>
    </div>
    
    <!-- 파티클 전용 캔버스는 화면 전체를 덮습니다 -->
    <canvas id="fx-canvas"></canvas>

    <div id="grid"></div>

    <script>
        /* === 1. 설정 및 데이터 === */
        const colorSequence = [
            '#FF0000', // 빨강
            '#0000FF', // 파랑
            '#FFA500', // 주황
            '#FFFF00', // 노랑
            '#800080', // 보라
            '#FFC0CB', // 핑크
            '#008000', // 초록
            '#FFD700', // 금색
            '#111111', // 검은색 (배경과 구분 위해 약간 밝게)
            '#C0C0C0', // 은색
            '#FFCC99', // 살색
            '#000000', // 반타 블랙
            '#00FFFF', // 청록색
            '#98FF98', // 민트색
            '#020202', // 리덴션 오브 베니티
            '#010101', // 무소 블랙
            '#8B0000', // 진 빨강
            '#FFFFFF', // 하양색
            '#DDA0DD', // 연보라
            '#ADFF2F', // 연두색
            '#808080'  // 회색
        ];
        
        // 펜타토닉 스케일 (영롱하고 조화로운 소리)
        const frequencies = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25, 783.99, 880.00, 1046.50, 1174.66];
        
        let colorIndex = 0;
        let activeWaveColor = '#00FFFF'; // 오실로스코프 기본 색상

        /* === 2. Web Audio API 엔진 === */
        let audioCtx, masterGain, analyser;
        let isInitialized = false;

        function initAudio() {
            if (isInitialized) return;
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.6;
            
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 2048; // 부드러운 파동을 위해 큰 사이즈
            
            masterGain.connect(analyser);
            analyser.connect(audioCtx.destination);
            
            isInitialized = true;
            document.getElementById('start-overlay').style.display = 'none';
            drawOscilloscope();
            drawParticles();
        }

        function playBeautifulNote(freq) {
            if (!audioCtx) return;
            
            const t = audioCtx.currentTime;
            
            // 두 개의 오실레이터로 몽환적이고 풍부한 소리 생성
            const osc1 = audioCtx.createOscillator();
            osc1.type = 'sine';
            osc1.frequency.value = freq;
            
            const osc2 = audioCtx.createOscillator();
            osc2.type = 'triangle';
            osc2.frequency.value = freq * 1.002; // 약간의 디튠으로 공간감 형성
            
            const noteGain = audioCtx.createGain();
            
            // 아름다운 ADSR 엔벨로프 (타격감 + 긴 잔향)
            noteGain.gain.setValueAtTime(0, t);
            noteGain.gain.linearRampToValueAtTime(0.5, t + 0.02); // 빠른 Attack
            noteGain.gain.exponentialRampToValueAtTime(0.001, t + 2.5); // 길고 부드러운 Release
            
            osc1.connect(noteGain);
            osc2.connect(noteGain);
            noteGain.connect(masterGain);
            
            osc1.start(t);
            osc2.start(t);
            osc1.stop(t + 3);
            osc2.stop(t + 3);

            // 주파수에 따라 오실로스코프 색상 변경 (낮은음: 빨강 -> 높은음: 보라)
            const hue = Math.max(0, Math.min(360, (freq - 260) / 1000 * 360));
            activeWaveColor = `hsl(${hue}, 100%, 60%)`;
        }

        /* === 3. 시각화: 오실로스코프 === */
        const oscCanvas = document.getElementById('oscope-canvas');
        const oscCtx = oscCanvas.getContext('2d');
        
        function resizeOscCanvas() {
            oscCanvas.width = oscCanvas.parentElement.clientWidth;
            oscCanvas.height = oscCanvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeOscCanvas);
        resizeOscCanvas();

        function drawOscilloscope() {
            requestAnimationFrame(drawOscilloscope);
            if (!analyser) return;

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteTimeDomainData(dataArray);

            oscCtx.fillStyle = 'rgba(0, 0, 0, 0.2)'; // 약간의 잔상 효과
            oscCtx.fillRect(0, 0, oscCanvas.width, oscCanvas.height);

            oscCtx.lineWidth = 4;
            oscCtx.strokeStyle = activeWaveColor;
            oscCtx.beginPath();

            const sliceWidth = oscCanvas.width * 1.0 / bufferLength;
            let x = 0;

            for (let i = 0; i < bufferLength; i++) {
                const v = dataArray[i] / 128.0; // 0 ~ 2 사이 값
                const y = v * oscCanvas.height / 2;

                if (i === 0) {
                    oscCtx.moveTo(x, y);
                } else {
                    oscCtx.lineTo(x, y);
                }
                x += sliceWidth;
            }
            oscCtx.lineTo(oscCanvas.width, oscCanvas.height / 2);
            oscCtx.stroke();
        }

        /* === 4. 시각화: 폭발 파티클 시스템 === */
        const fxCanvas = document.getElementById('fx-canvas');
        const fxCtx = fxCanvas.getContext('2d');
        let particles = [];

        function resizeFxCanvas() {
            fxCanvas.width = window.innerWidth;
            fxCanvas.height = window.innerHeight;
            fxCanvas.style.position = 'absolute';
            fxCanvas.style.top = '0';
            fxCanvas.style.left = '0';
        }
        window.addEventListener('resize', resizeFxCanvas);
        resizeFxCanvas();

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 15 + 5; // 폭발 속도
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.color = color;
                this.life = 1.0; // 수명
                this.decay = Math.random() * 0.02 + 0.015; // 사라지는 속도
                this.size = Math.random() * 8 + 4;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2; // 중력
                this.life -= this.decay;
            }
            draw(ctx) {
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                
                // 극강의 블랙 계열을 위해 하얀 테두리 살짝 추가
                if (this.color === '#000000' || this.color === '#010101' || this.color === '#020202') {
                    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }
        }

        // 연쇄 폭발 알고리즘
        function createExplosion(x, y, color, depth = 0) {
            // 메인 폭발 파티클 생성
            for (let i = 0; i < 40; i++) {
                particles.push(new Particle(x, y, color));
            }

            // 연쇄 폭발 (Chain Reaction): 다른 곳까지 팡팡 터짐
            if (depth < 3) { // 최대 3차 연쇄 폭발
                const numChains = Math.floor(Math.random() * 4) + 2; // 2~5개 추가 폭발
                for (let j = 0; j < numChains; j++) {
                    setTimeout(() => {
                        const nextX = x + (Math.random() - 0.5) * 400;
                        const nextY = y + (Math.random() - 0.5) * 400;
                        createExplosion(nextX, nextY, color, depth + 1);
                    }, Math.random() * 300 + 100); // 0.1~0.4초 딜레이
                }
            }
        }

        function drawParticles() {
            requestAnimationFrame(drawParticles);
            fxCtx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);
            
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                p.draw(fxCtx);
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
            fxCtx.globalAlpha = 1.0; // 초기화
        }

        /* === 5. UI: 두더지 코 생성 및 이벤트 바인딩 === */
        const grid = document.getElementById('grid');
        
        for (let i = 0; i < 12; i++) {
            const nose = document.createElement('div');
            nose.className = 'mole-nose';
            
            const pressHandler = (e) => {
                e.preventDefault(); // 더블 탭 줌 방지
                initAudio();
                
                // 1. 소리 재생
                playBeautifulNote(frequencies[i]);
                
                // 2. 색상 순서 가져오기
                const color = colorSequence[colorIndex];
                colorIndex = (colorIndex + 1) % colorSequence.length; // 다음 색상 준비
                
                // 3. 버튼 위치에서 폭발 효과 시작
                const rect = nose.getBoundingClientRect();
                const startX = rect.left + rect.width / 2;
                const startY = rect.top + rect.height / 2;
                createExplosion(startX, startY, color, 0);

                // 애니메이션 클래스 토글
                nose.classList.add('active');
                setTimeout(() => nose.classList.remove('active'), 100);
            };

            // 모바일 터치와 데스크탑 클릭 모두 지연 없이 반응
            nose.addEventListener('mousedown', pressHandler);
            nose.addEventListener('touchstart', pressHandler, { passive: false });

            grid.appendChild(nose);
        }

        // 전체 화면 오버레이 터치 시 오디오 컨텍스트 초기화 (브라우저 정책 우회)
        document.getElementById('start-overlay').addEventListener('mousedown', initAudio);
        document.getElementById('start-overlay').addEventListener('touchstart', (e) => {
            e.preventDefault();
            initAudio();
        }, { passive: false });

    </script>
</body>
</html>
