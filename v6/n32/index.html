<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎸 Real Guitar App</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#111;
color:white;
display:flex;
justify-content:center;
padding:20px;
}

.app{
width:100%;
max-width:1100px;
background:#1c1c1c;
border-radius:20px;
padding:20px;
box-shadow:0 20px 40px rgba(0,0,0,.6);
}

h1{text-align:center;}

.panel{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
margin-bottom:15px;
align-items:center;
}

select,button, input[type=range]{
padding:10px;
border-radius:10px;
border:none;
font-weight:bold;
}

select{
background:#333;
color:white;
}

button{
background:#ffb300;
cursor:pointer;
}

button:hover{background:#ffd54f;}

.speedBox{
display:flex;
flex-direction:column;
align-items:center;
font-size:12px;
}

.guitar{
margin-top:20px;
height:260px;
border-radius:20px;
background:linear-gradient(90deg,#6a3d1a,#9a5a2a,#6a3d1a);
position:relative;
overflow:hidden;
}

.string{
position:absolute;
left:0;
width:100%;
height:3px;
background:#ddd;
cursor:pointer;
transition:0.1s;
}

.string:hover{background:#ffe066;}

.fret{
position:absolute;
top:0;
width:4px;
height:100%;
background:#ccc;
opacity:0.6;
}

.box{
margin-top:10px;
background:#222;
padding:10px;
border-radius:10px;
}

.list{
display:flex;
flex-wrap:wrap;
gap:5px;
margin-top:10px;
}

.list button{
background:#333;
color:white;
font-size:12px;
padding:6px 8px;
transition:0.2s;
}

.list button:hover{background:#555;}

.list button.active{
background:#ffb300;
box-shadow:0 0 10px #ffb300;
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="app">

<h1>🎸 Real Guitar App</h1>

<div class="panel">

<select id="rhythm">
<option value="down">↓ 다운</option>
<option value="up">↑ 업</option>
</select>

<div class="speedBox">
<label>속도</label>
<input type="range" id="speed" min="400" max="2000" value="1200">
</div>

<button onclick="playChord(event)">▶ 연주</button>

</div>

<div class="box">
<strong>메이저</strong>
<div id="major" class="list"></div>
</div>

<div class="box">
<strong>마이너</strong>
<div id="minor" class="list"></div>
</div>

<div class="box">
<strong># 코드</strong>
<div id="sharp" class="list"></div>
</div>

<div class="guitar" id="guitar"></div>

</div>

<script>

const ctx = new (window.AudioContext||window.webkitAudioContext)();

const tuning=[82.41,110,146.83,196,246.94,329.63];

const chords={
C:[-1,3,2,0,1,0],
D:[-1,-1,0,2,3,2],
E:[0,2,2,1,0,0],
F:[1,3,3,2,1,1],
G:[3,2,0,0,0,3],
A:[-1,0,2,2,2,0],
B:[-1,2,4,4,4,2],

Am:[-1,0,2,2,1,0],
Em:[0,2,2,0,0,0],
Dm:[-1,-1,0,2,3,1],

Csharp:[-1,4,6,6,6,-1],
Dsharp:[-1,-1,1,3,4,3],
Fsharp:[2,4,4,3,2,2]
};

let currentChord="C";
let isPlaying=false;
let loopTimer=null;

const groups={
major:["C","D","E","F","G","A","B"],
minor:["Am","Em","Dm"],
sharp:["Csharp","Dsharp","Fsharp"]
};

let activeBtn=null;

function fill(id){
groups[id].forEach(c=>{
let b=document.createElement("button");
b.innerText=c;

b.onclick=()=>{

currentChord=c;

if(activeBtn) activeBtn.classList.remove("active");
b.classList.add("active");
activeBtn=b;

};

document.getElementById(id).appendChild(b);
});
}

fill("major");
fill("minor");
fill("sharp");

const guitar=document.getElementById("guitar");

for(let i=1;i<=12;i++){
let f=document.createElement("div");
f.className="fret";
f.style.left=(i*7.5)+"%";
guitar.appendChild(f);
}

const strings=[];

for(let i=0;i<6;i++){
let s=document.createElement("div");
s.className="string";
s.style.top=(40+i*35)+"px";

s.onclick=()=>playString(i);

guitar.appendChild(s);
strings.push(s);
}

function play(freq,vel=1){
const o=ctx.createOscillator();
const g=ctx.createGain();

o.type="sawtooth";
o.frequency.value=freq;

g.gain.setValueAtTime(0.0001,ctx.currentTime);
g.gain.exponentialRampToValueAtTime(0.25*vel,ctx.currentTime+0.01);
g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.8);

o.connect(g);
g.connect(ctx.destination);

o.start();
o.stop(ctx.currentTime+0.8);
}

function freq(base,fret){
return base*Math.pow(2,fret/12);
}

function playString(i){
play(tuning[i]);
}

// 스트럼 (down / up만)
function strum(dir){

const shape=chords[currentChord];

let order=[0,1,2,3,4,5];
if(dir==="up") order=order.reverse();

let t=0;

order.forEach(i=>{

const f=shape[i];
if(f===-1)return;

t+=25+Math.random()*20;

setTimeout(()=>{

play(freq(tuning[i],f),1-(i*0.1));

strings[i].style.background="#ffe066";
setTimeout(()=>strings[i].style.background="#ddd",100);

},t);

});

}

function getSpeed(){
return Number(document.getElementById("speed").value);
}

function loopPlay(){
if(!isPlaying) return;

strum(document.getElementById("rhythm").value);

loopTimer=setTimeout(loopPlay,getSpeed());
}

function playChord(e){

const btn=e.target;

if(!isPlaying){
isPlaying=true;
btn.innerText="⏹ 정지";
loopPlay();
}else{
isPlaying=false;
btn.innerText="▶ 연주";
clearTimeout(loopTimer);
}

}

</script>

</body>
</html>
