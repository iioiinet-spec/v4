<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>3D 웹 점프맵 게임 - 이모션 업데이트</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #0f0e17; }
        
        /* 왼쪽 상단 통합 컨테이너 */
        #left-container {
            position: absolute;
            top: 20px; left: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
            width: 280px;
        }

        /* 게임 상태판 */
        #ui {
            color: white; font-size: 16px;
            background: rgba(0,0,0,0.75); padding: 15px; border-radius: 8px;
            pointer-events: none; line-height: 1.5;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .highlight { color: #ffeb3b; font-weight: bold; }
        .level-up { color: #2ecc71; font-weight: bold; }

        /* [신규] 이모션 패널 UI */
        #emotion-box {
            background: rgba(0, 0, 0, 0.75);
            border-radius: 8px; padding: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        #emotion-box h3 { margin: 0 0 8px 0; color: #fff; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 4px; }
        .btn-group { display: flex; gap: 6px; }
        .emotion-btn {
            flex: 1; padding: 8px 0; border: none; border-radius: 4px;
            cursor: pointer; font-weight: bold; font-size: 12px;
            transition: background 0.2s, transform 0.1s;
        }
        #btn-smile { background: #f1c40f; color: #000; }
        #btn-sad { background: #3498db; color: #fff; }
        #btn-dance { background: #e74c3c; color: #fff; }
        .emotion-btn:hover { transform: scale(1.05); filter: brightness(1.1); }

        /* 미니 채팅창 */
        #comment-box {
            background: rgba(0, 0, 0, 0.75);
            border-radius: 8px; padding: 12px; display: flex; flex-direction: column;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            height: 160px; /* 이모션 창 자리를 위해 높이 살짝 조절 */
        }
        #comment-box h3 { margin: 0 0 8px 0; color: #fff; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 4px; }
        #comment-list { flex: 1; overflow-y: auto; margin-bottom: 8px; padding-right: 2px; }
        .comment-item { background: rgba(255,255,255,0.15); padding: 6px 10px; border-radius: 4px; margin-bottom: 6px; font-size: 12px; line-height: 1.4; color: #fff; }
        .comment-meta { font-size: 10px; color: #bbb; margin-bottom: 2px; }
        #comment-form { display: flex; gap: 4px; }
        #comment-input { flex: 1; padding: 6px; border: none; border-radius: 4px; font-size: 12px; background: rgba(255,255,255,0.9); color: #000; }
        #comment-btn { padding: 6px 10px; background: #0055ff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }

        /* 하단 안내 */
        #instructions {
            position: absolute;
            bottom: 20px; left: 50%; transform: translateX(-50%);
            color: white; font-size: 14px; background: rgba(0,0,0,0.7);
            padding: 10px 20px; border-radius: 20px; text-align: center; z-index: 10;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="left-container">
        <div id="ui">
            <div>현재 등급: <span id="levelNum" class="level-up">LV.1 비기너</span></div>
            <div>현재 구역: Stage <span id="stageNum">1</span> / 60</div>
            <div>최근 세이브: <span id="saveNum" class="highlight">시작 지점</span></div>
        </div>

        <div id="emotion-box">
            <h3>캐릭터 이모션 (감정 표현)</h3>
            <div class="btn-group">
                <button class="emotion-btn" id="btn-smile">😀 웃기</button>
                <button class="emotion-btn" id="btn-sad">😭 슬픔</button>
                <button class="emotion-btn" id="btn-dance">🕺 댄스</button>
            </div>
        </div>

        <div id="comment-box">
            <h3>방명록 & 채팅</h3>
            <div id="comment-list"></div>
            <div id="comment-form">
                <input type="text" id="comment-input" placeholder="메시지 입력..." maxlength="50">
                <button id="comment-btn">전송</button>
            </div>
        </div>
    </div>

    <div id="instructions">이동: WASD / 화살표 | 점프: 스페이스바 | 화면 회전: 마우스 드래그<br>이모션 버튼을 눌러 감정을 표현해 보세요!</div>

    <script>
        // --- 1. 기본 3D 세팅 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f0e17);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 25, 10);
        scene.add(dirLight);

        // --- 2. 플레이어 표정 텍스처 관리 (Smile / Sad 변경 기능 포함) ---
        let currentEmotion = "smile"; // 현재 감정 상태 변수 (smile, sad, dance)

        function drawFace(type) {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#ffdbac';
            ctx.fillRect(0, 0, 256, 256);

            // 눈 그리기
            ctx.fillStyle = '#111111';
            ctx.beginPath();
            ctx.arc(85, 110, 15, 0, Math.PI * 2);
            ctx.arc(171, 110, 15, 0, Math.PI * 2);
            ctx.fill();

            // 입 그리기 (타입에 따른 분기)
            ctx.strokeStyle = '#111111';
            ctx.lineWidth = 10; ctx.lineCap = 'round';
            ctx.beginPath();
            if (type === "sad") {
                // 울상/슬픈 표정 (위로 볼록한 호)
                ctx.arc(128, 175, 35, 1.1 * Math.PI, 1.9 * Math.PI);
            } else {
                // 웃는 표정 (아래로 볼록한 호)
                ctx.arc(128, 140, 45, 0.1 * Math.PI, 0.9 * Math.PI);
            }
            ctx.stroke();

            return new THREE.CanvasTexture(canvas);
        }

        // 초기 기본 텍스처 로드
        const smileTexture = drawFace("smile");
        const sadTexture = drawFace("sad");

        // --- 3. 사람 캐릭터 생성 ---
        const playerGroup = new THREE.Group();
        scene.add(playerGroup);

        const plasticMat = (color) => new THREE.MeshStandardMaterial({ color: color, roughness: 0.5 });
        
        // 머리 세팅 (앞면에 smileTexture를 기본 장착)
        const headMaterials = [
            plasticMat(0xffdbac), plasticMat(0xffdbac), plasticMat(0xffdbac),
            plasticMat(0xffdbac), new THREE.MeshStandardMaterial({ map: smileTexture, roughness: 0.5 }), plasticMat(0xffdbac)
        ];

        const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), headMaterials);
        head.position.y = 1.3;
        playerGroup.add(head);

        const torso = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 0.6), plasticMat(0x0055ff));
        torso.position.y = 0.4;
        playerGroup.add(torso);

        const leftArm = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.0, 0.4), plasticMat(0xffdbac));
        leftArm.position.set(-0.8, 0.4, 0);
        const rightArm = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.0, 0.4), plasticMat(0xffdbac));
        rightArm.position.set(0.8, 0.4, 0);
        playerGroup.add(leftArm, rightArm);

        const leftLeg = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1.0, 0.5), plasticMat(0x00aa00));
        leftLeg.position.set(-0.35, -0.6, 0);
        const rightLeg = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1.0, 0.5), plasticMat(0x00aa00));
        rightLeg.position.set(0.35, -0.6, 0);
        playerGroup.add(leftLeg, rightLeg);

        // 물리 및 상태 변수
        let respawnPosition = new THREE.Vector3(0, 5, 0); 
        let pos = new THREE.Vector3(0, 5, 0);
        let vel = new THREE.Vector3(0, 0, 0);
        const gravity = -0.015;
        const jumpForce = 0.35;
        const moveSpeed = 0.12;
        let isGrounded = false;

        const keys = { Forward: false, Backward: false, Left: false, Right: false, Jump: false };

        // --- 4. 60스테이지 맵 생성 ---
        const platforms = [];
        const numPlatforms = 60; 
        let nextPos = new THREE.Vector3(0, 0, 0);

        createPlatform(0, -0.5, 0, 15, 1, 15, "normal", 0x4e54c8, 0);

        for(let i = 1; i <= numPlatforms; i++) {
            let difficultyRatio = i / numPlatforms; 
            let zGap = 6 + (difficultyRatio * 6.5); 
            let xGap = (Math.random() - 0.5) * (2 + difficultyRatio * 8); 
            let yGap = 0.2 + (difficultyRatio * 0.9); 
            
            nextPos.x += xGap; nextPos.y += yGap; nextPos.z += zGap;

            let sizeX = Math.max(2.0, 8.0 - (difficultyRatio * 6.0));
            let sizeZ = Math.max(2.0, 8.0 - (difficultyRatio * 6.0));

            let type = "normal";
            let color = new THREE.Color(`hsl(${(i * 15) % 360}, 85%, 60%)`);

            if (i % 7 === 0 && i !== numPlatforms) {
                type = "checkpoint"; color = new THREE.Color(0xffeb3b);
                sizeX = Math.max(4, sizeX); sizeZ = Math.max(4, sizeZ);
            }
            createPlatform(nextPos.x, nextPos.y - 0.25, nextPos.z, sizeX, 0.5, sizeZ, type, color, i);
        }

        function createPlatform(x, y, z, w, h, d, type, color, stageIndex) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mat = new THREE.MeshStandardMaterial({ 
                color: color, roughness: 0.4,
                emissive: type === "checkpoint" ? color : 0x000000,
                emissiveIntensity: type === "checkpoint" ? 0.3 : 0
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, y, z);
            scene.add(mesh);
            
            platforms.push({
                mesh: mesh, minX: x - w/2, maxX: x + w/2, minY: y - h/2, maxY: y + h/2, minZ: z - d/2, maxZ: z + d/2,
                type: type, stage: stageIndex, spawnX: x, spawnY: y + h/2 + 2, spawnZ: z 
            });
        }

        // --- 5. 조작 이벤트 ---
        window.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName === 'INPUT') return;
            // 움직이면 댄스 이모션 상태 탈출 해제
            if (['KeyW', 'KeyA', 'KeyS', 'KeyD', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
                if(currentEmotion === "dance") currentEmotion = "smile";
            }
            if (e.code === 'KeyW' || e.code === 'ArrowUp') keys.Forward = true;
            if (e.code === 'KeyS' || e.code === 'ArrowDown') keys.Backward = true;
            if (e.code === 'KeyA' || e.code === 'ArrowLeft') keys.Left = true;
            if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.Right = true;
            if (e.code === 'Space') keys.Jump = true;
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'KeyW' || e.code === 'ArrowUp') keys.Forward = false;
            if (e.code === 'KeyS' || e.code === 'ArrowDown') keys.Backward = false;
            if (e.code === 'KeyA' || e.code === 'ArrowLeft') keys.Left = false;
            if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.Right = false;
            if (e.code === 'Space') keys.Jump = false;
        });

        let cameraAngle = 0;
        window.addEventListener('mousemove', (e) => {
            if (e.clientX < 320 && e.clientY < 520) return; // UI 패널 스킵 레이아웃 확장
            if (e.buttons === 1) cameraAngle -= e.movementX * 0.005;
        });

        function playerDie() {
            pos.copy(respawnPosition);
            vel.set(0, 0, 0);
            if(currentEmotion === "dance") currentEmotion = "smile";
        }

        function updateLevel(stage) {
            let levelStr = "LV.1 비기너";
            if (stage >= 40) levelStr = "LV.3 점프 마스터 👑";
            else if (stage >= 20) levelStr = "LV.2 고수 ⚡";
            document.getElementById('levelNum').innerText = levelStr;
        }

        // --- 6. 메인 게임 루프 및 이모션 애니메이션 ---
        let currentStage = 0;

        function animate() {
            requestAnimationFrame(animate);

            let moveX = 0; let moveZ = 0;
            if (document.activeElement.tagName !== 'INPUT') {
                if (keys.Forward) moveZ += moveSpeed;
                if (keys.Backward) moveZ -= moveSpeed;
                if (keys.Left) moveX += moveSpeed;
                if (keys.Right) moveX -= moveSpeed;
            }

            // 댄스 중에는 제자리 정지
            if (currentEmotion === "dance") { moveX = 0; moveZ = 0; }

            vel.x = moveX * Math.cos(cameraAngle) + moveZ * Math.sin(cameraAngle);
            vel.z = -moveX * Math.sin(cameraAngle) + moveZ * Math.cos(cameraAngle);

            if(moveX !== 0 || moveZ !== 0) {
                playerGroup.rotation.y = Math.atan2(vel.x, vel.z);
            }

            vel.y += gravity;
            if (keys.Jump && isGrounded && document.activeElement.tagName !== 'INPUT') { 
                vel.y = jumpForce; isGrounded = false; 
                if(currentEmotion === "dance") currentEmotion = "smile";
            }
            pos.add(vel);

            if (pos.y < -20) playerDie();

            isGrounded = false;
            const pRadius = 0.4;
            
            for (let plat of platforms) {
                if (pos.x + pRadius > plat.minX && pos.x - pRadius < plat.maxX &&
                    pos.z + pRadius > plat.minZ && pos.z - pRadius < plat.maxZ) {
                    
                    if (pos.y - 1.1 <= plat.maxY && pos.y - 1.1 >= plat.minY && vel.y <= 0) {
                        pos.y = plat.maxY + 1.1; vel.y = 0; isGrounded = true;
                        
                        if (plat.type === "checkpoint" && respawnPosition.z < plat.spawnZ) {
                            respawnPosition.set(plat.spawnX, plat.spawnY, plat.spawnZ);
                            document.getElementById('saveNum').innerText = "Stage " + (plat.stage + 1);
                        }
                        if(plat.stage > currentStage) {
                            currentStage = plat.stage;
                            document.getElementById('stageNum').innerText = currentStage + 1;
                            updateLevel(currentStage + 1);
                        }
                    }
                }
            }

            playerGroup.position.copy(pos);

            // --- 실시간 표정/애니메이션 제어 갱신 ---
            // 표정 매핑 업데이트
            if (currentEmotion === "sad") {
                head.material[4].map = sadTexture;
            } else {
                head.material[4].map = smileTexture; // 평소 및 댄스 시 웃는 얼굴
            }
            head.material[4].needsUpdate = true;

            const time = Date.now() * 0.008;

            if (currentEmotion === "dance") {
                // [이모션: 댄스] 팔다리를 양옆, 위아래로 흔들며 몸을 흔드는 댄스 동작 
                playerGroup.position.y = pos.y + Math.abs(Math.sin(time * 1.5)) * 0.2; // 들썩들썩
                playerGroup.rotation.y = time * 0.5; // 빙글빙글 회전
                leftArm.rotation.z = -Math.sin(time * 2) * 0.8 - 0.5;
                rightArm.rotation.z = Math.sin(time * 2) * 0.8 + 0.5;
                leftLeg.rotation.x = Math.sin(time * 2) * 0.4;
                rightLeg.rotation.x = -Math.sin(time * 2) * 0.4;
            } else if (isGrounded && (moveX !== 0 || moveZ !== 0)) {
                // 일반 달리기 애니메이션
                playerGroup.rotation.z = 0;
                leftLeg.rotation.x = Math.sin(time) * 0.5; rightLeg.rotation.x = -Math.sin(time) * 0.5;
                leftArm.rotation.x = -Math.sin(time) * 0.5; rightArm.rotation.x = Math.sin(time) * 0.5;
                leftArm.rotation.z = 0; rightArm.rotation.z = 0;
            } else if (!isGrounded) {
                // 공중 체공 포즈
                leftLeg.rotation.x = -0.2; rightLeg.rotation.x = 0.2;
                leftArm.rotation.z = -0.3; rightArm.rotation.z = 0.3;
            } else {
                // 기본 대기 상태
                leftLeg.rotation.x = 0; rightLeg.rotation.x = 0;
                leftArm.rotation.set(0,0,0); rightArm.rotation.set(0,0,0);
            }

            camera.position.x = pos.x - 10 * Math.sin(cameraAngle);
            camera.position.z = pos.z - 10 * Math.cos(cameraAngle);
            camera.position.y = pos.y + 4;
            camera.lookAt(pos.x, pos.y + 0.5, pos.z);

            renderer.render(scene, camera);
        }

        // --- 7. 이모션 버튼 이벤트 바인딩 ---
        document.getElementById('btn-smile').addEventListener('click', () => { currentEmotion = "smile"; });
        document.getElementById('btn-sad').addEventListener('click', () => { currentEmotion = "sad"; });
        document.getElementById('btn-dance').addEventListener('click', () => { currentEmotion = "dance"; });

        // --- 8. 로컬 채팅 시스템 로직 ---
        const commentList = document.getElementById('comment-list');
        const commentInput = document.getElementById('comment-input');
        const commentBtn = document.getElementById('comment-btn');

        let savedComments = JSON.parse(localStorage.getItem('mini_jump_comments_v2')) || [
            { text: "이모션 기능이 업데이트되었습니다!", time: "시스템" }
        ];

        function displayComments() {
            commentList.innerHTML = '';
            savedComments.forEach(c => {
                const div = document.createElement('div');
                div.className = 'comment-item';
                div.innerHTML = `<div class="comment-meta">${c.time}</div><div>${c.text}</div>`;
                commentList.appendChild(div);
            });
            commentList.scrollTop = commentList.scrollHeight;
        }

        function addComment() {
            const text = commentInput.value.trim();
            if(!text) return;
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
            savedComments.push({ text: text, time: timeStr });
            localStorage.setItem('mini_jump_comments_v2', JSON.stringify(savedComments));
            commentInput.value = '';
            displayComments();
        }

        commentBtn.addEventListener('click', addComment);
        commentInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') addComment(); });

        displayComments();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
