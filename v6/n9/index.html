<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BTS - Butter 바텀-다운 드럼 스테이지</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            background-color: #06070a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            padding: 10px;
        }

        /* ─── 상단 영역 ─── */
        .top-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 5px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5px;
        }

        header h1 {
            font-size: 1.2rem;
            color: #facc15;
            text-shadow: 0 0 10px rgba(250, 204, 21, 0.3);
        }

        header p {
            font-size: 0.75rem;
            color: #64748b;
        }

        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #11121a;
            padding: 8px 12px;
            border-radius: 12px;
            gap: 15px;
        }

        .btn-auto {
            padding: 8px 18px;
            font-size: 0.85rem;
            font-weight: bold;
            color: #000;
            background: linear-gradient(135deg, #facc15, #eab308);
            border: none;
            border-radius: 15px;
            cursor: pointer;
            min-width: 150px;
            box-shadow: 0 4px 10px rgba(250, 204, 21, 0.2);
            transition: all 0.2s;
        }

        .btn-auto.playing {
            color: #fff;
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3);
        }

        .select-kit {
            padding: 5px 10px;
            font-size: 0.8rem;
            font-weight: bold;
            background-color: #1a1b26;
            color: #facc15;
            border: 1px solid #eab308;
            border-radius: 15px;
            outline: none;
        }

        .bpm-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            color: #94a3b8;
            flex-grow: 1;
            justify-content: flex-end;
        }

        .bpm-slider {
            width: 80px;
            accent-color: #facc15;
        }

        .visualizer-container {
            width: 100%;
            height: 120px;
            background: #0d0e15;
            border-radius: 12px;
            border: 1px solid #1a1b26;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* ─── 하단 영역: 전체 패드를 화면 아래쪽으로 완전 하강 정렬 ─── */
        .bottom-section {
            flex-grow: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end; /* 기존 center에서 하단 밀착 정렬로 변경 */
            position: relative;
            padding-bottom: 25px; /* 기기 하단 가치선 침범 방지 여백 */
        }

        .drum-rack {
            position: relative;
            width: 420px;
            height: 420px;
        }

        .drum-pad {
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            box-shadow: 0 8px 16px rgba(0,0,0,0.6), inset 0 0 16px rgba(0,0,0,0.4);
            transition: transform 0.04s ease, filter 0.04s ease;
            text-align: center;
        }

        .drum-pad span {
            font-size: 0.65rem;
            opacity: 0.8;
            margin-top: 3px;
        }

        /* 빅 패드 크기 세팅 유지 */
        #kick {
            width: 125px; height: 125px; left: 147px; top: 215px;
            background: radial-gradient(circle, #ff2a2a 0%, #700000 100%);
            border: 5px solid #ff6b6b; font-size: 1.1rem;
        }

        #snare {
            width: 105px; height: 105px; left: 30px; top: 220px;
            background: radial-gradient(circle, #3b82f6 0%, #1e3a8a 100%);
            border: 4px solid #60a5fa; font-size: 1rem;
        }

        #hihat {
            width: 90px; height: 90px; left: -15px; top: 120px;
            background: radial-gradient(circle, #eab308 0%, #713f12 100%);
            border: 4px solid #fde047; font-size: 0.95rem;
        }

        #crash {
            width: 110px; height: 110px; left: 25px; top: 5px;
            background: radial-gradient(circle, #10b981 0%, #064e3b 100%);
            border: 4px solid #34d399; font-size: 1rem;
        }

        #tomHigh {
            width: 92px; height: 92px; left: 110px; top: 110px;
            background: radial-gradient(circle, #a855f7 0%, #4a044e 100%);
            border: 4px solid #c084fc; font-size: 0.9rem;
        }

        #tomMid {
            width: 96px; height: 96px; right: 110px; top: 110px;
            background: radial-gradient(circle, #ec4899 0%, #701a75 100%);
            border: 4px solid #f472b6; font-size: 0.9rem;
        }

        #tomFloor {
            width: 112px; height: 112px; right: 20px; top: 215px;
            background: radial-gradient(circle, #6366f1 0%, #312e81 100%);
            border: 4px solid #818cf8; font-size: 1rem;
        }

        #ride {
            width: 115px; height: 115px; right: 20px; top: -5px;
            background: radial-gradient(circle, #f97316 0%, #7c2d12 100%);
            border: 4px solid #fb923c; font-size: 1rem;
        }

        .drum-pad.active {
            transform: scale(0.90);
            filter: brightness(1.5);
        }

        /* 모바일 모드 레이아웃 유지 */
        @media (max-width: 430px) {
            .bottom-section { padding-bottom: 15px; }
            .drum-rack { width: 350px; height: 350px; }
            #kick { width: 105px; height: 105px; left: 122px; top: 180px; font-size: 0.95rem; }
            #snare { width: 85px; height: 85px; left: 25px; top: 185px; font-size: 0.85rem; }
            #hihat { width: 75px; height: 75px; left: -10px; top: 100px; font-size: 0.8rem; }
            #crash { width: 90px; height: 90px; left: 25px; top: 5px; font-size: 0.85rem; }
            #tomHigh { width: 78px; height: 78px; left: 90px; top: 95px; font-size: 0.8rem; }
            #tomMid { width: 82px; height: 82px; right: 90px; top: 95px; font-size: 0.8rem; }
            #tomFloor { width: 92px; height: 92px; right: 15px; top: 180px; font-size: 0.85rem; }
            #ride { width: 95px; height: 95px; right: 15px; top: -5px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <div class="top-section">
        <header>
            <h1>BTS - Butter (Bottom Pad Edition)</h1>
            <p>드럼 패드가 아래로 내려가 타격 시 화면이 덜 가려집니다.</p>
        </header>

        <div class="control-row">
            <button class="btn-auto" id="btnAuto">BTS - Butter 자동연주</button>
            <select class="select-kit" id="kitSelect">
                <option value="electronic">⚡ ELECTRONIC</option>
                <option value="acoustic" selected>🥁 ACOUSTIC</option>
                <option value="retro">👾 8-BIT RETRO</option>
            </select>
            <div class="bpm-container">
                <input type="range" id="bpmSlider" class="bpm-slider" min="60" max="200" value="110">
                <span id="bpmDisplay">110 BPM</span>
            </div>
        </div>

        <div class="visualizer-container">
            <canvas id="visualizer"></canvas>
        </div>
    </div>

    <div class="bottom-section">
        <div class="drum-rack">
            <div class="drum-pad" id="crash">CRASH<span>[콰앙]</span></div>
            <div class="drum-pad" id="ride">RIDE<span>[띵-]</span></div>
            <div class="drum-pad" id="tomHigh">H-TOM<span>[둥]</span></div>
            <div class="drum-pad" id="tomMid">M-TOM<span>[동]</span></div>
            <div class="drum-pad" id="hihat">HI-HAT<span>[칰]</span></div>
            <div class="drum-pad" id="snare">SNARE<span>[착]</span></div>
            <div class="drum-pad" id="tomFloor">F-TOM<span>[둠]</span></div>
            <div class="drum-pad" id="kick">KICK<span>[쿵]</span></div>
        </div>
    </div>

    <script>
        let audioCtx = null;
        let analyser = null;
        let isAutoPlaying = false;
        let autoPlayTimer = null;
        let currentStep = 0;

        const canvas = document.getElementById('visualizer');
        const canvasCtx = canvas.getContext('2d');
        const pads = document.querySelectorAll('.drum-pad');
        const btnAuto = document.getElementById('btnAuto');
        const kitSelect = document.getElementById('kitSelect');
        const bpmSlider = document.getElementById('bpmSlider');
        const bpmDisplay = document.getElementById('bpmDisplay');

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 128;
            analyser.connect(audioCtx.destination);
            renderTopSpectrum();
        }

        function createNoiseBuffer() {
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            return buffer;
        }

        // --- 사운드 제네레이션 엔진 ---
        function playKick(now, currentKit) {
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            if (currentKit === 'electronic') {
                const subOsc = audioCtx.createOscillator();
                subOsc.type = 'sine'; subOsc.frequency.setValueAtTime(180, now);
                subOsc.frequency.exponentialRampToValueAtTime(42, now + 0.12);
                osc.type = 'triangle'; osc.frequency.setValueAtTime(160, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.08);
                gainNode.gain.setValueAtTime(1.4, now);
                subOsc.connect(gainNode); subOsc.start(now); subOsc.stop(now + 0.35);
            } else if (currentKit === 'acoustic') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(105, now);
                osc.frequency.exponentialRampToValueAtTime(48, now + 0.12);
                gainNode.gain.setValueAtTime(1.2, now);
            } else {
                osc.type = 'square'; osc.frequency.setValueAtTime(95, now);
                osc.frequency.setValueAtTime(15, now + 0.06);
                gainNode.gain.setValueAtTime(0.7, now);
            }
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
            osc.connect(gainNode); gainNode.connect(analyser);
            osc.start(now); osc.stop(now + 0.35);
        }

        function playSnare(now, currentKit) {
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            const noise = audioCtx.createBufferSource();
            const noiseFilter = audioCtx.createBiquadFilter();
            const noiseGain = audioCtx.createGain();
            noise.buffer = createNoiseBuffer();

            if (currentKit === 'electronic') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(180, now);
                noiseFilter.type = 'highpass'; noiseFilter.frequency.value = 1000;
                gainNode.gain.setValueAtTime(0.5, now); noiseGain.gain.setValueAtTime(0.7, now);
            } else if (currentKit === 'acoustic') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(190, now);
                noiseFilter.type = 'bandpass'; noiseFilter.frequency.value = 1400;
                gainNode.gain.setValueAtTime(0.4, now); noiseGain.gain.setValueAtTime(0.6, now);
            } else {
                osc.type = 'square'; osc.frequency.setValueAtTime(320, now);
                noiseFilter.type = 'lowpass'; noiseFilter.frequency.value = 800;
                gainNode.gain.setValueAtTime(0.6, now); noiseGain.gain.setValueAtTime(0.4, now);
            }
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.12);
            noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 0.18);
            osc.connect(gainNode); gainNode.connect(analyser);
            noise.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(analyser);
            osc.start(now); noise.start(now); osc.stop(now + 0.2); noise.stop(now + 0.2);
        }

        function playTom(now, pitch, currentKit) {
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = (currentKit === 'electronic') ? 'triangle' : 'sine';
            osc.frequency.setValueAtTime(pitch, now);
            osc.frequency.exponentialRampToValueAtTime(pitch * 0.52, now + 0.15);
            gainNode.gain.setValueAtTime(0.7, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.22);
            osc.connect(gainNode); gainNode.connect(analyser);
            osc.start(now); osc.stop(now + 0.22);
        }

        function playHiHat(now, currentKit, isOpen = false) {
            const noise = audioCtx.createBufferSource();
            const filter = audioCtx.createBiquadFilter();
            const gain = audioCtx.createGain();
            noise.buffer = createNoiseBuffer();
            filter.type = 'highpass'; filter.frequency.value = currentKit === 'acoustic' ? 10500 : 7500;
            
            const duration = isOpen ? 0.25 : 0.05;
            gain.gain.setValueAtTime(isOpen ? 0.2 : 0.25, now);
            gain.gain.exponentialRampToValueAtTime(0.005, now + duration);
            
            noise.connect(filter); filter.connect(gain); gain.connect(analyser);
            noise.start(now); noise.stop(now + duration);
        }

        function playRide(now, currentKit) {
            const noise = audioCtx.createBufferSource();
            const filter = audioCtx.createBiquadFilter();
            const gain = audioCtx.createGain();
            noise.buffer = createNoiseBuffer();
            filter.type = 'bandpass'; filter.frequency.value = 8500;
            gain.gain.setValueAtTime(0.25, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            noise.connect(filter); filter.connect(gain); gain.connect(analyser);
            noise.start(now); noise.stop(now + 0.5);
        }

        function playCrash(now, currentKit) {
            const noise = audioCtx.createBufferSource();
            const filter = audioCtx.createBiquadFilter();
            const gain = audioCtx.createGain();
            noise.buffer = createNoiseBuffer();
            filter.type = 'highpass'; filter.frequency.value = 5000;
            gain.gain.setValueAtTime(0.4, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 1.2);
            noise.connect(filter); filter.connect(gain); gain.connect(analyser);
            noise.start(now); noise.stop(now + 1.2);
        }

        function triggerDrumSound(id, opt = false) {
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const now = audioCtx.currentTime;
            const currentKit = kitSelect.value;

            if (id === 'kick') playKick(now, currentKit);
            else if (id === 'snare') playSnare(now, currentKit);
            else if (id === 'hihat') playHiHat(now, currentKit, opt);
            else if (id === 'crash') playCrash(now, currentKit);
            else if (id === 'ride') playRide(now, currentKit);
            else if (id === 'tomHigh') playTom(now, 220, currentKit);
            else if (id === 'tomMid') playTom(now, 160, currentKit);
            else if (id === 'tomFloor') playTom(now, 110, currentKit);

            const padEl = document.getElementById(id);
            if (padEl) {
                padEl.classList.add('active');
                setTimeout(() => padEl.classList.remove('active'), 60);
            }
        }

        // --- BTS - Butter 32스텝 디스코 그루브 시퀀서 ---
        function runSequence() {
            const bpm = parseInt(bpmSlider.value);
            const stepTempo = (60 / bpm) / 4; 

            autoPlayTimer = setTimeout(() => {
                const step = currentStep % 32;

                if (step === 0) triggerDrumSound('crash');

                if (step === 0 || step === 4 || step === 8 || step === 12 || 
                    step === 16 || step === 20 || step === 24 || step === 28) {
                    triggerDrumSound('kick');
                }

                if (step === 4 || step === 12 || step === 20 || step === 26) {
                    triggerDrumSound('snare');
                }

                if (step % 2 === 0) {
                    const isOpen = (step === 2 || step === 6 || step === 10 || step === 14 || step === 18 || step === 22);
                    triggerDrumSound('hihat', isOpen);
                }

                if (step === 14) triggerDrumSound('tomHigh');
                if (step === 15) triggerDrumSound('tomMid');
                if (step === 30) triggerDrumSound('tomMid');
                if (step === 31) triggerDrumSound('tomFloor');

                currentStep++;
                if (isAutoPlaying) runSequence();
            }, stepTempo * 1000);
        }

        function toggleAutoPlay() {
            initAudio();
            if (isAutoPlaying) {
                isAutoPlaying = false;
                clearTimeout(autoPlayTimer);
                btnAuto.textContent = "BTS - Butter 자동연주";
                btnAuto.classList.remove('playing');
                currentStep = 0;
            } else {
                isAutoPlaying = true;
                btnAuto.textContent = "연주 정지 (STOP)";
                btnAuto.classList.add('playing');
                runSequence();
            }
        }

        bpmSlider.addEventListener('input', () => {
            bpmDisplay.textContent = `${bpmSlider.value} BPM`;
        });
        btnAuto.addEventListener('click', toggleAutoPlay);

        // [상단 옐로우 스펙트럼 디스플레이]
        function renderTopSpectrum() {
            requestAnimationFrame(renderTopSpectrum);
            const width = canvas.width = canvas.parentElement.clientWidth;
            const height = canvas.height = canvas.parentElement.clientHeight;

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            canvasCtx.fillStyle = '#06070a';
            canvasCtx.fillRect(0, 0, width, height);

            canvasCtx.strokeStyle = 'rgba(250, 204, 21, 0.03)';
            canvasCtx.lineWidth = 1;
            for(let i = 0; i < width; i += 40) {
                canvasCtx.beginPath(); canvasCtx.moveTo(i, 0); canvasCtx.lineTo(i, height); canvasCtx.stroke();
            }

            const barWidth = (width / bufferLength) * 1.2;
            let barHeight;
            let x = 0;

            for (let i = 0; i < bufferLength; i++) {
                barHeight = (dataArray[i] / 255) * height * 0.85;
                canvasCtx.fillStyle = `hsl(${45 + (i * 0.4)}, 100%, ${45 + (dataArray[i]/5)}%)`;
                canvasCtx.fillRect(x, height - barHeight, barWidth - 3, barHeight);
                x += barWidth;
            }
        }

        pads.forEach(pad => {
            const hitEvent = (e) => {
                e.preventDefault();
                triggerDrumSound(pad.id);
            };
            pad.addEventListener('mousedown', hitEvent);
            pad.addEventListener('touchstart', hitEvent, { passive: false });
        });
    </script>
</body>
</html>
