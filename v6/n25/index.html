<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MINI FL STUDIO FINAL INFO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
width:100%;
height:100%;
background:#050505;
color:white;
font-family:Arial;
overflow:hidden;
}

header{
height:60px;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:#111;
}

button{
background:#222;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

button.active{
background:#00ffff;
color:black;
}

.main{
display:flex;
height:calc(100% - 60px);
}

/* LEFT */
.left{
width:65%;
display:flex;
flex-direction:column;
}

.panel{
flex:1;
display:none;
justify-content:center;
align-items:center;
gap:10px;
}

.panel.active{display:flex;}

.white,.string,.bass,.pad{
transition:0.1s;
user-select:none;
cursor:pointer;
}

.white{width:60px;height:200px;background:white;border:1px solid #000;}
.string{width:400px;height:3px;background:#aaa;margin:8px;}
.bass{width:300px;height:5px;background:#666;margin:10px;}

.pad{
width:90px;height:90px;border-radius:50%;
background:#222;
display:flex;
align-items:center;
justify-content:center;
}

.active{
background:#00ffff !important;
transform:scale(0.95);
box-shadow:0 0 15px #00ffff;
}

/* RIGHT AREA */
.right{
width:35%;
background:#111;
display:flex;
flex-direction:column;
overflow:auto;
}

/* MIXER */
.mixer{
padding:10px;
border-bottom:1px solid #222;
}

.slider{
margin-bottom:10px;
}

input{width:100%;}

/* INFO */
.info{
padding:10px;
font-size:13px;
line-height:1.6;
color:#ccc;
}

.info h3{
color:#00ffff;
margin-bottom:6px;
}
</style>
</head>

<body>

<header>
<div>🎛 FINAL MINI FL STUDIO</div>
<div>
<button class="tab active" data-t="piano">Piano</button>
<button class="tab" data-t="guitar">Guitar</button>
<button class="tab" data-t="bass">Bass</button>
<button class="tab" data-t="drums">Drums</button>
</div>
</header>

<div class="main">

<!-- LEFT -->
<div class="left">
<div id="piano" class="panel active"></div>
<div id="guitar" class="panel"></div>
<div id="bass" class="panel"></div>
<div id="drums" class="panel"></div>
</div>

<!-- RIGHT -->
<div class="right">

<div class="mixer">
<h3>🎚 MIXER</h3>

Piano <input id="vP" type="range" min="0" max="1" step="0.01" value="0.7">
Guitar <input id="vG" type="range" min="0" max="1" step="0.01" value="0.6">
Bass <input id="vB" type="range" min="0" max="1" step="0.01" value="0.8">
Drums <input id="vD" type="range" min="0" max="1" step="0.01" value="0.7">
</div>

<div class="info">
<h3>📘 사용 설명</h3>

🎹 Piano<br>
A S D F G H J K = 도레미파솔라시도<br><br>

🎸 Guitar<br>
Z X C V B = 기타 줄<br><br>

🎵 Bass<br>
Q W E R = 베이스 음<br><br>

🥁 Drums<br>
1~6 = 킥 / 스네어 / 하이햇<br><br>

🧠 TIP<br>
- 현재 선택된 악기만 키보드 작동<br>
- 클릭 + 키보드 둘 다 사용 가능<br>
- 오른쪽 슬라이더로 음량 조절
</div>

</div>

</div>

<script>

/* AUDIO */
const ctx = new (window.AudioContext||webkitAudioContext)();
const master = ctx.createGain();
master.gain.value = 0.8;
master.connect(ctx.destination);

document.addEventListener("pointerdown",()=>ctx.resume());

let current="piano";
let volP=0.7,volG=0.6,volB=0.8,volD=0.7;

/* UI refs */
const pianoKeys=[],guitarKeys=[],bassKeys=[],drumPads=[];

function flash(el){
if(!el) return;
el.classList.add("active");
setTimeout(()=>el.classList.remove("active"),120);
}

/* SOUND */
function play(freq,type,el){

const now=ctx.currentTime;
const mix=ctx.createGain();
mix.connect(master);

mix.gain.setValueAtTime(0.0001,now);
mix.gain.exponentialRampToValueAtTime(1,now+0.02);
mix.gain.exponentialRampToValueAtTime(0.0001,now+1);

function osc(w,m,v){
const o=ctx.createOscillator();
const g=ctx.createGain();

o.type=w;
o.frequency.value=freq*m;
g.gain.value=v;

o.connect(g);
g.connect(mix);

o.start(now);
o.stop(now+1);
}

/* instruments */
if(type==="piano"){
osc("sine",1,volP);
osc("sine",2,volP*0.3);
}

if(type==="guitar"){
osc("sawtooth",1,volG);
}

if(type==="bass"){
osc("square",0.5,volB);
}

if(type==="drums"){

const gMain = ctx.createGain();
gMain.connect(mix);
gMain.gain.value=volD;

if(freq<150){
const o=ctx.createOscillator();
const g=ctx.createGain();

o.type="sine";
o.frequency.setValueAtTime(140,now);
o.frequency.exponentialRampToValueAtTime(40,now+0.2);

g.gain.setValueAtTime(1,now);
g.gain.exponentialRampToValueAtTime(0.001,now+0.3);

o.connect(g);
g.connect(gMain);

o.start(now);
o.stop(now+0.3);
}
else if(freq<250){
const buffer=ctx.createBuffer(1,ctx.sampleRate*0.2,ctx.sampleRate);
const data=buffer.getChannelData(0);
for(let i=0;i<data.length;i++)data[i]=(Math.random()*2-1)*0.6;

const noise=ctx.createBufferSource();
noise.buffer=buffer;

const filter=ctx.createBiquadFilter();
filter.type="highpass";
filter.frequency.value=1200;

const g=ctx.createGain();
g.gain.value=0.6;

noise.connect(filter);
filter.connect(g);
g.connect(gMain);

noise.start(now);
noise.stop(now+0.2);
}
else{
const buffer=ctx.createBuffer(1,ctx.sampleRate*0.1,ctx.sampleRate);
const data=buffer.getChannelData(0);
for(let i=0;i<data.length;i++)data[i]=Math.random()*2-1;

const noise=ctx.createBufferSource();
const filter=ctx.createBiquadFilter();

filter.type="highpass";
filter.frequency.value=7000;

const g=ctx.createGain();
g.gain.value=0.4;

noise.buffer=buffer;
noise.connect(filter);
filter.connect(g);
g.connect(gMain);

noise.start(now);
noise.stop(now+0.08);
}
}

flash(el);
}

/* UI BUILD */
const piano=document.getElementById("piano");
[261,293,329,349,392,440,493,523].forEach((f,i)=>{
const k=document.createElement("div");
k.className="white";
k.onclick=()=>play(f,"piano",k);
piano.appendChild(k);
pianoKeys.push(k);
});

const guitar=document.getElementById("guitar");
for(let i=0;i<6;i++){
const s=document.createElement("div");
s.className="string";
s.onclick=()=>play(110*(i+1),"guitar",s);
guitar.appendChild(s);
guitarKeys.push(s);
}

const bass=document.getElementById("bass");
for(let i=0;i<4;i++){
const s=document.createElement("div");
s.className="bass";
s.onclick=()=>play(55*(i+1),"bass",s);
bass.appendChild(s);
bassKeys.push(s);
}

const drums=document.getElementById("drums");
for(let i=0;i<6;i++){
const p=document.createElement("div");
p.className="pad";
p.innerText=i+1;
p.onclick=()=>play(200+i*20,"drums",p);
drums.appendChild(p);
drumPads.push(p);
}

/* TAB */
document.querySelectorAll(".tab").forEach(b=>{
b.onclick=()=>{

document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
b.classList.add("active");

current=b.dataset.t;

document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
document.getElementById(current).classList.add("active");

};
});

/* MIXER */
document.getElementById("vP").oninput=e=>volP=e.target.value;
document.getElementById("vG").oninput=e=>volG=e.target.value;
document.getElementById("vB").oninput=e=>volB=e.target.value;
document.getElementById("vD").oninput=e=>volD=e.target.value;

/* KEYBOARD */
window.addEventListener("keydown",(e)=>{

const k=e.key.toLowerCase();

const pianoMap={a:0,s:1,d:2,f:3,g:4,h:5,j:6,k:7};
const pianoFreq=[261,293,329,349,392,440,493,523];

const guitarMap={z:0,x:1,c:2,v:3,b:4};
const bassMap={q:0,w:1,e:2,r:3};
const drumMap={"1":0,"2":1,"3":2,"4":3,"5":4,"6":5};

if(current==="piano" && pianoMap[k]!=null)
play(pianoFreq[pianoMap[k]],"piano",pianoKeys[pianoMap[k]]);

if(current==="guitar" && guitarMap[k]!=null)
play(110*(guitarMap[k]+1),"guitar",guitarKeys[guitarMap[k]]);

if(current==="bass" && bassMap[k]!=null)
play(55*(bassMap[k]+1),"bass",bassKeys[bassMap[k]]);

if(current==="drums" && drumMap[k]!=null)
play(200+drumMap[k]*20,"drums",drumPads[drumMap[k]]);

});

</script>

</body>
</html>
