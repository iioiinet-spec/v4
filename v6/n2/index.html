<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 포켓몬 카드 마스터 팩 ⚡</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle, #222, #050505);
            font-family: 'Noto Sans KR', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            overflow-x: hidden;
            padding: 20px 0;
            box-sizing: border-box;
        }

        h1 {
            text-shadow: 0 0 12px rgba(255,255,255,0.6);
            margin: 0 0 5px 0;
            font-size: 2rem;
        }

        p { color: #aaa; margin: 0 0 20px 0; font-size: 0.95rem; }

        /* 카드 팩 스타일 */
        .pack-container {
            position: relative;
            width: 220px;
            height: 350px;
            cursor: pointer;
            transition: transform 0.3s;
            z-index: 10;
            margin-top: 20px;
        }

        .pack-container:hover {
            transform: scale(1.05) rotate(-2deg);
        }

        .pack {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #34495e 25%, #2c3e50 25%, #2c3e50 50%, #16a085 50%, #16a085 75%, #1abc9c 75%);
            background-size: 40px 40px;
            border: 5px solid #ffd700;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .pack-title {
            background: rgba(0, 0, 0, 0.85);
            padding: 12px 25px;
            font-weight: bold;
            font-size: 22px;
            border-radius: 6px;
            border: 2px solid #ffd700;
            text-align: center;
            color: #ffd700;
            letter-spacing: 1px;
        }

        /* 카드 결과창 */
        .result-container {
            display: none;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1400px;
            padding: 10px;
            animation: fadeIn 0.8s ease forwards;
        }

        /* 카드 프레임 */
        .card {
            width: 250px;
            height: 400px; /* 이미지를 위해 세로 조금 늘림 */
            border-radius: 14px;
            border: 6px solid #444;
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 12px;
            box-sizing: border-box;
            box-shadow: 0 12px 25px rgba(0,0,0,0.6);
            background: #fff;
            color: #222;
            transform: translateY(40px);
            opacity: 0;
            animation: slideUp 0.5s ease forwards;
        }

        /* 등급별 테두리 및 스킨 배경 */
        .card.C  { border-color: #bdc3c7; background: linear-gradient(#ffffff, #e6e9f0); }
        .card.R  { border-color: #f1c40f; background: linear-gradient(#fffdf0, #f7e5a9); }
        .card.SSR { 
            border-color: #9b59b6; 
            background: linear-gradient(135deg, #fff 0%, #f5efff 50%, #ebd9ff 100%);
            box-shadow: 0 0 30px rgba(155, 89, 182, 0.8);
        }

        /* SSR 카드 특수 홀로그램 필터 */
        .card.SSR::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 8px;
            background: linear-gradient(110deg, transparent 35%, rgba(255,255,255,0.45) 45%, rgba(155, 89, 182, 0.25) 50%, transparent 65%);
            background-size: 300% 300%;
            animation: holo 3s infinite linear;
            pointer-events: none;
        }

        /* 상단 헤더 */
        .card-header {
            display: flex;
            align-items: center;
            border-bottom: 2px solid rgba(0,0,0,0.08);
            padding-bottom: 5px;
        }
        .type-badge {
            font-size: 10px;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            margin-right: 6px;
        }
        .type-전기 { background-color: #f1c40f; color: #333; }
        .type-불꽃 { background-color: #e74c3c; }
        .type-에스퍼 { background-color: #9b59b6; }
        .type-물 { background-color: #2980b9; }
        .type-풀 { background-color: #2ecc71; }
        .type-고스트 { background-color: #7d3c98; }
        .type-드래곤 { background-color: #e67e22; }
        .type-격투 { background-color: #d35400; }
        .type-악 { background-color: #2c3e50; }

        .card-name { font-size: 17px; font-weight: bold; flex-grow: 1; }
        .card-hp { font-size: 13px; color: #c0392b; font-weight: bold; }

        /* 일러스트 구역 (진짜 이미지 들어가는 곳!) */
        .card-img-box {
            width: 100%;
            height: 120px;
            background: #fff;
            border: 2px solid #666;
            border-radius: 6px;
            margin: 6px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 6px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .card-img-box img {
            height: 95%;
            object-fit: contain;
        }

        /* 특성 스타일 */
        .ability-box {
            background: rgba(231, 76, 60, 0.08);
            border-radius: 4px;
            padding: 4px 6px;
            margin-bottom: 6px;
            font-size: 11px;
            border-left: 3px solid #e74c3c;
            line-height: 1.3;
        }
        .ability-title { font-weight: bold; color: #c0392b; }

        /* 기술 리스트 컨테이너 */
        .skills-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 4px;
        }
        .skill-item {
            border-bottom: 1px dashed rgba(0,0,0,0.1);
            padding-bottom: 2px;
        }
        .skill-top {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-weight: bold;
            color: #2c3e50;
        }
        .skill-damage { color: #000; }
        .skill-desc {
            font-size: 9.5px;
            color: #555;
            margin-top: 1px;
            line-height: 1.2;
        }

        /* 하단 텍스트 */
        .card-flavor {
            font-size: 9px;
            color: #7f8c8d;
            text-align: center;
            font-style: italic;
            margin-top: 4px;
            border-top: 1px solid rgba(0,0,0,0.08);
            padding-top: 4px;
        }

        .tier-badge {
            position: absolute;
            bottom: 6px;
            right: 8px;
            font-size: 9px;
            font-weight: bold;
            background: #222;
            color: #fff;
            padding: 1px 4px;
            border-radius: 3px;
        }

        /* 버튼 */
        .retry-btn {
            display: none;
            margin-top: 20px;
            padding: 12px 40px;
            font-size: 18px;
            font-weight: bold;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(39,174,96,0.4);
        }
        .retry-btn:hover { background-color: #219653; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { to { transform: translateY(0); opacity: 1; } }
        @keyframes holo {
            0% { background-position: 0% 0%; }
            100% { background-position: 300% 300%; }
        }
    </style>
</head>
<body>

    <h1 id="main-title">포켓몬 일러스트 카드 팩</h1>
    <p id="sub-title">팩을 개봉하면 실제 포켓몬 일러스트가 담긴 카드가 등장합니다!</p>

    <div class="pack-container" id="card-pack" onclick="openPack()">
        <div class="pack">
            <div class="pack-title">ILLUST<br>CARD PACK</div>
        </div>
    </div>

    <div class="result-container" id="result-box"></div>

    <button class="retry-btn" id="retry-button" onclick="resetPack()">한 번 더 뜯기 ⚡</button>

    <script>
        // id 항목에 포켓몬 전국도감 번호를 넣어서 공식 이미지를 매칭합니다.
        const pokemonPool = [
            { 
                id: 25, name: "피카츄", hp: "HP 90", type: "전기", tier: "R",
                ability: "정전기: 상대방이 몸을 접촉하는 기술을 쓰면 높은 확률로 마비시킵니다.",
                skills: [
                    {n: "볼부비부비", d: "10", desc: "동전을 던져 앞면이 나오면 상대를 마비 상태로 만듭니다."},
                    {n: "10만볼트", d: "60", desc: "이 포켓몬에게 붙어있는 에너지를 모두 트래쉬(소모)합니다."}
                ],
                flavor: "양 볼에 전기를 저장하는 주머니가 있다. 화가 나면 방전한다."
            },
            { 
                id: 6, name: "리자몽", hp: "HP 180", type: "불꽃", tier: "SSR",
                ability: "맹화: 자신의 HP가 1/3 이하일 때 불꽃 기술의 대미지가 1.5배 증가합니다.",
                skills: [
                    {n: "화염방사", d: "90", desc: "상대 포켓몬에게 화상 상태를 입힐 수 있습니다."},
                    {n: "플레어드라이브", d: "160", desc: "자신에게도 30만큼의 대미지를 줍니다. 반동이 큰 기술입니다."}
                ],
                flavor: "지상 1400미터까지 날개짓하여 올라가며, 매우 뜨거운 화염을 내뿜는다."
            },
            { 
                id: 150, name: "뮤츠", hp: "HP 190", type: "에스퍼", tier: "SSR",
                ability: "프레셔: 상대를 위압하여 상대가 쓰는 기술의 코스트를 증가시킵니다.",
                skills: [
                    {n: "사이코커터", d: "70", desc: "이 기술은 급소에 맞을 확률이 대단히 높습니다."},
                    {n: "사이코브레이크", d: "150", desc: "상대의 방어력 수치를 무시하고 특수 대미지를 직접 꽂아 넣습니다."}
                ],
                flavor: "포켓몬의 유전자를 재구성하여 탄생했다. 전투만을 생각하는 개체다."
            },
            { 
                id: 7, name: "꼬부기", hp: "HP 60", type: "물", tier: "C",
                ability: "급류: 체력이 떨어지면 물줄기가 훨씬 거세져 기술 위력이 세집니다.",
                skills: [
                    {n: "거품", d: "10", desc: "동전의 앞면이 나오면 상대의 스피드를 떨어뜨립니다."},
                    {n: "물대포", d: "30", desc: "입에서 물을 강하게 뿜어내어 적을 타격합니다."}
                ],
                flavor: "위험해지면 등껍질 속으로 목을 웅크려 숨는다. 수형 능력이 탁월하다."
            },
            { 
                id: 1, name: "이상해씨", hp: "HP 70", type: "풀", tier: "C",
                ability: "심록: 위험에 처했을 때 풀 속성의 능력이 대폭 향상됩니다.",
                skills: [
                    {n: "몸통박치기", d: "20", desc: "온몸의 무게를 실어 상대에게 돌진합니다."},
                    {n: "씨뿌리기", d: "10", desc: "매 턴마다 상대로부터 HP를 조금씩 흡수해 자신을 치유합니다."}
                ],
                flavor: "태어날 때부터 등에 씨앗이 있어, 자라면서 씨앗도 점점 커진다."
            },
            { 
                id: 94, name: "팬텀", hp: "HP 110", type: "고스트", tier: "R",
                ability: "저주받은바디: 대미지를 받았을 때, 30% 확률로 그 기술을 사용 불가로 만듭니다.",
                skills: [
                    {n: "섀도볼", d: "60", desc: "그림자 덩어리를 던집니다. 상대의 특수방어를 떨어뜨릴 때가 있습니다."},
                    {n: "병상첨병", d: "100", desc: "상대가 상태이상(마비, 화상 등)일 경우 대미지가 2배가 됩니다."}
                ],
                flavor: "방 안의 온도가 갑자기 내려갔다면 팬텀이 나타난 증거다."
            },
            { 
                id: 149, name: "망나뇽", hp: "HP 170", type: "드래곤", tier: "SSR",
                ability: "멀티스케일: 자신의 HP가 가득 차 있을 때 받는 대미지가 반으로 감소합니다.",
                skills: [
                    {n: "드래곤클로", d: "80", desc: "날카로운 발톱으로 상대를 빠르게 갈라 가볍게 타격합니다."},
                    {n: "파괴광선", d: "180", desc: "엄청난 광선을 뿜어내며, 사용 후 다음 자신의 차례에 행동할 수 없습니다."}
                ],
                flavor: "넓은 바다 어딘가를 거처로 삼고 날아다닌다. 조난당한 배를 도우며 다닌다."
            },
            { 
                id: 151, name: "뮤", hp: "HP 120", type: "에스퍼", tier: "SSR",
                ability: "싱크로: 자신이 상태 이상에 걸리면 상대방도 똑같은 상태 이상으로 만듭니다.",
                skills: [
                    {n: "사이코키네시스", d: "60", desc: "강한 염동력을 내뿜습니다. 상대의 에너지가 많을수록 위력이 올라갑니다."},
                    {n: "미라클웨이브", d: "100", desc: "신비로운 빛으로 공격하며 동전 앞면 시 상대의 패를 한 장 버립니다."}
                ],
                flavor: "모든 포켓몬의 유전자를 가졌다고 전해지며, 마음이 청정한 사람 앞에만 나타난다."
            },
            { 
                id: 56, name: "망키", hp: "HP 60", type: "격투", tier: "C",
                ability: "의기양양: 잠들지 않는 기질을 가져 잠듦 상태 이상을 원천 무시합니다.",
                skills: [
                    {n: "안면치기", d: "20", desc: "상대의 얼굴을 강하게 가격하여 스턴을 시도합니다."},
                    {n: "태권당수", d: "40", desc: "급소에 맞기 쉬운 정밀한 격투 베기 공격입니다."}
                ],
                flavor: "나뭇가지 위에서 무리를 지어 산다. 동료 무리 중 한 마리가 화를 내면 모두가 날뛴다."
            },
            { 
                id: 197, name: "블래키", hp: "HP 110", type: "악", tier: "R",
                ability: "정신력: 기가 죽지 않는 단단한 멘탈을 지녀 상대의 경직 공격을 버텨냅니다.",
                skills: [
                    {n: "속여때리기", d: "40", desc: "상대의 회피율이나 방어 스텟을 완벽히 무시하고 확정 대미지를 줍니다."},
                    {n: "악의파동", d: "80", desc: "악한 아우라를 내뿜으며 20% 확률로 상대를 행동 불능으로 만듭니다."}
                ],
                flavor: "달의 파동을 받으면 온몸의 고리 모양 무늬가 은은하게 빛나기 시작한다."
            }
        ];

        function openPack() {
            document.getElementById('card-pack').style.display = 'none';
            document.getElementById('sub-title').style.display = 'none';
            document.getElementById('main-title').innerText = '✨ 팩 개봉 결과! ✨';

            const resultBox = document.getElementById('result-box');
            resultBox.style.display = 'flex';
            resultBox.innerHTML = '';

            for (let i = 0; i < 5; i++) {
                const poke = pokemonPool[Math.floor(Math.random() * pokemonPool.length)];
                
                // 공식 고화질 일러스트 주소 연동
                const imgUrl = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${poke.id}.png`;

                let skillsHtml = '';
                poke.skills.forEach(skill => {
                    skillsHtml += `
                        <div class="skill-item">
                            <div class="skill-top">
                                <span class="skill-name">⚔️ ${skill.n}</span>
                                <span class="skill-damage">${skill.d}</span>
                            </div>
                            <div class="skill-desc">${skill.desc}</div>
                        </div>
                    `;
                });

                const cardHtml = `
                    <div class="card ${poke.tier}" style="animation-delay: ${i * 0.15}s">
                        <div class="card-header">
                            <span class="type-badge type-${poke.type}">${poke.type}</span>
                            <span class="card-name">${poke.name}</span>
                            <span class="card-hp">${poke.hp}</span>
                        </div>
                        <div class="card-img-box">
                            <img src="${imgUrl}" alt="${poke.name}">
                        </div>
                        
                        <div class="ability-box">
                            <span class="ability-title">[특성]</span> ${poke.ability}
                        </div>

                        <div class="skills-container">
                            ${skillsHtml}
                        </div>

                        <div class="card-flavor">${poke.flavor}</div>
                        <span class="tier-badge">${poke.tier}</span>
                    </div>
                `;
                resultBox.innerHTML += cardHtml;
            }

            document.getElementById('retry-button').style.display = 'block';
        }

        function resetPack() {
            document.getElementById('card-pack').style.display = 'block';
            document.getElementById('sub-title').style.display = 'block';
            document.getElementById('result-box').style.display = 'none';
            document.getElementById('retry-button').style.display = 'none';
            document.getElementById('main-title').innerText = '포켓몬 카드 하이퍼 팩';
        }
    </script>
</body>
</html>
