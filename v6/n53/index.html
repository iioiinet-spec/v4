<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로블록스 뉴비 군대 vs 베이컨 군대 (쿨타임 밸런스 패치)</title>
    <style>
        :root {
            --roblox-yellow: #E2DF1D;
            --roblox-blue: #00A2FF;
            --roblox-green: #2ECC71;
            --bacon-pink: #FFA07A;
            --bacon-red: #A30000;
            --bacon-brown: #5C4033;
        }
        body {
            margin: 0;
            background-color: #0b0b10;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }
        h1 {
            text-shadow: 0 0 10px #e74c3c, 3px 3px 0px #000;
            margin: 10px 0 5px 0;
            font-size: 26px;
            letter-spacing: 2px;
        }
        #game-container {
            position: relative;
            width: 950px;
            height: 480px;
            background: linear-gradient(to bottom, #0f0c1b, #05020a 70%, #1e1111 70%, #0c0505);
            border: 6px solid #440000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(231, 76, 60, 0.4);
        }
        /* 성 디자인 */
        .castle {
            position: absolute;
            bottom: 130px;
            width: 110px;
            height: 200px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            border: 4px solid #fff;
            box-shadow: 0 0 25px rgba(255,255,255,0.1);
            z-index: 5;
        }
        #player-castle {
            left: 20px;
            background-color: #1e3799;
            border-color: var(--roblox-blue);
        }
        #enemy-castle {
            right: 20px;
            background-color: #6a1b1b;
            border-color: #eb2f06;
        }
        .hp-bar {
            width: 90%;
            height: 12px;
            background-color: #222;
            margin: 8px auto;
            border: 1px solid #555;
            border-radius: 3px;
            overflow: hidden;
        }
        .hp-inner {
            height: 100%;
            background-color: #2ecc71;
            width: 100%;
            transition: width 0.1s;
        }
        
        /* 🧱 로블록스 클래식 캐릭터 공통 스타일 */
        .roblox-char {
            position: absolute;
            bottom: 130px;
            width: 32px;
            height: 55px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            transition: filter 0.2s;
        }
        .roblox-head {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            border: 1.5px solid #000;
            position: relative;
            z-index: 3;
        }
        .roblox-torso {
            width: 24px;
            height: 22px;
            border: 1.5px solid #000;
            border-bottom: none;
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 8px;
            color: white;
            font-weight: bold;
        }
        .roblox-legs {
            width: 22px;
            height: 15px;
            border: 1.5px solid #000;
            z-index: 1;
        }

        /* 👑 뉴비 스킨 */
        .newbie-normal .roblox-head { background-color: var(--roblox-yellow); }
        .newbie-normal .roblox-torso { background-color: var(--roblox-blue); }
        .newbie-normal .roblox-legs { background-color: var(--roblox-green); }

        .newbie-knight .roblox-head { background-color: #95a5a6; border-radius: 0; }
        .newbie-knight .roblox-torso { background-color: #7f8c8d; }
        .newbie-knight .roblox-legs { background-color: #5d6d7e; }

        .newbie-shield .roblox-head { background-color: var(--roblox-yellow); }
        .newbie-shield .roblox-torso { background-color: var(--roblox-blue); }
        .newbie-shield .roblox-legs { background-color: var(--roblox-green); }
        .newbie-shield .roblox-torso::after { content: "🛡️"; position: absolute; font-size: 18px; left: -10px; }

        .newbie-gun .roblox-head { background-color: var(--roblox-yellow); }
        .newbie-gun .roblox-torso { background-color: #27ae60; }
        .newbie-gun .roblox-legs { background-color: #145a32; }
        .newbie-gun .roblox-torso::after { content: "🔫"; position: absolute; font-size: 14px; right: -10px; }

        .newbie-giant { width: 60px; height: 100px; }
        .newbie-giant .roblox-head { width: 26px; height: 26px; background-color: var(--roblox-yellow); }
        .newbie-giant .roblox-torso { width: 48px; height: 42px; font-size: 14px; background-color: var(--roblox-blue); }
        .newbie-giant .roblox-legs { width: 44px; height: 28px; background-color: var(--roblox-green); }

        /* 👥 떼거리 뉴비 공중부양 */
        .newbie-fake-giant {
            width: 60px;
            height: 100px;
            position: absolute;
            bottom: 220px !important;
            display: grid;
            grid-template-columns: repeat(3, 18px);
            grid-template-rows: repeat(4, 23px);
            gap: 2px;
            justify-content: center;
            align-content: flex-end;
            animation: levitate 2s infinite ease-in-out;
        }
        .mini-newbie {
            width: 18px;
            height: 23px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            opacity: 0.95;
            animation: swarm-wiggle 0.15s infinite alternate;
        }
        .mini-head { width: 6px; height: 6px; background-color: var(--roblox-yellow); border: 0.5px solid #000; border-radius: 1px; }
        .mini-torso { width: 10px; height: 10px; background-color: var(--roblox-blue); border: 0.5px solid #000; }
        .mini-legs { width: 9px; height: 5px; background-color: var(--roblox-green); border: 0.5px solid #000; }

        .newbie-guest .roblox-head { background-color: #000; border-color: red; }
        .newbie-guest .roblox-head::before { content: "👁️👁️"; font-size: 6px; color: red; position: absolute; top: 2px; left: 1px; }
        .newbie-guest .roblox-torso { background-color: #111; color: red; }
        .newbie-guest .roblox-legs { background-color: #000; }

        .newbie-god { filter: drop-shadow(0 0 15px #f1c40f); }
        .newbie-god .roblox-head { background-color: #fff; border-color: #f1c40f; }
        .newbie-god .roblox-torso { background-color: #f1c40f; color: #000; }
        .newbie-god .roblox-legs { background-color: #fff; }

        /* 🥓 적군 베이컨 스킨 */
        .bacon-normal .roblox-head { background-color: var(--bacon-pink); }
        .bacon-normal .roblox-head::before { content: "🥓"; font-size: 11px; position: absolute; top: -10px; left: 0px; }
        .bacon-normal .roblox-torso { background-color: var(--bacon-red); }
        .bacon-normal .roblox-legs { background-color: var(--bacon-brown); }

        .bacon-knight .roblox-head { background-color: #555; border-radius: 0; }
        .bacon-knight .roblox-head::before { content: "🥓"; font-size: 11px; position: absolute; top: -10px; left: 0px; }
        .bacon-knight .roblox-torso { background-color: #333; }
        .bacon-knight .roblox-legs { background-color: #111; }

        .bacon-shield .roblox-head { background-color: var(--bacon-pink); }
        .bacon-shield .roblox-head::before { content: "🥓"; font-size: 11px; position: absolute; top: -10px; left: 0px; }
        .bacon-shield .roblox-torso { background-color: var(--bacon-red); }
        .bacon-shield .roblox-legs { background-color: var(--bacon-brown); }
        .bacon-shield .roblox-torso::after { content: "🛡️"; position: absolute; font-size: 18px; right: -10px; }

        .bacon-gun .roblox-head { background-color: var(--bacon-pink); }
        .bacon-gun .roblox-head::before { content: "🥓"; font-size: 11px; position: absolute; top: -10px; left: 0px; }
        .bacon-gun .roblox-torso { background-color: #2c3e50; }
        .bacon-gun .roblox-legs { background-color: #1a252f; }
        .bacon-gun .roblox-torso::after { content: "🔫"; position: absolute; font-size: 14px; left: -10px; }

        .bacon-giant { width: 60px; height: 100px; }
        .bacon-giant .roblox-head { width: 26px; height: 26px; background-color: var(--bacon-pink); }
        .bacon-giant .roblox-head::before { content: "🥓"; font-size: 20px; position: absolute; top: -18px; left: 1px; }
        .bacon-giant .roblox-torso { width: 48px; height: 42px; font-size: 14px; background-color: var(--bacon-red); }
        .bacon-giant .roblox-legs { width: 44px; height: 28px; background-color: var(--bacon-brown); }

        .bacon-fake-giant {
            width: 60px;
            height: 100px;
            position: absolute;
            bottom: 220px !important;
            display: grid;
            grid-template-columns: repeat(3, 18px);
            grid-template-rows: repeat(4, 23px);
            gap: 2px;
            justify-content: center;
            align-content: flex-end;
            animation: levitate 2s infinite ease-in-out alternate;
        }
        .mini-bacon {
            width: 18px;
            height: 23px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            opacity: 0.95;
            animation: swarm-wiggle 0.15s infinite alternate;
        }
        .mini-bacon-head { width: 6px; height: 6px; background-color: var(--bacon-pink); border: 0.5px solid #000; border-radius: 1px; position: relative; }
        .mini-bacon-head::before { content: "🥓"; font-size: 5px; position: absolute; top: -5px; left: 0; }
        .mini-bacon-torso { width: 10px; height: 10px; background-color: var(--bacon-red); border: 0.5px solid #000; }
        .mini-bacon-legs { width: 9px; height: 5px; background-color: var(--bacon-brown); border: 0.5px solid #000; }

        .bacon-guest .roblox-head { background-color: #3a0000; border-color: #000; }
        .bacon-guest .roblox-head::before { content: "😈"; font-size: 10px; position: absolute; top: -5px; left: 1px; }
        .bacon-guest .roblox-torso { background-color: #200; color: #ff3333; }
        .bacon-guest .roblox-legs { background-color: #100; }

        .bacon-god { filter: drop-shadow(0 0 15px #eb2f06); }
        .bacon-god .roblox-head { background-color: #ffcccc; border-color: #eb2f06; }
        .bacon-god .roblox-head::before { content: "🥓👑"; font-size: 10px; position: absolute; top: -11px; left: -4px; }
        .bacon-god .roblox-torso { background-color: #eb2f06; color: #fff; }
        .bacon-god .roblox-legs { background-color: #ffcccc; }

        /* 애니메이션 효과 */
        @keyframes levitate {
            0% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0); }
        }
        @keyframes swarm-wiggle {
            0% { transform: translateY(0) translateX(0); }
            100% { transform: translateY(-1px) translateX(1px); }
        }

        /* 폭격 스킬 비주얼 이펙트 */
        .bomb-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 69, 0, 0.8);
            z-index: 99;
            animation: flash 0.8s ease-out forwards;
            pointer-events: none;
        }
        @keyframes flash {
            0% { opacity: 0; }
            30% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* UI 구성 */
        #ui-container {
            width: 950px;
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .stats-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #111;
            padding: 12px 20px;
            border-radius: 6px;
            border: 2px solid #551a1a;
            font-size: 16px;
        }
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        button {
            padding: 10px;
            font-size: 13px;
            font-weight: bold;
            background-color: #1c2a38;
            color: white;
            border: 2px solid #2b3a4a;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            position: relative;
        }
        button:hover:not(:disabled) {
            background-color: #2b3a4a;
            border-color: #40556b;
        }
        button:active:not(:disabled) {
            transform: scale(0.95);
        }
        button:disabled {
            background-color: #333 !important;
            border-color: #222 !important;
            color: #666;
            cursor: not-allowed;
        }
        .upgrade-btn {
            background-color: #b71c1c;
            border-color: #d32f2f;
            text-shadow: 1px 1px 0px #000;
        }
        .upgrade-btn:hover {
            background-color: #d32f2f;
        }
        .bomb-btn {
            background-color: #d35400;
            border-color: #e67e22;
            color: #fff;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(230, 126, 34, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(230, 126, 34, 0); }
            100% { box-shadow: 0 0 0 0 rgba(230, 126, 34, 0); }
        }
        .damage-pop {
            position: absolute;
            color: #ff1111;
            font-weight: 900;
            font-size: 18px;
            text-shadow: 1.5px 1.5px 0px #000;
            animation: floatUp 0.5s ease-out forwards;
            z-index: 10;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-50px) scale(1.3); opacity: 0; }
        }
    </style>
</head>
<body>

    <h1>⚡ NEWBIE ARMY vs BACON CRUSADE: COOLDOWN UPDATE ⚡</h1>
    
    <div id="game-container">
        <!-- 아군 성 -->
        <div id="player-castle" class="castle">
            <div style="margin-top: 20px;">뉴비 요새</div>
            <div class="hp-bar"><div id="player-hp" class="hp-inner"></div></div>
            <span id="player-hp-txt">10000/10000</span>
        </div>

        <!-- 적 성 -->
        <div id="enemy-castle" class="castle">
            <div style="margin-top: 20px;">베이컨 거점</div>
            <div class="hp-bar"><div id="enemy-hp" class="hp-inner"></div></div>
            <span id="enemy-hp-txt">15000/15000</span>
        </div>
    </div>

    <div id="ui-container">
        <div class="stats-panel">
            <div>🔥 스테이지: <span id="stage-txt" style="color: #ff3838; font-weight: bold; font-size: 22px;">1</span></div>
            <div>💀 난이도: <span id="danger-txt" style="color: #ff9f43; font-weight: bold; font-size: 22px;">하드코어!</span></div>
            <div>⚡ 타격 점수: <span id="score-txt" style="color: #2ecc71; font-weight: bold; font-size: 22px;">0점</span></div>
            <button class="upgrade-btn" onclick="upgradeNewbies()">🛡️ 뉴비 강화 (비용: 2000점)<br><span id="upg-level" style="font-size:11px;">공/체 +0% (Lv.0)</span></button>
            <button id="bomb-btn" class="bomb-btn" onclick="useAirstrike()" disabled>🚀 궤도 핵폭격 (비활성)<br><span id="bomb-timer" style="font-size:11px;">대기 시간: 30초</span></button>
        </div>
        
        <!-- 소환 버튼 -->
        <div class="btn-grid">
            <button id="normal-btn" onclick="spawnNewbie('normal')">🐣 일반 뉴비 (돌격) <br><span>[공:150 체:1500]</span></button>
            <button id="knight-btn" onclick="spawnNewbie('knight')">⚔️ 기사 뉴비 (광역) <br><span>[공:500 체:4500]</span></button>
            <button id="shield-btn" onclick="spawnNewbie('shield')">🛡️ 방패 뉴비 (반사) <br><span>[공:80 체:12000]</span></button>
            <button id="gun-btn" onclick="spawnNewbie('gun')">🔫 총 뉴비 (관통) <br><span>[공:1200 체:1000]</span></button>
            <button id="giant-btn" onclick="spawnNewbie('giant')">🗿 거대 뉴비 (기절) <br><span>[공:2500 체:30000]</span></button>
            <button id="fake-giant-btn" onclick="spawnNewbie('fake-giant')">🛸 떼거리 뉴비 (전격폭풍) <br><span>[공:1800 체:9000]</span></button>
            <button id="guest-btn" onclick="spawnNewbie('guest')">💀 게스트 666 (사신) <br><span>[공:4500 체:20000]</span></button>
            <button id="god-btn" onclick="spawnNewbie('god')">⚡ 뉴비 신 (일제 타격) <br><span>[공:10000 체:80000]</span></button>
        </div>
    </div>

    <script>
        const gameContainer = document.getElementById('game-container');
        
        let stage = 1;
        let score = 0;
        let upgradeLevel = 0;
        let statMultiplier = 1.0;

        let playerCastleHP = 10000;
        let maxPlayerHP = 10000;
        let enemyCastleHP = 15000;
        let maxEnemyHP = 15000;

        let playerUnits = [];
        let enemyUnits = [];

        // 쿨타임 관리 객체
        const cooldowns = {
            'fake-giant': { active: false, time: 6,  btnId: 'fake-giant-btn', label: '🛸 떼거리 뉴비 (전격폭풍) <br><span>[공:1800 체:9000]</span>' },
            'guest':      { active: false, time: 10, btnId: 'guest-btn',      label: '💀 게스트 666 (사신) <br><span>[공:4500 체:20000]</span>' },
            'god':        { active: false, time: 15, btnId: 'god-btn',        label: '⚡ 뉴비 신 (일제 타격) <br><span>[공:10000 체:80000]</span>' }
        };
        
        // 폭격 변수
        let survivalTime = 0;
        let isBombUsed = false;
        let survivalTimerInterval;

        // 초강화 아군 유닛 베이스 스펙 데이터 (거대 뉴비 속도 0.3으로 밸런스 하향 조정)
        const unitData = {
            'normal':     { name: '일반', hp: 1500,  dmg: 150,  speed: 3.2 },  
            'knight':     { name: '기사', hp: 4500,  dmg: 500,  speed: 1.3 },  
            'shield':     { name: '방패', hp: 12000, dmg: 80,   speed: 0.9 },  
            'gun':        { name: '총',   hp: 1000,  dmg: 1200, speed: 1.1 },  
            'giant':      { name: '거대', hp: 30000, dmg: 2500, speed: 0.3 },  // 느릿느릿 묵직하게 움직이도록 0.6 -> 0.3 하향 패치!
            'fake-giant': { name: '떼거리',hp: 9000,  dmg: 1800, speed: 1.5 },  
            'guest':      { name: 'G666', hp: 20000, dmg: 4500, speed: 2.2 },  
            'god':        { name: '신',   hp: 80000, dmg: 10000, speed: 0.7 }  
        };

        // 로블록스 표준 R6 구성기
        function createRobloxBody(typeClass, name, isBacon = false) {
            const char = document.createElement('div');
            char.className = `roblox-char ${typeClass}`;
            
            const head = document.createElement('div');
            head.className = 'roblox-head';
            
            const torso = document.createElement('div');
            torso.className = 'roblox-torso';
            torso.innerText = name;
            
            const legs = document.createElement('div');
            legs.className = 'roblox-legs';
            
            char.appendChild(head);
            char.appendChild(torso);
            char.appendChild(legs);
            return char;
        }

        // 공중부양 떼거리 바디 생성기
        function createSwarmBody(isBacon = false) {
            const container = document.createElement('div');
            container.className = isBacon ? 'bacon-fake-giant' : 'newbie-fake-giant';

            for (let i = 0; i < 12; i++) {
                const mini = document.createElement('div');
                mini.className = isBacon ? 'mini-bacon' : 'mini-newbie';
                
                const head = document.createElement('div');
                head.className = isBacon ? 'mini-bacon-head' : 'mini-head';
                
                const torso = document.createElement('div');
                torso.className = isBacon ? 'mini-bacon-torso' : 'mini-torso';
                
                const legs = document.createElement('div');
                legs.className = isBacon ? 'mini-bacon-legs' : 'mini-legs';
                
                mini.appendChild(head);
                mini.appendChild(torso);
                mini.appendChild(legs);
                container.appendChild(mini);
            }
            return container;
        }

        // 아군 뉴비 소환
        function spawnNewbie(type) {
            // 쿨타임 체크 대상인지 판단
            if (cooldowns[type]) {
                if (cooldowns[type].active) return;
                startCooldown(type);
            }

            const data = unitData[type];
            let charEl;

            if (type === 'fake-giant') {
                charEl = createSwarmBody(false);
            } else {
                charEl = createRobloxBody(`newbie-${type}`, data.name);
            }
            
            charEl.style.left = '130px';
            gameContainer.appendChild(charEl);

            playerUnits.push({
                element: charEl,
                hp: data.hp * statMultiplier,
                maxHp: data.hp * statMultiplier,
                dmg: data.dmg * statMultiplier,
                speed: data.speed,
                x: 130,
                width: type === 'giant' ? 60 : (type === 'fake-giant' ? 60 : 32),
                type: type,
                stunned: false
            });
        }

        // 쿨타임 핸들러
        function startCooldown(type) {
            const cd = cooldowns[type];
            cd.active = true;
            const btn = document.getElementById(cd.btnId);
            btn.disabled = true;
            let currentCooldown = cd.time;
            
            const timer = setInterval(() => {
                currentCooldown--;
                if (currentCooldown <= 0) {
                    clearInterval(timer);
                    cd.active = false;
                    btn.disabled = false;
                    btn.innerHTML = cd.label;
                } else {
                    btn.innerHTML = `⏳ 쿨타임 대기 중... (${currentCooldown}초)`;
                }
            }, 1000);
        }

        // 30초 생존 타이머 가동 (폭격용)
        function startSurvivalTimer() {
            survivalTime = 0;
            isBombUsed = false;
            const btn = document.getElementById('bomb-btn');
            btn.disabled = true;
            btn.innerHTML = `🚀 궤도 핵폭격 (비활성)<br><span id="bomb-timer">대기 시간: 30초</span>`;

            clearInterval(survivalTimerInterval);
            survivalTimerInterval = setInterval(() => {
                survivalTime++;
                let remaining = 30 - survivalTime;
                if (remaining <= 0) {
                    clearInterval(survivalTimerInterval);
                    if (!isBombUsed) {
                        btn.disabled = false;
                        btn.innerHTML = `🚀 궤도 핵폭격 장전완료!<br><span id="bomb-timer" style="color: #ff9f43; font-weight:bold;">지금 즉시 사용 가능!</span>`;
                    }
                } else {
                    btn.innerHTML = `🚀 궤도 핵폭격 (충전중)<br><span id="bomb-timer">남은 시간: ${remaining}초</span>`;
                }
            }, 1000);
        }

        // 🚀 궤도 폭격 발사 스킬
        function useAirstrike() {
            if (survivalTime < 30 || isBombUsed) return;
            isBombUsed = true;
            
            const flash = document.createElement('div');
            flash.className = 'bomb-effect';
            gameContainer.appendChild(flash);
            setTimeout(() => flash.remove(), 800);

            // 전장 내의 모든 적군에게 폭격 피해 적용
            for (let i = enemyUnits.length - 1; i >= 0; i--) {
                let eUnit = enemyUnits[i];
                eUnit.hp -= 25000; 
                createDamagePop(eUnit.x, 25000);
                if (eUnit.hp <= 0) {
                    eUnit.element.remove();
                    enemyUnits.splice(i, 1);
                }
            }

            enemyCastleHP -= 5000;
            score += 1000;
            document.getElementById('score-txt').innerText = `${score}점`;
            updateCastleHP();

            const btn = document.getElementById('bomb-btn');
            btn.disabled = true;
            btn.innerHTML = `🚀 사용 완료<br><span style="color:#aaa;">이번 판에는 재사용 불가</span>`;
        }

        // 적군 베이컨 군단 소환
        function spawnBacon(type) {
            const data = unitData[type];
            let charEl;

            if (type === 'fake-giant') {
                charEl = createSwarmBody(true);
            } else {
                charEl = createRobloxBody(`bacon-${type}`, type === 'guest' ? 'B666' : 'Bacon', true);
            }
            
            charEl.style.left = '800px';
            gameContainer.appendChild(charEl);

            const dangerMultiplier = 1.8 * Math.pow(1.3, stage - 1); 
            enemyUnits.push({
                element: charEl,
                hp: Math.round(data.hp * dangerMultiplier * 0.35), 
                maxHp: Math.round(data.hp * dangerMultiplier * 0.35),
                dmg: Math.round(data.dmg * dangerMultiplier * 0.4),
                speed: data.speed * 0.85,
                x: 800,
                width: type === 'giant' ? 60 : (type === 'fake-giant' ? 60 : 32),
                type: type,
                stunned: false
            });
        }

        // 아군 결사대 강화 시스템
        function upgradeNewbies() {
            const cost = 2000 + (upgradeLevel * 1500);
            if (score >= cost) {
                score -= cost;
                upgradeLevel++;
                statMultiplier = 1.0 + (upgradeLevel * 0.40);
                document.getElementById('score-txt').innerText = `${score}점`;
                document.getElementById('upg-level').innerText = `공/체 +${upgradeLevel * 40}% (Lv.${upgradeLevel})`;
                document.querySelector('.upgrade-btn').innerHTML = `🛡️ 뉴비 강화 (비용: ${2000 + (upgradeLevel * 1500)}점)<br><span id="upg-level" style="font-size:11px;">공/체 +${upgradeLevel * 40}% (Lv.${upgradeLevel})</span>`;
            } else {
                alert("점수가 부족합니다! 전선을 밀어붙여 타격 점수를 확보하십시오!");
            }
        }

        // 베이컨 출격 타이머
        const baconTypes = ['normal', 'knight', 'shield', 'gun', 'giant', 'fake-giant', 'guest', 'god'];
        let baconSpawnTimer = setInterval(() => {
            if (enemyUnits.length < 12 + (stage * 2)) {
                const randIndex = Math.floor(Math.random() * Math.min(baconTypes.length, 3 + stage));
                spawnBacon(baconTypes[randIndex]);
            }
        }, Math.max(400, 2000 - (stage * 200)));

        function createDamagePop(x, dmg) {
            const pop = document.createElement('div');
            pop.className = 'damage-pop';
            pop.innerText = `-${Math.round(dmg)}`;
            pop.style.left = `${x}px`;
            pop.style.bottom = '190px';
            gameContainer.appendChild(pop);
            setTimeout(() => pop.remove(), 500);
        }

        // 성 HP 업데이트 및 게임 승리/패배 트리거
        function updateCastleHP() {
            playerCastleHP = Math.max(0, playerCastleHP);
            enemyCastleHP = Math.max(0, enemyCastleHP);

            const pPercent = (playerCastleHP / maxPlayerHP) * 100;
            const ePercent = (enemyCastleHP / maxEnemyHP) * 100;

            document.getElementById('player-hp').style.width = `${pPercent}%`;
            document.getElementById('player-hp-txt').innerText = `${Math.round(playerCastleHP)}/${maxPlayerHP}`;

            document.getElementById('enemy-hp').style.width = `${ePercent}%`;
            document.getElementById('enemy-hp-txt').innerText = `${Math.round(enemyCastleHP)}/${maxEnemyHP}`;

            // 승리 판정
            if (enemyCastleHP <= 0) {
                alert(`축하합니다! 스테이지 ${stage}를 클리어하셨습니다!`);
                nextStage();
            }

            // 패배 판정
            if (playerCastleHP <= 0) {
                alert("아군 요새가 함락되었습니다... 패배!");
                resetGame();
            }
        }

        // 다음 스테이지 진입
        function nextStage() {
            stage++;
            score += 5000; // 스테이지 보너스 점수
            document.getElementById('stage-txt').innerText = stage;
            document.getElementById('score-txt').innerText = `${score}점`;

            // 전장 정리
            playerUnits.forEach(u => u.element.remove());
            enemyUnits.forEach(u => u.element.remove());
            playerUnits = [];
            enemyUnits = [];

            // 성 체력 스케일 업 및 완전 회복
            maxPlayerHP = 10000 + (stage - 1) * 3000;
            maxEnemyHP = 15000 + (stage - 1) * 6000;
            playerCastleHP = maxPlayerHP;
            enemyCastleHP = maxEnemyHP;

            updateCastleHP();
            startSurvivalTimer();
        }

        // 게임 오버 리셋
        function resetGame() {
            stage = 1;
            score = 0;
            upgradeLevel = 0;
            statMultiplier = 1.0;

            playerUnits.forEach(u => u.element.remove());
            enemyUnits.forEach(u => u.element.remove());
            playerUnits = [];
            enemyUnits = [];

            maxPlayerHP = 10000;
            maxEnemyHP = 15000;
            playerCastleHP = maxPlayerHP;
            enemyCastleHP = maxEnemyHP;

            document.getElementById('stage-txt').innerText = stage;
            document.getElementById('score-txt').innerText = `${score}점`;
            document.getElementById('upg-level').innerText = `공/체 +0% (Lv.0)`;
            document.querySelector('.upgrade-btn').innerHTML = `🛡️ 뉴비 강화 (비용: 2000점)<br><span id="upg-level" style="font-size:11px;">공/체 +0% (Lv.0)</span>`;

            updateCastleHP();
            startSurvivalTimer();
        }

        // 메인 업데이트 루프
        function update() {
            // 1. 아군 뉴비 업데이트
            playerUnits.forEach((pUnit, pIdx) => {
                if (pUnit.stunned) return; 

                let canMove = true;
                let targets = [];

                enemyUnits.forEach((eUnit) => {
                    if (pUnit.x + pUnit.width >= eUnit.x && pUnit.x < eUnit.x) {
                        targets.push(eUnit);
                    }
                });

                if (targets.length > 0) {
                    canMove = false;
                    
                    const multiStrikeClasses = ['knight', 'gun', 'giant', 'fake-giant', 'guest', 'god'];
                    
                    if (multiStrikeClasses.includes(pUnit.type)) {
                        targets.forEach((eUnit) => {
                            let dealDmg = pUnit.dmg / 60;
                            eUnit.hp -= dealDmg;

                            if (pUnit.type === 'giant' && Math.random() < 0.05) {
                                eUnit.stunned = true;
                                eUnit.element.style.filter = 'grayscale(1) brightness(0.5)';
                                setTimeout(() => {
                                    eUnit.stunned = false;
                                    eUnit.element.style.filter = 'none';
                                }, 1500);
                            }

                            if (Math.random() < 0.04) createDamagePop(eUnit.x, pUnit.dmg);
                        });
                    } else {
                        let target = targets[0];
                        target.hp -= pUnit.dmg / 60;
                        if (Math.random() < 0.04) createDamagePop(target.x, pUnit.dmg);
                    }

                    for (let i = enemyUnits.length - 1; i >= 0; i--) {
                        if (enemyUnits[i].hp <= 0) {
                            enemyUnits[i].element.remove();
                            enemyUnits.splice(i, 1);
                        }
                    }
                }

                if (pUnit.x + pUnit.width >= 820) {
                    canMove = false;
                    enemyCastleHP -= pUnit.dmg / 60;
                    score += Math.round(pUnit.dmg / 15);
                    document.getElementById('score-txt').innerText = `${score}점`;
                    updateCastleHP();
                }

                if (canMove) {
                    pUnit.x += pUnit.speed;
                    pUnit.element.style.left = `${pUnit.x}px`;
                }
            });

            // 2. 적군 베이컨 업데이트
            enemyUnits.forEach((eUnit, eIdx) => {
                if (eUnit.stunned) return;

                let canMove = true;
                let targets = [];

                playerUnits.forEach((pUnit) => {
                    if (eUnit.x <= pUnit.x + pUnit.width && eUnit.x > pUnit.x) {
                        targets.push(pUnit);
                    }
                });

                if (targets.length > 0) {
                    canMove = false;
                    
                    const enemyMultiClasses = ['knight', 'gun', 'giant', 'fake-giant', 'guest', 'god'];
                    if (enemyMultiClasses.includes(eUnit.type)) {
                        targets.forEach((pUnit) => {
                            let dealDmg = eUnit.dmg / 60;
                            pUnit.hp -= dealDmg;
                            
                            if (pUnit.type === 'shield') {
                                eUnit.hp -= dealDmg * 0.15;
                            }

                            if (Math.random() < 0.04) createDamagePop(pUnit.x, eUnit.dmg);
                        });
                    } else {
                        let target = targets[0];
                        let dealDmg = eUnit.dmg / 60;
                        target.hp -= dealDmg;

                        if (target.type === 'shield') {
                            eUnit.hp -= dealDmg * 0.15;
                        }

                        if (Math.random() < 0.04) createDamagePop(target.x, eUnit.dmg);
                    }

                    for (let i = playerUnits.length - 1; i >= 0; i--) {
                        if (playerUnits[i].hp <= 0) {
                            playerUnits[i].element.remove();
                            playerUnits.splice(i, 1);
                        }
                    }
                }

                if (eUnit.x <= 130) {
                    canMove = false;
                    playerCastleHP -= eUnit.dmg / 60;
                    updateCastleHP();
                }

                if (canMove) {
                    eUnit.x -= eUnit.speed;
                    eUnit.element.style.left = `${eUnit.x}px`;
                }
            });

            requestAnimationFrame(update);
        }

        // 초기 시작 가동
        updateCastleHP();
        startSurvivalTimer();
        update();
    </script>
</body>
</html>
