<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>The Prototype of MIDI</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1e272e; color: white; padding: 20px; margin: 0; user-select: none; }
        h1 { margin-bottom: 5px; color: #f5f6fa; font-size: 24px; }
        .controls { position: sticky; top: 0; background: #1e272e; padding: 15px; z-index: 10; border-bottom: 1px solid #3d3d3d; margin-bottom: 20px; }
        .control-group { display: inline-flex; align-items: center; background: #2f3640; padding: 6px 12px; border-radius: 4px; margin: 5px; vertical-align: middle; }
        .control-group label { font-size: 13px; font-weight: bold; color: #dcdde1; margin-right: 8px; }
        button { padding: 10px 18px; font-size: 15px; font-weight: bold; cursor: pointer; border: none; border-radius: 4px; background: #4cd137; color: white; margin: 0 5px; vertical-align: middle; }
        button:hover { background: #44bd32; } button.stop { background: #e84118; } button.stop:hover { background: #c23616; } button.clear { background: #7f8fa6; } button.clear:hover { background: #718093; }        
        select, input[type="number"] { padding: 8px; font-size: 14px; border-radius: 4px; border: none; background: #1e272e; color: white; font-weight: bold; cursor: pointer; }
        input[type="number"] { width: 65px; text-align: center; } input[type="range"] { cursor: pointer; accent-color: #4cd137; vertical-align: middle; }
        .bpm-val { display: inline-block; width: 35px; font-weight: bold; color: #fbc531; font-size: 14px; margin-left: 5px; }
        .sequencer-container { display: flex; max-width: 1300px; margin: 0 auto; background: #2f3640; padding: 15px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); overflow: hidden; }        
        .piano-keys { display: flex; flex-direction: column; width: 100px; flex-shrink: 0; }
        .key-label { height: 32px; line-height: 32px; background: #f5f6fa; color: #1e272e; margin-bottom: 3px; font-weight: bold; border-radius: 4px 0 0 4px; font-size: 12px; text-align: right; padding-right: 8px; box-sizing: border-box; }
        .key-label.sharp { background: #1e272e; color: #f5f6fa; border-right: 5px solid #00a8ff; } .key-label.percussion { background: #3a4454; color: #00a8ff; border-right: 5px solid #e84118; }
        .key-label.timeline-label { background: #1e272e; color: #fbc531; font-size: 11px; height: 24px; line-height: 24px; border-bottom: 1px solid #718093; }
        .grid-viewport { flex-grow: 1; overflow-x: auto; margin-left: 5px; border-radius: 0 4px 4px 0; background: #20242c; scroll-behavior: smooth; position: relative; }
        .grid-matrix { display: flex; flex-direction: column; width: max-content; position: relative; }
        .grid-row { display: flex; height: 32px; margin-bottom: 3px; } .grid-row.percussion-row { background: #252a34; }
        .timeline-row { display: flex; height: 24px; margin-bottom: 3px; background: #15181f; border-bottom: 1px solid #718093; }
        .timeline-cell { width: 36px; height: 100%; font-size: 10px; line-height: 24px; color: #7f8fa6; border-right: 1px solid #1e272e; cursor: pointer; box-sizing: border-box; font-weight: bold; }
        .timeline-cell:hover { background: #3d3d3d; color: white; }
        .grid-matrix.ts-4-4 .grid-cell:nth-child(4n), .grid-matrix.ts-4-4 .timeline-cell:nth-child(4n) { border-right: 2px solid #718093; }
        .grid-matrix.ts-4-4 .grid-cell:nth-child(16n), .grid-matrix.ts-4-4 .timeline-cell:nth-child(16n) { border-right: 3px solid #00a8ff; }
        .grid-matrix.ts-6-8 .grid-cell:nth-child(6n), .grid-matrix.ts-6-8 .timeline-cell:nth-child(6n) { border-right: 2px solid #718093; }
        .grid-matrix.ts-6-8 .grid-cell:nth-child(24n), .grid-matrix.ts-6-8 .timeline-cell:nth-child(24n) { border-right: 3px solid #00a8ff; }
        .grid-cell { width: 36px; height: 100%; background: #2d3436; border-right: 1px solid #1e272e; border-bottom: 1px solid #1e272e; cursor: pointer; box-sizing: border-box; position: relative; flex-shrink: 0; }        
        .grid-cell.active { background: #fbc531; box-shadow: inset 0 0 8px #fbc531; border-right-color: transparent; }
        .grid-cell.percussion-cell { background: #343d46; }
        .grid-cell.percussion-cell.active { background: #e84118; box-shadow: inset 0 0 8px #e84118; border-right-color: #1e272e; }
        .grid-cell.hold { background: #f1c40f; opacity: 0.7; border-right-color: transparent; } .grid-cell:hover { background: #485460; }        
        .grid-cell.playing, .timeline-cell.playing { background: rgba(232, 65, 24, 0.35) !important; color: white; border-left: 1px solid #e84118; border-right: 1px solid #e84118; }        
        #status { margin-top: 15px; font-size: 16px; color: #fbc531; min-height: 24px; font-weight: bold; }
        .mixer-group input[type="range"] { width: 80px; accent-color: #00a8ff; }
    </style>
</head>
<body>
    <div class="controls">
        <h1>The Prototype of  MIDI</h1>
        <button onclick="playSequencer()">▶ Play</button>
        <button class="stop" onclick="stopSequencer()">■ Stop</button>
        <button class="clear" onclick="clearGrid()">🔄 Restart</button>       
        <div class="control-group">
            <label for="timeSignature">BPM</label>
            <select id="timeSignature" onchange="resizeGrid()">
                <option value="4-4">4/4</option>
                <option value="6-8">6/8</option>
            </select>
        </div>
        <div class="control-group">
            <label for="synthType">Sound</label>
            <select id="synthType">
                <option value="sine">Sine</option> <option value="triangle">Triangle</option>
                <option value="sawtooth">Sawtooth</option> <option value="square">Square</option>
            </select>
        </div>
        <div class="control-group">
            <label for="bpmRange">BPM</label>
            <input type="range" id="bpmRange" min="60" max="150" value="125" oninput="updateBPM(this.value)">
            <span class="bpm-val" id="bpmShow">125</span>
        </div>
        <div class="control-group">
            <label for="maxBeats">Length</label>
            <input type="number" id="maxBeats" min="4" max="128" value="8" onchange="resizeGrid()">
        </div>
        <div class="control-group mixer-group">
            <label>🎚️ Volume</label>
            <label style="font-size:11px; margin-left:5px;">Keyboard</label><input type="range" id="vol-melody" min="0" max="100" value="100">
            <label style="font-size:11px; margin-left:5px;">Kick</label><input type="range" id="vol-kick" min="0" max="100" value="90">
            <label style="font-size:11px; margin-left:5px;">Snare</label><input type="range" id="vol-snare" min="0" max="100" value="70">
            <label style="font-size:11px; margin-left:5px;">Clap</label><input type="range" id="vol-clap" min="0" max="100" value="70">
            <label style="font-size:11px; margin-left:5px;">Highhat</label><input type="range" id="vol-hat" min="0" max="100" value="50">
        </div>
    </div>
    <div class="sequencer-container">
        <div class="piano-keys" id="pianoKeys">
            <!-- 3번 아이디어 레이블 매핑 -->
            <div class="key-label timeline-label">Location</div>
        </div>
        <div class="grid-viewport" id="gridViewport">
            <div class="grid-matrix ts-4-4" id="gridMatrix"></div>
        </div>
    </div>
    <div id="status">Waiting...</div>
    <script>
        const scaleData = [
            { name: "C6", hz: 1046.50, s: false, type: 'melody' }, { name: "B5", hz: 987.77, s: false, type: 'melody' },
            { name: "A#5", hz: 932.33, s: true, type: 'melody' }, { name: "A5", hz: 880.00, s: false, type: 'melody' },
            { name: "G#5", hz: 830.61, s: true, type: 'melody' }, { name: "G5", hz: 783.99, s: false, type: 'melody' },
            { name: "F#5", hz: 739.99, s: true, type: 'melody' }, { name: "F5", hz: 698.46, s: false, type: 'melody' },
            { name: "E5", hz: 659.25, s: false, type: 'melody' }, { name: "D#5", hz: 622.25, s: true, type: 'melody' },
            { name: "D5", hz: 587.33, s: false, type: 'melody' }, { name: "C#5", hz: 554.37, s: true, type: 'melody' },
            { name: "C5", hz: 523.25, s: false, type: 'melody' }, { name: "B4", hz: 493.88, s: false, type: 'melody' },
            { name: "A#4", hz: 466.16, s: true, type: 'melody' }, { name: "A4", hz: 440.00, s: false, type: 'melody' },
            { name: "G#4", hz: 415.30, s: true, type: 'melody' }, { name: "G4", hz: 392.00, s: false, type: 'melody' },
            { name: "F#4", hz: 369.99, s: true, type: 'melody' }, { name: "F4", hz: 349.23, s: false, type: 'melody' },
            { name: "E4", hz: 329.63, s: false, type: 'melody' }, { name: "D#4", hz: 311.13, s: true, type: 'melody' },
            { name: "D4", hz: 293.66, s: false, type: 'melody' }, { name: "C#4", hz: 277.18, s: true, type: 'melody' },
            { name: "C4", hz: 261.63, s: false, type: 'melody' }
        ];
        const drumData = [
            { name: "🥁 Kick", id: "kick", type: "drum" }, { name: "⚡ Snare", id: "snare", type: "drum" },
            { name: "👏 Clap", id: "clap", type: "drum" }, { name: "✨ Highhat", id: "hat", type: "drum" }
        ];
        const allTracks = [...scaleData, ...drumData];
        const ROWS = allTracks.length;
        let COLS = 32, BPM = 125, stepDuration = 60 / BPM / 4; 
        let audioCtx = null, isPlaying = false, currentStep = 0, playbackInterval = null, activeOscillators = [];
        let isMouseDown = false, startRow = null, startCol = null;
        const keysContainer = document.getElementById('pianoKeys'), matrixContainer = document.getElementById('gridMatrix'), viewport = document.getElementById('gridViewport');

        allTracks.forEach((track) => {
            const key = document.createElement('div');
            key.className = track.type === 'drum' ? 'key-label percussion' : `key-label ${track.s ? 'sharp' : ''}`;
            key.innerText = track.name;
            keysContainer.appendChild(key);
        });

        function buildGrid() {
            matrixContainer.innerHTML = '';
            const timelineRow = document.createElement('div');
            timelineRow.className = 'timeline-row';
            for (let c = 0; c < COLS; c++) {
                const tCell = document.createElement('div');
                tCell.className = 'timeline-cell'; tCell.dataset.col = c;
                const ts = document.getElementById('timeSignature').value;
                let divFactor = ts === "6-8" ? 6 : 4;
                tCell.innerText = (c % divFactor === 0) ? `${Math.floor(c / divFactor) + 1}Bar` : `${c % divFactor + 1}`;
                tCell.addEventListener('click', () => handleTimelineJump(c));
                timelineRow.appendChild(tCell);
            }
            matrixContainer.appendChild(timelineRow);

            for (let r = 0; r < ROWS; r++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = allTracks[r].type === 'drum' ? 'grid-row percussion-row' : 'grid-row';
                for (let c = 0; c < COLS; c++) {
                    const cell = createCell(r, c);
                    rowDiv.appendChild(cell);
                }
                matrixContainer.appendChild(rowDiv);
            }
        }

        function createCell(r, c) {
            const cell = document.createElement('div');
            cell.className = allTracks[r].type === 'drum' ? 'grid-cell percussion-cell' : 'grid-cell';
            cell.dataset.row = r; cell.dataset.col = c;
            cell.addEventListener('mousedown', (e) => handleMouseDown(e, r, c));
            cell.addEventListener('mouseenter', (e) => handleMouseEnter(e, r, c));
            return cell;
        }
        window.addEventListener('mouseup', () => { isMouseDown = false; });
        function handleTimelineJump(targetStep) {
            currentStep = targetStep;
            document.querySelectorAll('.grid-cell.playing, .timeline-cell.playing').forEach(el => el.classList.remove('playing'));
            const currentCell = document.querySelector(`.timeline-cell[data-col="${currentStep}"]`);
            if (currentCell) currentCell.classList.add('playing');
            document.getElementById('status').innerText = `🎯 Jumped`;
        }

        function handleMouseDown(e, r, c) {
            isMouseDown = true;
            const cell = document.querySelector(`.grid-cell[data-row="${r}"][data-col="${c}"]`);
            const isDrum = allTracks[r].type === 'drum';
            if (cell.classList.contains('active') || cell.classList.contains('hold')) {
                clearNoteChain(r, c);
            } else {
                startRow = r; startCol = c; cell.classList.add('active');
                if (!isDrum) cell.dataset.len = 1; 
            }
        }

        function handleMouseEnter(e, r, c) {
            if (!isMouseDown || r !== startRow || c < startCol || allTracks[r].type === 'drum') return;
            const masterCell = document.querySelector(`.grid-cell[data-row="${startRow}"][data-col="${startCol}"]`);
            if (!masterCell) return;
            masterCell.dataset.len = c - startCol + 1;
            for (let i = startCol + 1; i <= c; i++) {
                const nextCell = document.querySelector(`.grid-cell[data-row="${startRow}"][data-col="${i}"]`);
                if (nextCell && !nextCell.classList.contains('active')) nextCell.className = 'grid-cell hold';
            }
        }

        function clearNoteChain(r, c) {
            let start = c;
            let targetCell = document.querySelector(`.grid-cell[data-row="${r}"][data-col="${start}"]`);
            while (targetCell && targetCell.classList.contains('hold') && start > 0) {
                start--;
                targetCell = document.querySelector(`.grid-cell[data-row="${r}"][data-col="${start}"]`);
            }
            const master = document.querySelector(`.grid-cell[data-row="${r}"][data-col="${start}"]`);
            const isDrum = allTracks[r].type === 'drum';
            if (master && master.classList.contains('active')) {
                const len = isDrum ? 1 : (parseInt(master.dataset.len) || 1);
                for (let i = start; i < start + len; i++) {
                    const cleanCell = document.querySelector(`.grid-cell[data-row="${r}"][data-col="${i}"]`);
                    if (cleanCell) {
                        cleanCell.className = isDrum ? 'grid-cell percussion-cell' : 'grid-cell';
                        cleanCell.removeAttribute('data-len');
                    }
                }
            }
        }

        function calculateStepDuration(tsValue) {
            if (tsValue === "6-8") return 60 / BPM / 3;
            return 60 / BPM / 4;
        }

        function updateBPM(val) {
            BPM = parseInt(val); document.getElementById('bpmShow').innerText = BPM;
            const ts = document.getElementById('timeSignature').value;
            stepDuration = calculateStepDuration(ts);
            if (isPlaying) { clearInterval(playbackInterval); startLoop(); }
        }
        function resizeGrid() {
            const beats = parseInt(document.getElementById('maxBeats').value) || 8;
            const ts = document.getElementById('timeSignature').value;
            let cellsPerBar = ts === "6-8" ? 6 : 4;
            const newCols = beats * cellsPerBar;
            stopSequencer();
            COLS = newCols;
            buildGrid();
            stepDuration = calculateStepDuration(ts);
            matrixContainer.className = `grid-matrix ts-${ts}`;
            if (currentStep >= COLS) currentStep = 0;
        }

        function playSequencer() {
            if (isPlaying) return;            
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            isPlaying = true;
            document.getElementById('status').innerText = "🎵 Playing";
            startLoop();
        }

        function startLoop() {
            const synthType = document.getElementById('synthType').value;
            playbackInterval = setInterval(() => {
                if (currentStep >= COLS) currentStep = 0;
                document.querySelectorAll('.grid-cell.playing, .timeline-cell.playing').forEach(el => el.classList.remove('playing'));
                const currentTimelineCell = document.querySelector(`.timeline-cell[data-col="${currentStep}"]`);
                if (currentTimelineCell) currentTimelineCell.classList.add('playing');
                for (let r = 0; r < ROWS; r++) {
                    const cell = document.querySelector(`.grid-cell[data-row="${r}"][data-col="${currentStep}"]`);
                    if (cell) cell.classList.add('playing');
                    if (cell && cell.classList.contains('active')) {
                        if (allTracks[r].type === 'melody') playMelody(allTracks[r].hz, synthType, parseInt(cell.dataset.len) || 1);
                        else playDrum(allTracks[r].id);
                    }
                }
                currentStep++;
            }, stepDuration * 1000);
        }

        function playMelody(freq, synthType, length) {
            const totalDuration = length * stepDuration, osc = audioCtx.createOscillator(), gainNode = audioCtx.createGain();
            osc.type = synthType; osc.frequency.value = freq;
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            const sliderVal = parseInt(document.getElementById('vol-melody').value) / 100;
            const volumeBase = synthType === 'sawtooth' || synthType === 'square' ? 0.05 : 0.14;
            gainNode.gain.setValueAtTime(volumeBase * sliderVal, now);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, now + totalDuration - 0.01);
            osc.start(now); osc.stop(now + totalDuration);
            activeOscillators.push(osc);
        }

        function playDrum(type) {
            const now = audioCtx.currentTime;
            const sliderVal = parseInt(document.getElementById(`vol-${type}`).value) / 100;
            if (type === "kick") {
                const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.15);
                gain.gain.setValueAtTime(0.6 * sliderVal, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now); osc.stop(now + 0.16);
            } else if (type === "snare" || type === "clap") {
                const bufferSize = audioCtx.sampleRate * 0.12, buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate), data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
                const filter = audioCtx.createBiquadFilter(); filter.type = type === "snare" ? "lowpass" : "bandpass"; filter.frequency.value = type === "snare" ? 1000 : 1200;
                const gain = audioCtx.createGain(), baseVol = type === "snare" ? 0.4 : 0.3;
                gain.gain.setValueAtTime(baseVol * sliderVal, now); gain.gain.exponentialRampToValueAtTime(0.01, now + (type === "snare" ? 0.12 : 0.08));
                noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
                noise.start(now); noise.stop(now + 0.15);
            } else if (type === "hat") {
                const osc = audioCtx.createOscillator(), gain = audioCtx.createGain(), filter = document.createElement('div') && audioCtx.createBiquadFilter();
                osc.type = "square"; osc.frequency.setValueAtTime(8000, now); filter.type = "highpass"; filter.frequency.value = 7000;
                gain.gain.setValueAtTime(0.2 * sliderVal, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
                osc.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.05);
            }
        }

        function stopSequencer() {
            clearInterval(playbackInterval); isPlaying = false;
            document.querySelectorAll('.grid-cell.playing, .timeline-cell.playing').forEach(el => el.classList.remove('playing'));
            activeOscillators.forEach(osc => { try { osc.stop(); } catch(e) {} }); activeOscillators = [];
            if (audioCtx) { audioCtx.close(); audioCtx = null; }
            document.getElementById('status').innerText = "⏹ Paused";
        }

        function clearGrid() { stopSequencer(); buildGrid(); viewport.scrollLeft = 0; document.getElementById('status').innerText = "🔄 All deleted"; }
        buildGrid();
    </script>
</body>
</html>
