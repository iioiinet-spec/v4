<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 뉴비 거대 점프맵 (블록 55개)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #87CEEB;
        }
        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.85);
            padding: 15px;
            border-radius: 8px;
            font-family: sans-serif;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            pointer-events: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="controls">
        <strong>🎮 55단 거대 점프맵 미션</strong><br>
        • 이동: WASD / 점프: Spacebar<br>
        • 티배깅: Shift 키 (연타 가능)<br>
        • 목표: 하늘 높이 솟아오른 55번째 골드 발판까지 도달하세요!
    </div>

    <script>
        // --- 1. 기본 3D 세팅 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // 조명
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(30, 80, 30);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // --- 2. 기본 바닥 (거대 잔디밭) ---
        const groundGeometry = new THREE.BoxGeometry(300, 1, 300);
        const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x3cb371 });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.position.y = -0.5;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- 3. [대폭 확장] 55개 점프맵 블록 자동 생성 ---
        const platforms = [];
        
        // 블록 생성을 위한 베이스 배열 생성
        const pData = [];

        // 규칙성 있는 알고리즘과 디테일한 수치 조절로 55개의 블록을 배치합니다.
        let currentX = 0;
        let currentY = 1.5;
        let currentZ = -8;

        for (let i = 1; i <= 55; i++) {
            let bWidth = 4;
            let bDepth = 4;
            let pColor = 0xFF8C00; // 기본 오렌지색 블록

            // 후반부로 갈수록 난이도 상승 (발판이 작아짐)
            if (i > 20) { bWidth = 3; bDepth = 3; pColor = 0xFF4500; } // 다홍색
            if (i > 40) { bWidth = 2.2; bDepth = 2.2; pColor = 0x9400D3; } // 보라색
            if (i === 55) { bWidth = 6; bDepth = 6; pColor = 0xFFD700; } // 최종 목적지는 거대한 골드 블록

            pData.push({
                w: bWidth, h: 1, d: bDepth,
                x: currentX, y: currentY, z: currentZ,
                color: pColor
            });

            // 다음 블록의 위치 계산 (지그재그 및 회전형 상승 패턴)
            currentY += 1.3; // 완만한 상승 높이
            currentZ -= 6.5; // 앞으로 전진

            if (i <= 15) {
                // 1구간: 좌우 지그재그 패턴
                currentX += (i % 2 === 0) ? 3.5 : -3.5;
            } else if (i <= 35) {
                // 2구간: 나선형 회전 회오리 코스 (방향 전환)
                let angle = i * 0.7;
                currentX += Math.sin(angle) * 4.5;
                currentZ += Math.cos(angle) * 2.0; // Z축 변칙 무빙
            } else {
                // 3구간: 극악의 일자형 좁은 징검다리 코스
                currentX += (Math.random() - 0.5) * 2.5; // 미세한 흔들림
            }
        }

        // 실제 3D 맵에 블록 설치 및 충돌 데이터 등록
        pData.forEach((data, index) => {
            const geom = new THREE.BoxGeometry(data.w, data.h, data.d);
            const mat = new THREE.MeshStandardMaterial({ color: data.color });
            const mesh = new THREE.Mesh(geom, mat);
            
            mesh.position.set(data.x, data.y - (data.h / 2), data.z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            
            platforms.push({
                mesh: mesh,
                y: data.y,
                minX: data.x - data.w/2,
                maxX: data.x + data.w/2,
                minZ: data.z - data.d/2,
                maxZ: data.z + data.d/2
            });
        });

        // --- 4. 뉴비 캐릭터 조립 ---
        const noob = new THREE.Group();

        const yellow = new THREE.MeshStandardMaterial({ color: 0xFFD700 }); 
        const blue = new THREE.MeshStandardMaterial({ color: 0x0055FF });   
        const green = new THREE.MeshStandardMaterial({ color: 0x00AA00 });  

        const legHeight = 2.0;   
        const torsoHeight = 2.0; 
        const headHeight = 1.2;  

        // 상체 그룹
        const upperBody = new THREE.Group();

        const torsoGeom = new THREE.BoxGeometry(2.0, torsoHeight, 1.0);
        const torso = new THREE.Mesh(torsoGeom, blue);
        torso.position.y = torsoHeight / 2;
        torso.castShadow = true;
        upperBody.add(torso);

        const headGeom = new THREE.BoxGeometry(headHeight, headHeight, headHeight);
        const head = new THREE.Mesh(headGeom, yellow);
        head.position.y = torsoHeight + (headHeight / 2); 
        head.castShadow = true;
        upperBody.add(head);

        const eyeGeom = new THREE.BoxGeometry(0.15, 0.15, 0.1);
        const faceMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
        const leftEye = new THREE.Mesh(eyeGeom, faceMat);
        const rightEye = new THREE.Mesh(eyeGeom, faceMat);
        leftEye.position.set(-0.3, head.position.y + 0.1, -0.61);
        rightEye.position.set(0.3, head.position.y + 0.1, -0.61);
        upperBody.add(leftEye, rightEye);

        const mouthGeom = new THREE.BoxGeometry(0.4, 0.08, 0.1);
        const mouth = new THREE.Mesh(mouthGeom, faceMat);
        mouth.position.set(0, head.position.y - 0.2, -0.61);
        upperBody.add(mouth);

        const armGeom = new THREE.BoxGeometry(0.5, 2.0, 1.0); 
        const leftArm = new THREE.Mesh(armGeom, yellow);
        leftArm.position.set(-1.25, torsoHeight / 2, 0); 
        leftArm.castShadow = true;
        upperBody.add(leftArm);

        const rightArm = new THREE.Mesh(armGeom, yellow);
        rightArm.position.set(1.25, torsoHeight / 2, 0); 
        rightArm.castShadow = true;
        upperBody.add(rightArm);

        upperBody.position.y = legHeight;
        noob.add(upperBody);

        // 하체 (양다리)
        const legGeom = new THREE.BoxGeometry(0.95, legHeight, 1.0); 
        const leftLeg = new THREE.Mesh(legGeom, green);
        leftLeg.position.set(-0.5, legHeight / 2, 0); 
        leftLeg.castShadow = true;
        noob.add(leftLeg);

        const rightLeg = new THREE.Mesh(legGeom, green);
        rightLeg.position.set(0.5, legHeight / 2, 0); 
        rightLeg.castShadow = true;
        noob.add(rightLeg);

        noob.position.set(0, 0, 0);
        scene.add(noob);

        // --- 5. 상태 변수 및 키보드 제어 ---
        const keys = { w: false, a: false, s: false, d: false, space: false, shift: false };
        
        let velocityY = 0;
        let isJumping = false;
        
        const moveSpeed = 0.22;
        const gravity = 0.02;      
        const jumpPower = 0.48;    

        window.addEventListener('keydown', (e) => {
            let key = e.key.toLowerCase();
            if (e.code === 'Space') key = 'space';
            if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') key = 'shift';
            if (key in keys) {
                keys[key] = true;
                if (key === 'space' || key === 'shift') e.preventDefault();
            }
        });

        window.addEventListener('keyup', (e) => {
            let key = e.key.toLowerCase();
            if (e.code === 'Space') key = 'space';
            if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') key = 'shift';
            if (key in keys) keys[key] = false;
        });

        // --- 6. 게임 애니메이션 루프 ---
        let clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            let isMoving = false;

            // 이동 및 회전
            if (keys.w) { noob.position.z -= moveSpeed; noob.rotation.y = 0; isMoving = true; } 
            if (keys.s) { noob.position.z += moveSpeed; noob.rotation.y = Math.PI; isMoving = true; } 
            if (keys.a) { noob.position.x -= moveSpeed; noob.rotation.y = Math.PI / 2; isMoving = true; } 
            if (keys.d) { noob.position.x += moveSpeed; noob.rotation.y = -Math.PI / 2; isMoving = true; } 

            if (keys.w && keys.a) noob.rotation.y = Math.PI * 0.25;
            if (keys.w && keys.d) noob.rotation.y = -Math.PI * 0.25;
            if (keys.s && keys.a) noob.rotation.y = Math.PI * 0.75;
            if (keys.s && keys.d) noob.rotation.y = -Math.PI * 0.75;

            // 걷기 애니메이션
            if (isMoving && !keys.shift) {
                const time = clock.getElapsedTime() * 12; 
                leftLeg.rotation.x = Math.sin(time) * 0.4;
                leftLeg.position.z = Math.sin(time) * 0.2;
                rightLeg.rotation.x = -Math.sin(time) * 0.4;
                rightLeg.position.z = -Math.sin(time) * 0.2;
                leftArm.rotation.x = -Math.sin(time) * 0.3;
                rightArm.rotation.x = Math.sin(time) * 0.3;
            } else {
                leftLeg.rotation.x = 0; leftLeg.position.z = 0;
                rightLeg.rotation.x = 0; rightLeg.position.z = 0;
                leftArm.rotation.x = 0; rightArm.rotation.x = 0;
            }

            // 티배깅 처리
            if (keys.shift && !isJumping) {
                upperBody.position.y = legHeight * 0.5;
                leftLeg.scale.set(1.2, 0.5, 1.2);
                rightLeg.scale.set(1.2, 0.5, 1.2);
                leftLeg.position.y = (legHeight * 0.5) / 2;
                rightLeg.position.y = (legHeight * 0.5) / 2;
            } else {
                upperBody.position.y = legHeight;
                leftLeg.scale.set(1, 1, 1);
                rightLeg.scale.set(1, 1, 1);
                leftLeg.position.y = legHeight / 2;
                rightLeg.position.y = legHeight / 2;
            }

            // 실시간 바닥/발판 착지 판정 (중력)
            let currentGroundY = 0;
            for (let p of platforms) {
                if (noob.position.x >= p.minX && noob.position.x <= p.maxX &&
                    noob.position.z >= p.minZ && noob.position.z <= p.maxZ) {
                    if (noob.position.y >= p.y - 0.2) {
                        currentGroundY = p.y;
                        break;
                    }
                }
            }

            if (keys.space && !isJumping && noob.position.y <= currentGroundY + 0.05) {
                velocityY = jumpPower;
                isJumping = true;
            }

            if (noob.position.y > currentGroundY || isJumping) {
                isJumping = true; 
                velocityY -= gravity; 
                noob.position.y += velocityY; 

                if (noob.position.y <= currentGroundY) {
                    noob.position.y = currentGroundY;
                    velocityY = 0;
                    isJumping = false;
                }
            }

            // 카메라 트래킹 (높이 올라가는 것을 감안하여 Y축 시점 유연하게 대처)
            camera.position.x = noob.position.x;
            camera.position.z = noob.position.z + 15; 
            camera.position.y = noob.position.y + 9;  
            camera.lookAt(noob.position.x, noob.position.y + 3, noob.position.z);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
