<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>키보드 피아노</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:sans-serif;

    background:
      linear-gradient(45deg,#333 25%,transparent 25%),
      linear-gradient(-45deg,#333 25%,transparent 25%),
      linear-gradient(45deg,transparent 75%,#333 75%),
      linear-gradient(-45deg,transparent 75%,#333 75%);
    background-size:60px 60px;
    background-position:0 0,0 30px,30px -30px,-30px 0;
    background-color:#444;
}

h1{
    text-align:center;
    color:white;
}

#piano{
    display:flex;
    justify-content:center;
    margin-top:40px;
}

.key{
    width:85px;
    height:320px;
    background:white;
    border:2px solid black;
    border-radius:0 0 12px 12px;
    margin:2px;
    position:relative;
    transition:.08s;
    cursor:pointer;
    user-select:none;
}

.key.active{
    transform:translateY(8px);
    box-shadow:0 0 40px white;
}

.label{
    position:absolute;
    bottom:12px;
    width:100%;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.ripple{
    position:absolute;
    border-radius:50%;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    animation:ripple .8s linear forwards;
    pointer-events:none;
}

@keyframes ripple{
    from{
        width:10px;
        height:10px;
        opacity:1;
    }
    to{
        width:180px;
        height:180px;
        opacity:0;
    }
}
</style>
</head>

<body>

<h1>⌨️ 키보드 피아노 (A S D F G H J K L ;)</h1>

<div id="piano"></div>

<script>

const AudioContext=window.AudioContext||window.webkitAudioContext;
const ctx=new AudioContext();

const notes=[
{key:"a",freq:261.63,color:"red",name:"도"},
{key:"s",freq:293.66,color:"orange",name:"레"},
{key:"d",freq:329.63,color:"yellow",name:"미"},
{key:"f",freq:349.23,color:"limegreen",name:"파"},
{key:"g",freq:392.00,color:"dodgerblue",name:"솔"},
{key:"h",freq:440.00,color:"indigo",name:"라"},
{key:"j",freq:493.88,color:"violet",name:"시"},
{key:"k",freq:523.25,color:"magenta",name:"도"},
{key:"l",freq:587.33,color:"white",name:"레"},
{key:";",freq:659.25,color:"saddlebrown",name:"미"}
];

const piano=document.getElementById("piano");

notes.forEach(n=>{

let div=document.createElement("div");
div.className="key";
div.id=n.key;

let label=document.createElement("div");
label.className="label";
label.innerHTML=n.key.toUpperCase()+"<br>"+n.name;

div.appendChild(label);
piano.appendChild(div);

div.onclick=()=>play(n);

});

function play(note){

ctx.resume();

let osc1=ctx.createOscillator();
let osc2=ctx.createOscillator();

let gain=ctx.createGain();

osc1.type="triangle";
osc2.type="sine";

osc1.frequency.value=note.freq;
osc2.frequency.value=note.freq*2;

osc2.gain=0.2;

osc1.connect(gain);
osc2.connect(gain);

gain.connect(ctx.destination);

let t=ctx.currentTime;

gain.gain.setValueAtTime(0,t);
gain.gain.linearRampToValueAtTime(.7,t+.01);
gain.gain.exponentialRampToValueAtTime(.4,t+.15);
gain.gain.exponentialRampToValueAtTime(.001,t+2);

osc1.start(t);
osc2.start(t);

osc1.stop(t+2);
osc2.stop(t+2);

let key=document.getElementById(note.key);

key.classList.add("active");

let ripple=document.createElement("div");
ripple.className="ripple";
ripple.style.background=note.color;

key.appendChild(ripple);

setTimeout(()=>{
ripple.remove();
key.classList.remove("active");
},700);

}

document.addEventListener("keydown",(e)=>{

let n=notes.find(x=>x.key===e.key.toLowerCase());

if(n) play(n);

});

</script>

</body>
</html><!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 오실로스코프 피아노</title>
    <style>
        /* 배경: 체크무늬 패턴 */
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            background-image: 
                linear-gradient(45deg, #e0e0e0 25%, transparent 25%, transparent 75%, #e0e0e0 75%, #e0e0e0),
                linear-gradient(45deg, #e0e0e0 25%, #f5f5f5 25%, #f5f5f5 75%, #e0e0e0 75%, #e0e0e0);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        /* 오실로스코프 캔버스 */
        #visualizer {
            width: 800px;
            height: 150px;
            background: rgba(20, 20, 20, 0.9);
            border-radius: 10px;
            box-shadow: inset 0 0 10px #000, 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        /* 피아노 건반 컨테이너 */
        .piano {
            display: flex;
            background: #222;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            position: relative;
        }

        /* 건반 기본 스타일 */
        .key {
            width: 60px;
            height: 240px;
            margin: 0 3px;
            border-radius: 0 0 8px 8px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 15px;
            box-sizing: border-box;
            font-weight: bold;
            font-size: 14px;
            color: #333;
            position: relative;
            user-select: none;
            transition: transform 0.05s, box-shadow 0.05s;
            box-shadow: inset 0 -5px 0 rgba(0,0,0,0.2), 0 4px 5px rgba(0,0,0,0.2);
        }

        /* 안내 문구 스타일 */
        .key span {
            background: rgba(255, 255, 255, 0.7);
            padding: 2px 6px;
            border-radius: 4px;
            margin-top: 5px;
            pointer-events: none;
        }

        /* 누르고 있을 때 효과 */
        .key.active {
            transform: translateY(4px);
            box-shadow: inset 0 2px 0 rgba(0,0,0,0.2), 0 1px 2px rgba(0,0,0,0.2);
            filter: brightness(1.2);
        }

        /* 건반별 지정 색상 */
        .key[data-note="도1"] { background-color: #ff4d4d; } /* 빨강 */
        .key[data-note="레1"] { background-color: #ff944d; } /* 주황 */
        .key[data-note="미1"] { background-color: #ffee4d; } /* 노랑 */
        .key[data-note="파1"] { background-color: #4dff4d; } /* 초록 */
        .key[data-note="솔1"] { background-color: #4da6ff; } /* 파랑 */
        .key[data-note="라1"] { background-color: #4d4dff; } /* 남색 */
        .key[data-note="시1"] { background-color: #b34dff; } /* 보라 */
        .key[data-note="도2"] { background-color: #ff4dff; } /* 자주 */
        .key[data-note="레2"] { background-color: #ffffff; } /* 흰색 */
        .key[data-note="미2"] { background-color: #8b5a2b; color: #fff; } /* 갈색 */

        /* 파동 이펙트 링 */
        .wave-effect {
            position: absolute;
            border: 2px solid rgba(255,255,255,0.8);
            border-radius: 50%;
            pointer-events: none;
            animation: ripple 0.4s linear forwards;
        }

        @keyframes ripple {
            0% {
                width: 0px;
                height: 0px;
                opacity: 1;
            }
            100% {
                width: 150px;
                height: 150px;
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <h1>Oscilloscope Piano</h1>
    <canvas id="visualizer"></canvas>

    <div class="piano" id="piano">
        <div class="key" data-key="a" data-note="도1">도<span>A</span></div>
        <div class="key" data-key="s" data-note="레1">레<span>S</span></div>
        <div class="key" data-key="d" data-note="미1">미<span>D</span></div>
        <div class="key" data-key="f" data-note="파1">파<span>F</span></div>
        <div class="key" data-key="g" data-note="솔1">솔<span>G</span></div>
        <div class="key" data-key="h" data-note="라1">라<span>H</span></div>
        <div class="key" data-key="j" data-note="시1">시<span>J</span></div>
        <div class="key" data-key="k" data-note="도2">도<span>K</span></div>
        <div class="key" data-key="l" data-note="레2">레<span>L</span></div>
        <div class="key" data-key=";" data-note="미2">미<span>;</span></div>
    </div>

    <script>
        // Web Audio API 설정 및 주파수 매핑 (매끄러운 피아노 음색용 주파수)
        const noteFreqs = {
            "a": 261.63, // 도1 (C4)
            "s": 293.66, // 레1 (D4)
            "d": 329.63, // 미1 (E4)
            "f": 349.23, // 파1 (F4)
            "g": 392.00, // 솔1 (G4)
            "h": 440.00, // 라1 (A4)
            "j": 493.88, // 시1 (B4)
            "k": 523.25, // 도2 (C5)
            "l": 587.33, // 레2 (D5)
            ";": 659.25  // 미2 (E5)
        };

        let audioCtx = null;
        let analyser = null;
        const activeNodes = {}; // 현재 연주 중인 노드 저장용

        // 오디오 컨텍스트 초기화 (브라우저 보안 정책 대응)
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 2048;
                analyser.connect(audioCtx.destination);
                drawOscilloscope();
            }
        }

        // 소리 내기 함수 (매끄러운 서스테인과 릴리즈 적용)
        function playNote(key) {
            initAudio();
            if (!noteFreqs[key] || activeNodes[key]) return;

            // 오실레이터(소리 생성기) 설정
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            // 피아노에 가까운 부드러운 소리를 위해 사인파(sine)와 삼각파(triangle) 혼합 가능하나, 
            // 요청하신 매끄러운 소리를 위해 기본 부드러운 sine파 적용 + Gain 조절
            osc.type = 'sine'; 
            osc.frequency.setValueAtTime(noteFreqs[key], audioCtx.currentTime);

            // 볼륨 엔벨로프 (매끄러운 소리의 핵심: Attack과 Release 적용)
            const now = audioCtx.currentTime;
            gainNode.gain.setValueAtTime(0, now);
            // Attack: 누를 때 아주 살짝 부드럽게 볼륨이 커짐 (0.02초)
            gainNode.gain.linearRampToValueAtTime(0.4, now + 0.02); 

            osc.connect(gainNode);
            gainNode.connect(analyser);
            osc.start();

            activeNodes[key] = { osc, gainNode };

            // 시각 효과 트리거
            activateKeyUI(key);
        }

        // 소리 끄기 함수
        function stopNote(key) {
            if (!activeNodes[key]) return;

            const now = audioCtx.currentTime;
            const { osc, gainNode } = activeNodes[key];

            // Release: 뗄 때 뚝 끊기지 않고 부드럽게 사라짐 (0.3초 동안 서서히 감소)
            gainNode.gain.setValueAtTime(gainNode.gain.value, now);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
            
            osc.stop(now + 0.3);
            delete activeNodes[key];

            // UI 비활성화
            deactivateKeyUI(key);
        }

        // UI 활성화 및 파동 효과 생성
        function activateKeyUI(key) {
            const keyEl = document.querySelector(`.key[data-key="${key}"]`);
            if (keyEl) {
                keyEl.classList.add('active');
                createWave(keyEl);
            }
        }

        function deactivateKeyUI(key) {
            const keyEl = document.querySelector(`.key[data-key="${key}"]`);
            if (keyEl) {
                keyEl.classList.remove('active');
            }
        }

        // 작은 파동 효과 생성 함수
        function createWave(element) {
            const wave = document.createElement('div');
            wave.classList.add('wave-effect');
            
            // 건반 중심부에 파동 위치 계산
            wave.style.left = `calc(50% - 0px)`;
            wave.style.top = `calc(80% - 0px)`;
            
            element.appendChild(wave);
            
            // 애니메이션 종료 후 요소 삭제
            wave.addEventListener('animationend', () => {
                wave.remove();
            });
        }

        // 키보드 이벤트 리스너
        window.addEventListener('keydown', (e) => {
            if (e.repeat) return; // 꾹 누르고 있을 때 중복 실행 방지
            const key = e.key.toLowerCase();
            if (noteFreqs[key]) playNote(key);
        });

        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (noteFreqs[key]) stopNote(key);
        });

        // 마우스 클릭 연주 지원
        const keys = document.querySelectorAll('.key');
        keys.forEach(keyEl => {
            const key = keyEl.getAttribute('data-key');
            keyEl.addEventListener('mousedown', () => playNote(key));
            keyEl.addEventListener('mouseup', () => stopNote(key));
            keyEl.addEventListener('mouseleave', () => stopNote(key));
        });

        // --- 오실로스코프 (사인파 스타일 비주얼라이저) 그리기 ---
        const canvas = document.getElementById('visualizer');
        const canvasCtx = canvas.getContext('2d');
        
        // 캔버스 크기 해상도 맞추기
        canvas.width = 800;
        canvas.height = 150;

        function drawOscilloscope() {
            requestAnimationFrame(drawOscilloscope);

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteTimeDomainData(dataArray);

            // 캔버스 초기화
            canvasCtx.fillStyle = 'rgba(20, 20, 20, 0.2)'; // 잔상 효과를 위해 약간 투명하게 채움
            canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

            // 격자선 그리기 (오실로스코프 스타일)
            canvasCtx.lineWidth = 0.5;
            canvasCtx.strokeStyle = 'rgba(0, 100, 0, 0.3)';
            for(let i=0; i<canvas.width; i+=40) {
                canvasCtx.beginPath(); canvasCtx.moveTo(i, 0); canvasCtx.lineTo(i, canvas.height); canvasCtx.stroke();
            }
            for(let i=0; i<canvas.height; i+=30) {
                canvasCtx.beginPath(); canvasCtx.moveTo(0, i); canvasCtx.lineTo(canvas.width, i); canvasCtx.stroke();
            }

            // 부드러운 사인파선 설정
            canvasCtx.lineWidth = 3;
            canvasCtx.strokeStyle = '#00ffcc'; // 네온 민트색 파형
            canvasCtx.shadowBlur = 6;
            canvasCtx.shadowColor = '#00ffcc';
            canvasCtx.beginPath();

            const sliceWidth = canvas.width * 1.0 / bufferLength;
            let x = 0;

            for (let i = 0; i < bufferLength; i++) {
                const v = dataArray[i] / 128.0;
                const y = v * canvas.height / 2;

                if (i === 0) {
                    canvasCtx.moveTo(x, y);
                } else {
                    canvasCtx.lineTo(x, y);
                }

                x += sliceWidth;
            }

            canvasCtx.lineTo(canvas.width, canvas.height / 2);
            canvasCtx.stroke();
            canvasCtx.shadowBlur = 0; // 다른 그리기에 영향 안 주도록 리셋
        }
    </script>
</body>
</html>
