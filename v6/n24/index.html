<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비주얼라이저 선택형 피아노</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #1e272e;
            font-family: 'Arial', sans-serif;
            margin: 0;
            overflow: hidden;
        }
        h1 { color: #ffffff; margin-bottom: 5px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        p { color: #a4b0be; margin-bottom: 15px; }
        
        /* 모드 선택 버튼 컨테이너 */
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .btn {
            background-color: #485460;
            color: #ffffff;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .btn:hover { background-color: #57606f; }
        .btn.active {
            background-color: #2ed573;
            box-shadow: 0 0 10px rgba(46, 213, 115, 0.6);
        }

        /* 시각화 캔버스 */
        #visualizer {
            width: 600px;
            height: 150px;
            background: #2f3640;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 5px 15px rgba(0,0,0,0.3);
        }

        .piano {
            display: flex;
            position: relative;
            box-shadow: 0px 15px 25px rgba(0,0,0,0.5);
            border-radius: 0 0 10px 10px;
            background: #2c3e50;
            padding: 0 5px 5px 5px;
        }

        /* 흰 건반 */
        .key.white {
            width: 65px;
            height: 220px;
            background: white;
            border: 1px solid #dcdde1;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 20px;
            cursor: pointer;
            user-select: none;
            z-index: 1;
            transition: background 0.05s ease;
        }
        .key.white:active, .key.white.active {
            background: #ececec;
            height: 218px;
            border-top: 4px solid var(--press-color);
        }

        /* 검은 건반 (샵) */
        .key.black {
            width: 40px;
            height: 130px;
            background: #2c3e50;
            border: 1px solid #1e272e;
            position: absolute;
            top: 0;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 15px;
            cursor: pointer;
            user-select: none;
            border-radius: 0 0 5px 5px;
            box-shadow: 0px 5px 5px rgba(0,0,0,0.3);
            transition: background 0.05s ease;
        }
        .key.black:active, .key.black.active {
            background: var(--press-color);
            height: 128px;
        }

        /* 검은 건반 위치 */
        .key[data-key="q"] { left: 50px; }
        .key[data-key="w"] { left: 115px; }
        .key[data-key="e"] { left: 245px; }
        .key[data-key="r"] { left: 310px; }
        .key[data-key="t"] { left: 375px; }

        /* 텍스트 스타일 */
        .note { font-weight: bold; font-size: 16px; color: #2c3e50; }
        .key.black .note { color: white; font-size: 14px; }
        
        .hint { font-size: 12px; font-weight: bold; margin-top: 5px; text-transform: uppercase; }
        .key.white .hint { color: #718093; }
        .key.black .hint { color: #f5f6fa; }
    </style>
</head>
<body>

    <h1>🎵 멀티 비주얼라이저 피아노</h1>
    <p>원하는 효과 버튼을 클릭한 뒤 건반을 연주해 보세요!</p>

    <div class="controls">
        <button id="btn-wave" class="btn active">〰️ 음파 모드</button>
        <button id="btn-graph" class="btn">📊 그래프 모드</button>
    </div>

    <canvas id="visualizer"></canvas>

    <div class="piano">
        <div class="key white" data-note="도" data-freq="261.63" data-key="a" style="--press-color: #ff4757;"><span class="note">도</span><span class="hint">A</span></div>
        <div class="key white" data-note="레" data-freq="293.66" data-key="s" style="--press-color: #ffa502;"><span class="note">레</span><span class="hint">S</span></div>
        <div class="key white" data-note="미" data-freq="329.63" data-key="d" style="--press-color: #eccc68;"><span class="note">미</span><span class="hint">D</span></div>
        <div class="key white" data-note="파" data-freq="349.23" data-key="f" style="--press-color: #2ed573;"><span class="note">파</span><span class="hint">F</span></div>
        <div class="key white" data-note="솔" data-freq="392.00" data-key="j" style="--press-color: #1e90ff;"><span class="note">솔</span><span class="hint">J</span></div>
        <div class="key white" data-note="라" data-freq="440.00" data-key="k" style="--press-color: #3742fa;"><span class="note">라</span><span class="hint">K</span></div>
        <div class="key white" data-note="시" data-freq="493.88" data-key="l" style="--press-color: #9b59b6;"><span class="note">시</span><span class="hint">L</span></div>
        <div class="key white" data-note="도" data-freq="523.25" data-key=";" style="--press-color: #ff6b81;"><span class="note">도</span><span class="hint">;</span></div>

        <div class="key black" data-note="도#" data-freq="277.18" data-key="q" style="--press-color: #ff6348;"><span class="note">도#</span><span class="hint">Q</span></div>
        <div class="key black" data-note="레#" data-freq="311.13" data-key="w" style="--press-color: #ffd32a;"><span class="note">레#</span><span class="hint">W</span></div>
        <div class="key black" data-note="파#" data-freq="369.99" data-key="e" style="--press-color: #05c46b;"><span class="note">파#</span><span class="hint">E</span></div>
        <div class="key black" data-note="솔#" data-freq="415.30" data-key="r" style="--press-color: #0fbcf9;"><span class="note">솔#</span><span class="hint">R</span></div>
        <div class="key black" data-note="라#" data-freq="466.16" data-key="t" style="--press-color: #5758bb;"><span class="note">라#</span><span class="hint">T</span></div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256; // 그래프 모드와 음파 모드 모두 적절히 표현되도록 조정
        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);

        const canvas = document.getElementById('visualizer');
        const canvasCtx = canvas.getContext('2d');
        canvas.width = 600;
        canvas.height = 150;

        let currentStrokeColor = '#2ed573';
        let currentMode = 'wave'; // 'wave'(음파) 또는 'graph'(그래프)

        // 버튼 마우스 클릭 이벤트 바인딩
        const btnWave = document.getElementById('btn-wave');
        const btnGraph = document.getElementById('btn-graph');

        btnWave.addEventListener('click', () => {
            currentMode = 'wave';
            btnWave.classList.add('active');
            btnGraph.classList.remove('active');
        });

        btnGraph.addEventListener('click', () => {
            currentMode = 'graph';
            btnGraph.classList.add('active');
            btnWave.classList.remove('active');
        });

        function playTone(freq, color) {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            // 파형 분석이 잘 잡히도록 중간 질감인 삼각파(triangle) 사용
            oscillator.type = 'triangle'; 
            oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
            
            oscillator.connect(gainNode);
            gainNode.connect(analyser);
            analyser.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.8);

            currentStrokeColor = color;
        }

        // 메인 시각화 드로잉 루프
        function draw() {
            requestAnimationFrame(draw);

            canvasCtx.fillStyle = '#2f3640';
            canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

            if (currentMode === 'wave') {
                // 1. 음파(Time Domain) 모드 그리기
                analyser.getByteTimeDomainData(dataArray);

                canvasCtx.lineWidth = 3;
                canvasCtx.strokeStyle = currentStrokeColor;
                canvasCtx.shadowBlur = 6;
                canvasCtx.shadowColor = currentStrokeColor;
                canvasCtx.beginPath();

                const sliceWidth = canvas.width * 1.0 / bufferLength;
                let x = 0;

                for (let i = 0; i < bufferLength; i++) {
                    const v = dataArray[i] / 128.0;
                    const y = v * canvas.height / 2;

                    if (i === 0) {
                        canvasCtx.moveTo(x, y);
                    } else {
                        canvasCtx.lineTo(x, y);
                    }
                    x += sliceWidth;
                }
                canvasCtx.lineTo(canvas.width, canvas.height / 2);
                canvasCtx.stroke();
                canvasCtx.shadowBlur = 0;

            } else if (currentMode === 'graph') {
                // 2. 그래프(Frequency Data) 모드 그리기
                analyser.getByteFrequencyData(dataArray);

                const barWidth = (canvas.width / bufferLength) * 1.5;
                let barHeight;
                let x = 0;

                canvasCtx.shadowBlur = 4;
                canvasCtx.shadowColor = currentStrokeColor;

                for (let i = 0; i < bufferLength; i++) {
                    barHeight = dataArray[i] * 0.55; // 캔버스 높이에 맞춰 높이 비율 조정

                    // 건반 색상을 기반으로 주파수 막대 그리기
                    canvasCtx.fillStyle = currentStrokeColor;
                    canvasCtx.fillRect(x, canvas.height - barHeight, barWidth - 2, barHeight);

                    x += barWidth;
                }
                canvasCtx.shadowBlur = 0;
            }
        }

        draw();

        // 마우스로 건반 클릭
        const keys = document.querySelectorAll('.key');
        keys.forEach(key => {
            key.addEventListener('mousedown', (e) => {
                e.stopPropagation();
                const freq = key.getAttribute('data-freq');
                const color = window.getComputedStyle(key).getPropertyValue('--press-color');
                playTone(freq, color);
            });
        });

        // 키보드 연주
        window.addEventListener('keydown', (e) => {
            if (e.repeat) return;
            const pressedKey = e.key.toLowerCase(); 
            const keyEl = document.querySelector(`.key[data-key="${pressedKey}"]`);
            
            if (keyEl) {
                keyEl.classList.add('active');
                const freq = keyEl.getAttribute('data-freq');
                const color = window.getComputedStyle(keyEl).getPropertyValue('--press-color');
                playTone(freq, color);
            }
        });

        window.addEventListener('keyup', (e) => {
            const pressedKey = e.key.toLowerCase();
            const keyEl = document.querySelector(`.key[data-key="${pressedKey}"]`);
            if (keyEl) {
                keyEl.classList.remove('active');
            }
        });
    </script>
</body>
</html>
