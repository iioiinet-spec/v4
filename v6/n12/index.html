<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>피타고라스의 정리 시뮬레이터</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Serif KR', serif;
            background-color: #fcfbfa;
            color: #2c2a29;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            /* 우클릭 메뉴 방지 */
            user-select: none;
        }

        h1 {
            font-family: 'Cinzel', 'Noto Serif KR', serif;
            font-size: 2rem;
            letter-spacing: 2px;
            margin-bottom: 40px;
            color: #1a1a1a;
            border-bottom: 2px solid #d4af37; /* 금빛 포인트 라인 */
            padding-bottom: 10px;
        }

        /* 메인 컨테이너 */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #ffffff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid #eaeaea;
        }

        /* 삼각형이 그려질 캔버스 영역 영역 */
        .canvas-container {
            position: relative;
            width: 450px;
            height: 400px;
            margin-bottom: 40px;
        }

        canvas {
            width: 100%;
            height: 100%;
        }

        /* 조작 버튼 및 라벨 스타일 */
        .btn-label {
            position: absolute;
            background-color: #ffffff;
            border: 1px solid #d4af37;
            padding: 8px 16px;
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
            border-radius: 4px;
        }

        .btn-label:hover {
            background-color: #d4af37;
            color: white;
            transform: translateY(-2px);
        }

        /* 좌하단 A 버튼 위치 */
        #btn-a {
            bottom: 10px;
            left: 20px;
        }

        /* 우하단 B 버튼 위치 */
        #btn-b {
            bottom: 10px;
            right: 20px;
        }

        /* 변 길이 표시 레이블 */
        .side-label {
            position: absolute;
            font-family: 'Cinzel', 'Noto Serif KR', serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: #4a4a4a;
            background: rgba(255, 255, 255, 0.8);
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* 수식 영역 */
        .formula-container {
            text-align: center;
            border-top: 1px solid #eee;
            padding-top: 30px;
            width: 100%;
        }

        .formula {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 15px;
        }

        .formula sup {
            font-size: 1.1rem;
            color: #d4af37;
        }

        .description {
            font-size: 0.9rem;
            color: #888;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <h1>Pythagorean Theorem</h1>

    <div class="container" id="main-area">
        <div class="canvas-container">
            <canvas id="triangleCanvas" width="450" height="400"></canvas>
            
            <button id="btn-a" class="btn-label" onclick="incrementA(event)">A : <span id="val-a-btn">3</span></button>
            <button id="btn-b" class="btn-label" onclick="incrementB(event)">B : <span id="val-b-btn">4</span></button>

            <div id="label-a" class="side-label"></div>
            <div id="label-b" class="side-label"></div>
            <div id="label-c" class="side-label"></div>
        </div>

        <div class="formula-container">
            <div class="formula">
                a² + b² = c²
            </div>
            <div class="formula" style="font-size: 1.5rem; color: #555;">
                <span id="calc-a">3</span>² + <span id="calc-b">4</span>² = <span id="calc-c">5.00</span>²
            </div>
            <div class="formula" style="font-size: 1.3rem; color: #d4af37; margin-top: 10px;">
                <span id="num-a">9</span> + <span id="num-b">16</span> = <span id="num-c">25</span>
            </div>
            <p class="description">💡 좌하단 A, 우하단 B 버튼을 클릭하면 1씩 증가합니다. | 마우스 우클릭을 하면 모든 값이 2씩 감소합니다.</p>
        </div>
    </div>

    <script>
        // 초기 변의 길이 설정 (기본 3, 4, 5 트리오)
        let a = 3; // 아랫변 (밑변)
        let b = 4; // 세로변 (높이)

        const canvas = document.getElementById('triangleCanvas');
        const ctx = canvas.getContext('2d');

        // 전체 화면 우클릭 메뉴 방지 및 우클릭 시 값 2씩 감소 이벤트
        window.addEventListener('contextmenu', function(e) {
            e.preventDefault(); // 기본 우클릭 메뉴 팝업 방지
            
            // 모든 값이 최소 1 이상은 유지되도록 제한하며 2씩 감소
            if (a > 2 && b > 2) {
                a -= 2;
                b -= 2;
            } else {
                // 최소값 방어 코드
                if (a > 1) a -= 1;
                if (b > 1) b -= 1;
            }
            update();
        });

        // A 값 증가 (좌하단 버튼)
        function incrementA(event) {
            event.stopPropagation(); // 우클릭 버블링 방지
            a += 1;
            update();
        }

        // B 값 증가 (우하단 버튼)
        function incrementB(event) {
            event.stopPropagation(); // 우클릭 버블링 방지
            b += 1;
            update();
        }

        // 렌더링 및 계산 업데이트 함수
        function update() {
            // 1. 빗변 c 계산
            const c = Math.sqrt(a*a + b*b);

            // 2. UI 텍스트 업데이트 (소수점 둘째자리까지 표기)
            document.getElementById('val-a-btn').innerText = a;
            document.getElementById('val-b-btn').innerText = b;
            
            document.getElementById('calc-a').innerText = a;
            document.getElementById('calc-b').innerText = b;
            document.getElementById('calc-c').innerText = c.toFixed(2);

            document.getElementById('num-a').innerText = a*a;
            document.getElementById('num-b').innerText = b*b;
            document.getElementById('num-c').innerText = (c*c).toFixed(0);

            // 3. 변 옆의 글자 및 값 위치 계산용 레이블 업데이트
            const labelA = document.getElementById('label-a');
            const labelB = document.getElementById('label-b');
            const labelC = document.getElementById('label-c');

            labelA.innerText = `a = ${a}`;
            labelB.innerText = `b = ${b}`;
            labelC.innerText = `c = ${c.toFixed(2)}`;

            // 4. 삼각형 그리기
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 화면에 이쁘게 그리기 위한 스케일 비율 조정 (값이 너무 커지거나 작아질 때 대응)
            const maxVal = Math.max(a, b);
            const scale = Math.min(260 / maxVal, 50); // 적절한 크기로 제한

            // 기준점 설정 (직각이 있는 곳이 우하단 버튼 근처이므로 좌표 설정 주의)
            // 좌하단(A)에서 시작해서 우하단(B)을 거쳐 위로 올라가는 형태
            const startX = 60; 
            const startY = 320; 
            
            const pX_A = startX;                  // 좌하단 점 (A 버튼 위치 근처)
            const pY_A = startY;
            
            const pX_RightAngle = startX + (a * scale); // 우하단 점 (직각 위치, B 버튼 근처)
            const pY_RightAngle = startY;
            
            const pX_Top = pX_RightAngle;         // 상단 점
            const pY_Top = startY - (b * scale);

            // 삼각형 선 그리기
            ctx.beginPath();
            ctx.moveTo(pX_A, pY_A);
            ctx.lineTo(pX_RightAngle, pY_RightAngle);
            ctx.lineTo(pX_Top, pY_Top);
            ctx.closePath();

            ctx.lineWidth = 3;
            ctx.strokeStyle = '#2c2a29';
            ctx.stroke();
            ctx.fillStyle = 'rgba(212, 175, 55, 0.05)'; // 삼각형 내부 은은한 금빛 채우기
            ctx.fill();

            // 직각 표시 (Square 기호)
            const squareSize = 15;
            ctx.beginPath();
            ctx.moveTo(pX_RightAngle - squareSize, pY_RightAngle);
            ctx.lineTo(pX_RightAngle - squareSize, pY_RightAngle - squareSize);
            ctx.lineTo(pX_RightAngle, pY_RightAngle - squareSize);
            ctx.strokeStyle = '#888';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // 5. 각 변의 텍스트 레이블 위치 세팅
            // 아랫변 a (밑변 중심 아래쪽)
            labelA.style.left = `${(pX_A + pX_RightAngle) / 2 - 20}px`;
            labelA.style.top = `${pY_A + 15}px`;

            // 세로변 b (우측 높이 중심 오른편)
            labelB.style.left = `${pX_RightAngle + 15}px`;
            labelB.style.top = `${(pY_RightAngle + pY_Top) / 2 - 10}px`;

            // 빗변 c (빗변 중심의 왼쪽 대각선 위편)
            labelC.style.left = `${(pX_A + pX_Top) / 2 - 50}px`;
            labelC.style.top = `${(pY_A + pY_Top) / 2 - 25}px`;
        }

        // 초기 실행
        update();
    </script>
</body>
</html>
