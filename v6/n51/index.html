<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Neon 3D Top-Down Shooter - Balanced</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #010103; font-family: 'Segoe UI', sans-serif; user-select: none; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        #hp { font-size: 32px; font-weight: bold; color: #00ffff; text-shadow: 0 0 10px #00ffff; }
        #info { font-size: 16px; margin-top: 10px; color: #ff00ff; text-shadow: 0 0 5px #ff00ff; }
        
        #killBanner {
            position: absolute; top: -50px; left: 50%; transform: translateX(-50%);
            z-index: 21; font-size: 32px; font-weight: bold; color: #00ff00;
            text-shadow: 0 0 10px #00ff00; visibility: hidden;
        }
        .killBannerAnim { visibility: visible !important; animation: killPop 1.5s ease-out forwards; }
        @keyframes killPop {
            0% { top: -50px; opacity: 0; transform: translateX(-50%) scale(0.8); }
            15% { top: 40px; opacity: 1; transform: translateX(-50%) scale(1.2); }
            100% { top: 0px; opacity: 0; transform: translateX(-50%) scale(0.9); visibility: hidden; }
        }

        #gameover { 
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            font-size: 64px; font-weight: bold; color: #ff0000; text-shadow: 0 0 20px #ff0000; 
            z-index: 20; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="hp">HP: 100</div>
        <div id="info">이동: WASD | 공격: 마우스 좌클릭</div>
    </div>
    <div id="killBanner">적 처치!</div>
    <div id="gameover">GAME OVER</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(new THREE.RenderPass(scene, camera));
        
        // [수정] 네온 효과 강도 완화 (3.5 -> 1.5), 임계값 조정 (0 -> 0.2)
        const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.2);
        composer.addPass(bloomPass);

        const grid = new THREE.GridHelper(300, 150, 0xdd00ff, 0x330066);
        scene.add(grid);

        const player = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true }));
        player.position.y = 1;
        scene.add(player);

        let hp = 100, gameActive = true, shake = { d: 0, i: 0 };
        const keys = {}, bullets = [], enemies = [], clock = new THREE.Clock();

        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
        window.addEventListener('mousedown', e => {
            if (!gameActive) return;
            
            // 총소리 합성
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.frequency.setValueAtTime(600, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.1);
            g.gain.setValueAtTime(0.04, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
            osc.connect(g); g.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.1);

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1), camera);
            const target = new THREE.Vector3();
            raycaster.ray.intersectPlane(new THREE.Plane(new THREE.Vector3(0,1,0), 0), target);
            
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshBasicMaterial({ color: 0xffff00 }));
            b.position.copy(player.position);
            b.userData.dir = new THREE.Vector3(target.x - player.position.x, 0, target.z - player.position.z).normalize();
            scene.add(b); bullets.push(b);
        });

        setTimeout(() => setInterval(() => {
            if (!gameActive) return;
            const e = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), new THREE.MeshBasicMaterial({ color: 0xff0033, wireframe: true }));
            const a = Math.random() * Math.PI * 2;
            e.position.set(player.position.x + Math.cos(a)*45, 1, player.position.z + Math.sin(a)*45);
            scene.add(e); enemies.push(e);
        }, 800), 3000);

        function animate() {
            requestAnimationFrame(animate);
            if (!gameActive) return composer.render();
            const dt = clock.getDelta();
            if (keys['w']) player.position.z -= 25*dt;
            if (keys['s']) player.position.z += 25*dt;
            if (keys['a']) player.position.x -= 25*dt;
            if (keys['d']) player.position.x += 25*dt;

            let sx = 0, sz = 0;
            if (shake.d > 0) { sx = (Math.random()-0.5)*shake.i; sz = (Math.random()-0.5)*shake.i; shake.d -= dt; }
            camera.position.set(player.position.x + sx, 50, player.position.z + sz);
            camera.lookAt(player.position.x + sx, 0, player.position.z + sz);

            bullets.forEach((b, i) => {
                b.position.add(b.userData.dir.clone().multiplyScalar(50*dt));
                if (b.position.distanceTo(player.position) > 65) { scene.remove(b); bullets.splice(i, 1); }
            });

            enemies.forEach((e, i) => {
                e.position.add(new THREE.Vector3(player.position.x-e.position.x, 0, player.position.z-e.position.z).normalize().multiplyScalar(12*dt));
                if (e.position.distanceTo(player.position) < 2) {
                    hp -= 10; document.getElementById('hp').innerText = 'HP: ' + hp;
                    shake = {d: 0.2, i: 1.0}; scene.remove(e); enemies.splice(i, 1);
                    if (hp <= 0) { gameActive = false; document.getElementById('gameover').style.display = 'block'; }
                }
                bullets.forEach((b, j) => {
                    if (e.position.distanceTo(b.position) < 2.5) {
                        shake = {d: 0.08, i: 0.3};
                        const kb = document.getElementById('killBanner');
                        kb.classList.remove('killBannerAnim'); void kb.offsetWidth; kb.classList.add('killBannerAnim');
                        scene.remove(e); scene.remove(b); enemies.splice(i, 1); bullets.splice(j, 1);
                    }
                });
            });
            composer.render();
        }
        animate();
    </script>
</body>
</html>
