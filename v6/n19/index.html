<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>렉 제로 슬로우 칼립소 기타 스튜디오 (A코드)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            min-height: 100vh;
            padding: 15px 10px;
            overflow: hidden;
            position: relative;
            background-color: #0c0c0e;
        }

        /* 흐리게 처리된 고화질 기타 배경 레이어 */
        .bg-guitar-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?auto=format&fit=crop&q=80&w=1200');
            background-size: cover;
            background-position: center;
            filter: blur(7px) brightness(0.35);
            transform: scale(1.05); 
            z-index: -2;
        }

        .bg-overlay-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, rgba(12,12,14,0.5) 0%, rgba(12,12,14,0.85) 100%);
            z-index: -1;
        }

        /* 시작 오버레이 가림막 */
        #audio-unlock-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(12, 12, 14, 0.95);
            z-index: 99999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        #audio-unlock-overlay h2 {
            font-size: 1.6rem;
            font-weight: 600;
            color: #ffaa71;
            text-align: center;
            pointer-events: none;
        }

        .start-btn {
            background-color: #ffaa71;
            color: #121214;
            padding: 18px 50px;
            font-size: 1.3rem;
            font-weight: bold;
            border: none;
            border-radius: 35px;
            box-shadow: 0 0 25px rgba(255, 170, 113, 0.5);
            pointer-events: none;
        }

        header {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            margin-bottom: 5px;
            z-index: 10;
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #f1f5f9;
            text-shadow: 0 2px 5px rgba(0,0,0,0.7);
        }

        /* AI 시연 버튼 */
        .ai-play-btn {
            background: linear-gradient(135deg, #38bdf8 0%, #0284c7 100%);
            color: #ffffff;
            border: none;
            padding: 11px 22px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(2, 132, 199, 0.4);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ai-play-btn:active {
            transform: scale(0.95);
        }

        .ai-play-btn.playing {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.4);
        }

        .visualizer-container {
            width: 100%;
            max-width: 900px;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            z-index: 10;
        }

        canvas {
            width: 100%;
            height: 100%;
            max-height: 160px;
            background: rgba(10, 10, 12, 0.65); 
            backdrop-filter: blur(8px);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .chord-container {
            width: 100%;
            max-width: 900px;
            background-color: rgba(20, 20, 24, 0.75); 
            backdrop-filter: blur(12px);
            padding: 14px;
            border-radius: 20px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 10;
        }

        .chord-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            width: 100%;
        }

        .chord-btn {
            color: #121214;
            height: 95px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            transition: all 0.04s ease;
        }

        .chord-btn.ai-active {
            transform: translateY(4px) !important;
            box-shadow: 0 1px 0 rgba(0,0,0,0.2) !important;
            filter: brightness(0.8) contrast(1.2);
        }

        .chord-btn .down-zone {
            width: 100%;
            height: 65%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            font-weight: 700;
            pointer-events: none;
        }

        .chord-btn .down-zone span {
            font-size: 0.65rem;
            font-weight: 400;
            opacity: 0.7;
        }

        .chord-btn .up-zone {
            width: 100%;
            height: 35%;
            background-color: rgba(0, 0, 0, 0.08);
            border-top: 1px dashed rgba(0, 0, 0, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1px;
            opacity: 0.6;
            pointer-events: none;
        }

        .chord-btn.minor .up-zone {
            background-color: rgba(255, 255, 255, 0.05);
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }

        .chord-btn.major {
            background: linear-gradient(to bottom, #ffffff 0%, #e2e8f0 100%);
            box-shadow: 0 5px 0 #cbd5e1, 0 6px 12px rgba(0,0,0,0.3);
        }
        .chord-btn.major:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #cbd5e1, 0 3px 6px rgba(0,0,0,0.2);
        }

        .chord-btn.minor {
            background: linear-gradient(to bottom, #444456 0%, #2a2a38 100%);
            color: #ffffff;
            box-shadow: 0 5px 0 #181822, 0 6px 12px rgba(0,0,0,0.4);
        }
        .chord-btn.minor:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #181822, 0 3px 6px rgba(0,0,0,0.2);
        }

        .chord-btn.seventh {
            background: linear-gradient(to bottom, #ffd3b6 0%, #ffaa71 100%);
            box-shadow: 0 5px 0 #d97d41, 0 6px 12px rgba(0,0,0,0.3);
        }
        .chord-btn.seventh:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #d97d41, 0 3px 6px rgba(0,0,0,0.2);
        }

        .chord-btn.sus4 {
            background: linear-gradient(to bottom, #a8dadc 0%, #457b9d 100%);
            color: #ffffff;
            box-shadow: 0 5px 0 #1d3557, 0 6px 12px rgba(0,0,0,0.3);
        }
        .chord-btn.sus4:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #1d3557, 0 3px 6px rgba(0,0,0,0.2);
        }

        .info-text {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #b2b2cc;
            text-align: center;
            line-height: 1.4;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div class="bg-guitar-image"></div>
    <div class="bg-overlay-gradient"></div>

    <div id="audio-unlock-overlay">
        <h2>화면 아무 곳이나 터치해 주세요</h2>
        <button class="start-btn">연주 시작 🎸</button>
    </div>

    <header>
        <h1>Studio Live Guitar Simulator</h1>
        <button class="ai-play-btn" id="ai-btn">🤖 A코드 칼립소 시연 (2회)</button>
    </header>

    <div class="visualizer-container">
        <canvas id="visualizer"></canvas>
    </div>

    <div class="chord-container">
        <div class="chord-grid">
            <button class="chord-btn major" data-chord="C"><div class="down-zone">C<span>Major</span></div><div class="up-zone">▲ UP</div></button>
            <button class="chord-btn major" data-chord="D"><div class="down-zone">D<span>Major</span></div><div class="up-zone">▲ UP</div></button>
            <button class="chord-btn major" data-chord="E"><div class="down-zone">E<span>Major</span></div><div class="up-zone">▲ UP</div></button>
            <button class="chord-btn major" data-chord="F"><div class="down-zone">F<span>Major</span></div><div class="up-zone">▲ UP</div></button>
            <button class="chord-btn major" data-chord="G"><div class="down-zone">G<span>Major</span></div><div class="up-zone">▲ UP</div></button>

            <button class="chord-btn major" data-chord="A"><div class="down-zone">A<span>Major</span></div><div class="up-zone">▲ UP</div></button>
            <button class="chord-btn major" data-chord="B"><div class="down-zone">B<span>Major</span></div><div class="up-zone">▲ UP</div></button>
            <button class="chord-btn minor" data-chord="Cm"><div class="down-zone">Cm<span>Minor</span></div><div class="up-zone">▲ UP</div></button>
            <button class="chord-btn minor" data-chord="Dm"><div class="down-zone">Dm<span>Minor</span></div><div class="up-zone">▲ UP</div></button>
            <button class="chord-btn minor" data-chord="Em"><div class="down-zone">Em<span>Minor</span></div><div class="up-zone">▲ UP</div></button>

            <button class="chord-btn minor" data-chord="Am"><div class="down-zone">Am<span>Minor</span></div><div class="up-zone">▲ UP</div></button>
            <button class="chord-btn minor" data-chord="Bm"><div class="down-zone">Bm<span>Minor</span></div><div class="up-zone">▲ UP</div></button>
            <button class="chord-btn seventh" data-chord="C7"><div class="down-zone">C7<span>Dominant</span></div><div class="up-zone">▲ UP</div></button>
            <button class="chord-btn seventh" data-chord="D7"><div class="down-zone">D7<span>Dominant</span></div><div class="up-zone">▲ UP</div></button>
            <button class="chord-btn seventh" data-chord="E7"><div class="down-zone">E7<span>Dominant</span></div><div class="up-zone">▲ UP</div></button>

            <button class="chord-btn seventh" data-chord="G7"><div class="down-zone">G7<span>Dominant</span></div><div class="up-zone">▲ UP</div></button>
            <button class="chord-btn seventh" data-chord="A7"><div class="down-zone">A7<span>Dominant</span></div><div class="up-zone">▲ UP</div></button>
            <button class="chord-btn seventh" data-chord="B7"><div class="down-zone">B7<span>Dominant</span></div><div class="up-zone">▲ UP</div></button>
            <button class="chord-btn sus4" data-chord="Dsus4"><div class="down-zone">Dsus4<span>Sus4</span></div><div class="up-zone">▲ UP</div></button>
            <button class="chord-btn sus4" data-chord="Gsus4"><div class="down-zone">Gsus4<span>Sus4</span></div><div class="up-zone">▲ UP</div></button>
        </div>
        <div class="info-text">상단 글씨를 터치하면 <b>다운 스트로크</b>, 하단 <b>▲ UP</b> 영역을 터치하면 거꾸로 긁어올리는 <b>업 스트로크</b> 사운드가 출력됩니다.</div>
    </div>

    <script>
        const chords = {
            "C":  [130.81, 164.81, 196.00, 261.63, 329.63], 
            "D":  [146.83, 220.00, 293.66, 369.99],         
            "E":  [82.41, 123.47, 164.81, 207.65, 246.94, 329.63], 
            "F":  [87.31, 130.81, 174.61, 220.00, 261.63, 349.23],  
            "G":  [98.00, 123.47, 146.83, 196.00, 246.94, 392.00], 
            "A":  [110.00, 164.81, 220.00, 277.18, 329.63],
            "B":  [116.54, 164.81, 233.08, 293.66, 369.99],
            "Cm": [130.81, 155.56, 196.00, 261.63, 311.13],
            "Dm": [146.83, 220.00, 293.66, 349.23],         
            "Em": [82.41, 123.47, 164.81, 196.00, 246.94, 329.63], 
            "Am": [110.00, 164.81, 220.00, 261.63, 329.63], 
            "Bm": [116.54, 174.61, 233.08, 293.66, 349.23],
            "C7": [130.81, 164.81, 233.08, 261.63, 329.63],
            "D7": [146.83, 220.00, 293.66, 311.13],
            "E7": [82.41, 123.47, 164.81, 196.00, 246.94, 293.66],
            "G7": [98.00, 123.47, 146.83, 196.00, 246.94, 349.23],
            "A7": [110.00, 164.81, 220.00, 311.13, 329.63],
            "B7": [116.54, 146.83, 233.08, 293.66, 369.99],
            "Dsus4": [146.83, 220.00, 293.66, 392.00],
            "Gsus4": [98.00, 130.81, 146.83, 196.00, 261.63, 392.00]
        };

        let audioCtx = null;
        let analyser = null;

        function setupAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 512;
                analyser.connect(audioCtx.destination);
                
                const buffer = audioCtx.createBuffer(1, 1, 22050);
                const source = audioCtx.createBufferSource();
                source.buffer = buffer;
                source.connect(audioCtx.destination);
                source.start(0);
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function strumChord(chordName, isUpstroke = false) {
            if (!audioCtx) return;

            let freqs = chords[chordName];
            if (!freqs) return;

            if (isUpstroke) {
                freqs = [...freqs].reverse();
            }

            const now = audioCtx.currentTime;
            
            freqs.forEach((freq, index) => {
                const stringDelay = index * (isUpstroke ? 0.03 : 0.035); 
                const playTime = now + stringDelay;

                const oscRoot = audioCtx.createOscillator();
                const oscOvertone = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                const filter = audioCtx.createBiquadFilter();
                const overtoneGain = audioCtx.createGain();

                oscRoot.type = 'triangle';
                oscRoot.frequency.setValueAtTime(freq, playTime);

                oscOvertone.type = 'sawtooth';
                oscOvertone.frequency.setValueAtTime(freq * 2, playTime);
                
                overtoneGain.gain.setValueAtTime(isUpstroke ? 0.06 : 0.04, playTime); 

                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(isUpstroke ? 1800 : 1500, playTime);

                gainNode.gain.setValueAtTime(0, playTime);
                gainNode.gain.linearRampToValueAtTime(isUpstroke ? 0.28 : 0.35, playTime + 0.003); 
                gainNode.gain.exponentialRampToValueAtTime(0.001, playTime + 1.6); 

                oscRoot.connect(gainNode);
                oscOvertone.connect(overtoneGain);
                overtoneGain.connect(gainNode);
                gainNode.connect(filter);
                filter.connect(analyser);

                oscRoot.start(playTime);
                oscOvertone.start(playTime);
                
                oscRoot.stop(playTime + 1.7);
                oscOvertone.stop(playTime + 1.7);
            });
        }

        const aiBtn = document.getElementById('ai-btn');
        let aiTimeoutTimeline = [];
        let isPlaying = false;

        function stopAiDemo() {
            aiTimeoutTimeline.forEach(t => clearTimeout(t));
            aiTimeoutTimeline = [];
            
            isPlaying = false;
            aiBtn.classList.remove('playing');
            aiBtn.innerText = "🤖 A코드 칼립소 시연 (2회)";
        }

        function playTwoTimesCalypso() {
            setupAudioContext();
            isPlaying = true;
            aiBtn.classList.add('playing');
            aiBtn.innerText = "🛑 연주 중단하기";

            // [수정] 오직 "A" 코드로만 2마디 연주되도록 타임 패턴 설정
            const twoTimesPattern = [
                // 1번째 마디 (A코드)
                { relTime: 0,    chord: "A", up: false }, 
                { relTime: 480,  chord: "A", up: false }, 
                { relTime: 720,  chord: "A", up: true },  
                { relTime: 1200, chord: "A", up: true },  
                { relTime: 1440, chord: "A", up: false }, 
                { relTime: 1680, chord: "A", up: true },  

                // 2번째 마디 (A코드)
                { relTime: 1900, chord: "A", up: false },
                { relTime: 2380, chord: "A", up: false },
                { relTime: 2620, chord: "A", up: true },
                { relTime: 3100, chord: "A", up: true },
                { relTime: 3340, chord: "A", up: false },
                { relTime: 3580, chord: "A", up: true }
            ];

            twoTimesPattern.forEach(step => {
                let t = setTimeout(() => {
                    strumChord(step.chord, step.up);
                    visualizeAiPress(step.chord);
                }, step.relTime);
                aiTimeoutTimeline.push(t);
            });

            let tEnd = setTimeout(() => {
                stopAiDemo();
            }, 3800);
            aiTimeoutTimeline.push(tEnd);
        }

        function visualizeAiPress(chordName) {
            const btn = document.querySelector(`.chord-btn[data-chord="${chordName}"]`);
            if (btn) {
                btn.classList.add('ai-active');
                setTimeout(() => btn.classList.remove('ai-active'), 250);
            }
        }

        aiBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (isPlaying) {
                stopAiDemo();
            } else {
                playTwoTimesCalypso();
            }
        });

        const overlay = document.getElementById('audio-unlock-overlay');
        overlay.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            setupAudioContext();
            overlay.style.opacity = 0;
            setTimeout(() => overlay.remove(), 200);
        });

        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = canvas.clientWidth * window.devicePixelRatio;
            canvas.height = canvas.clientHeight * window.devicePixelRatio;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        document.querySelectorAll('.chord-btn').forEach(btn => {
            btn.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                setupAudioContext();
                const chordName = btn.getAttribute('data-chord');
                
                const rect = btn.getBoundingClientRect();
                const relativeY = e.clientY - rect.top;
                const buttonHeight = rect.height;

                const isUpstroke = relativeY > (buttonHeight * 0.65);
                
                strumChord(chordName, isUpstroke);
            });
        });

        function drawVisualizer() {
            requestAnimationFrame(drawVisualizer);

            if (!analyser) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                return;
            }

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteTimeDomainData(dataArray);

            ctx.fillStyle = 'rgba(12, 12, 14, 0.25)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.lineWidth = 3.5;
            ctx.strokeStyle = '#38bdf8'; 
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#38bdf8';
            ctx.beginPath();

            const sliceWidth = canvas.width / bufferLength;
            let x = 0;

            let triggerOffset = 0;
            for (let i = 0; i < bufferLength / 2; i++) {
                if (dataArray[i] < 128 && dataArray[i+1] >= 128) {
                    triggerOffset = i;
                    break;
                }
            }

            for (let i = triggerOffset; i < bufferLength; i++) {
                const v = dataArray[i] / 128.0;
                const y = (v * canvas.height) / 2;

                if (i === triggerOffset) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
                x += sliceWidth;
                if (x > canvas.width) break;
            }

            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        drawVisualizer();
    </script>
</body>
</html>
